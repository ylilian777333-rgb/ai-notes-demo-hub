<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Notes · Demo 管理中心</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8fafc;--s2:#ffffff;--s3:#f1f5f9;
  --bd:#e2e8f0;--bd2:#cbd5e1;
  --tx:#0f172a;--su:#475569;--mu:#64748b;--dm:#94a3b8;
  --bl:#2563eb;--am:#d97706;--pu:#7c3aed;--gn:#16a34a;--rd:#dc2626;--cy:#0891b2;
}
html,body{background:var(--bg);color:var(--tx);font-family:'Noto Sans SC',sans-serif;min-height:100vh}
body{padding:32px 24px 60px}
.container{max-width:1200px;margin:0 auto}

/* header */
.header{text-align:center;margin-bottom:40px}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.03);border:1px solid var(--bd);border-radius:20px;padding:4px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--mu);margin-bottom:12px}
.header h1{font-size:28px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.header p{font-size:13px;color:var(--mu)}
.stats{display:flex;gap:20px;justify-content:center;margin-top:16px}
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:8px 18px;text-align:center}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--bl)}
.stat-label{font-size:10px;color:var(--mu);margin-top:2px}

/* filters */
.filters{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;justify-content:center}
.filter-btn{display:flex;align-items:center;gap:6px;border:1.5px solid var(--bd);border-radius:10px;padding:8px 16px;cursor:pointer;transition:all .25s;background:var(--s2);font-family:'Noto Sans SC',sans-serif;font-size:12px;font-weight:500;color:var(--su)}
.filter-btn:hover{border-color:var(--bd2);transform:translateY(-1px);background:var(--s3)}
.filter-btn.active{border-color:var(--bl);background:rgba(37,99,235,.08);color:var(--bl)}
.filter-btn .count{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(0,0,0,.05);padding:2px 6px;border-radius:4px;color:var(--mu)}

/* timeline */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--bd),transparent)}
.date-group{margin-bottom:32px}
.date-label{position:relative;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mu);margin-bottom:14px;letter-spacing:.05em}
.date-label::before{content:'';position:absolute;left:-24px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--bl);border:2px solid var(--bg);box-shadow:0 0 6px rgba(37,99,235,.25)}

/* cards grid */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* card */
.card{display:block;background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;text-decoration:none;color:var(--tx);transition:all .25s;position:relative;overflow:hidden;cursor:pointer}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac);border-radius:3px 0 0 3px;opacity:.6;transition:opacity .25s}
.card:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.card:hover::before{opacity:1}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-ver{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:5px;background:rgba(0,0,0,.04);color:var(--ac);font-weight:600}
.card-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dm)}
.card-title{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.4}
.card-desc{font-size:11.5px;color:var(--mu);line-height:1.6;margin-bottom:10px}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.card-cat{font-size:10px;padding:3px 8px;border-radius:5px;background:rgba(0,0,0,.04);color:var(--su);font-weight:500}
.card-open{font-size:11px;color:var(--ac);font-weight:500;opacity:0;transition:opacity .25s}
.card:hover .card-open{opacity:1}

/* responsive */
@media(max-width:640px){
  body{padding:20px 14px 40px}
  .header h1{font-size:22px}
  .cards{grid-template-columns:1fr}
  .stats{gap:10px}
  .stat{padding:6px 12px}
}
</style>
</head>

const CATS = [
  {id:"all",name:"全部",icon:"📋",count:DEMOS.length},
  {id:"interaction",name:"交互演示",icon:"🎯",count:DEMOS.filter(d=>d.cat==="interaction").length,color:"bl"},
  {id:"product",name:"产品定义",icon:"📐",count:DEMOS.filter(d=>d.cat==="product").length,color:"am"},
  {id:"serious",name:"严肃创作",icon:"✍️",count:DEMOS.filter(d=>d.cat==="serious").length,color:"pu"},
  {id:"combined",name:"完整版",icon:"📦",count:DEMOS.filter(d=>d.cat==="combined").length,color:"gn"},
  {id:"claw",name:"Claw光线",icon:"✨",count:DEMOS.filter(d=>d.cat==="claw").length,color:"cy"},
  {id:"pm",name:"项目管理",icon:"📊",count:DEMOS.filter(d=>d.cat==="pm").length,color:"rd"},
  {id:"miclaw",name:"MiClaw Agent",icon:"🔥",count:DEMOS.filter(d=>d.cat==="miclaw").length,color:"am"},
];

let activeCat = "all";

function renderFilters(){
  const el = document.getElementById("filters");
  el.innerHTML = CATS.map(c=>`<button class="filter-btn ${activeCat===c.id?'active':''}" onclick="setFilter('${c.id}')">${c.icon} ${c.name} <span class="count">${c.count}</span></button>`).join("");
}

function setFilter(cat){
  activeCat = cat;
  renderFilters();
  renderTimeline();
}

function renderTimeline(){
  const filtered = activeCat==="all" ? DEMOS : DEMOS.filter(d=>d.cat===activeCat);
  const groups = {};
  filtered.forEach(d=>{
    if(!groups[d.date]) groups[d.date]=[];
    groups[d.date].push(d);
  });
  const sortedDates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const el = document.getElementById("timeline");
  el.innerHTML = sortedDates.map(date=>{
    const dayLabel = formatDate(date);
    const cards = groups[date].sort((a,b)=>b.time.localeCompare(a.time));
    return `<div class="date-group">
      <div class="date-label">${dayLabel} · ${cards.length} 个版本</div>
      <div class="cards">${cards.map(renderCard).join("")}</div>
    </div>`;
  }).join("");
}

function formatDate(d){
  const [y,m,day] = d.split("-");
  const weekdays=["日","一","二","三","四","五","六"];
  const dt = new Date(d);
  return `${y}年${+m}月${+day}日 · 周${weekdays[dt.getDay()]}`;
}

function renderCard(d){
  return `<a href="${d.file}" target="_blank" class="card" style="--ac:var(--${d.color})">
    <div class="card-head">
      <span class="card-ver">${d.ver}</span>
      <span class="card-time">${d.time}</span>
    </div>
    <div class="card-title">${d.title}</div>
    <div class="card-desc">${d.desc}</div>
    <div class="card-foot">
      <span class="card-cat">${d.catName}</span>
      <span class="card-open">打开 →</span>
    </div>
  </a>`;
}

renderFilters();
renderTimeline();
</script>
