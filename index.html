<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Notes · Demo 管理中心</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f6f8fb;--s1:#ffffff;--s2:#f0f4f8;--s3:#e8edf3;
  --bd:#dfe4ec;--bd2:#c8d0dc;
  --tx:#1a1f36;--su:#4a5568;--mu:#718096;--dm:#a0aec0;
  --bl:#4f6ef7;--am:#e8930c;--pu:#8b5cf6;--gn:#10b981;--rd:#ef4444;--cy:#06b6d4;
  --bl-bg:#eef2ff;--am-bg:#fef3c7;--pu-bg:#f3e8ff;--gn-bg:#d1fae5;--rd-bg:#fee2e2;--cy-bg:#cffafe;
  --radius:16px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans SC',sans-serif;min-height:100vh;padding:0}

/* hero */
.hero{background:linear-gradient(135deg,#4f6ef7 0%,#8b5cf6 50%,#06b6d4 100%);padding:48px 24px 56px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60%;left:-20%;width:140%;height:140%;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 60%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(to bottom right,transparent 49.5%,var(--bg) 50%)}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 16px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.9);margin-bottom:14px}
.hero h1{font-size:32px;font-weight:700;letter-spacing:-.02em;color:#fff;margin-bottom:8px;text-shadow:0 2px 12px rgba(0,0,0,.1)}
.hero p{font-size:14px;color:rgba(255,255,255,.75);margin-bottom:24px}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:10px 22px;text-align:center;min-width:90px}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#fff}
.stat-label{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.05em}

/* main */
.main{max-width:1200px;margin:-20px auto 0;padding:0 24px 60px;position:relative;z-index:2}

/* search + filters bar */
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:24px;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--bd);border-radius:12px;background:var(--s1);font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--tx);outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(79,110,247,.1)}
.search-box input::placeholder{color:var(--dm)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dm);width:16px;height:16px}
.view-toggle{display:flex;border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;background:var(--s1)}
.view-btn{padding:8px 14px;cursor:pointer;font-size:14px;border:none;background:none;color:var(--mu);transition:all .2s}
.view-btn.active{background:var(--bl);color:#fff}

/* filters */
.filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--bd);border-radius:24px;padding:7px 16px;cursor:pointer;transition:all .25s;background:var(--s1);font-family:'Noto Sans SC',sans-serif;font-size:12px;font-weight:500;color:var(--su)}
.filter-btn:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.04)}
.filter-btn.active{color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,.1)}
.filter-btn.active[data-cat="all"]{background:var(--bl)}
.filter-btn.active[data-cat="interaction"]{background:var(--bl)}
.filter-btn.active[data-cat="product"]{background:var(--am)}
.filter-btn.active[data-cat="serious"]{background:var(--pu)}
.filter-btn.active[data-cat="combined"]{background:var(--gn)}
.filter-btn.active[data-cat="claw"]{background:var(--cy)}
.filter-btn.active[data-cat="pm"]{background:var(--rd)}
.filter-btn .count{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,.06)}
.filter-btn.active .count{background:rgba(255,255,255,.25);color:#fff}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">◆ DEMO MANAGER v2</div>
  <h1>AI Notes · Demo 管理中心</h1>
  <p>所有产品 Demo · 按内容分类 · 按时间线管理</p>
  <div class="stats" id="stats"></div>
</div>

<div class="main">
  <div class="toolbar">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜索 Demo 名称、描述..." oninput="onSearch()"/>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('grid')" id="vGrid">▦</button>
      <button class="view-btn" onclick="setView('list')" id="vList">☰</button>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div id="timeline"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">🔍</div>
    <div class="empty-text">没有找到匹配的 Demo</div>
  </div>
</div>
</body>
</html>

<style>
/* timeline */
.date-group{margin-bottom:32px;animation:fadeUp .4s ease both}
.date-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.date-dot{width:10px;height:10px;border-radius:50%;background:var(--bl);box-shadow:0 0 0 4px var(--bl-bg);flex-shrink:0}
.date-line{height:1px;flex:1;background:linear-gradient(to right,var(--bd),transparent)}
.date-label{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--su);font-weight:500;white-space:nowrap}
.date-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dm);background:var(--s2);padding:2px 8px;border-radius:8px;white-space:nowrap}

/* cards grid */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding-left:22px}
.cards.list-view{grid-template-columns:1fr;gap:10px}

/* card */
.card{display:block;background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--radius);padding:20px;text-decoration:none;color:var(--tx);transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;cursor:pointer}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ac);border-radius:4px 0 0 4px;opacity:0;transition:opacity .3s}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(79,110,247,.02),rgba(139,92,246,.02));opacity:0;transition:opacity .3s;pointer-events:none;border-radius:var(--radius)}
.card:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04)}
.card:hover::before{opacity:1}
.card:hover::after{opacity:1}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-ver{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:8px;font-weight:600;letter-spacing:.02em}
.card-ver.c-bl{background:var(--bl-bg);color:var(--bl)}
.card-ver.c-am{background:var(--am-bg);color:var(--am)}
.card-ver.c-pu{background:var(--pu-bg);color:var(--pu)}
.card-ver.c-gn{background:var(--gn-bg);color:var(--gn)}
.card-ver.c-rd{background:var(--rd-bg);color:var(--rd)}
.card-ver.c-cy{background:var(--cy-bg);color:var(--cy)}
.card-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dm);display:flex;align-items:center;gap:4px}
.card-title{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.5}
.card-desc{font-size:12px;color:var(--mu);line-height:1.7;margin-bottom:12px}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.card-cat{font-size:10px;padding:4px 10px;border-radius:8px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.card-cat.c-bl{background:var(--bl-bg);color:var(--bl)}
.card-cat.c-am{background:var(--am-bg);color:var(--am)}
.card-cat.c-pu{background:var(--pu-bg);color:var(--pu)}
.card-cat.c-gn{background:var(--gn-bg);color:var(--gn)}
.card-cat.c-rd{background:var(--rd-bg);color:var(--rd)}
.card-cat.c-cy{background:var(--cy-bg);color:var(--cy)}
.card-open{font-size:12px;color:var(--ac);font-weight:500;opacity:0;transition:all .3s;transform:translateX(-4px)}
.card:hover .card-open{opacity:1;transform:translateX(0)}

/* list view card */
.list-view .card{display:flex;align-items:center;gap:16px;padding:14px 20px}
.list-view .card-head{margin-bottom:0;flex-shrink:0;width:80px}
.list-view .card-body{flex:1;min-width:0}
.list-view .card-title{margin-bottom:2px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-view .card-desc{margin-bottom:0;font-size:11px}
.list-view .card-foot{flex-shrink:0}

/* empty state */
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px;color:var(--mu)}

/* animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* responsive */
@media(max-width:768px){
  .hero{padding:36px 16px 48px}
  .hero h1{font-size:24px}
  .main{padding:0 16px 40px}
  .cards{grid-template-columns:1fr;padding-left:0}
  .toolbar{flex-direction:column}
  .search-box{min-width:100%}
  .stats{gap:8px}
  .stat{padding:8px 14px;min-width:70px}
  .stat-num{font-size:18px}
}
@media(max-width:400px){
  .filters{gap:6px}
  .filter-btn{padding:6px 12px;font-size:11px}
}
</style>

const CATS = [
  {id:"all",name:"全部",icon:"📋"},
  {id:"interaction",name:"交互演示",icon:"🎯",color:"bl"},
  {id:"product",name:"产品定义",icon:"📐",color:"am"},
  {id:"serious",name:"严肃创作",icon:"✍️",color:"pu"},
  {id:"combined",name:"完整版",icon:"📦",color:"gn"},
  {id:"claw",name:"Claw光线",icon:"✨",color:"cy"},
  {id:"pm",name:"项目管理",icon:"📊",color:"rd"},
];

let activeCat="all", searchQuery="", viewMode="grid";

function getFiltered(){
  let list = activeCat==="all" ? DEMOS : DEMOS.filter(d=>d.cat===activeCat);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(d=>(d.title+d.desc+d.ver+d.catName).toLowerCase().includes(q));
  }
  return list;
}

function renderStats(){
  const cats=new Set(DEMOS.map(d=>d.cat));
  const days=new Set(DEMOS.map(d=>d.date));
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="stat-num">${DEMOS.length}</div><div class="stat-label">总 Demo</div></div>
    <div class="stat"><div class="stat-num">${cats.size}</div><div class="stat-label">分类</div></div>
    <div class="stat"><div class="stat-num">${days.size}</div><div class="stat-label">天</div></div>`;
}

function renderFilters(){
  document.getElementById("filters").innerHTML=CATS.map(c=>{
    const cnt=c.id==="all"?DEMOS.length:DEMOS.filter(d=>d.cat===c.id).length;
    return `<button class="filter-btn ${activeCat===c.id?'active':''}" data-cat="${c.id}" onclick="setFilter('${c.id}')">${c.icon} ${c.name} <span class="count">${cnt}</span></button>`;
  }).join("");
}

function setFilter(cat){activeCat=cat;renderFilters();renderTimeline()}
function onSearch(){searchQuery=document.getElementById("searchInput").value;renderTimeline()}
function setView(v){
  viewMode=v;
  document.getElementById("vGrid").className="view-btn"+(v==="grid"?" active":"");
  document.getElementById("vList").className="view-btn"+(v==="list"?" active":"");
  renderTimeline();
}

function renderTimeline(){
  const filtered=getFiltered();
  const empty=document.getElementById("emptyState");
  const el=document.getElementById("timeline");
  if(!filtered.length){el.innerHTML="";empty.style.display="block";return}
  empty.style.display="none";
  const groups={};
  filtered.forEach(d=>{if(!groups[d.date])groups[d.date]=[];groups[d.date].push(d)});
  const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=dates.map((date,i)=>{
    const cards=groups[date].sort((a,b)=>b.time.localeCompare(a.time));
    return `<div class="date-group" style="animation-delay:${i*60}ms">
      <div class="date-header">
        <div class="date-dot"></div>
        <div class="date-label">${formatDate(date)}</div>
        <div class="date-count">${cards.length} 个</div>
        <div class="date-line"></div>
      </div>
      <div class="cards ${viewMode==='list'?'list-view':''}">${cards.map(renderCard).join("")}</div>
    </div>`;
  }).join("");
}

function formatDate(d){
  const [y,m,day]=d.split("-");
  const w=["日","一","二","三","四","五","六"];
  return `${+m}月${+day}日 · 周${w[new Date(d).getDay()]}`;
}

function renderCard(d){
  if(viewMode==="list"){
    return `<a href="${d.file}" target="_blank" class="card" style="--ac:var(--${d.color})">
      <div class="card-head"><span class="card-ver c-${d.color}">${d.ver}</span></div>
      <div class="card-body">
        <div class="card-title">${d.title}</div>
        <div class="card-desc">${d.desc}</div>
      </div>
      <div class="card-foot">
        <span class="card-time">🕐 ${d.time}</span>
        <span class="card-open">打开 →</span>
      </div>
    </a>`;
  }
  return `<a href="${d.file}" target="_blank" class="card" style="--ac:var(--${d.color})">
    <div class="card-head">
      <span class="card-ver c-${d.color}">${d.ver}</span>
      <span class="card-time">🕐 ${d.time}</span>
    </div>
    <div class="card-title">${d.title}</div>
    <div class="card-desc">${d.desc}</div>
    <div class="card-foot">
      <span class="card-cat c-${d.color}">${d.catIcon} ${d.catName}</span>
      <span class="card-open">打开 →</span>
    </div>
  </a>`;
}

renderStats();renderFilters();renderTimeline();
</script>
