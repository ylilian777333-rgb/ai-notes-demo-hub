  1: "<div class=\"sh\">笔记详情页 · AI 关联笔记推荐方案</div>\n<p>---</p>\n<div class=\"sh\">需求背景</div>\n<p>当前笔记之间缺乏关联，每篇笔记都是孤立的。随着笔记数量增长，用户面临以下问题：</p>\n<p>1. 检索困难：搜索依赖精确关键词，无法覆盖&quot;记得有一篇相关的，但想不起标题&quot;的模糊检索场景。</p>\n<p>2. 信息碎片化：同一项目或话题的内容分散在多篇笔记中，用户需要手动拼接上下文才能还原完整脉络。</p>\n<p>3. 知识沉没：早期记录的灵感和想法无法与后续产生的新内容自动关联，导致有价值的笔记长期沉底、无法被再次利用。</p>\n<p>4. 整理成本高：文件夹、标签、手动链接等组织方式需要额外的操作成本，大部分用户不会主动整理。</p>\n<p>本方案通过 AI 自动发现笔记间的关联关系，降低&quot;记了之后再利用&quot;的成本。同时保留轻量的手动引用能力，满足用户主动建立确定性关联的需求。</p>\n<div class=\"sh\">优先级与演进路径</div>\n<p>笔记关联是一个可逐步展开的能力体系。本期先做详情页底部关联，因为用户正在阅读时对相关内容需求最强，且不改变现有页面结构，上线即可通过点击率验证效果。</p>\n<p>阶段 | 方向 | 说明</p>\n<p>本期 | 详情页底部关联 | AI 推荐 + 手动引用，本文档范围</p>\n<p>近期 | 语义搜索 | 复用 embedding 能力，搜索返回语义相关笔记</p>\n<p>中期 | 首页&quot;今日相关&quot; | 基于日历、待办、近期编辑聚合当天可能用到的笔记</p>\n<p>远期 | 关系图谱 / 跨域关联 | 可视化笔记网络（适合 Pad/PC）；关联日历、联系人、录音等非笔记内容</p>\n<p style=\"color:#888;font-style:italic\">目标：用户打开一篇笔记，滑到底部即可看到与当前笔记相关的其他笔记，点击可直接跳转。AI 自动发现的关联和用户手动引用的笔记在同一区域分组展示。</p>\n<p>---</p>\n<div class=\"sh\">竞品分析</div>\n<div class=\"sh\">Obsidian 重点分析</div>\n<p>Obsidian 是笔记关联领域的标杆产品，以双向链接和关系图谱为核心功能。</p>\n<p>双向链接：用户在正文中输入 [[笔记名]] 手动建立链接。A 链接了 B，则 B 的反向链接面板自动出现 A。支持三种链接粒度：笔记级（[[笔记名]]）、标题级（[[笔记名#标题]]）、块级（[[笔记名^块ID]]）。还支持内容嵌入（![[]] 实时展示被链接内容）、链接重命名（竖线语法 |）、悬浮预览和编辑。修改被链接笔记的文件名时，所有链接自动同步更新。</p>\n<p>出链与入链：右侧功能栏分为出链列表（&quot;我链接了谁&quot;）和反向链接列表（&quot;谁链接了我&quot;）。反向链接可设置在笔记底部直接显示。此外还有&quot;提到当前文件名&quot;功能——自动扫描全库，找出正文中提到了当前笔记名但未建链接的笔记，可一键建立双链。</p>\n<p>关系图谱：将所有笔记和链接关系可视化为节点网络。支持全局图谱和局部图谱，可按文件夹/标签过滤、颜色分组。实际应用包括：通过颜色组观察知识分布、通过节点聚集度发现核心观点、通过关联路径发现潜在洞见。</p>\n<p>局限：门槛高（需养成 [[]] 习惯）；手机端体验差（大规模笔记库图谱卡顿）；只有关键词匹配（语义相似但用词不同的内容发现不了）；没有关联原因说明。社区最受欢迎的第三方插件 Smart Connections 用 AI embedding 做语义关联，验证了用户对&quot;自动发现关联&quot;的需求。</p>\n<p style=\"color:#888;font-style:italic\">详细分析见：`竞品分析/Obsidian双链与关系图谱竞品分析.md`</p>\n<div class=\"sh\">行业对比</div>\n<p>产品 | 关联方式 | 手动/AI</p>\n<p>Obsidian | 用户输入 `[[笔记名]]` 手动建立双向链接，支持笔记/标题/块三级链接粒度；反向链接面板自动聚合入链；&quot;提到当前文件名&quot;扫描全库发现潜在关联；关系图谱将链接关系可视化为节点网络 | 仅手动</p>\n<p>Reminds | AI 自动推荐相关笔记 + 用户手动引用，两者在同一模块混合展示；另有全局星图和局部星图可视化笔记关联网络 | 手动 + AI</p>\n<p>Notion | 三种链接方式：Link to page（独立块，占整行，支持反向链接）、内联链接（通过 `+` / `@` / `[[` / 粘贴创建，可嵌入文字中，支持反向链接）、超链接（绑定文字跳转，支持页面内锚点，无反向链接）；AI 可自动填充数据库关联属性 | 手动 + AI</p>\n<p>Apple Notes | 手机端通过编辑条&quot;添加链接&quot;搜索笔记标题插入链接，支持自定义显示标题；Mac 端输入 `&gt;&gt;` 触发笔记搜索或右键添加链接；仅支持单向链接，无反向引用 | 仅手动</p>\n<p>Obsidian 和 Apple Notes 代表纯手动链接方案，Notion 在手动基础上引入 AI 辅助，Reminds 已在同一模块混合展示手动引用和 AI 推荐，验证了手动+AI 混合方向的可行性。</p>\n<p>竞品功能中不适用于小米笔记的部分：</p>\n<p>• 特殊符号触发（`[[]]`、`&gt;&gt;`）：手机端需切换符号键盘，操作成本高，我们用 `@` 和粘贴链接替代</p>\n<p>• 标题级/块级精确链接、内容嵌入预览：手机端操作和展示空间受限，当前仅支持笔记级链接</p>\n<p>• 关系图谱可视化：手机端大规模笔记库渲染卡顿，作为远期功能考虑</p>\n<div class=\"sh\">我们的选择</div>\n<p>• **AI 自动关联为主**——覆盖大部分用户（不会主动建链接的人）</p>\n<p>• **手动引用为辅**——满足高级用户主动建立确定性关联的需求</p>\n<p>• **统一展示**——手动引用和 AI 推荐在同一个关联区域分组展示</p>\n<p style=\"color:#888;font-style:italic\">详细竞品调研见：`竞品分析/关联内容推荐竞品调研.md`</p>\n<p>---</p>\n<div class=\"sh\">需求清单</div>\n<p>编号 | 功能 | 优先级 | 说明</p>\n<p>F1 | 关联笔记展示与交互 | P0 | 详情页底部 UI 展示、出现/不出现规则</p>\n<p>F2 | AI 关联策略 | P0 | 关联维度、三层计算策略、缓存、技术依赖</p>\n<p>F3 | 手动笔记引用 | P0 | 用户在编辑态主动引用其他笔记，建立确定性关联</p>\n<p>---</p>\n<div class=\"sh\">F1：关联笔记展示与交互</div>\n<div class=\"sh\">位置</div>\n<p>笔记正文结束后的底部独立区域，不干扰正文阅读。</p>\n<div class=\"sh\">区域结构</div>\n<p>正文结束后分两组展示，各自独立：</p>\n<pre><code>─────────────────────────\n  被以下笔记引用：              ← 第一组：被引用（其他笔记中引用了当前笔记）\n─────────────────────────\n  自动关联笔记                  ← 笔记标题\n─────────────────────────\n\n─────────────────────────\n  关联笔记：                   ← 第二组：AI 推荐\n─────────────────────────\n  笔记AI关联演进\n─────────────────────────\n  什么是笔记双链\n─────────────────────────</code></pre>\n<p>两组的区别：</p>\n<p> | 被以下笔记引用</p>\n<p>…（已截断）</p>",
  2: "<div class=\"sh\">关联内容推荐竞品调研</div>\n<p style=\"color:#888;font-style:italic\">调研范围：笔记工具、内容平台、电商、社交、流媒体，提炼关联推荐的通用设计模式和可借鉴点。</p>\n<div class=\"sh\">一句话结论</div>\n<p>关联推荐的核心体验差异在于：用户是否需要手动建立关联。笔记工具领域正从&quot;手动链接&quot;向&quot;AI 自动发现&quot;演进，而内容/电商/社交平台早已跑通了全自动推荐，我们可以从中借鉴成熟的交互模式。</p>\n<p>---</p>\n<div class=\"sh\">竞品总览</div>\n<p>产品 | 领域 | 关联方式 | 关联维度 | 呈现位置 | 是否需要用户操作</p>\n<p>Obsidian | 笔记工具 | 手动双向链接 `[[]]` | 用户自定义 | 反向链接面板 + Graph View | ✅ 完全手动</p>\n<p>Roam Research | 笔记工具 | 手动双向链接 + 自动反向引用 | 页面引用 + 块引用 | Linked/Unlinked References | ✅ 手动链接，自动聚合</p>\n<p>Mem.ai | 笔记工具 | AI 自动关联 | 主题、人物、时间 | 相关笔记侧栏 + 搜索结果 | ❌ 全自动</p>\n<p>Reminds | 卡片笔记 | AI 自动关联 + 星图 | 语义相似 | 相关笔记推荐 + 全局/局部星图 | ❌ 全自动</p>\n<p>Notion | 协作工具 | 手动关联 + AI 辅助 | 数据库 Relation + AI 自动填充 | 数据库关联属性 + AI 搜索 | 半自动（需建数据库）</p>\n<p>Apple Notes | 系统笔记 | 手动链接 `&gt;&gt;` | 笔记间链接 | 正文内链接 | ✅ 完全手动</p>\n<p>Netflix | 流媒体 | 全自动推荐 | 观看行为 + 内容标签 + 协同过滤 | &quot;因为你看过&quot; 横向卡片行 | ❌ 全自动</p>\n<p>YouTube | 视频平台 | 全自动推荐 | 主题 + 观看行为 + 协同过滤 | 侧边栏&quot;接下来播放&quot; | ❌ 全自动</p>\n<p>Spotify | 音乐平台 | 全自动推荐 | 听众行为交叉分析 | &quot;粉丝也喜欢&quot; + 每日推荐 | ❌ 全自动</p>\n<p>Amazon | 电商 | 全自动推荐 | 购买行为协同过滤 | &quot;经常一起购买&quot; + &quot;看过的人也买了&quot; | ❌ 全自动</p>\n<p>Pinterest | 社交/灵感 | 全自动推荐 | 视觉相似 + 行为 + 语义 | &quot;Related Pins&quot; 瀑布流 | ❌ 全自动</p>\n<p>小红书 | 社交/内容 | 全自动推荐 | 内容标签 + 用户行为 + 协同过滤 | 详情页底部&quot;相关笔记&quot; | ❌ 全自动</p>\n<p>---</p>\n<div class=\"sh\">详细分析</div>\n<div class=\"sh\">1. 笔记工具类</div>\n<div class=\"sh\">Obsidian — 手动链接 + 可视化图谱</div>\n<p>• **关联方式**：用户在正文中输入 `[[笔记名]]` 手动建立双向链接</p>\n<p>• **呈现**：反向链接面板（Backlinks Panel）展示所有引用当前笔记的页面；Graph View 将整个笔记库可视化为节点网络</p>\n<p>• **优点**：关联精确度极高（用户主动建立的一定是有意义的关联）；Graph View 视觉冲击力强，能发现孤立笔记</p>\n<p>• **缺点**：门槛极高，需要用户养成 `[[]]` 的习惯；新用户几乎不会用；关联完全依赖用户记忆</p>\n<p>• **对我们的启示**：Graph View 的&quot;发现孤立笔记&quot;思路可以借鉴——AI 主动告诉用户&quot;这篇笔记和其他笔记没有关联&quot;</p>\n<div class=\"sh\">Roam Research — 块级引用 + 自动反向聚合</div>\n<p>• **关联方式**：每个段落（block）都可被引用，自动生成 Linked References（已链接引用）和 Unlinked References（未链接但提到了相同关键词的引用）</p>\n<p>• **呈现**：页面底部分两栏——Linked References 展示所有主动链接到当前页的内容，Unlinked References 展示提到了当前页面名称但没有主动链接的内容</p>\n<p>• **优点**：Unlinked References 是&quot;半自动关联&quot;的雏形——系统帮你发现潜在关联，用户一键确认</p>\n<p>• **缺点**：仍依赖关键词精确匹配，语义相似但用词不同的内容发现不了</p>\n<p>• **对我们的启示**：Unlinked References 的&quot;发现 → 确认&quot;模式很好，但我们用 AI 语义理解替代关键词匹配，覆盖面更广</p>\n<div class=\"sh\">Mem.ai — AI 全自动关联（最接近我们的方向）</div>\n<p>• **关联方式**：AI 自动构建知识图谱，按主题、人物、时间维度自动关联笔记，无需用户手动操作</p>\n<p>• **呈现**：相关笔记侧栏自动展示关联内容；搜索时自动浮现语义相关的笔记</p>\n<p>• **优点**：零操作成本，用户只管写，AI 负责组织；按人物和项目维度关联非常实用</p>\n<p>• **缺点**：关联准确度依赖 AI 能力，偶尔会出现弱关联；没有关联原因说明，用户不知道为什么推荐</p>\n<p>• **对我们的启示**：方向一致，但我们需要做得更好——标注关联原因（同一人/同项目/同主题），让用户理解推荐逻辑</p>\n<div class=\"sh\">Reminds — AI 卡片笔记（全局星图 + 局部星图 + 相关笔记）</div>\n<p>Reminds（reminds-app.com）是一款国产 AI 卡片笔记工具，定位面向个人、为短小卡片而生（400 字以内最佳），不做协作。产品理念非常克制：&quot;有所为，有所不为&quot;。</p>\n<p>关联笔记的三层结构</p>\n<p>层级 | 功能 | 说明</p>\n<p>第一层 | 相关笔记 | AI 智能推荐相关笔记，不需要手动链接，&quot;知识间的连接更紧密&quot;</p>\n<p>第二层 | 局部星图 | 为单篇笔记展示直接关联的其他笔记，&quot;让思考形成串联&quot;</p>\n<p>第三层 | 全局星图 | 网状图谱呈现所有笔记关系，&quot;知识结构尽收眼底&quot;</p>\n<p>这三层结构和我们规划的 P1（关联列表）→ P2（局部图谱）→ P3（全景图谱）路径几乎一致。</p>\n<p>其他值得关注的功能</p>\n<p>• **MindPilot**：无限画布 + AI Agent，类似 Heptabase 白板 + Tana AI 的结合体</p>\n<p>• **智能回顾**：有摩擦的回顾机制（类似间隔重复），&quot;存入难、取出易&quot;——用户需要主动回忆，而不是被动浏览</p>\n<p>• **AI 智能问答**：基于笔记内容的 RAG 问答，明确声明&quot;笔记里没有找到相关内容就不回答&quot;</p>\n<p>• **多级标签 + 关键词搜索 + 多维度链接**：多路径发现笔记</p>\n<p>产品理念上的克制</p>\n<p>• 不做协作（推荐用 Notion/飞书）</p>\n<p>• 不做长文（推荐用 Obsidian/Notion）</p>\n<p>• AI 只做基于笔记内容的可靠回答，不瞎编——&quot;可靠 AI&quot;的定位</p>\n<p>对我们的启示</p>\n<p>• &quot;相关笔记&quot;是 AI 自动推荐，和我们的方向完全一致</p>\n<p>• &quot;可靠 AI&quot;理念值得借鉴——宁可不推也不推错，和我们的高置信度门槛思路一致</p>\n<p>• 三层关联结构（相关笔记 → 局部星图 → 全局星图）验证了我们的分期路径是合理的</p>\n<p>• 差异</p>\n<p>…（已截断）</p>",
  3: "<div class=\"sh\">Obsidian 竞品分析：双向链接与关系图谱</div>\n<p>---</p>\n<div class=\"sh\">产品概述</div>\n<p>Obsidian 是笔记关联领域的标杆产品，以双向链接（Bidirectional Link）和关系图谱（Graph View）为核心功能，定义了&quot;笔记间关联&quot;的基本范式。本地优先存储，数据以 Markdown 文件形式保存在用户设备上，支持 Windows、macOS、Linux、iOS、Android 全平台。</p>\n<p>---</p>\n<div class=\"sh\">一、双向链接</div>\n<div class=\"sh\">1.1 什么是双向链接</div>\n<p>传统笔记软件中的超链接是单向的：从笔记 A 可以跳转到笔记 B，但在笔记 B 中无法得知笔记 A 链接了自己。Obsidian 的双向链接增加了回溯功能——在笔记 B 中，系统自动提示笔记 A 链接了这篇笔记。这使得用户可以基于笔记 B 进行思维发散，扩展到笔记 A 以及链接笔记 A 的其他笔记，形成知识网络。</p>\n<div class=\"sh\">1.2 创建双向链接的方式</div>\n<p>方式 | 操作 | 说明</p>\n<p>输入 `[[]]` | 在正文中输入两个中括号，弹出候选笔记列表，输入关键字搜索并选择 | 最基础的方式，如果目标笔记不存在会自动创建新笔记</p>\n<p>快捷键转换 | 选中已有文字，按快捷键直接转换为双向链接 | 快捷键可自定义设置</p>\n<p>拖拽笔记 | 从左侧文件列表中将笔记拖到编辑器中 | 自动生成双向链接</p>\n<div class=\"sh\">1.3 链接粒度</div>\n<p>Obsidian 的双向链接不仅支持笔记级别，还支持更细粒度的链接：</p>\n<p>粒度 | 语法 | 说明 | 出链列表图标</p>\n<p>笔记链接 | `[[笔记名]]` | 链接到整篇笔记 | 锁链图标</p>\n<p>标题链接 | `[[笔记名#标题]]` | 链接到笔记中的某个标题（支持一级、二级等各级标题） | 大写 H 图标</p>\n<p>块链接 | `[[笔记名^块ID]]` | 链接到笔记中的任意一个块（段落、列表项等） | 列表图标</p>\n<p>块链接的规则：</p>\n<p>• 列表中每次只能引用一个列表项，但如果该项下有子级内容，会一并引用</p>\n<p>• 两行文字之间没有空行（仅回车换行），算作同一个块，可以一起引用</p>\n<p>• 块 ID 由系统随机生成，也可以自定义（在内容后输入 `空格 + ^ + 自定义编号`）</p>\n<p>• 可以用 `^^` 直接搜索内容关键字，不需要记住在哪篇笔记中</p>\n<div class=\"sh\">1.4 链接重命名</div>\n<p>在链接中使用竖线语法 [[笔记名|显示名称]]，可以自定义链接在正文中的显示文字，使链接内容与上下文更贴切。</p>\n<p>重命名的同步规则：</p>\n<p>• 当显示名称与笔记原名相同时，修改被链接笔记的文件名，显示名称会同步修改</p>\n<p>• 当显示名称与笔记原名不同时，显示名称固定不变</p>\n<div class=\"sh\">1.5 链接同步机制</div>\n<p>操作 | 结果</p>\n<p>修改被链接笔记的文件名 | 所有链接到该笔记的链接自动同步更新（需开启&quot;始终更新内部链接&quot;设置）</p>\n<p>在主动链接笔记中修改 `[[]]` 内的内容 | 不会修改原笔记名，而是创建新笔记或链接到其他已有笔记</p>\n<p>未开启自动更新时 | 每次重命名会弹出确认框，询问是否更新相关内部链接</p>\n<p>关键设置：设置 → 文件与链接 → 始终更新内部链接（开启后重命名文件时自动更新所有链接）</p>\n<div class=\"sh\">1.6 出链与入链</div>\n<p>概念 | 含义 | 位置</p>\n<p>出链列表 | &quot;我链接了谁&quot;——当前笔记中所有 `[[]]` 链接指向的笔记 | 右侧功能栏</p>\n<p>反向链接列表（入链） | &quot;谁链接了我&quot;——所有链接到当前笔记的其他笔记，并指出具体位置 | 右侧功能栏，或开启后显示在笔记底部</p>\n<p>提到当前文件名 | 正文中提到了当前笔记名但没有建立 `[[]]` 链接的笔记，可一键建立双链 | 反向链接面板底部</p>\n<p>出链列表中的视觉区分：</p>\n<p>• 已链接到具体笔记的链接：锁链图标，颜色饱满</p>\n<p>• 未创建目标笔记的链接：带加号的文件图标，颜色透明</p>\n<p>反向链接可以设置在笔记底部直接显示（设置 → 核心插件 → 反向链接 → 在标签页中显示反向链接）。</p>\n<div class=\"sh\">1.7 内容嵌入与预览</div>\n<p>功能 | 语法/操作 | 说明</p>\n<p>内容嵌入 | `![[笔记名]]` | 在当前笔记中实时展示被链接笔记的完整内容</p>\n<p>标题嵌入 | `![[笔记名#标题]]` | 展示该标题下的所有内容</p>\n<p>块嵌入 | `![[笔记名^块ID]]` | 展示指定块的内容</p>\n<p>悬浮预览 | 按住 Command 键，鼠标移到链接上 | 悬浮显示被链接内容，无需跳转</p>\n<p>悬浮编辑 | 按住 Command 键，点击悬浮内容 | 可以直接在悬浮窗中编辑被链接笔记</p>\n<p>嵌入规则：展示的内容范围为该级别下的所有内容。嵌入内容后方有链接按钮，点击可跳转到原笔记。</p>\n<p>需开启核心插件&quot;页面预览&quot;。</p>\n<div class=\"sh\">1.8 外部链接</div>\n<p>Obsidian 也支持外部超链接，语法为 [显示文字](URL)。外部链接在正文中显示为带&quot;指向方框外&quot;图标的链接，点击跳转到外部页面。外部链接不会出现在出链列表中——双向链接仅针对笔记库内部。</p>\n<p>---</p>\n<div class=\"sh\">二、关系图谱</div>\n<div class=\"sh\">2.1 基本原理</div>\n<p>关系图谱将每篇笔记视为图中的一个节点，将所有双向链接的笔记用线相连。链接越多的笔记节点越大，视觉上越突出。</p>\n<div class=\"sh\">2.2 查看方式</div>\n<p>• 点击左侧功能栏的图谱按钮</p>\n<p>• 使用命令面板（Ctrl/Command + P）输入&quot;关系图谱&quot;</p>\n<p>• 自定义快捷键直接打开</p>\n<p>支持全局图谱（所有笔记）和局部图谱（当前笔记的 1-2 跳关联）。</p>\n<div class=\"sh\">2.3 图谱交互</div>\n<p>• 按住 Command 键将鼠标移到节点上，可实时预览笔记内容</p>\n<p>• 点击节点可直接编辑笔记</p>\n<p>• 图谱只显示笔记的原名（不显示重命名后的显示名称）</p>\n<p>• 支持按文件夹/标签过滤节点、缩放平移、拖拽节点</p>\n<div class=\"sh\">2.4 关系图谱的实际应用</div>\n<p>很多用户认为关系图谱&quot;除了炫酷没有用&quot;，但实际上有以下应用场景：</p>\n<p>应用一：颜色组观察知识分布</p>\n<p>通过为不同文件夹路径设置不同颜色，可以在图谱上直观看出笔记在各领域的分布情况。例如红色代表数学、橙色代表社会科学等。通过这种主题分布图，可以追踪知识体系的变化，指导学习和职业发展方向。</p>\n<p>应用二：聚集度发现核心观点</p>\n<p>链接数量多的笔记在图谱上节点更大、更突出，说明这是一个核心概念或枢纽笔记。通过观察聚集度，可以快速识别知识体系中的关键节点。</p>\n<p>应用三：关联路径发现潜在洞见</p>\n<p>以一个节点为起点、另一个节点为终点，观察中间有多少种可能的路径。不同路径代表不同的思维链条，可能为学习、工作或科研提供新的想法。</p>\n<p>应用四：人脉管理</p>\n<p>以代表人物的笔记为出发点，查看通过哪些路径可以找到目标人物对应的笔记，辅助现实中的人脉拓展。</p>\n<p>---</p>\n<div class=\"sh\">三、优势与局限</div>\n<div class=\"sh\">优势</div>\n<p>1. 关联精确度高：用户主动建立的链接</p>\n<p>…（已截断）</p>",
  4: "<div class=\"sh\">笔记详情页 · AI 问答优化方案</div>\n<p>---</p>\n<div class=\"sh\">需求背景</div>\n<p>笔记详情页底部已有 AI 对话入口，用户可以通过文字或语音与 AI 交互。当前版本存在几个问题：</p>\n<p>1. 对话框看起来像独立的聊天窗口，用户心智容易变成&quot;我在和 AI 聊天&quot;，而不是&quot;我在用 AI 编辑这篇笔记&quot;。对话框和笔记正文之间缺乏联动，两个区域各管各的。</p>\n<p>2. 快捷 chips 是固定的，不管什么类型的笔记都展示一样的选项。录音刚转写完的笔记和已经整理好的会议纪要，用户需要的操作完全不同，但看到的 chips 一模一样。</p>\n<p>3. 用户想对笔记中某一段做局部修改时，没有精准的操作入口。只能在对话框里描述&quot;把第三段改一下&quot;，AI 不一定能准确定位。</p>\n<p>4. AI 回复用聊天气泡展示，缺乏&quot;成品感&quot;。用户看到的应该是可以直接操作的结果卡片（Before/After 对比、待办列表），而不是需要复制粘贴的文字。</p>\n<p>本次优化的目标：把对话框从&quot;聊天工具&quot;变成&quot;笔记的 AI 编辑器&quot;，所有交互围绕当前这篇笔记展开。</p>\n<p>---</p>\n<div class=\"sh\">需求清单</div>\n<p>编号 | 功能模块 | 优先级 | 状态</p>\n<p>F1 | 对话框交互优化 | P0 | 待设计</p>\n<p>F2 | Chips 动态展示 | P0 | 部分已完成</p>\n<p>F3 | 一句话指令修改笔记 | P0 | 已设计</p>\n<p>F4 | 选中段落局部润色 | P0 | 待设计</p>\n<p>---</p>\n<div class=\"sh\">F1：对话框交互优化</div>\n<p>对话框的定位是&quot;笔记的 AI 编辑器&quot;，不是聊天工具。用户在收起态完成所有操作，展开态只用于查看历史对话。</p>\n<div class=\"sh\">F1.1 两态设计</div>\n<p>• 收起态（默认）：底部输入条 + 推荐指令 + chips 横滑栏，用户在这里完成所有操作</p>\n<p>• 展开态：半屏面板，展示历史对话 + 完整推荐指令列表 + chips + 输入条</p>\n<p>状态切换：</p>\n<p>• 收起态 → 展开态：唤起键盘后，输入框上方出现拖拽条（drag handle），点击或上划拖拽条进入展开态</p>\n<p>• 展开态 → 收起态：下拉拖拽条或点击返回，回到未唤起键盘的收起态</p>\n<div class=\"sh\">F1.2 推荐指令的显示与隐藏</div>\n<p>推荐指令根据笔记内容动态生成 2-3 条，形式统一，在以下场景中出现或消失：</p>\n<p>1. 进入笔记详情页时，底部输入条上方自动展示推荐指令</p>\n<p>2. 用户做任意操作（滚动、点击正文等）后，推荐指令消失</p>\n<p>3. 点击输入框键盘弹起、但未输入内容时，推荐指令重新展示</p>\n<p>4. 用户开始输入文字后，推荐指令消失</p>\n<p>5. 上划展开面板后，面板内展示完整推荐指令列表</p>\n<div class=\"sh\">F1.3 输入方式</div>\n<p>支持三种输入方式，均在收起态完成：</p>\n<p>• 文字输入：点击输入条 → 键盘弹起 → 输入文字 → 发送</p>\n<p>• 语音输入：长按麦克风按钮 → 实时转写 → 松手后转写文字填入输入框 → 可编辑后发送，上滑取消</p>\n<p>• 点击推荐指令：推荐指令消失，指令直接发送</p>\n<p>---</p>\n<div class=\"sh\">F2：Chips 动态展示</div>\n<div class=\"sh\">F2.0 Chips 的两种形态</div>\n<p>Chips 有两种展示形态，根据出现位置不同自动切换：</p>\n<p>• 指令形态：一句话短语气泡，出现在收起态输入框上方（权重最高的 2-3 条），也在展开态对话为空时作为引导气泡出现（权重最高的 3 条）。用户点击后直接发送对应指令。</p>\n<p>• 菜单形态：icon + 几个字的按钮，出现在展开态对话面板输入框上方，单行横滑，展示权重次高的 4-6 个。用户点击后直接发送对应指令。</p>\n<p>两种形态可以同时出现：展开态对话为空时，上方显示指令形态的引导气泡，底部输入框上方显示菜单形态的按钮。</p>\n<div class=\"sh\">F2.1 为什么是这些 Chips</div>\n<p>用户打开一篇笔记，对内容只有三种本质需求：理解它、改造它、带走它。</p>\n<p>P0 的筛选标准：这个 chip 不做，用户在笔记详情页的核心体验链路就断了。</p>\n<p>• 理解：用户打开一篇长笔记，如果不能快速抓重点或看清结构，AI 笔记和普通笔记没区别</p>\n<p>• 改造·减少：AI 生成的内容普遍偏长，精简是录音转写场景的刚需</p>\n<p>• 改造·增加：灵感速记和未完成的笔记需要续写，否则短笔记场景下 AI 入口无用武之地</p>\n<p>• 改造·变形：录音转写→结构化笔记、从内容中提取行动项和日程，是 AI 笔记的核心价值</p>\n<p>• 改造·修正：用户手写和 AI 生成都可能有拼写、语法、标点、用词问题，全文校对是最基础的文本质量保障</p>\n<div class=\"sh\">F2.2 每个分组对应的交互场景</div>\n<p>每个 chip 的交互场景由分组决定，不需要 AI 动态判断：</p>\n<p>• 内容提取类（总结要点、创建思维导图、提取待办、提取日程）：点击后展开面板，通过对话展示结果卡片</p>\n<p>• 文本润色类（校对全文、改简洁、续写补充、改成正式语气）：点击后走确认修改流程，在笔记正文上展示 Before/After 对比；如果不符合修改条件（如内容太短无法精简），则降级为对话展示</p>\n<p>• 笔记模板类（会议纪要、课堂笔记、对话访谈、脑暴纪要）：点击后展开面板，通过对话展示结果卡片</p>\n<div class=\"sh\">F2.3 Chips 清单（按用户视角分组）</div>\n<div class=\"sh\">内容提取</div>\n<p># | Chip 名称 | 推荐指令 | 输出形态 | 状态</p>\n<p>1 | 总结要点 | 总结这篇笔记的要点 | 3-5 句话的摘要卡片 | P0 待开发</p>\n<p>2 | 创建思维导图 | 把这篇笔记整理成思维导图 | 可交互的导图页面 | ✅ 已完成</p>\n<p>3 | 提取待办 | 提取这篇笔记里的待办 | 待办卡片（可勾选+同步系统） | ✅ 已完成</p>\n<p>4 | 提取日程 | 提取这篇笔记里的日程 | 日程卡片（可同步日历） | ✅ 已完成</p>\n<div class=\"sh\">文本润色</div>\n<p># | Chip 名称 | 推荐指令 | 输出形态 | 状态</p>\n<p>5 | 校对全文 | 帮我检查这篇笔记有没有错误 | 逐条高亮修改+原因说明+逐条确认 | P0 待开发</p>\n<p>6 | 改简洁 | 把这篇笔记改简洁一点 | Before/After 确认卡片 | P0 待开发</p>\n<p>7 | 续写补充 | 帮我接着往下写 | 新内容直接追加到末尾 | P0 待开发</p>\n<p>8 | 改成正式语气 | 把这篇笔记改成正式语气 | Before/After 确认卡片 | P0 待开发</p>\n<div class=\"sh\">笔记模板</div>\n<p># | Chip 名称 | 推荐指令 | 输出形态 | 状态</p>\n<p>9 | 会议纪要 | 把这段录音整理成会议纪要 | 议题→结论→待办→日程 | ✅ 已完成</p>\n<p>10 | 课堂笔记 | 把这段录音整理成课堂笔记 | 知识点→重点→课后任务 | ✅ 已完成</p>\n<p>11 | 对话访谈 | 把这段录音整理成访谈纪要 | 问答→核心观点→引用 | ✅ 已完成</p>\n<p>12 | 脑暴纪要</p>\n<p>…（已截断）</p>",
  5: "<div class=\"sh\">语音输入笔记竞品参考</div>\n<p style=\"color:#888;font-style:italic\">调研时间：2026年4月</p>\n<p style=\"color:#888;font-style:italic\">调研范围：手机厂商系统笔记 + 第三方 AI 语音笔记工具 + 硬件形态产品</p>\n<p>&lt;callout emoji=&quot;💡&quot; background-color=&quot;light-blue&quot;&gt;</p>\n<p>结论：语音笔记赛道已从&quot;录音转文字&quot;进化到&quot;录完即出成品笔记&quot;。头部产品的核心差异在三件事：① 转写后的 AI 整理质量（不是转写准确率，大家都差不多了）；② 是否需要打开 APP（无感录入 vs 手动操作）；③ 录音和笔记是否打通（一体化 vs 两个独立工具）。</p>\n<p>&lt;/callout&gt;</p>\n<p>---</p>\n<div class=\"sh\">一、手机厂商系统级方案（直接竞品）</div>\n<div class=\"sh\">1. Apple Notes（iOS 18+）</div>\n<p>做法：</p>\n<p>• iOS 18 起，备忘录内置录音 + 实时转写，不需要第三方 APP</p>\n<p>• 操作路径：打开备忘录 → 点附件按钮（回形针）→ 选&quot;录制音频&quot; → 录音过程中实时出文字</p>\n<p>• 转写完成后可以生成摘要（Apple Intelligence 驱动）</p>\n<p>• 录音嵌入笔记正文，点击文字可跳回对应音频位置</p>\n<p>值得关注的点：</p>\n<p>• 录音和笔记完全一体化，不是两个 APP 之间跳转</p>\n<p>• 转写是端侧处理（Apple Intelligence 本地模型），不上传云端，隐私卖点很强</p>\n<p>• 摘要生成也是端侧完成，离线可用</p>\n<p>• 支持多语言自动检测，中英混合场景表现不错</p>\n<p>对我们的启发：</p>\n<p>• Apple 把录音机的核心能力直接并入了备忘录，和我们 PRD 里&quot;录音机核心能力并入笔记&quot;的方向一致</p>\n<p>• 端侧 AI 是苹果的差异化卖点，我们的 libSuniaEngine.so 也是端侧引擎，可以打同样的隐私牌</p>\n<p>• 但苹果没有做&quot;AI 自动整理成结构化笔记&quot;这一步，只是转写 + 简单摘要，这是我们可以拉开差距的地方</p>\n<p>---</p>\n<div class=\"sh\">2. Samsung Notes + Voice Recorder（Galaxy AI）</div>\n<p>做法：</p>\n<p>• 三星的方案是&quot;两个 APP 联动&quot;：Voice Recorder 录音 → Galaxy AI 转写 → 可导入 Samsung Notes</p>\n<p>• Galaxy AI Transcript Assist：录音完成后点&quot;Transcribe&quot;按钮，自动识别语言并生成文字</p>\n<p>• 支持说话人分离（Speaker Diarization），能区分不同发言者</p>\n<p>• One UI 7 新增通话录音转写：通话结束后自动生成文字记录和摘要</p>\n<p>• Samsung Notes 本身支持录音同步手写——边录音边手写，回放时手写内容和音频时间轴对齐</p>\n<p>值得关注的点：</p>\n<p>• 说话人分离是三星的亮点，会议场景下很实用</p>\n<p>• 通话录音自动转写 + 摘要，和我们 PRD 里&quot;通讯 Agent 写入通话摘要&quot;的思路一致</p>\n<p>• 但录音和笔记仍然是两个 APP，用户需要手动导入，体验有断点</p>\n<p>对我们的启发：</p>\n<p>• 说话人分离能力我们也需要做，会议纪要场景是刚需</p>\n<p>• 三星的&quot;通话录音 → 自动摘要&quot;链路值得参考，但他们没有做到自动写入笔记，我们可以通过 Agent 机制做到全自动</p>\n<p>• 录音和笔记分离是三星的短板，我们一体化方案有优势</p>\n<p>---</p>\n<div class=\"sh\">3. 华为备忘录</div>\n<p>做法：</p>\n<p>• 华为备忘录支持语音输入，但主要是&quot;语音转文字输入&quot;（类似听写），不是录音整理</p>\n<p>• 录音转写能力主要在&quot;录音机&quot;APP 里，支持实时转写和会议记录</p>\n<p>• 华为的 AI 能力（盘古大模型）更多体现在小艺助手上，备忘录本身的 AI 整理能力相对弱</p>\n<p>• 华为的优势在跨设备协同（手机/平板/PC 无缝流转），备忘录数据通过华为云自动同步</p>\n<p>对我们的启发：</p>\n<p>• 华为在语音笔记的 AI 整理上还没发力，这是我们可以超越的窗口</p>\n<p>• 但华为的跨设备体验做得很好，这块我们也不能落后</p>\n<p>---</p>\n<div class=\"sh\">二、第三方 AI 语音笔记工具（功能参考）</div>\n<div class=\"sh\">4. Otter.ai — 实时协作转写标杆</div>\n<p>核心能力：</p>\n<p>• 实时语音转文字，准确率行业领先</p>\n<p>• 说话人自动识别和标注</p>\n<p>• AI 自动生成会议摘要、行动项（Action Items）、关键决策</p>\n<p>• 支持 Zoom/Google Meet/Teams 自动加入会议并录制</p>\n<p>• 转写内容可搜索、可高亮、可评论，支持团队协作</p>\n<p>• 支持对转写内容提问（Otter AI Chat）</p>\n<p>定价： 免费版 300 分钟/月，Pro $10/月起</p>\n<p>值得关注的点：</p>\n<p>• Otter 的核心卖点不是转写准确率，而是&quot;转写后能做什么&quot;——搜索、提问、协作</p>\n<p>• Action Items 自动提取做得很好，和我们 PRD 里 F6 待办提取的思路一致</p>\n<p>• 但 Otter 是纯云端方案，隐私敏感用户有顾虑</p>\n<p>---</p>\n<div class=\"sh\">5. Notta — 多语言转写最强</div>\n<p>核心能力：</p>\n<p>• 支持 100+ 语言转写，多语言场景下表现最好</p>\n<p>• 实时转写 + 录音回放 + AI 摘要</p>\n<p>• 支持音视频文件上传转写（不只是实时录音）</p>\n<p>• 提供翻译功能，转写完可以一键翻译成其他语言</p>\n<p>• 云端 + 本地双模式处理</p>\n<p>定价： 免费版有限制，Premium $13.49/月起</p>\n<p>值得关注的点：</p>\n<p>• 多语言是 Notta 的核心差异化，100+ 语言远超竞品</p>\n<p>• 音视频文件上传转写是个好功能——用户不一定都是实时录音，可能有已有的录音文件需要整理</p>\n<p>• 我们 PRD 里 F1.4 多语言识别目前只规划了中英混合，后续可以参考 Notta 的多语言策略</p>\n<p>---</p>\n<div class=\"sh\">6. Granola — 无感录入 + 人机协作笔记</div>\n<p>核心能力：</p>\n<p>• 无 Bot 录入：不需要加入会议的机器人，直接捕获系统音频，对方完全无感</p>\n<p>• 人机协作模式：用户在会议中手动记几个要点，AI 结合完整转写自动补全成完整笔记</p>\n<p>• 根据会议类型（产品评审/销售电话/1on1）自动调整摘要结构</p>\n<p>• 本地音频处理，隐私友好</p>\n<p>• 支持 30+ 语言</p>\n<p>定价： $18/月起</p>\n<p>值得关注的点：</p>\n<p>• &quot;人机协作&quot;模式是 Granola 最大的创新——不是 AI 全自动生成，而是用户写几个关键词，AI 帮你扩展成完整笔记。这解决了&quot;AI 生成的内容我不信任&quot;的问题</p>\n<p>• 根据会议类型自动调整摘要结构，和我们 PRD 里 F1.2 的&quot;不同整理模板&quot;思路一致</p>\n<p>• 无 Bot 录入对隐私敏感场景很重要</p>\n<p>对我们的启发：</p>\n<p>• &quot;用户写要点 + AI 补全&quot;的协作模式值得考虑，可以作为我们&quot;AI 自动整理&quot;之外的第二种模式</p>\n<p>• 按会议类型自动匹配模板的能力我们已经在做（会议纪要/学习笔记/灵感记录/通用整理），方向正确</p>\n<p>---</p>\n<div class=\"sh\">7. Vomo AI — 语音备忘录 + AI 问答</div>\n<p>核心能力：</p>\n<p>• 录音 → 转写 → AI 摘要 → 结构化笔记，一条龙</p>\n<p>• Ask AI 功能：对着自己的录音/笔记提问，AI 基于内容回答</p>\n<p>• 自动匹配笔记模板（会议纪要/项目规划/头脑风暴），不需要用户手动选</p>\n<p>• 支持 50+ 语言，自动降噪</p>\n<p>• 支持 YouTube 视</p>\n<p>…（已截断）</p>",
  6: "<div class=\"sh\">笔记详情页 · AI 预置 Chips 清单</div>\n<p>用户打开一篇笔记，对内容只有三种本质需求：理解它、改造它、带走它。所有 chips 从这三个方向推导，不从已有能力倒推。</p>\n<p>---</p>\n<div class=\"sh\">前置说明</div>\n<div class=\"sh\">Chips 和场景判断是解耦的</div>\n<p>Chip 只定义&quot;做什么&quot;，不绑定&quot;走哪个交互流程&quot;。用户点击 chip 后，AI 先处理，处理完再根据结果性质自动判断走哪个场景：</p>\n<p>场景 | 判断标准 | 交互流程</p>\n<p>确认修改 | AI 的结果会修改或删除原文内容 | AI处理 → 当前页面展示 Before/After 对比 → 用户确认或撤销 → 写入笔记</p>\n<p>直接插入 | AI 的结果是新增内容，不动原文 | AI处理 → 生成卡片直接插入笔记 → 底部药丸显示结果</p>\n<p>对话展示 | AI 的结果是回答、分析、展示，不修改笔记 | 进入全屏对话面板 → AI回答展示在对话中 → 下拉关闭回到笔记</p>\n<p>同一个 chip 在不同上下文下可能走不同场景。比如&quot;翻译&quot;：如果用户选中了一段文字再点翻译，走确认修改（替换原文）；如果没有选中，走对话展示（在对话面板里展示译文）。场景判断由 AI 根据操作结果决定，不由 chip 预设。</p>\n<p>---</p>\n<div class=\"sh\">一、理解它 — &quot;这篇笔记说了什么&quot;</div>\n<p>用户不想通读全文，想快速抓住重点、看清结构、搞懂细节。</p>\n<p># | Chip 名称 | 用户心声 | 输出形态 | 优先级</p>\n<p>1 | 总结要点 | &quot;太长了，给我说重点&quot; | 3-5 句话的摘要卡片 | P0</p>\n<p>2 | 创建思维导图 | &quot;帮我理清结构&quot; | 可交互的导图页面 | ✅ 已完成</p>\n<p>3 | 列出关键数字 | &quot;里面提到了哪些数据&quot; | 数字+上下文的列表卡片 | P1</p>\n<p>4 | 标注人物关系 | &quot;谁说了什么、谁负责什么&quot; | 人物→发言/职责的映射卡片 | P2</p>\n<p>5 | 时间线梳理 | &quot;事情的先后顺序是什么&quot; | 时间轴卡片 | P2</p>\n<p>6 | 生成闪卡 | &quot;帮我做成复习卡片&quot; | 正反面闪卡页面 | P1</p>\n<p>7 | 生成对话博客 | &quot;变成两个人聊天的形式&quot; | 对话体文章+语音朗读 | P2</p>\n<p>---</p>\n<div class=\"sh\">二、改造它 — &quot;这篇笔记还不够好&quot;</div>\n<p>改造只有四个方向：减少、增加、变形、修正。</p>\n<div class=\"sh\">2.1 减少 — 去掉多余的</div>\n<p># | Chip 名称 | 用户心声 | 输出形态 | 优先级</p>\n<p>8 | 改简洁 | &quot;啰嗦了，帮我精简&quot; | Before/After 确认卡片 | P0</p>\n<p>9 | 去口语化 | &quot;录音整理的太口语了&quot; | Before/After 确认卡片 | P1</p>\n<p>10 | 删除重复内容 | &quot;好几段说的是同一件事&quot; | 高亮重复段落+合并建议 | P1</p>\n<div class=\"sh\">2.2 增加 — 补上缺的</div>\n<p># | Chip 名称 | 用户心声 | 输出形态 | 优先级</p>\n<p>11 | 续写补充 | &quot;还没写完，帮我接着写&quot; | 新内容直接追加到末尾 | P0</p>\n<p>12 | 补充风险点 | &quot;有没有什么遗漏的风险&quot; | 风险项列表卡片插入笔记 | P1</p>\n<p>13 | 补充背景信息 | &quot;加点背景说明&quot; | 背景段落插入到开头 | P2</p>\n<p>14 | 生成下一步行动 | &quot;接下来该做什么&quot; | 行动建议列表卡片 | P1</p>\n<div class=\"sh\">2.3 变形 — 换个形态</div>\n<p># | Chip 名称 | 用户心声 | 输出形态 | 优先级</p>\n<p>15 | 整理成笔记 | &quot;把录音转写整理一下&quot; | 结构化笔记（AI自动选模板） | ✅ 已完成</p>\n<p>16 | 提取待办 | &quot;把该做的事挑出来&quot; | 待办卡片（可勾选+同步系统） | ✅ 已完成</p>\n<p>17 | 提取日程 | &quot;把时间安排挑出来&quot; | 日程卡片（可同步日历） | ✅ 已完成</p>\n<p>18 | 翻译 | &quot;翻译成英文/中文&quot; | 译文卡片或全文替换 | P1</p>\n<p>19 | 生成PPT大纲 | &quot;帮我搭个演示文稿框架&quot; | 层级大纲卡片 | P1</p>\n<p>20 | 改成正式语气 | &quot;要发给领导，语气正式点&quot; | Before/After 确认卡片 | P0</p>\n<p>21 | 改成口语化 | &quot;太书面了，改自然点&quot; | Before/After 确认卡片 | P2</p>\n<p>22 | 拆成多篇笔记 | &quot;这篇太杂了，帮我拆开&quot; | 拆分预览+确认 | P2</p>\n<div class=\"sh\">2.4 修正 — 改掉错的</div>\n<p># | Chip 名称 | 用户心声 | 输出形态 | 优先级</p>\n<p>23 | 校对全文 | &quot;帮我检查一下有没有问题&quot; | 逐条高亮修改+原因说明+逐条确认 | P0</p>\n<p>24 | 修正语法 | &quot;句子不通顺的帮我改改&quot; | Before/After 确认卡片 | P1</p>\n<p>25 | 核实事实 | &quot;里面的数据对不对&quot; | 存疑项列表+AI标注 | P2</p>\n<p>---</p>\n<div class=\"sh\">三、带走它 — &quot;我要把这篇笔记用到别处&quot;</div>\n<p>用户想把笔记内容输出到笔记之外。</p>\n<p># | Chip 名称 | 用户心声 | 输出形态 | 优先级</p>\n<p>26 | 分享摘要 | &quot;发给别人看，但不要发原文&quot; | 摘要卡片→分享到微信/钉钉 | P1</p>\n<p>27 | 生成邮件草稿 | &quot;把这个结论发邮件给同事&quot; | 邮件格式文本+收件人建议 | P2</p>\n<p>28 | 导出为长图 | &quot;发朋友圈/小红书用&quot; | 排版精美的长图 | P2</p>\n<p>---</p>\n<div class=\"sh\">四、完整清单汇总（28 个 Chips）</div>\n<p>方向 | 已完成 | P0 | P1 | P2</p>\n<p>理解 | 创建思维导图 | 总结要点 | 列出关键数字、生成闪卡 | 标注人物关系、时间线梳理、生成对话博客</p>\n<p>改造·减少 | — | 改简洁 | 去口语化、删除重复内容 | —</p>\n<p>改造·增加 | — | 续写补充 | 补充风险点、生成下一步行动 | 补充背景信息</p>\n<p>改造·变形 | 整理成笔记、提取待办、提取日程 | 改成正式语气 | 翻译、生成PPT大纲 | 改成口语化、拆成多篇笔记</p>\n<p>改造·修正 | — | 校对全文 | 修正语法 | 核实事实</p>\n<p>带走 | —</p>\n<p>…（已截断）</p>",
  7: "<div class=\"sh\">AI 笔记新架构产品需求文档（PRD）</div>\n<div class=\"sh\">一、需求目标</div>\n<p>把小米笔记从&quot;用户手写记录工具&quot;升级为&quot;AI 驱动的知识管理中心&quot;。</p>\n<p>用户的角色变了：从&quot;写笔记的人&quot;变成&quot;审阅和补充的人&quot;。AI 负责生产大部分内容（语音转写、会议纪要、摘要、周报），用户负责确认、修改、组织。</p>\n<p>本次需求覆盖 9 个模块，分三个层次：</p>\n<p>核心体验（必须做好）：</p>\n<p>1. 语音说一段话，AI 直接生成一篇结构化笔记</p>\n<p>2. 对着自己的笔记库提问，AI 基于全部内容回答，还能主动推荐相关知识</p>\n<p>3. 文件夹不再是死的树形结构，AI 帮你自动整理，你也能手动拖拽排序</p>\n<p>4. 笔记里的待办自动提取、自动提醒、和日历打通</p>\n<p>5. 数据在手机/平板/PC 之间自动同步，编辑可以跨设备接力</p>\n<p>能力延伸（让产品更完整）：</p>\n<p>6. 长笔记一键生成思维导图，看结构比看文字快</p>\n<p>7. 笔记导出 PDF/图片，分享到微信/钉钉自动生成摘要卡片</p>\n<p>8. 悬浮窗随时记、桌面小组件随时看、深度链接随时跳</p>\n<p>系统打通（Agentic OS 要求）：</p>\n<p>9. 笔记关联日历事件、联系人、录音机，信息不再孤立</p>\n<p>---</p>\n<div class=\"sh\">二、需求清单总览</div>\n<p>编号 | 模块 | 需求名称 | 优先级</p>\n<p>F1 | 语音生成笔记 | 语音录入并自动生成结构化笔记 | P0</p>\n<p>F1.1 | 语音生成笔记 | 实时语音转文字 | P0</p>\n<p>F1.2 | 语音生成笔记 | AI 自动整理成结构化笔记 | P0</p>\n<p>F1.3 | 语音生成笔记 | 录音回溯定位 | P1</p>\n<p>F1.4 | 语音生成笔记 | 多语言识别 | P1</p>\n<p>F1.5 | 语音生成笔记 | MiClaw 语音指令创建笔记 | P1</p>\n<p>F2 | AI 问答 | 基于笔记全文的自然语言问答 | P0</p>\n<p>F2.1 | AI 问答 | 单篇笔记问答 | P0</p>\n<p>F2.2 | AI 问答 | 跨笔记全局问答 | P0</p>\n<p>F2.3 | AI 问答 | 自动提炼知识点 | P0</p>\n<p>F2.4 | AI 问答 | 个性化内容推荐 | P1</p>\n<p>F2.5 | AI 问答 | 问答结果保存为笔记 | P1</p>\n<p>F3 | 文件夹系统升级 | 智能整理 + 手动排序 | P0</p>\n<p>F3.1 | 文件夹系统升级 | AI 自动分类建议 | P0</p>\n<p>F3.2 | 文件夹系统升级 | 手动拖拽排序 | P0</p>\n<p>F3.3 | 文件夹系统升级 | 多维度归属 | P1</p>\n<p>F3.4 | 文件夹系统升级 | 智能标签 | P1</p>\n<p>F4 | 思维导图 | 笔记内容自动生成思维导图 | P1</p>\n<p>F4.1 | 思维导图 | AI 自动生成思维导图 | P1</p>\n<p>F4.2 | 思维导图 | 思维导图编辑与交互 | P1</p>\n<p>F5 | 笔记分享与导出 | 多格式导出 + 社交分享 | P1</p>\n<p>F5.1 | 笔记分享与导出 | 多格式导出 | P1</p>\n<p>F5.2 | 笔记分享与导出 | 社交分享与协作 | P2</p>\n<p>F6 | 待办与提醒 | 笔记内待办提取 + 提醒 | P0</p>\n<p>F6.1 | 待办与提醒 | AI 自动提取待办 | P0</p>\n<p>F6.2 | 待办与提醒 | 待办提醒与日历联动 | P1</p>\n<p>F7 | 快捷入口与小组件 | 悬浮窗 + 桌面 Widget + 深度链接 | P1</p>\n<p>F7.1 | 快捷入口与小组件 | 悬浮窗快速记录 | P1</p>\n<p>F7.2 | 快捷入口与小组件 | 桌面小组件 | P1</p>\n<p>F7.3 | 快捷入口与小组件 | 深度链接与外部跳转 | P1</p>\n<p>F8 | 云同步与跨设备 | 小米云同步 + 跨设备接力 | P0</p>\n<p>F8.1 | 云同步与跨设备 | 小米云笔记同步 | P0</p>\n<p>F8.2 | 云同步与跨设备 | 跨设备接力 | P1</p>\n<p>F9 | 跨域关联 | 笔记关联日历、联系人、录音、照片 | P1</p>\n<p>F9.1 | 跨域关联 | 日历事件关联 | P1</p>\n<p>F9.2 | 跨域关联 | 联系人关联 | P1</p>\n<p>F9.3 | 跨域关联 | 录音机 AI 能力打通 | P1</p>\n<p>---</p>\n<div class=\"sh\">三、分模块需求详情</div>\n<p>---</p>\n<div class=\"sh\">模块 F1：语音生成笔记</div>\n<div class=\"sh\">需求背景</div>\n<p>用户在开会、走路、开车等场景下没法打字，但有大量信息需要记录。现在的做法是录完音再手动整理，效率很低。我们要做到：说完就有一篇能用的笔记。</p>\n<div class=\"sh\">F1.1 实时语音转文字</div>\n<p>功能描述：</p>\n<p>• 笔记列表页和编辑页都有语音入口（悬浮麦克风按钮）</p>\n<p>• 点击开始录音，屏幕上实时显示识别出的文字，像字幕一样逐字出现</p>\n<p>• 支持长时间连续录音（至少 60 分钟）</p>\n<p>• 录音过程中可以暂停、继续</p>\n<p>• 识别结果实时保存，即使中途退出也不丢失</p>\n<p>功能效果：</p>\n<p>• 用户看到文字在屏幕上&quot;流出来&quot;，确认 AI 在听、在记</p>\n<p>• 录音结束后，原始转写文本立即可见，不需要等待</p>\n<div class=\"sh\">F1.2 AI 自动整理成结构化笔记</div>\n<p>功能描述：</p>\n<p>• 录音结束后（或录音过程中），AI 自动把口语化的转写文本整理成结构化笔记</p>\n<p>• 整理包括：去除口头禅和重复、提取关键信息、分段加标题、生成摘要</p>\n<p>• 整理结果以&quot;AI 生成&quot;标签展示，和用户手写内容视觉区分</p>\n<p>• 用户可以选择不同的整理模板：</p>\n<p>• 会议纪要（参会人、议题、结论、待办）</p>\n<p>• 学习笔记（知识点、重点、疑问）</p>\n<p>• 灵感记录（核心想法、关联思考）</p>\n<p>• 通用整理（分段 + 摘要）</p>\n<p>• 用户可以对 AI 整理结果进行编辑、删除、重新生成</p>\n<p>功能效果：</p>\n<p>• 用户说了 10 分钟的话，得到一篇 1 页的结构化笔记，而不是 10 页的流水账</p>\n<p>• 打开笔记第一眼看到的是摘要和关键结论，不是原始录音文本</p>\n<div class=\"sh\">F1.3 录音回溯定位</div>\n<p>功能描述：</p>\n<p>• 笔记中的每段文字都关联到原始录音的时间点</p>\n<p>• 点击笔记中的任意一段文字，可以跳转播放对应时刻的原始录音</p>\n<p>• 录音时间轴嵌入笔记底部，可以拖动定位</p>\n<p>功能效果：</p>\n<p>• 用户看到 AI 整理的&quot;结论：Q3 预算削减 20%&quot;，不确定是不是准确，点一下就能听到原话</p>\n<p>• 解决&quot;AI 整理得对不对&quot;的信任问题</p>\n<div class=\"sh\">F1.4 多语言识别</div>\n<p>功能描述：</p>\n<p>• 支持中文、英文、中英混合识别</p>\n<p>• 自动检测语言，不需要用户手动切换</p>\n<p>• 后续扩展更多语种</p>\n<p>功能效果：</p>\n<p>• 开会时有人说英文有人说中文，不用切换，都能识别</p>\n<div class=\"sh\">F1.5 MiClaw 语音指令创建笔记</div>\n<p>功能描述：</p>\n<p>• 用户对 MiClaw 说&quot;帮我记一下……&quot;，MiClaw 调用笔记的语音创建能力，自动生成笔记</p>\n<p>• 不需要打开笔记 APP，在锁屏、悬浮态、任意界面都能触发</p>\n<p>• 生成完成后，通知栏/岛推送&quot;已为你创建笔记：xxx&quot;，点击可查看</p>\n<p>功能效果：</p>\n<p>• 走</p>\n<p>…（已截断）</p>",
  8: "<div class=\"sh\">笔记首页改造——P0 场景梳理</div>\n<p style=\"color:#888;font-style:italic\">改造范围：仅覆盖 MiClaw 写入笔记的 P0 优先级场景，作为首页交互方案的输入。</p>\n<p>首页需要承接 8 个 P0 写入场景，涵盖&quot;系统自动写入&quot;&quot;用户对话触发&quot;&quot;跨 Agent 协作&quot;&quot;穿戴设备/多端采集&quot;四种触发方式。核心矛盾是：Agent 高频写入会冲击用户自建内容的浏览效率，首页需要同时解决&quot;看得到&quot;和&quot;不被淹&quot;两个问题。</p>\n<p>---</p>\n<div class=\"sh\">首页改造方案</div>\n<div class=\"sh\">一、来源区分</div>\n<p>不做独立的标签体系。Agent 写入的笔记标题自带内容类型关键词（如&quot;通话摘要 · 与王总通话&quot;&quot;Q2 产品路线图评审会 · 会议纪要&quot;&quot;2026年3月 每日简报&quot;），用户通过标题识别内容类型，通过来源标识识别是谁写的。</p>\n<p>展示位置 | 展示内容 | 样式</p>\n<p>首页 · 列表模式 | 统一 AI 角标 | 卡片右侧 AI 小图标（MiClaw 渐变色），不区分具体 Agent</p>\n<p>首页 · 宫格模式 | 统一 AI 角标 | 卡片右上角 AI 小图标（MiClaw 渐变色），不区分具体 Agent</p>\n<p>笔记详情页 | 来源 Agent 名称 | 标题上方元信息栏，如&quot;🤖 内容助手&quot;</p>\n<p>用户自建笔记 | 不显示 | 列表/宫格/详情页均保持默认样式</p>\n<p>首页统一用 AI 角标的原因：保持列表和宫格两种模式的视觉一致性，用户只需区分&quot;AI 写的还是我写的&quot;，具体来源点进详情页看。</p>\n<div class=\"sh\">二、智能文件夹自动归类</div>\n<p>复用现有智能文件夹能力（用户新建文件夹时可勾选智能文件夹，根据文件夹名称对笔记全文匹配自动归类）。</p>\n<p>智能文件夹按&quot;内容类型&quot;归类，不按&quot;来源 Agent&quot;归类。用户不需要一个&quot;张三的自定义 Agent&quot;文件夹，他需要的是&quot;所有通话摘要&quot;文件夹。不管未来有多少个自定义 Agent，智能文件夹数量始终跟内容类型数挂钩。</p>\n<p>匹配链路：Agent 写入笔记 → 标题自带内容类型关键词 → 智能文件夹全文匹配命中 → 自动归入。</p>\n<p>Agent 首次写入某类内容时，系统自动创建对应的智能文件夹（用户已手动创建同名的则直接归入，不重复创建）：</p>\n<p>笔记标题关键词 | 自动创建的智能文件夹</p>\n<p>会议纪要 | 会议纪要</p>\n<p>通话摘要 | 通话摘要</p>\n<p>速记 | 速记</p>\n<p>简报 | 简报</p>\n<p>沟通记录 | 沟通记录</p>\n<p>（无固定关键词） | 归入用户指定文件夹或&quot;全部&quot;</p>\n<p>自动创建的智能文件夹和用户手动创建的行为一致，用户可重命名、隐藏、删除，也可以把 Agent 写入的笔记手动移到其他文件夹。</p>\n<div class=\"sh\">三、滚动更新内容处理</div>\n<p>每日简报等&quot;滚动更新&quot;类内容的处理规则：</p>\n<p>• 按周/月/年等维度，同一周期内的内容写入同一篇笔记，最新的排在最前面</p>\n<p>• 周期结束后自动创建新笔记承接下一周期，旧笔记归档保留</p>\n<p>• 同类型笔记自动创建智能文件夹归档</p>\n<p>举例：每日简报按月归集，3 月份每天生成的简报都追加在&quot;2026年3月 每日简报&quot;这一篇笔记里（3/30 在最上面，3/1 在最下面）；4 月 1 日自动新建&quot;2026年4月 每日简报&quot;，3 月那篇归档到&quot;简报&quot;智能文件夹。</p>\n<p>首页只显示当前周期的一张卡片，卡片预览为最新一期摘要，每次更新后自然浮到时间流顶部。</p>\n<p>历史笔记链接：当前周期笔记正文末尾自动插入最近 5 篇历史笔记的链接（📎 胶囊样式），点击跳转到对应历史笔记。例如：</p>\n<p>• 📎 2026年3月 每日简报</p>\n<p>• 📎 2026年2月 每日简报</p>\n<p>• 📎 2026年1月 每日简报</p>\n<div class=\"sh\">四、语音速记的纯待办处理</div>\n<p>AI 判断语音速记内容只包含待办事项时，不创建笔记，直接同步到首页右上角 ☑ 待办中心。</p>\n<p>• 纯待办：用户说&quot;帮我记一下，周五前给王总方案&quot; → 待办中心新增一条 → 超级岛确认&quot;已添加待办&quot;</p>\n<p>• 正文+待办：用户说&quot;帮我记一下今天开会的结论，另外周五前给王总方案&quot; → 创建笔记 + 同步待办到待办中心</p>\n<p>---</p>\n<div class=\"sh\">P0 场景清单</div>\n<p># | 场景 | 触发方式 | 来源 Agent | 写入内容 | 内容属性</p>\n<p>1 | 会议纪要 | 录音结束，后台自动触发 | 内容助手 | 结构化纪要 + 待办 + 决策项 | 长期保存</p>\n<p>2 | 通话摘要 | 通话结束，后台自动触发 | 通讯 Agent | 通话摘要 + 待办 + 关键信息 | 长期保存</p>\n<p>3 | 语音速记 | 用户唤起 MiClaw 说&quot;帮我记一下…&quot; | 内容助手 | 结构化待办/备忘 | 长期保存</p>\n<p>4 | 对话生成笔记 | 用户唤起 MiClaw 说&quot;帮我写一份…&quot; | 内容助手 | AI 生成的长文档 | 长期保存</p>\n<p>5 | 每日简报 | 每日定时触发 | 主 Agent 编排 | 日程 + 待办 + 资讯 + 统计 | 滚动更新</p>\n<p>6 | 通讯录备注 | 通话/会议结束后触发 | 通讯 Agent | 联系人沟通摘要 | 长期保存</p>\n<p>7 | AI 键闪念 | 长按 AI 键+语音 | 手机 AI 键 | 闪念速记/一句话笔记 | 长期保存</p>\n<p>8 | 手表速记 | 手表语音输入 | 手表 | 语音转结构化备忘 | 长期保存</p>\n<p style=\"color:#888;font-style:italic\">APP 内 AI 操作类（对话修改笔记、AI 追加内容）是 P0 但不涉及首页信息流，不在本文范围。</p>\n<p>---</p>\n<div class=\"sh\">场景交互流程</div>\n<div class=\"sh\">系统自动产出（后台触发，用户无操作）</div>\n<p>场景 | 触发条件 | 来源 Agent | 交互流程</p>\n<p>会议纪要 | 录音结束 | 内容助手 | 录音结束 → AI 后台转写+生成纪要 → 超级岛通知 → 点击进入笔记审阅</p>\n<p>通话摘要 | 通话结束 | 通讯 Agent | 通话结束 → AI 后台生成摘要 → 超级岛通知 → 点击进入笔记 + 同步待办到日历</p>\n<div class=\"sh\">MiClaw 对话产出（用户主动触发）</div>\n<p>场景 | 用户说 | 来源 Agent | 交互流程</p>\n<p>语音速记 | &quot;帮我记一下，王总要的方案周五前给&quot; | 内容助手 | 唤起 MiClaw → AI 识别意图 → 生成结构化笔记 → 超级岛确认 → 写入笔记+同步日历</p>\n<p>对话生成笔记 | &quot;帮我写一份XX的分析报告&quot; | 内容助手 | 说需求 → AI 多轮对话明确 → 生成草稿 → 卡片预览 → 确认/修改 → 写入笔记</p>\n<div class=\"sh\">跨 Agent 协作产出（其他 Agent → 笔记）</div>\n<p>场景 | 触发条件 | 来源 Agent | 交互流程 | 内容属性</p>\n<p>…（已截断）</p>",
  9: "<div class=\"sh\">AI 关联笔记推荐 — 系统提示词</div>\n<p style=\"color:#888;font-style:italic\">适用场景：AI 笔记 app 内，用户打开笔记详情页时，AI 分析当前笔记内容，从用户的笔记库中找出与当前笔记相关的其他笔记，返回关联推荐结果。</p>\n<div class=\"sh\">System Prompt</div>\n<pre><code>你是一个笔记关联推荐引擎。你的任务是分析当前笔记的内容，从候选笔记列表中找出与当前笔记最相关的笔记，并说明关联原因。\n\n## 输入\n\n一个 JSON 对象，包含当前笔记和候选笔记列表：\n</code></pre>\n<p>{</p>\n<p>&quot;current_note&quot;: {</p>\n<p>&quot;id&quot;: &quot;note_001&quot;,</p>\n<p>&quot;title&quot;: &quot;首页改版评审会纪要&quot;,</p>\n<p>&quot;content&quot;: &quot;笔记的完整文本内容&quot;,</p>\n<p>&quot;char_count&quot;: 1200,</p>\n<p>&quot;created_at&quot;: &quot;2026-04-16T15:30:00&quot;,</p>\n<p>&quot;tags&quot;: [&quot;会议纪要&quot;, &quot;首页改版&quot;],</p>\n<p>&quot;people&quot;: [&quot;张三&quot;, &quot;李四&quot;, &quot;王五&quot;]</p>\n<p>},</p>\n<p>&quot;candidate_notes&quot;: [</p>\n<p>{</p>\n<p>&quot;id&quot;: &quot;note_002&quot;,</p>\n<p>&quot;title&quot;: &quot;Q2 产品路线图&quot;,</p>\n<p>&quot;content&quot;: &quot;笔记的完整文本内容&quot;,</p>\n<p>&quot;char_count&quot;: 800,</p>\n<p>&quot;created_at&quot;: &quot;2026-04-15T10:00:00&quot;,</p>\n<p>&quot;tags&quot;: [&quot;产品规划&quot;],</p>\n<p>&quot;people&quot;: [&quot;张三&quot;]</p>\n<p>}</p>\n<p>]</p>\n<p>}</p>\n<pre><code>\n字段说明：\n- current_note：当前正在查看的笔记\n- candidate_notes：候选笔记列表（由语义搜索预筛选，通常 10-20 条）\n\n## 输出\n\n一个 JSON 数组，每个元素代表一条推荐。按关联置信度从高到低排序，最多返回 3 条。\n\n输出格式：</code></pre>\n<p>[</p>\n<p>{</p>\n<p>&quot;note_id&quot;: &quot;note_002&quot;,</p>\n<p>&quot;dimension&quot;: &quot;project&quot;,</p>\n<p>&quot;reason&quot;: &quot;同属首页改版项目&quot;,</p>\n<p>&quot;confidence&quot;: 0.92</p>\n<p>}</p>\n<p>]</p>\n<pre><code>\n字段说明：\n- note_id：推荐的笔记 id\n- dimension：关联维度，可选值见下方\n- reason：关联原因的自然语言描述，仅作为后台判断和调试参考，不展示给用户\n- confidence：置信度，0-1 之间的浮点数\n\n## 关联维度\n\n从以下 5 个维度分析笔记间的关联关系。每条推荐只选择置信度最高的 1 个维度。\n\n| 维度 | dimension 值 | 判断条件 | reason 示例 |\n|------|-------------|---------|------------|\n| 人物关联 | person | 两篇笔记提到相同人名 | &quot;都提到了张三&quot; |\n| 项目关联 | project | 两篇笔记属于同一项目或话题 | &quot;同属首页改版项目&quot; |\n| 主题关联 | topic | 两篇笔记的内容语义相似 | &quot;都在讨论语音交互&quot; |\n| 时间关联 | timeline | 两篇笔记是同一事件的前后续 | &quot;上一次评审会&quot; |\n| 待办关联 | todo | 两篇笔记的待办项指向同一件事 | &quot;都有相关待办&quot; |\n\n### 维度判断规则\n\n1. **人物关联**：两篇笔记中出现了相同的人名，且该人物是笔记内容的核心角色（不是仅在参会人列表中出现）。人名匹配需要考虑称呼变体（&quot;张三&quot;&quot;张总&quot;&quot;老张&quot;可能是同一个人）。仅仅&quot;都提到了某人&quot;不够，该人物需要在两篇笔记中都有实质性的内容关联（如负责同一件事、做了同一个决策）。\n\n2. **项目关联**：两篇笔记讨论的是同一个项目、产品、功能模块，且有具体的内容交集。判断依据包括：相同的项目名称、相同的产品名称、相同的功能模块名称。注意：&quot;都和笔记产品相关&quot;不算项目关联，必须是同一个具体项目或功能模块。\n\n3. **主题关联**：两篇笔记的核心话题语义相似，且讨论的具体问题有交集。比如一篇讨论&quot;语音输入的体验优化&quot;，另一篇讨论&quot;语音交互的未来形态&quot;，虽然用词不同但讨论的是同一个具体问题。注意：&quot;都在做竞品分析&quot;不算主题关联，必须是分析的对象或结论有交集。\n\n4. **时间关联**：两篇笔记是同一个事件的不同阶段。比如&quot;首页改版讨论（第一轮）&quot;和&quot;首页改版评审会&quot;是同一件事的前后续。判断依据包括：标题中的序号/轮次、内容中提到的&quot;上次&quot;&quot;之前&quot;&quot;后续&quot;等时间线索。\n\n5. **待办关联**：两篇笔记中都包含指向同一件事的待办项。比如两篇笔记都提到&quot;周五前出排序方案&quot;。\n\n### 多维度冲突时的选择\n\n如果一条候选笔记同时满足多个维度，选择置信度最高的那个。优先级参考：\n- 时间关联 &gt; 项目关联 &gt; 人物关联 &gt; 主题关联 &gt; 待办关联\n- 这个优先级仅在置信度相近时作为 tiebreaker，置信度差距明显时以置信度为准\n\n## reason 文案规则\n\nreason 仅作为后台判断和调试参考，不展示给用户，但仍需遵守以下规则以便于排查问题：\n\n1. 用具体的关联描述，不用抽象分类\n   - ✅ &quot;都在讨论语音交互&quot;\n   - ❌ &quot;同主题&quot;\n\n2. 一句话说清楚，不超过 15 个字\n\n3. 如果是人物关联，reason 中要包含具体人名\n\n4. 如果是项目关联，reason 中要包含具体项目名\n\n5. 如果是时间关联，reason 中要说明前后关系（&quot;上一次&quot;&quot;后续&quot;）\n\n## 不推荐的条件\n\n以下情况不返回推荐结果，返回空数组 []：\n\n1. 当前笔记内容少于 100 字（语义信息不足）\n2. 候选笔记列表为空\n3. 所有候选笔记的置信度都低于 0.70（宁可不推也不推错）\n\n## 排序与过滤规则\n\n1. 按 confidence 从高到低排序\n2. confidence &lt; 0.70 的不返回\n3. 最多返回 3 条\n4. 同一个 dimension 最多出现 2 条（避免 3 条全是&quot;同主题&quot;）\n\n## 置信度打分规则\n\n置信度是你对&quot;这两篇笔记确实相关&quot;的确信程度。打分时参照以下锚点：\n\n| 分数区间 | 关联等级 | 锚定定义 | 典型场景 |\n|---------|---------|---------|---------|\n| 0.90-1.00 | 确定性关联 | 两篇笔记讨论的是同一件具体的事，看到其中一篇必然想看另一篇 | 同一次会议的纪要和待办清单；同一个需求的方案文档和对应的系统提示词；同一个功能的 V1 和 V2 版本 |\n| 0.80-0.89 | 强关联 | 两篇笔记属于同一个项目的不同模块，了解其中一篇对理解另一篇有直接帮助 | PRD 和它的某个子模块细化方案；竞品调研和基于该调研写的需求文档 |\n| 0.70-0.79 | 中等关联 | 两篇笔记讨论的主题有明显交集，用户看到推荐理由后会想点进去看 | 两篇不同产品的竞品分析（都在分析笔记工具）；两个都涉及录音处理的不同方案 |\n| 0.50-0\n\n…（已截断）</code></pre>",
  10: "<div class=\"sh\">音频解析失败场景设计</div>\n<p style=\"color:#888;font-style:italic\">覆盖音频从录制到 AI 总结的完整链路，每个环节可能出现的失败场景、用户感知、恢复方案。</p>\n<p>---</p>\n<div class=\"sh\">结论先行</div>\n<p style=\"color:#888;font-style:italic\">音频处理链路有 4 个环节可能失败：录音 → 转录 → AI 整理 → 写入笔记。核心原则是**能保多少保多少**——录音成功了就保录音，转录成功了就保转录文本，AI 整理失败了还有原始转录兜底。不能让一个环节的失败把前面的成果全丢了。</p>\n<p>---</p>\n<div class=\"sh\">一、失败场景总览</div>\n<p>环节 | 失败场景 | 用户感知 | 已有内容 | 恢复方式</p>\n<p>录音 | 麦克风权限被拒 | 无法开始录音 | 无 | 引导开权限</p>\n<p>录音 | 存储空间不足 | 录音中断 | 已录部分音频 | 保存已录内容 + 提示清理空间</p>\n<p>录音 | 录音意外中断（来电/崩溃） | 录音突然停止 | 已录部分音频 | 自动保存已录内容，下次打开提示恢复</p>\n<p>转录 | 音频无人声 | 转录结果为空 | 原始音频 | 保留音频，提示&quot;未检测到语音内容&quot;</p>\n<p>转录 | 音频噪声过大 | 转录结果质量差 | 原始音频 + 低质量文本 | 保留音频 + 展示转录文本，提示质量可能受影响</p>\n<p>转录 | 语音识别引擎失败 | 转录无结果 | 原始音频 | 保留音频，提示&quot;转录失败，点击重试&quot;</p>\n<p>转录 | 网络中断（云端转录时） | 转录暂停 | 原始音频 + 已转录部分 | 网络恢复后自动续传，或提示手动重试</p>\n<p>转录 | 音频格式不支持 | 无法转录 | 原始音频文件 | 保留音频，提示格式不支持</p>\n<p>转录 | 音频时长超限 | 无法转录 | 原始音频 | 保留音频，提示超出时长限制</p>\n<p>AI 整理 | 模型调用超时 | 等待后无结果 | 原始音频 + 转录文本 | 展示转录文本兜底，提示&quot;AI 整理失败，点击重试&quot;</p>\n<p>AI 整理 | 模型返回异常 | 整理结果为空或乱码 | 原始音频 + 转录文本 | 自动切换备用模型重试，仍失败则展示转录文本</p>\n<p>AI 整理 | 转录文本过短无法整理 | 无有意义的整理结果 | 原始音频 + 转录文本 | 直接展示转录文本，不触发 AI 整理</p>\n<p>写入笔记 | 笔记保存失败 | 内容丢失 | 内存中的处理结果 | 自动重试保存，失败后缓存到本地临时文件</p>\n<p>---</p>\n<div class=\"sh\">二、分环节详细设计</div>\n<div class=\"sh\">环节 1：录音阶段</div>\n<div class=\"sh\">1.1 麦克风权限被拒</div>\n<p>• 触发条件：用户未授权麦克风权限，或录音过程中权限被收回</p>\n<p>• 用户看到：弹窗提示&quot;需要麦克风权限才能录音&quot;，提供&quot;去设置&quot;按钮</p>\n<p>• 恢复方式：点击&quot;去设置&quot;跳转系统权限页面</p>\n<p>• 特殊处理：如果是 MiClaw 触发的录音，通过通知栏告知&quot;录音失败：未获得麦克风权限&quot;</p>\n<div class=\"sh\">1.2 存储空间不足</div>\n<p>• 触发条件：录音过程中检测到剩余存储 &lt; 50MB</p>\n<p>• 用户看到：录音面板顶部出现黄色警告条&quot;存储空间不足，录音即将停止&quot;</p>\n<p>• 恢复方式：</p>\n<p>• 立即自动保存已录制的音频（不等用户操作）</p>\n<p>• 停止录音后提示&quot;已保存 X 分 X 秒的录音，请清理存储空间后继续&quot;</p>\n<p>• 已录制的音频正常进入转录流程</p>\n<div class=\"sh\">1.3 录音意外中断</div>\n<p>• 触发条件：来电打断、APP 崩溃、系统杀进程、手机关机</p>\n<p>• 用户看到：下次打开笔记时，顶部出现恢复提示条&quot;上次录音未正常结束，已保存 X 分 X 秒的录音&quot;</p>\n<p>• 恢复方式：</p>\n<p>• 录音过程中每 30 秒自动保存一次临时文件</p>\n<p>• 恢复后用户可选择&quot;继续处理&quot;（进入转录）或&quot;删除&quot;</p>\n<p>• 来电场景：通话结束后自动恢复录音面板，提示&quot;录音已暂停，点击继续&quot;</p>\n<p>---</p>\n<div class=\"sh\">环节 2：转录阶段</div>\n<div class=\"sh\">2.1 音频无人声</div>\n<p>• 触发条件：转录引擎分析完成，未检测到有效语音片段</p>\n<p>• 用户看到：音频卡片下方显示&quot;未检测到语音内容&quot;</p>\n<p>• 恢复方式：</p>\n<p>• 保留原始音频，用户可播放确认</p>\n<p>• 提供&quot;重新转录&quot;按钮（可能是识别引擎误判）</p>\n<p>• 不触发 AI 整理流程</p>\n<div class=\"sh\">2.2 音频噪声过大</div>\n<p>• 触发条件：转录引擎返回结果，但置信度低于阈值（如 &lt; 60%）</p>\n<p>• 用户看到：转录文本正常展示，但顶部有提示&quot;录音环境嘈杂，转录结果可能不准确&quot;</p>\n<p>• 恢复方式：</p>\n<p>• 正常展示转录文本，用户可手动修正</p>\n<p>• 仍然触发 AI 整理（AI 整理时会标注&quot;基于低质量转录&quot;）</p>\n<p>• 保留原始音频供用户回听核实</p>\n<div class=\"sh\">2.3 语音识别引擎失败</div>\n<p>• 触发条件：SuniaEngine 返回错误码，或调用超时</p>\n<p>• 用户看到：</p>\n<p>• 进度条消失，显示&quot;转录失败&quot;</p>\n<p>• 提供&quot;点击重试&quot;按钮</p>\n<p>• 恢复方式：</p>\n<p>• 第一次失败：自动重试一次（用户无感知）</p>\n<p>• 自动重试仍失败：展示失败状态，用户手动点击重试</p>\n<p>• 重试 3 次仍失败：提示&quot;转录暂时不可用，请稍后再试&quot;，保留原始音频</p>\n<div class=\"sh\">2.4 网络中断（云端转录）</div>\n<p>• 触发条件：转录过程中网络断开</p>\n<p>• 用户看到：进度条暂停，提示&quot;网络已断开，恢复后将继续转录&quot;</p>\n<p>• 恢复方式：</p>\n<p>• 网络恢复后自动续传（不需要从头开始）</p>\n<p>• 如果断网超过 5 分钟，降级为端侧转录（如果支持）</p>\n<p>• 端侧也不支持：保留音频，等网络恢复后提示用户重试</p>\n<div class=\"sh\">2.5 音频格式不支持</div>\n<p>• 触发条件：用户导入的音频文件格式不在支持列表内</p>\n<p>• 用户看到：音频卡片显示&quot;不支持该音频格式&quot;</p>\n<p>• 恢复方式：</p>\n<p>• 保留原始文件，可播放（如果系统播放器支持）</p>\n<p>• 提示支持的格式列表</p>\n<p>• 不触发转录和 AI 整理</p>\n<div class=\"sh\">2.6 音频时长超限</div>\n<p>• 触发条件：导入的音频超过系统支持的最大时长（如 &gt; 4 小时）</p>\n<p>• 用户看到：提示&quot;音频时长超过 X 小时，暂不支持转录&quot;</p>\n<p>• 恢复方式：</p>\n<p>• 保留原始音频，可播放</p>\n<p>• 建议用户分段录制</p>\n<p>---</p>\n<div class=\"sh\">环节 3：AI 整理阶段</div>\n<div class=\"sh\">3.1 模型调用超时</div>\n<p>• 触发条件：AI 模型（DeepSeek / MiMo）响应超时（&gt; 60 秒无返回）</p>\n<p>• 用户看到：</p>\n<p>• &quot;解析中&quot;状态持续超过预期时间</p>\n<p>• 超时后显示&quot;AI 整理超时&quot;</p>\n<p>• 恢复方式：</p>\n<p>• 第一次超时：自动切换到备用模型重试</p>\n<p>• 备用模型也超时：展示去口语化文本（转录文本的书面化版本）作为兜底</p>\n<p>• 提供&quot;重新整理&quot;按钮</p>\n<p>• 兜底文案：&quot;AI 整理暂时不可用，已为你展示转录文本&quot;</p>\n<div class=\"sh\">3.2 模型返回异常</div>\n<p>• 触发条件：模型返回空内容、格式错误、或不可解析的结果</p>\n<p>• 用户看到：同上，&quot;AI 整理失败&quot;</p>\n<p>• 恢复方式：</p>\n<p>• 自动重试一次（切换模型）</p>\n<p>• 仍失败：展示去口语化文本兜底</p>\n<p>• 记录异常日志用于后续排查</p>\n<div class=\"sh\">3.3 转录文本过短</div>\n<p>• 触发条件：转录文本字数 &lt; 30 字（参考飞书文档的阈值）</p>\n<p>• 用户看到：不展示 AI 整理结果，直接展示转录文本</p>\n<p>-</p>\n<p>…（已截断）</p>",
  11: "<div class=\"sh\">笔记云同步策略与冲突处理方案</div>\n<p style=\"color:#888;font-style:italic\">本文档整合了云同步的原始策略、核心处理逻辑、以及补充的边界场景，供研发和测试作为完整参考。</p>\n<p>---</p>\n<div class=\"sh\">一、核心处理逻辑</div>\n<p>遇到任何同步冲突时，按以下优先级判断：</p>\n<p>优先级 | 逻辑 | 一句话说明</p>\n<p>1 | 删除冲突判断 | 一方删了另一方没删 → 看内容是否一致决定删还是保留</p>\n<p>2 | 内容一致性判断 | 内容一致 → 最后修改者胜出；内容不一致 → 分裂为两份保留</p>\n<p>3 | 同名实体合并 | 不同 ID 但名称相同 → 合并内容，保留云端 ID</p>\n<p>4 | 升级去重 | 旧格式升新格式时按 syncID 去重，系统笔记按账号去重</p>\n<p>5 | 网络异常兜底 | 离线、中断、时间戳异常等场景的兜底处理</p>\n<div class=\"sh\">逻辑1：最后修改者胜出（Last Write Wins）</div>\n<p>所有修改类冲突的默认裁决规则。不管是笔记正文、子笔记（待办/思维导图/总结/对话）、文件夹名称、还是置顶状态，谁的修改时间更新，就以谁为准覆盖另一方。</p>\n<div class=\"sh\">逻辑2：内容不一致时不丢数据，分裂保留</div>\n<p>当云端和本地的笔记正文内容都被修改且不一致时（文本/图片/涂鸦/文档/音频任一不同），不做覆盖，而是分裂为两份笔记各自保留。宁可多一份，不可丢内容。</p>\n<div class=\"sh\">逻辑3：删除冲突看内容是否一致来决定</div>\n<p>一方删除、另一方没删除时：</p>\n<p>• 内容一致 → 认为用户确实想删，执行删除（同步删除另一方）</p>\n<p>• 内容不一致 → 认为未删除方有新修改，保留未删除方的版本，撤销删除操作</p>\n<p>这条逻辑对笔记和文件夹都适用。文件夹场景下用「名称是否一致」替代「内容是否一致」做判断。</p>\n<div class=\"sh\">逻辑4：同名实体合并，保留云端 ID</div>\n<p>出现不同 ID 但名称相同的文件夹时，合并两个文件夹中的笔记，以云端文件夹 ID 为准覆盖本地。云端 ID 是权威标识。</p>\n<div class=\"sh\">逻辑5：升级和下发时按 ID 去重</div>\n<p>• 旧笔记升级为新格式时，保留原始 ID 和云端 syncID，如果新格式笔记的原始 syncID 与已有内容一致，只保留一份</p>\n<p>• 向旧版本下发系统笔记时，按账号维度去重，同一账号只发一次</p>\n<div class=\"sh\">逻辑6：网络异常与离线场景兜底</div>\n<p>离线、同步中断、设备时间异常等场景下的兜底处理规则（详见第五模块）。</p>\n<p>---</p>\n<div class=\"sh\">二、笔记冲突</div>\n<p>以整个笔记为单位，包括子笔记的冲突。</p>\n<div class=\"sh\">场景1：主笔记修改冲突</div>\n<p style=\"color:#888;font-style:italic\">笔记存在没有上传的脏数据，与云端水位不一致。</p>\n<p>内容不一致 → 分裂为两份笔记</p>\n<p>云端和本地都修改了，没有及时同步，导致内容不一致。以下任一维度不一致即判定为&quot;内容不一致&quot;：</p>\n<p>• 文本不一致</p>\n<p>• 图片不一致</p>\n<p>• 涂鸦不一致</p>\n<p>• 文档不一致</p>\n<p>• 音频不一致</p>\n<p>内容一致 → 新修改覆盖后修改</p>\n<p>没有修改笔记内容，但是修改时间、文件夹 ID 等其他字段有更新。</p>\n<p>子场景——移动文件夹冲突：同一个笔记，文件夹 ID 不一致。新修改覆盖后修改，保留新修改的笔记文件夹 ID：</p>\n<p>• 云端新移动 → 云端覆盖本地</p>\n<p>• 本地新移动 → 本地覆盖云端</p>\n<p>补充边界场景：</p>\n<p>场景 | 处理方式 | 适用逻辑</p>\n<p>笔记私密状态冲突（一方设为私密，另一方没设） | 按最后修改时间覆盖 | 逻辑1</p>\n<p>笔记标签冲突（AI 自动标签 vs 用户手动标签） | 按最后修改时间覆盖 | 逻辑1</p>\n<p>笔记排序冲突（两台设备都拖拽了排序） | 按最后操作时间覆盖 | 逻辑1</p>\n<p>文件夹内排序方式冲突（A 设备&quot;按时间&quot;，B 设备&quot;手动&quot;） | 按最后修改覆盖 | 逻辑1</p>\n<p>AI 整理结果冲突（同一段录音在两台设备分别触发 AI 整理） | 按最后生成时间覆盖 | 逻辑1</p>\n<p>附件增量冲突（本地新增音频，云端新增文档） | 两边附件都保留，合并到同一篇笔记 | 逻辑2 变体</p>\n<p>分裂后字符数超限（合并附件导致超过 50,000 字符） | 标记为&quot;超限笔记&quot;，禁止继续添加但保留完整内容 | 逻辑2 + 限制方案</p>\n<p>分裂后文件夹归属 | 新笔记放原文件夹，标题加后缀&quot;（冲突副本 - 设备名 - 时间）&quot; | 逻辑2</p>\n<p>多设备同时编辑产生多份分裂（3 台设备同时改） | 最多保留 2 份（云端版本 + 最新本地版本），避免笔记爆炸 | 逻辑2</p>\n<div class=\"sh\">场景2：主笔记关联的子笔记冲突</div>\n<p style=\"color:#888;font-style:italic\">两份笔记的子笔记内容不一致。统一处理方式：新修改覆盖后修改。</p>\n<p>子笔记类型 | 冲突处理</p>\n<p>待办卡片 | 同一份待办卡片，以新修改覆盖旧修改</p>\n<p>思维导图 | 同一份思维导图，以新修改的思维导图覆盖旧思维导图</p>\n<p>行程计划 | 以新修改的日程信息覆盖旧日程信息；日程状态不同步，直接取设备的日程状态</p>\n<p>总结卡片 | 同一份总结，新修改覆盖旧修改</p>\n<div class=\"sh\">场景3：笔记内的对话冲突</div>\n<p style=\"color:#888;font-style:italic\">云端与本地笔记的对话内容不一致。</p>\n<p>处理方式：新修改覆盖后修改，覆盖对话内容。</p>\n<div class=\"sh\">场景4：笔记删除冲突</div>\n<p style=\"color:#888;font-style:italic\">笔记的本地与云端删除状态不一致。</p>\n<p>云端删除，本地没删除：</p>\n<p>• 删除的文件与本地文件内容一致 → 则本地也删除，本地不会上传云端</p>\n<p>• 删除的文件与本地文件内容不一致 → 则本地不删除，且本地文件重新上传云端</p>\n<p>云端没删除，本地删除：</p>\n<p>• 云端的文件与本地删除的文件内容一致 → 则云端不下发，并同步云端删除</p>\n<p>• 云端的文件与本地删除的文件内容不一致 → 则云端的文件下发到本地</p>\n<p>补充边界场景：</p>\n<p>场景 | 处理方式 | 适用逻辑</p>\n<p>回收站中笔记恢复 vs 云端已永久删除 | 永久删除优先级高于恢复，本地也执行永久删除 | 逻辑3 延伸</p>\n<p>回收站过期自动清理冲突（云端 30 天清理，本地离线没同步到） | 下次联网时同步清理状态，本地也删除 | 逻辑3 延伸</p>\n<p>附件单独删除冲突（本地删了某附件，云端没删） | 附件内容一致则同步删除，不一致则保留云端版本 | 逻辑3</p>\n<p>---</p>\n<div class=\"sh\">三、文件夹冲突</div>\n<p>本地和云端，文件夹重名、修改/置顶/删除状态不一致。</p>\n<div class=\"sh\">场景1：文件夹重名冲突</div>\n<p style=\"color:#888;font-style:italic\">不同的文件夹 ID，名称一致。</p>\n<p>处理方式：融合文件夹中的笔记，保留云端文件夹 ID 信息，覆盖本地。</p>\n<p>补充边界场景：</p>\n<p>场景 | 处理方式 | 适用逻辑</p>\n<p>合并时两个文件夹有同一篇笔记（通过 syncID 判断） | 合并后只保留一份引用，不重复 | 逻辑4</p>\n<p>嵌套文件夹重名（本地&quot;工作/会议&quot;和云端&quot;工作/会议&quot;ID 不同） | 按逻辑4 合并，保留云端 ID | 逻辑4</p>\n<p>合并后笔记数量很大（两个文件夹各 100 篇） | 不做限制，前端做分页懒加载 | 逻辑4</p>\n<div class=\"sh\">场</div>\n<p>…（已截断）</p>",
  12: "<div class=\"sh\">Chips 动态排序 — 系统提示词</div>\n<p style=\"color:#888;font-style:italic\">适用场景：AI 笔记 app 内，用户打开笔记详情页时，根据笔记内容和上下文动态计算应该展示哪些 chips、以什么顺序展示。</p>\n<div class=\"sh\">System Prompt</div>\n<pre><code>你是一个 Chips 排序引擎。你的任务是根据当前笔记的内容和上下文信息，计算每个 chip 的权重，返回按权重从高到低排序的 chips 列表。\n\n## 输入\n\n一个 JSON 对象，包含笔记的内容和上下文信息：\n</code></pre>\n<p>{</p>\n<p>&quot;content&quot;: &quot;笔记的完整文本内容&quot;,</p>\n<p>&quot;char_count&quot;: 1200,</p>\n<p>&quot;source&quot;: &quot;user_input | ai_generated | voice_input&quot;,</p>\n<p>&quot;has_audio&quot;: false,</p>\n<p>&quot;ends_with_incomplete&quot;: false,</p>\n<p>&quot;previous_chips_used&quot;: [3],</p>\n<p>&quot;existing_artifacts&quot;: [&quot;todo&quot;],</p>\n<p>&quot;mode&quot;: &quot;full | selection&quot;,</p>\n<p>&quot;selected_content&quot;: &quot;选中的文本内容（仅 selection 模式）&quot;,</p>\n<p>&quot;selected_chars&quot;: 0,</p>\n<p>&quot;selection_position&quot;: &quot;end | middle&quot;</p>\n<p>}</p>\n<pre><code>\n字段说明：\n- content：笔记全文文本，用于判断关键词、口语化表述等\n- char_count：笔记总字数\n- source：笔记来源。user_input = 用户手动输入，ai_generated = AI 生成，voice_input = 语音输入\n- has_audio：是否有录音附件\n- ends_with_incomplete：末尾是否是未完成的句子（如&quot;合集入口需要&quot;没写完）\n- previous_chips_used：用户上次使用过的 chip id 列表，用于降权避免重复推荐\n- existing_artifacts：已生成的产物列表。可选值：todo（待办）、schedule（日程）、mindmap（思维导图）、summary（摘要）\n- mode：当前模式。full = 全文模式，selection = 选中段落模式\n- selected_content：选中的文本内容，仅 selection 模式有值\n- selected_chars：选中文本字数，仅 selection 模式有值\n- selection_position：选中内容在笔记中的位置。end = 在笔记末尾，middle = 在笔记中间，仅 selection 模式有值\n\n## 输出\n\n一个 JSON 数组，每个元素包含 chip 的 id、名称、推荐指令和最终权重。按权重从高到低排序。\n\n输出格式：</code></pre>\n<p>[</p>\n<p>{ &quot;id&quot;: 1, &quot;name&quot;: &quot;总结要点&quot;, &quot;prompt&quot;: &quot;总结这篇笔记的要点&quot;, &quot;weight&quot;: 9 },</p>\n<p>{ &quot;id&quot;: 3, &quot;name&quot;: &quot;提取待办&quot;, &quot;prompt&quot;: &quot;提取这篇笔记里的待办&quot;, &quot;weight&quot;: 8 }</p>\n<p>]</p>\n<pre><code>\n笔记为空（char_count = 0）时，返回空数组 []。\n\n## 全部 Chips 定义\n\n共 12 个 chip，分三组：\n\n### 内容提取\n\n| id | 名称 | 推荐指令 |\n|----|------|---------|\n| 1 | 总结要点 | 总结这篇笔记的要点 |\n| 2 | 创建思维导图 | 把这篇笔记整理成思维导图 |\n| 3 | 提取待办 | 提取这篇笔记里的待办 |\n| 4 | 提取日程 | 提取这篇笔记里的日程 |\n\n### 文本润色\n\n| id | 名称 | 推荐指令 |\n|----|------|---------|\n| 5 | 校对全文 | 帮我检查这篇笔记有没有错误 |\n| 6 | 改简洁 | 把这篇笔记改简洁一点 |\n| 7 | 续写补充 | 帮我接着往下写 |\n| 8 | 改成正式语气 | 把这篇笔记改成正式语气 |\n\n### 笔记模板\n\n| id | 名称 | 推荐指令 |\n|----|------|---------|\n| 9 | 会议纪要 | 把这段录音整理成会议纪要 |\n| 10 | 课堂笔记 | 把这段录音整理成课堂笔记 |\n| 11 | 对话访谈 | 把这段录音整理成访谈纪要 |\n| 12 | 脑暴纪要 | 把这段录音整理成脑暴纪要 |\n\n## 计算规则\n\n### 第一步：基础权重\n\n权重按&quot;场景覆盖面&quot;定义：能用在越多种笔记上的 chip，基础权重越高。这是产品判断的初始值，上线后根据实际点击数据调整。\n\n| id | chip | 基础权重 |\n|----|------|---------|\n| 1 | 总结要点 | 9 |\n| 2 | 思维导图 | 7 |\n| 3 | 待办事项 | 7 |\n| 4 | 行程计划 | 5 |\n| 5 | 校对 | 8 |\n| 6 | 改简洁 | 6 |\n| 7 | 续写 | 5 |\n| 8 | 正式语气 | 6 |\n| 9 | 会议纪要 | 8 |\n| 10 | 课堂笔记 | 7 |\n| 11 | 对话访谈 | 6 |\n| 12 | 脑暴纪要 | 5 |\n\n### 第二步：大模型分析排序（异步）\n\n大模型分析笔记全文内容语义，对基础权重进行调整。如果大模型未返回结果（超时或异常），跳过此步直接进入第三步。\n\n#### 2.1 判断每个 chip 是否满足出现条件\n\n大模型只负责分析需要理解文本才能确定的条件。满足条件的 chip 保持基础权重，不满足的权重降为 1。\n\n| id | chip | 大模型判断条件 |\n|----|------|--------------|\n| 1 | 总结要点 | content 信息量足够丰富，有多个主题或论点值得提炼 |\n| 2 | 思维导图 | content 有层级结构或多个并列主题，适合用导图呈现 |\n| 3 | 待办事项 | content 含行动类语义（需要做什么、谁负责、截止时间等） |\n| 4 | 行程计划 | content 含具体日期/时间 + 事件描述 |\n| 5 | 校对 | content 存在疑似拼写、语法、标点或用词问题 |\n| 6 | 改简洁 | content 存在冗余表述、重复信息或套话，有精简空间 |\n| 7 | 续写 | content 末尾是未完成的句子，或内容明显不完整（如只有提纲没有正文） |\n| 8 | 正式语气 | content 含口语化表述（&quot;聊了下&quot;&quot;挺好的&quot;&quot;搞定了&quot;等） |\n| 9 | 会议纪要 | content 含会议相关语义（会议、讨论、议题、参会等） |\n| 10 | 课堂笔记 | content 含课堂相关语义（课程、老师、知识点、学习等） |\n| 11 | 对话访谈 | content 含问答轮次或访谈相关语义（采访、访谈、Q&amp;A等） |\n| 12 | 脑暴纪要 | content 含脑暴相关语义（脑暴、头脑风暴、创意、点子\n\n…（已截断）</code></pre>",
  13: "<div class=\"sh\">指令分流判断 — 系统提示词</div>\n<p style=\"color:#888;font-style:italic\">适用场景：AI 笔记 app 内，用户在笔记详情页通过文字或语音发送一句自然语言指令后，判断该指令应该走哪种交互场景。这个判断在 AI 执行指令之前完成，决定后续的交互流程。</p>\n<div class=\"sh\">System Prompt</div>\n<pre><code>你是一个指令分流判断器。用户在一篇笔记的详情页发送了一句自然语言指令，你需要判断这条指令应该走哪种交互场景。\n\n你不需要执行指令，只需要判断场景类型并返回结果。\n\n## 输入\n\n你会收到两个信息：\n1. 用户的指令文本\n2. 当前笔记的基本信息（标题、字数、是否有录音附件、是否已整理过、来源等）\n\n## 输出\n\n返回一个 JSON 对象：\n</code></pre>\n<p>{</p>\n<p>&quot;scene&quot;: &quot;confirm_edit | direct_edit | dialog&quot;,</p>\n<p>&quot;reason&quot;: &quot;一句话说明为什么判断为这个场景&quot;,</p>\n<p>&quot;sub_type&quot;: &quot;add | modify | delete | proofread | null&quot;</p>\n<p>}</p>\n<pre><code>\n## 三种场景的判断规则\n\n### 场景1：confirm_edit（确认修改）\n\n用户的指令会导致原文内容被修改或删除，修改后原文信息会丢失或发生不可逆变化。\n\n判断为 confirm_edit 的信号：\n- 指令中包含&quot;删掉&quot;&quot;删除&quot;&quot;去掉&quot;&quot;移除&quot;等删除类动词\n- 指令中包含&quot;重写&quot;&quot;改写&quot;&quot;替换&quot;&quot;换成&quot;等替换类动词\n- 指令中包含&quot;改简洁&quot;&quot;精简&quot;&quot;缩短&quot;等会减少原文内容的动词\n- 指令中包含&quot;改成正式语气&quot;&quot;改成口语化&quot;等会改变原文表述的动词\n- 指令中包含&quot;校对&quot;&quot;检查错误&quot;&quot;纠错&quot;&quot;改错别字&quot;&quot;修正错别字&quot;等校对类动词\n- 指令明确指向原文中的某个段落、某句话、某个词，要求修改它\n\nsub_type 判断：\n- &quot;add&quot;：指令要求在原文中增加内容（如&quot;在第二段后面加一句总结&quot;）\n- &quot;modify&quot;：指令要求修改原文中已有的内容（如&quot;把第三条共识的时间改成下周五&quot;）\n- &quot;delete&quot;：指令要求删除原文中的内容（如&quot;把会议目的那段删掉&quot;）\n- &quot;proofread&quot;：指令要求校对全文或选中内容（如&quot;帮我检查有没有错误&quot;）\n\n### 场景2：direct_edit（直接修改）\n\n用户的指令会在笔记中插入新内容，不修改或删除原文已有的内容。原文信息不丢失。\n\n判断为 direct_edit 的信号：\n- 指令中包含&quot;续写&quot;&quot;接着写&quot;&quot;追加&quot;&quot;补充&quot;&quot;加一段&quot;等新增内容的动词\n- 指令明确要求在某个位置插入新内容（如&quot;在第二段后面加一句总结&quot;&quot;在末尾加个待办&quot;）\n- 指令要求生成卡片类内容（待办、日程、思维导图等）并明确要求插入笔记（如&quot;提取待办插入笔记&quot;&quot;生成思维导图加到笔记里&quot;）\n\nsub_type 固定为 null。\n\n### 场景3：dialog（对话展示）\n\n用户的指令是提问、分析、讨论，不需要修改笔记内容。结果在对话面板中展示。\n\n判断为 dialog 的信号：\n- 指令是疑问句（&quot;有没有&quot;&quot;是什么&quot;&quot;为什么&quot;&quot;怎么&quot;）\n- 指令要求分析或评价（&quot;分析一下&quot;&quot;有什么问题&quot;&quot;遗漏了什么&quot;）\n- 指令要求总结或概括（&quot;总结要点&quot;&quot;核心结论是什么&quot;）\n- 指令中包含&quot;提取&quot;&quot;挑出&quot;&quot;列出&quot;等提取类动词（如&quot;提取待办&quot;&quot;提取日程&quot;），且没有明确要求插入笔记，结果在对话面板中展示\n- 指令中包含&quot;生成&quot;&quot;创建&quot;&quot;整理成&quot;等生成类动词（如&quot;整理成会议纪要&quot;&quot;生成思维导图&quot;），且没有明确要求插入笔记，结果在对话面板中展示\n- 指令要求翻译但没有指定替换原文（&quot;翻译成英文&quot;默认走 dialog，&quot;把原文替换成英文&quot;走 confirm_edit）\n- 指令和笔记内容无关（闲聊、问天气等）\n\nsub_type 固定为 null。\n\n## 兜底规则\n\n如果无法确定指令属于哪个场景，返回 dialog。宁可多走一步对话展示，不误改原文。\n\n## 示例\n\n### 示例1\n输入指令：&quot;把第二条共识删掉&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;confirm_edit&quot;, &quot;reason&quot;: &quot;指令要求删除原文中的特定内容&quot;, &quot;sub_type&quot;: &quot;delete&quot;}</p>\n<pre><code>\n### 示例2\n输入指令：&quot;帮我提取待办事项&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;dialog&quot;, &quot;reason&quot;: &quot;提取待办在对话面板中展示结果&quot;, &quot;sub_type&quot;: null}</p>\n<pre><code>\n### 示例3\n输入指令：&quot;这篇笔记有没有遗漏什么议题&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;dialog&quot;, &quot;reason&quot;: &quot;指令是提问，不需要修改笔记&quot;, &quot;sub_type&quot;: null}</p>\n<pre><code>\n### 示例4\n输入指令：&quot;把会议目的改简洁一点&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;confirm_edit&quot;, &quot;reason&quot;: &quot;精简会议目的会修改原文内容&quot;, &quot;sub_type&quot;: &quot;modify&quot;}</p>\n<pre><code>\n### 示例5\n输入指令：&quot;帮我接着往下写&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;direct_edit&quot;, &quot;reason&quot;: &quot;续写是在末尾追加新内容，直接写入&quot;, &quot;sub_type&quot;: null}</p>\n<pre><code>\n### 示例6\n输入指令：&quot;帮我检查有没有错别字&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;confirm_edit&quot;, &quot;reason&quot;: &quot;校对会修改原文中的错误&quot;, &quot;sub_type&quot;: &quot;proofread&quot;}</p>\n<pre><code>\n### 示例7\n输入指令：&quot;把这段录音整理成会议纪要&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;dialog&quot;, &quot;reason&quot;: &quot;整理成会议纪要在对话面板中展示结果&quot;, &quot;sub_type&quot;: null}</p>\n<pre><code>\n### 示例8\n输入指令：&quot;总结这篇笔记的要点&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;dialog&quot;, &quot;reason&quot;: &quot;总结要点是展示分析结果，不修改笔记&quot;, &quot;sub_type&quot;: null}</p>\n<pre><code>\n### 示例9\n输入指令：&quot;把第三段改成正式语气&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;confirm_edit&quot;, &quot;reason&quot;: &quot;改语气会修改原文表述&quot;, &quot;sub_type&quot;: &quot;modify&quot;}</p>\n<pre><code>\n### 示例10\n输入指令：&quot;翻译成英文&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;dialog&quot;, &quot;reason&quot;: &quot;未指定替换原文，默认在对话中展示译文&quot;, &quot;sub_type&quot;: null}</p>\n<pre><code>\n### 示例11\n输入指令：&quot;提取待办并插入笔记&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;direct_edit&quot;, &quot;reason&quot;: &quot;用户明确要求将待办插入笔记，直接写入&quot;, &quot;sub_type&quot;: null}</p>\n<pre><code>\n### 示例12\n输入指令：&quot;帮我生成一个思维导图&quot;</code></pre>\n<p>{&quot;scene&quot;: &quot;dialog&quot;, &quot;reason&quot;: &quot;未要求插入笔记，在对话面板中展示思维导图&quot;, &quot;sub_type&quot;: null}</p>\n<pre><code>\n## 边界情况\n\n1. **指令模糊**（如&quot;\n\n…（已截断）</code></pre>",
  14: "<div class=\"sh\">AI 关联笔记推荐 — 第三层 LLM 效果验证</div>\n<p style=\"color:#888;font-style:italic\">验证目标：用真实笔记数据测试系统提示词的第三层 LLM 精细判断效果，检验关联维度识别、reason 文案、置信度打分、排序过滤规则是否符合预期。</p>\n<p style=\"color:#888;font-style:italic\">验证方式：跳过第一层（实体匹配）和第二层（语义相似度），直接将当前笔记 + 候选笔记喂给 LLM，观察输出是否合理。</p>\n<p style=\"color:#888;font-style:italic\">测试数据来源：本工作区中的真实文档。</p>\n<p>---</p>\n<div class=\"sh\">测试场景 1：需求文档找关联</div>\n<div class=\"sh\">输入</div>\n<p>当前笔记：笔记详情页关联笔记推荐方案（需求文档，约 4000 字，涵盖关联笔记的展示、AI 策略、手动引用三个模块）</p>\n<p>候选笔记（5 篇）：</p>\n<p>ID | 标题 | 字数 | 内容概要</p>\n<p>note_A | 关联内容推荐竞品调研 | ~5000 | 跨领域竞品调研（Obsidian/Reminds/Notion/Netflix/小红书等），含关联网络视图深度调研</p>\n<p>note_B | 笔记详情页AI问答优化方案 | ~4000 | 详情页 AI 对话框交互、Chips 动态展示、一句话指令修改、选中段落润色</p>\n<p>note_C | 笔记首页改造-P0场景梳理 | ~3000 | 首页承接 MiClaw 写入的 8 个 P0 场景，来源区分、智能文件夹、滚动更新</p>\n<p>note_D | AI笔记新架构PRD | ~8000 | 9 个模块的完整 PRD（语音生成、AI 问答、文件夹、思维导图、同步等）</p>\n<p>note_E | 语音输入笔记竞品参考 | ~4000 | 语音笔记竞品调研（Apple/Samsung/Otter/Granola/Plaud 等）</p>\n<div class=\"sh\">LLM 输出</div>\n<pre><code>[\n  {\n    &quot;note_id&quot;: &quot;note_A&quot;,\n    &quot;dimension&quot;: &quot;project&quot;,\n    &quot;reason&quot;: &quot;同属关联笔记推荐项目&quot;,\n    &quot;confidence&quot;: 0.95\n  },\n  {\n    &quot;note_id&quot;: &quot;note_D&quot;,\n    &quot;dimension&quot;: &quot;project&quot;,\n    &quot;reason&quot;: &quot;同属AI笔记新架构&quot;,\n    &quot;confidence&quot;: 0.85\n  },\n  {\n    &quot;note_id&quot;: &quot;note_B&quot;,\n    &quot;dimension&quot;: &quot;topic&quot;,\n    &quot;reason&quot;: &quot;都在设计详情页AI能力&quot;,\n    &quot;confidence&quot;: 0.78\n  }\n]</code></pre>\n<div class=\"sh\">人工评估</div>\n<p>推荐 | 维度 | reason | 置信度 | 评估 | 说明</p>\n<p>note_A 关联内容推荐竞品调研 | project | 同属关联笔记推荐项目 | 0.95 | ✅ 正确 | 竞品调研是关联推荐方案的直接输入，关联度最高</p>\n<p>note_D AI笔记新架构PRD | project | 同属AI笔记新架构 | 0.85 | ✅ 正确 | PRD 是上层需求文档，关联推荐是其中 F2.4 的细化方案</p>\n<p>note_B 详情页AI问答优化 | topic | 都在设计详情页AI能力 | 0.78 | ✅ 正确 | 同一个页面（详情页）的不同 AI 能力，主题相关</p>\n<p>未推荐的笔记评估：</p>\n<p>笔记 | 是否应该推荐 | 说明</p>\n<p>note_C 首页改造 | ❌ 不应推荐 | 首页和详情页是不同页面，关联度不够强</p>\n<p>note_E 语音竞品参考 | ❌ 不应推荐 | 语音输入和笔记关联是不同功能方向</p>\n<p>场景 1 结论：✅ 通过。维度识别准确，排序合理，未出现弱关联。</p>\n<p>---</p>\n<div class=\"sh\">测试场景 2：交互方案找关联</div>\n<div class=\"sh\">输入</div>\n<p>当前笔记：音频解析失败场景设计（交互方案，约 3000 字，覆盖录音→转录→AI整理→写入笔记四个环节的失败场景和兜底策略）</p>\n<p>候选笔记（5 篇）：</p>\n<p>ID | 标题 | 字数 | 内容概要</p>\n<p>note_F | 笔记云同步策略与冲突处理方案 | ~4000 | 云同步冲突处理的 6 条核心逻辑、笔记/文件夹冲突、网络异常兜底</p>\n<p>note_B | 笔记详情页AI问答优化方案 | ~4000 | 详情页 AI 对话框交互、Chips、一句话指令修改</p>\n<p>note_D | AI笔记新架构PRD | ~8000 | 9 个模块的完整 PRD</p>\n<p>note_E | 语音输入笔记竞品参考 | ~4000 | 语音笔记竞品调研</p>\n<p>note_G | 笔记详情页关联笔记推荐方案 | ~4000 | 关联笔记展示、AI 策略、手动引用</p>\n<div class=\"sh\">LLM 输出</div>\n<pre><code>[\n  {\n    &quot;note_id&quot;: &quot;note_E&quot;,\n    &quot;dimension&quot;: &quot;topic&quot;,\n    &quot;reason&quot;: &quot;都在讨论语音录音处理&quot;,\n    &quot;confidence&quot;: 0.82\n  },\n  {\n    &quot;note_id&quot;: &quot;note_F&quot;,\n    &quot;dimension&quot;: &quot;topic&quot;,\n    &quot;reason&quot;: &quot;都在设计异常兜底策略&quot;,\n    &quot;confidence&quot;: 0.75\n  },\n  {\n    &quot;note_id&quot;: &quot;note_D&quot;,\n    &quot;dimension&quot;: &quot;project&quot;,\n    &quot;reason&quot;: &quot;同属AI笔记新架构&quot;,\n    &quot;confidence&quot;: 0.70\n  }\n]</code></pre>\n<div class=\"sh\">人工评估</div>\n<p>推荐 | 维度 | reason | 置信度 | 评估 | 说明</p>\n<p>note_E 语音竞品参考 | topic | 都在讨论语音录音处理 | 0.82 | ✅ 正确 | 音频解析和语音输入都围绕录音场景，主题强相关</p>\n<p>note_F 云同步冲突处理 | topic | 都在设计异常兜底策略 | 0.75 | ⚠️ 可接受 | 两者都涉及异常处理和降级策略，但具体领域不同（音频 vs 同步），关联偏弱</p>\n<p>note_D AI笔记新架构PRD | project | 同属AI笔记新架构 | 0.70 | ✅ 正确 | PRD 是上层文档，音频解析是其中 F1 的细化方案</p>\n<p>未推荐的笔记评估：</p>\n<p>笔记 | 是否应该推荐 | 说明</p>\n<p>note_B 详情页AI问答优化 | ❌ 不应推荐 | AI 问答和音频解析是不同功能</p>\n<p>note_G 关联笔记推荐方案 | ❌ 不应推荐</p>\n<p>…（已截断）</p>",
  15: "<div class=\"sh\">Notion 链接方式竞品分析</div>\n<p>---</p>\n<div class=\"sh\">概述</div>\n<p>Notion 提供三种页面链接方式：Link to page（页面链接块）、内联链接（Inline mention）和超链接（Hyperlink）。三者在展示形态、创建方式、反向链接支持上有明显差异。</p>\n<p>---</p>\n<div class=\"sh\">一、Link to page（页面链接块）</div>\n<div class=\"sh\">特点</div>\n<p>• 是一个独立的块（block），占用整一行，不能放在文字后面</p>\n<p>• 通过 slash 命令创建，选择或搜索目标页面</p>\n<p>• 支持反向链接：被链接的页面可以看到哪些页面链接了自己</p>\n<p>• 反向链接有三种显示方式：悬浮显示、一直显示、关闭</p>\n<p>• 链接的是页面本身，在链接页面上的修改会同步到原页面（需注意不要随意更改）</p>\n<div class=\"sh\">创建方式</div>\n<p>1. 输入 / 调出 slash 命令，选择 Link to page</p>\n<p>2. 在下拉菜单中选择目标页面，或输入名称搜索</p>\n<div class=\"sh\">局限</div>\n<p>• 占用整行，无法嵌入在文本中间</p>\n<p>• 如需居中显示，需要通过多列布局实现</p>\n<p>---</p>\n<div class=\"sh\">二、内联链接（Inline mention）</div>\n<div class=\"sh\">特点</div>\n<p>• 是一个文本块内的元素，可以放在文字后面，不占用独立行</p>\n<p>• 不会在侧边栏嵌套到目标页面下（与 Link to page 的最大区别）</p>\n<p>• 具有文本的功能，可以转换为标题，实现&quot;标题即链接&quot;的效果</p>\n<p>• 同样支持反向链接</p>\n<div class=\"sh\">创建方式（四种）</div>\n<p>1. 使用 +：可在本页面或其他页面创建新子页面，也可链接已有页面</p>\n<p>2. 使用 @：可调出日期、人物，同时可创建页面和内联链接</p>\n<p>3. 使用 [[：中括号形式创建，与 Obsidian 的 [[]] 类似</p>\n<p>4. 粘贴页面链接：复制页面链接后粘贴，选择 mention 形式插入</p>\n<div class=\"sh\">注意事项</div>\n<p>• 如果以上命令创建不了，需先按一下空格再输入命令</p>\n<p>• 内联链接可以和普通文字在同一行，适合在正文中自然引用其他页面</p>\n<p>---</p>\n<div class=\"sh\">三、超链接（Hyperlink）</div>\n<div class=\"sh\">特点</div>\n<p>• 与 PPT 的超链接含义相同：将跳转目标的链接绑定到指定文字上</p>\n<p>• 可用于页面内跳转（锚点跳转），Link to page 和内联链接不支持此功能</p>\n<p>• 不产生反向链接</p>\n<div class=\"sh\">创建方式</div>\n<p>1. 复制目标位置的链接（通过侧边栏选项面板或快捷键）</p>\n<p>2. 选中要添加链接的文字，通过选项面板或快捷键添加链接</p>\n<div class=\"sh\">使用场景</div>\n<p>• 页面内目录跳转（如点击底部文字跳转到页面顶部的某个标题）</p>\n<p>• 链接外部 URL</p>\n<p>---</p>\n<div class=\"sh\">四、三种链接方式对比</div>\n<p> | Link to page | 内联链接 | 超链接</p>\n<p>展示形态 | 独立块，占整行 | 文本内元素，可嵌入文字中 | 文字上的链接</p>\n<p>反向链接 | ✅ 支持 | ✅ 支持 | ❌ 不支持</p>\n<p>侧边栏嵌套 | ✅ 嵌套到目标页面下 | ❌ 不嵌套 | ❌ 不嵌套</p>\n<p>页面内跳转 | ❌ 不支持 | ❌ 不支持 | ✅ 支持</p>\n<p>可转换为标题 | ❌ | ✅ | ❌</p>\n<p>创建方式 | slash 命令 | `+` / `@` / `[[` / 粘贴 | 复制链接 + 绑定文字</p>\n<p>---</p>\n<div class=\"sh\">五、对小米笔记的启示</div>\n<p>Notion 功能 | 我们的对应方案 | 差异</p>\n<p>内联链接（`@` 创建） | `@` 触发笔记搜索浮窗 | 交互方式一致</p>\n<p>粘贴链接插入 mention | 粘贴笔记链接插入链接卡片 | 交互方式一致</p>\n<p>反向链接显示 | &quot;被以下笔记引用&quot;分组 | 位置一致（页面底部）</p>\n<p>Link to page 占整行 | 笔记链接卡片也占整行 | 形态一致</p>\n<p>`[[` 创建链接 | 不支持（手机端输入不便） | 我们用 `@` 替代</p>\n<p>页面内跳转（超链接） | 暂不支持 | 远期可考虑</p>\n<p>反向链接三种显示方式 | 固定在笔记底部显示 | 我们不提供显示方式切换</p>",
  16: "<div class=\"sh\">笔记详情页 · AI Chips P0 清单</div>\n<div class=\"sh\">为什么是这 12 个</div>\n<p>用户打开一篇笔记，对内容只有三种本质需求：理解它、改造它、带走它。</p>\n<p>P0 的筛选标准：这个 chip 不做，用户在笔记详情页的核心体验链路就断了。</p>\n<p>• 理解：用户打开一篇长笔记，如果不能快速抓重点或看清结构，AI 笔记和普通笔记没区别</p>\n<p>• 改造·减少：AI 生成的内容普遍偏长，精简是录音转写场景的刚需，不做的话用户每次都要手动删改</p>\n<p>• 改造·增加：灵感速记和未完成的笔记需要续写，否则短笔记场景下 AI 入口无用武之地</p>\n<p>• 改造·变形：录音转写→结构化笔记、从内容中提取行动项和日程，是 AI 笔记的核心价值</p>\n<p>• 改造·修正：用户手写和 AI 生成都可能有拼写、语法、标点、用词问题，全文校对是最基础的文本质量保障</p>\n<p>---</p>\n<div class=\"sh\">场景说明</div>\n<p>Chip 只定义&quot;做什么&quot;，不绑定交互流程。用户点击 chip 后，AI 处理完根据结果性质自动判断走哪个场景：</p>\n<p>场景 | 判断标准 | 交互流程</p>\n<p>确认修改 | AI 的结果会修改或删除原文内容 | AI处理 → 当前页面展示 Before/After 对比 → 用户确认或撤销 → 写入笔记</p>\n<p>直接插入 | AI 的结果是新增内容，不动原文 | AI处理 → 生成卡片直接插入笔记 → 底部药丸显示结果</p>\n<p>对话展示 | AI 的结果是回答、分析、展示，不修改笔记 | 进入全屏对话面板 → AI回答展示在对话中 → 下拉关闭回到笔记</p>\n<p>同一个 chip 在不同上下文下可能走不同场景，由 AI 根据操作结果决定。</p>\n<p>---</p>\n<div class=\"sh\">Chips 清单（按用户视角分组）</div>\n<div class=\"sh\">内容提取</div>\n<p># | Chip 名称 | 推荐指令 | 输出形态 | 状态</p>\n<p>1 | 总结要点 | 总结这篇笔记的要点 | 3-5 句话的摘要卡片 | P0 待开发</p>\n<p>2 | 创建思维导图 | 把这篇笔记整理成思维导图 | 可交互的导图页面 | ✅ 已完成</p>\n<p>3 | 提取待办 | 提取这篇笔记里的待办 | 待办卡片（可勾选+同步系统） | ✅ 已完成</p>\n<p>4 | 提取日程 | 提取这篇笔记里的日程 | 日程卡片（可同步日历） | ✅ 已完成</p>\n<div class=\"sh\">文本润色</div>\n<p># | Chip 名称 | 推荐指令 | 输出形态 | 状态</p>\n<p>5 | 校对全文 | 帮我检查这篇笔记有没有错误 | 逐条高亮修改+原因说明+逐条确认 | P0 待开发</p>\n<p>6 | 改简洁 | 把这篇笔记改简洁一点 | Before/After 确认卡片 | P0 待开发</p>\n<p>7 | 续写补充 | 帮我接着往下写 | 新内容直接追加到末尾 | P0 待开发</p>\n<p>8 | 改成正式语气 | 把这篇笔记改成正式语气 | Before/After 确认卡片 | P0 待开发</p>\n<div class=\"sh\">笔记模板</div>\n<p># | Chip 名称 | 推荐指令 | 输出形态 | 状态</p>\n<p>9 | 会议纪要 | 把这段录音整理成会议纪要 | 议题→结论→待办→日程 | ✅ 已完成</p>\n<p>10 | 课堂笔记 | 把这段录音整理成课堂笔记 | 知识点→重点→课后任务 | ✅ 已完成</p>\n<p>11 | 对话访谈 | 把这段录音整理成访谈纪要 | 问答→核心观点→引用 | ✅ 已完成</p>\n<p>12 | 脑暴纪要 | 把这段录音整理成脑暴纪要 | 议题→创意→筛选→结论 | ✅ 已完成</p>\n<p>---</p>\n<div class=\"sh\">基础权重</div>\n<p>权重按&quot;场景覆盖面&quot;定义：能用在越多种笔记上的 chip，基础权重越高。这是产品判断的初始值，上线后根据实际点击数据调整。</p>\n<p>编号 | chip | 基础权重 | 覆盖面分析</p>\n<p>1 | 总结要点 | 9 | 任何超过 500 字的笔记都能用，不限类型和来源，覆盖最广</p>\n<p>2 | 思维导图 | 7 | 长笔记能用，但对内容结构有隐性要求，纯流水账生成的导图价值不大</p>\n<p>3 | 待办事项 | 7 | 需要含行动类关键词，会议纪要和工作笔记大概率有，日记随笔不一定有，覆盖约 50-60%</p>\n<p>4 | 行程计划 | 5 | 需要含日期/时间+事件描述，比待办更窄，覆盖约 30-40%</p>\n<p>5 | 校对 | 8 | 几乎任何超过 20 字的笔记都能用，覆盖面和总结要点并列最广</p>\n<p>6 | 改简洁 | 6 | 需要超过 500 字，且只对冗长内容有效，已经简洁的笔记用了也没效果</p>\n<p>7 | 续写 | 5 | 只覆盖短笔记（&lt; 200 字）和未完成笔记，笔记库中的少数派</p>\n<p>8 | 正式语气 | 6 | 覆盖口语化表述和语音输入笔记，约 40-50%</p>\n<p>9 | 会议纪要 | 8 | 前置条件是有录音，会议是最常见的录音场景，在录音笔记中覆盖最广</p>\n<p>10 | 课堂笔记 | 7 | 学生群体的高频场景，但在整体用户中占比不如会议</p>\n<p>11 | 对话访谈 | 6 | 记者、研究员、产品经理做用户访谈时用，场景比会议和课堂更窄</p>\n<p>12 | 脑暴纪要 | 5 | 最窄的录音场景，只有团队脑暴时才用</p>\n<p>---</p>\n<div class=\"sh\">每个 Chip 的出现条件与排序权重</div>\n<p>最多同时展示 4 个 chips，单行横滑。满足条件的 chips 按权重排序取前 4。</p>\n<p># | Chip | 出现条件 | 基础权重 | 不出现条件</p>\n<p>1 | 总结要点 | 内容 &gt; 500 字 | 9 | 已有 AI 生成的摘要卡片</p>\n<p>2 | 创建思维导图 | 内容 &gt; 300 字 且 有 2 个以上层级标题 | 7 | 已生成过思维导图</p>\n<p>3 | 提取待办 | 内容含&quot;需要&quot;&quot;负责&quot;&quot;截止&quot;&quot;跟进&quot;&quot;确认&quot;等行动类关键词 | 8 | 已提取过待办</p>\n<p>4 | 提取日程 | 内容含具体日期/时间 + 事件描述 | 7 | 已提取过日程</p>\n<p>5 | 校对全文 | 始终可用（用户手动输入的笔记权重 +2） | 6 | 内容 &lt; 20 字</p>\n<p>6 | 改简洁 | 内容 &gt; 500 字 | 7 | 内容已经过 AI 精简</p>\n<p>7 | 续写补充 | 内容 &lt; 200 字 或 末尾是未完成的句子 | 8 | 内容 &gt; 2000 字</p>\n<p>8 | 改成正式语气 | 内容含口语化表述 或 来源为语音输入 | 6 | 内容已是正式语气</p>\n<p>9-12 | 笔记模板（共用前置条件） | 有录音附件 且 内容为纯转写文本（未经 AI 整理） | — | 已经整理过</p>\n<p>9</p>\n<p>…（已截断）</p>",
  17: "<div class=\"sh\">笔记首页筛选功能需求文档</div>\n<p style=\"color:#888;font-style:italic\">筛选的核心目的：Agent 高频写入后，用户需要快速区分&quot;哪些是我写的、哪些是 AI 写的&quot;，不被 AI 内容淹没。</p>\n<p>---</p>\n<div class=\"sh\">一、筛选选项</div>\n<p>选项 | 文案 | 含义 | 默认状态</p>\n<p>选项 1 | 全部笔记 | 显示所有笔记，不区分来源 | 默认选中</p>\n<p>选项 2 | 我创建的笔记 | 仅显示用户手动创建的笔记 | —</p>\n<p>选项 3 | AI 创建的笔记 | 仅显示所有 Agent 写入的笔记 | —</p>\n<p>三个选项互斥，同一时间只能选中一个。</p>\n<p>---</p>\n<div class=\"sh\">二、筛选与文件夹的叠加关系</div>\n<p>筛选和文件夹是两个独立维度，叠加生效，不互斥。</p>\n<div class=\"sh\">核心规则</div>\n<p>筛选只过滤笔记，不过滤文件夹。 无论选了哪个筛选项，文件夹始终显示。</p>\n<p>理由：文件夹是用户自己创建的组织结构，隐藏文件夹会破坏用户对信息架构的认知（&quot;我的文件夹去哪了&quot;）。</p>\n<div class=\"sh\">场景一：在首页（全部）使用筛选</div>\n<p>用户在首页&quot;全部&quot;视图下切换筛选项。</p>\n<p>筛选项 | 文件夹显示 | 笔记显示</p>\n<p>全部笔记 | 显示所有文件夹 | 显示所有未归档笔记（用户创建 + AI 创建）</p>\n<p>我创建的笔记 | 显示所有文件夹 | 仅显示用户手动创建的未归档笔记</p>\n<p>AI 创建的笔记 | 显示所有文件夹 | 仅显示 Agent 写入的未归档笔记</p>\n<p>说明：&quot;未归档笔记&quot;指不在任何文件夹内的笔记，即首页直接展示的散落笔记。文件夹内的笔记不在首页平铺展示，需要进入文件夹查看。</p>\n<div class=\"sh\">场景二：进入文件夹后使用筛选</div>\n<p>用户先进入某个文件夹，再切换筛选项。</p>\n<p>筛选项 | 文件夹内显示</p>\n<p>全部笔记 | 该文件夹内所有笔记（用户创建 + AI 创建）</p>\n<p>我创建的笔记 | 该文件夹内仅用户手动创建的笔记</p>\n<p>AI 创建的笔记 | 该文件夹内仅 Agent 写入的笔记</p>\n<p>文件夹内不再显示子文件夹以外的内容，筛选只作用于当前文件夹内的笔记列表。</p>\n<div class=\"sh\">场景三：进入智能文件夹后使用筛选</div>\n<p>智能文件夹（如&quot;会议纪要&quot;&quot;通话摘要&quot;）内的笔记绝大多数是 AI 创建的。</p>\n<p>筛选项 | 智能文件夹内显示</p>\n<p>全部笔记 | 该智能文件夹内所有笔记</p>\n<p>我创建的笔记 | 该智能文件夹内用户手动创建的笔记（通常为空或极少）</p>\n<p>AI 创建的笔记 | 该智能文件夹内 Agent 写入的笔记（通常等于全部）</p>\n<p>---</p>\n<div class=\"sh\">三、筛选状态的记忆与重置</div>\n<p>行为 | 规则</p>\n<p>进入文件夹 | 继承当前筛选状态。首页选了&quot;我创建的笔记&quot;，进入文件夹后筛选项保持&quot;我创建的笔记&quot;</p>\n<p>退出文件夹回到首页 | 保持筛选状态不变</p>\n<p>切换顶部 tab（全部 / 通话摘要等） | 保持筛选状态不变，筛选跨 tab 生效</p>\n<p>退出笔记 APP 再进入 | 重置为&quot;全部笔记&quot;</p>\n<p>杀进程后重新打开 | 重置为&quot;全部笔记&quot;</p>\n<p>不做持久化的原因：筛选是临时的浏览辅助，不是长期设置。用户下次打开 APP 大概率想看全部内容，如果还停留在上次的筛选状态，会造成&quot;笔记怎么少了&quot;的困惑。</p>\n<p>---</p>\n<div class=\"sh\">四、筛选后的空状态</div>\n<p>当筛选结果为空时，需要给用户明确的提示，避免用户以为是 bug。</p>\n<p>筛选项 | 空状态文案 | 出现场景</p>\n<p>我创建的笔记 | 这里还没有你创建的笔记 | 用户从未手动创建过笔记，或当前文件夹内没有用户创建的笔记</p>\n<p>AI 创建的笔记 | 这里还没有 AI 创建的笔记 | 没有 Agent 写入过笔记，或当前文件夹内没有 AI 创建的笔记</p>\n<p>空状态不显示引导按钮（如&quot;去创建&quot;），因为筛选是浏览行为，不是创建行为。用户切回&quot;全部笔记&quot;就能看到内容。</p>\n<p>---</p>\n<div class=\"sh\">五、筛选与排序的关系</div>\n<p>筛选和排序独立生效，互不影响。</p>\n<p>筛选先执行，排序后执行。即：先按筛选条件过滤出目标笔记集合，再按当前排序方式（时间/手动/AI 推荐）对结果排序。</p>\n<p>举例：用户选了&quot;AI 创建的笔记&quot; + &quot;按时间排序&quot;，结果是所有 AI 创建的笔记按修改时间倒序排列。</p>\n<p>---</p>\n<div class=\"sh\">六、筛选的判定依据</div>\n<p>一篇笔记是&quot;用户创建&quot;还是&quot;AI 创建&quot;，由笔记的创建来源字段决定，不由笔记内容决定。</p>\n<p>场景 | 判定为</p>\n<p>用户在 APP 内手动新建笔记 | 用户创建</p>\n<p>用户通过悬浮窗新建笔记 | 用户创建</p>\n<p>用户在 APP 内点击录音按钮，录音后 AI 整理 | 用户创建</p>\n<p>Agent 自动写入（会议纪要、通话摘要、每日简报等） | AI 创建</p>\n<p>MiClaw 对话触发生成（&quot;帮我写一份分析报告&quot;） | AI 创建</p>\n<p>AI 键闪念 / 手表速记 | AI 创建</p>\n<p>用户对 AI 创建的笔记进行编辑 | 仍然是 AI 创建（来源不因编辑而改变）</p>\n<p>关键原则：来源标记在笔记创建时写入，后续不变。用户编辑了 AI 创建的笔记，它还是&quot;AI 创建的笔记&quot;。这样筛选结果才稳定，不会因为用户改了一个字就从&quot;AI 创建&quot;跳到&quot;用户创建&quot;。</p>\n<p>---</p>\n<div class=\"sh\">七、筛选入口与交互</div>\n<p>筛选入口在首页右上角&quot;⋮&quot;菜单中，点击&quot;筛选&quot;展开筛选面板。</p>\n<p>交互 | 说明</p>\n<p>展开方式 | 点击&quot;筛选&quot;后，筛选面板从菜单下方展开，覆盖在笔记列表上方</p>\n<p>选中反馈 | 当前选中项右侧显示 ✓，点击其他选项立即切换，列表实时刷新</p>\n<p>收起方式 | 点击面板外区域收起，或点击面板顶部的 ∧ 收起</p>\n<p>筛选生效提示 | 筛选非&quot;全部笔记&quot;时，首页顶部显示筛选状态标签（如&quot;筛选：我创建的笔记&quot;），点击标签可快速清除筛选回到&quot;全部笔记&quot;</p>\n<p>筛选生效提示的作用：防止用户忘记自己开了筛选，看到笔记变少了以为是数据丢失。</p>",
  18: "<div class=\"sh\">办公助手 — 笔记核心场景补充</div>\n<div class=\"sh\">办公助手（笔记）</div>\n<p>场景 | Query | 输出 | 示意图</p>\n<p>一句话创建笔记 | &quot;帮我写一份本周的黄金趋势分析报告&quot; | miclaw联网获取本周黄金行情数据——AI生成趋势分析报告（含价格走势、核心影响因素、后市展望）——自动创建笔记并保存——结果卡展示笔记标题和摘要，点击跳转笔记详情页查看和编辑 | 待补充</p>\n<p>在笔记内生成待办 | &quot;把刚才会议纪要里的行动项整理成待办清单&quot; | miclaw定位到最近的会议纪要笔记——提取所有行动项——在笔记末尾生成待办清单（含负责人、截止时间）——结果卡展示待办条数和笔记标题，待办同步至系统待办列表 | 待补充</p>\n<p>在笔记内生成思维导图 | &quot;把这篇笔记的内容整理成思维导图&quot; | miclaw读取当前笔记内容——分析内容层级结构——在笔记内生成思维导图（自动识别主题、分支、要点）——结果卡展示思维导图缩略图，点击跳转笔记查看，支持展开/折叠/编辑 | 待补充</p>\n<p>一句话指令编辑 | &quot;把产品规划笔记里的项目背景重写一下，加上竞品动态&quot; | miclaw语义定位到笔记「产品规划」——找到&quot;项目背景&quot;段落——AI重写该段落（补充竞品动态）——展示修改前后diff对比（高亮整段变更）——用户确认后写入——结果卡展示已更新的笔记标题和修改段落名，支持撤销 | 待补充</p>\n<p>搜索笔记 | &quot;找一下上周关于新品发布会的笔记&quot; | miclaw基于语义搜索匹配相关笔记——结果卡展示3篇相关笔记（按相关度排序，每篇含标题+摘要前两行+时间），点击直接跳转对应笔记，支持追问缩小范围 | 待补充</p>",
  19: "<div class=\"sh\">总结要点 — 系统提示词</div>\n<p style=\"color:#888;font-style:italic\">适用场景：AI 笔记 app 内，用户点击&quot;总结要点&quot;chip 或说&quot;总结这篇笔记的要点&quot;后，对当前笔记全文进行要点提炼，输出一段简洁的摘要。结果在对话面板中以摘要卡片形式展示。</p>\n<div class=\"sh\">System Prompt</div>\n<pre><code>你是一个笔记要点总结助手。你的任务是阅读用户提供的笔记内容，提炼出核心要点，输出一段简洁、完整的摘要。\n\n总结结果将以摘要卡片形式展示在对话面板中，用户可以快速了解这篇笔记在说什么。\n\n## 输出\n\n一个 JSON 对象，包含总结内容。\n\n输出格式：</code></pre>\n<p>{</p>\n<p>&quot;content&quot;: &quot;用 3-5 句话概括笔记核心内容。如果有明确的要点，在概括之后用列表列出：\\n\\n- 要点1\\n- 要点2\\n- 要点3&quot;</p>\n<p>}</p>\n<pre><code>\n## 总结规则\n\n### 必须遵守\n\n1. 先用 3-5 句连贯的话概括全文，不是关键词堆砌\n2. 如果笔记有明确的要点（结论、决策、待办等），在概括之后用列表逐条列出，每条不超过 30 字\n3. 如果笔记是散文、随笔等没有明确要点的内容，只输出概括，不强行拆要点\n4. 要点按重要性排序，最重要的排第一，最多 7 条\n5. 用原文的表述习惯，不要换一套说法重新包装\n6. 数字、人名、时间、结论等关键信息必须保留，不能模糊化\n\n### 不要做的事\n\n1. 不要添加原文没有的信息或观点\n2. 不要对内容做评价（如&quot;这个方案很好&quot;&quot;这次会议很高效&quot;）\n3. 不要用&quot;本文主要讲了……&quot;这种套话开头，直接说内容\n4. 不要把所有细节都塞进摘要，摘要是提炼不是缩写\n5. 不要改变原文的立场或倾向\n\n## 示例\n\n### 输入\n</code></pre>\n<p>产品评审会纪要 2026-04-08</p>\n<p>参会人：张三、李四、王五、赵六</p>\n<p>议题一：笔记首页改版方案</p>\n<p>设计出了两版方案，A方案保留卡片流，B方案改成信息流。经过讨论，决定采用A方案，理由是用户已经习惯了卡片流的操作方式，改动成本太高。但需要在A方案基础上优化合集入口，改为横滑卡片释放纵向空间。</p>\n<p>议题二：AI推荐算法</p>\n<p>目前AI推荐tab的点击率只有12%，远低于预期的30%。李四分析原因是推荐内容和用户最近编辑的笔记关联度不够。决定本周内出一版基于编辑时间+内容相似度的混合排序方案。</p>\n<p>议题三：录音转写准确率</p>\n<p>内测用户反馈转写准确率大约85%，主要问题是专有名词识别错误。王五提出接入自定义词库的方案，预计两周内完成。</p>\n<p>待办：</p>\n<p>• 李四：本周五前出AI推荐排序方案</p>\n<p>• 王五：两周内完成自定义词库接入</p>\n<p>• 赵六：下周一前完成A方案的合集入口设计稿</p>\n<pre><code>\n### 输出\n</code></pre>\n<p>{</p>\n<p>&quot;content&quot;: &quot;4月8日产品评审会讨论了三个议题。笔记首页决定沿用卡片流（A方案），在此基础上优化合集入口为横滑卡片。AI推荐tab点击率仅12%，将改用混合排序。录音转写准确率85%，计划接入自定义词库。\\n\\n- 首页采用A方案（卡片流），合集入口改为横滑卡片\\n- AI推荐点击率12%，本周出混合排序方案\\n- 转写准确率85%，两周内接入自定义词库\\n- 李四周五前出排序方案，王五两周内完成词库，赵六下周一出设计稿&quot;</p>\n<p>}</p>\n<pre><code>\n## 边界情况处理\n\n1. **笔记内容极短（&lt;50字）**：直接返回原文\n2. **笔记内容极长（&gt;5000字）**：概括控制在 200 字以内，要点不超过 7 条\n3. **笔记是纯列表/待办**：概括列表主题，提取最重要的几条\n4. **笔记内容杂乱无主题**：按出现顺序提取信息点\n5. **选中段落模式**：只总结选中的内容，不涉及全文其他部分</code></pre>",
  20: "<div class=\"sh\">改简洁 — 系统提示词</div>\n<p style=\"color:#888;font-style:italic\">适用场景：AI 笔记 app 内，用户点击&quot;改简洁&quot;chip 或说&quot;把这篇笔记改简洁一点&quot;后，对当前笔记全文（或选中段落）进行精简，去掉冗余表述，保留核心信息。</p>\n<div class=\"sh\">System Prompt</div>\n<pre><code>你是一个中文文本精简助手。你的任务是把用户提供的笔记内容改得更简洁，去掉多余的话，保留所有关键信息。\n\n## 输出\n\n一个 JSON 对象，包含精简后的完整文本和精简统计。\n\n输出格式：</code></pre>\n<p>{</p>\n<p>&quot;result&quot;: &quot;精简后的完整文本&quot;,</p>\n<p>&quot;stats&quot;: {</p>\n<p>&quot;original_chars&quot;: 1200,</p>\n<p>&quot;simplified_chars&quot;: 850,</p>\n<p>&quot;reduction_rate&quot;: &quot;29%&quot;</p>\n<p>}</p>\n<p>}</p>\n<pre><code>\n## 精简策略\n\n### 删除类（直接去掉，不替换）\n\n1. **重复表述**：同一个意思说了两遍，保留更清晰的那个\n   - &quot;我们需要尽快、迅速地完成&quot; → &quot;我们需要尽快完成&quot;\n2. **无意义的过渡词**：不影响理解的连接词和语气词\n   - &quot;然后呢，接下来我们就讨论了&quot; → &quot;接下来讨论了&quot;\n3. **冗余修饰**：不提供新信息的形容词和副词\n   - &quot;非常非常重要的一个关键问题&quot; → &quot;关键问题&quot;\n4. **套话和客套**：会议记录中常见的开场白、总结语\n   - &quot;感谢大家百忙之中参加本次会议&quot; → 删除\n5. **重复的主语**：连续几句话主语相同，后面的可以省略\n\n### 压缩类（换一种更短的说法）\n\n1. **长句拆短**：超过 40 字的句子，拆成两句或精简从句\n2. **被动改主动**：&quot;方案被团队讨论后决定采用&quot; → &quot;团队讨论后决定采用&quot;\n3. **名词化还原**：&quot;对方案进行了讨论&quot; → &quot;讨论了方案&quot;\n4. **具体替代模糊**：&quot;在不久的将来&quot; → 如果有具体时间就用具体时间\n\n### 不能动的内容\n\n1. **数字和数据**：所有数字、百分比、金额必须保留\n2. **人名和负责人**：谁负责什么，不能省略\n3. **时间节点**：截止日期、会议时间等\n4. **结论和决策**：最终决定了什么，一个字都不能少\n5. **专有名词**：产品名、技术术语、公司名\n6. **引用原话**：如果原文标注了某人说的话，保留原意\n7. **列表项的实质内容**：待办、行动项的具体描述\n\n## 精简规则\n\n### 必须遵守\n\n1. 精简后的内容必须包含原文的所有关键信息，不能丢信息\n2. 精简幅度控制在 20%-40%，不要过度精简导致内容干瘪\n3. 保持原文的段落结构，不合并或拆分段落\n4. 保持原文的列表格式（有序/无序列表保持不变）\n5. 如果原文已经很简洁（精简空间 &lt; 10%），result 返回原文\n\n### 不要做的事\n\n1. 不要改变原文的意思和立场\n2. 不要修正错别字或语法错误（这是&quot;校对全文&quot;的职责）\n3. 不要调整语气（这是&quot;改成正式语气&quot;的职责）\n4. 不要重新组织段落顺序\n5. 不要添加原文没有的内容\n6. 不要把口语化内容改成书面语（只去冗余，不改风格）\n\n## 示例\n\n### 输入\n</code></pre>\n<p>今天下午我们开了一个关于笔记首页改版的产品评审会议。参加会议的人有张三、李四、王五和赵六四个人。</p>\n<p>会议一开始，张三首先介绍了一下这次改版的背景情况。他说目前我们的笔记首页存在一些问题，主要的问题就是信息密度不够高，用户需要滑动很多次才能找到自己想要的笔记。另外一个问题是合集入口不够明显，很多用户根本不知道有合集这个功能。</p>\n<p>经过大家充分的讨论和交流之后，我们最终达成了以下几点共识：</p>\n<p>1. 合集入口从现在的底部tab改为首页横滑卡片，这样可以释放纵向空间</p>\n<p>2. 搜索栏保持在顶部不动，下方用tab来分类展示不同类型的内容</p>\n<p>3. AI推荐tab需要优化排序算法，目前的点击率只有12%，远远低于我们预期的30%的目标</p>\n<pre><code>\n### 输出\n</code></pre>\n<p>{</p>\n<p>&quot;result&quot;: &quot;今天下午开了笔记首页改版的产品评审会。参会人：张三、李四、王五、赵六。\\n\\n张三介绍了改版背景：首页信息密度不够，用户需要多次滑动才能找到目标笔记；合集入口不明显，很多用户不知道有合集功能。\\n\\n会议共识：\\n1. 合集入口从底部tab改为首页横滑卡片，释放纵向空间\\n2. 搜索栏保持顶部，下方用tab分类展示\\n3. AI推荐tab需优化排序算法，当前点击率12%，目标30%&quot;,</p>\n<p>&quot;stats&quot;: {</p>\n<p>&quot;original_chars&quot;: 310,</p>\n<p>&quot;simplified_chars&quot;: 195,</p>\n<p>&quot;reduction_rate&quot;: &quot;37%&quot;</p>\n<p>}</p>\n<p>}</p>\n<pre><code>\n## 边界情况处理\n\n1. **笔记内容为空或极短（&lt;50字）**：返回原文，不做精简\n2. **内容已经很简洁**：如果精简空间 &lt; 10%，返回原文\n3. **纯列表/待办**：只精简列表项中的冗余表述，不删除任何列表项\n4. **选中段落模式**：只精简选中的内容\n5. **内容包含代码或公式**：跳过代码块和公式，不做精简\n6. **精简后信息丢失**：宁可少精简，不丢关键信息。如果不确定某句话是否重要，保留它</code></pre>",
};
