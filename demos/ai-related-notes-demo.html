1: '<div class="sh">一、人群定位</div>\n<strong>以学生为核心，聚焦无纸化学习，打造 Pad 的关键竞争力，成为影响购机决策的 Top5 软件场景之一</strong>\n<p>• <strong>【行业】无纸化趋势下，手写笔记成学生购机关键，驱动 Pad × 手写笔联动售卖增长</strong></p>\n<p>PAD用户画像，学生TOP1 | 学习是平板的top2场景 | 做笔记、写作业、读电子书 | MatePadTOP购买决策 | O81上仅为TOP21 | 购笔用户最关注软件类型：系统自带笔记、手写笔记</p>\n<p>• <strong>【目标人群】无纸化的学生与知识工作者以笔记 App 取代纸笔，构建个人知识体系</strong></p>\n<p>目标人群 【主力人群】大学生、研究生、考研考公党 【辐射人群】职业知识工作者（律师、顾问、研究员等）</p>\n<p>使用场景 课堂笔记、课后复习/自学 </p>\n<p>人群标签 <strong>一句话人群定义</strong>：需要高效地整理知识，并希望把厚厚的纸质笔记"装进一台设备"里随身携带的学习者。<strong>特征标签</strong> - 18~30岁，互联网原住民 - 移动化、多场景的学习生活，习惯手机、平板、电脑多设备协同 - 对价格敏感，但愿意为提升学习效率、节省时间的关键功能付费 - 生活节奏紧张，注重时间管理与学习效率，同时乐于接受并善用科技工具提升自身竞争力。- 决策受同学、知识区博主深度影响，极易形成"寝室同款"或"考研标配"的应用潮流。 <strong>一句话人群定义</strong>：需要将非结构化信息快速转化为结构化知识，形成可追溯、可复用、可交付的专业工作成果。<strong>特征标签</strong> - 25-45岁，主力使用电脑办公，Pad作为移动办公使用 - 常在客户现场、差旅途中等碎片场景进行深度工作 - 与笔记本电脑协同工作，注重多端同步、团队合作、演示功能 - 视高效可靠的生产力工具为必要投资，愿意为节省时间、降低错误、提升客户体验的专业功能支付订阅费。</p>',
2: '<div class="sh">问卷内容</div>\n<p>答题前必看：</p>\n<p>• 回答问卷时，请回忆并带入你还是一个大学生/研究生的时候，对这些功能的需求</p>\n<p>• 文档和问卷的问题序号是一一对应的，文档内是对每个问题的详细说明</p>\n<p>• <strong>你是否经常使用笔记产品（包括备忘录、文字笔记、手写笔记、无边记等）？（单选）</strong></p>\n<p>从不使用，偶尔使用，经常使用，重度使用</p>\n<p>• <strong>笔记中支持插入以下几种富媒体元素，你对每项元素插入能力的需求强烈程度是？（打分）</strong></p>\n<p>（1-5分打分，1分=不需要；5分=非常需要）</p>\n<p>图片插入 | 录音/音频插入 | 网址插入 | 文档插入 | 笔记引用 | 小爱记忆导入（导入元素的快捷方式，能够将批量内容导入笔记）</p>\n<p>• <strong>关于「富媒体元素」是否支持「笔记内预览」功能，您的看法是？（KANO）</strong></p>\n<p>若提供此服务（我很喜欢/理应如此/无所谓/勉强接受/我很不习惯）</p>\n<p>若不提供此服务（我很喜欢/理应如此/无所谓/勉强接受/我很不习惯）</p>\n<p>• <strong>若笔记的每项富媒体元素支持笔记内预览，你对每项元素预览的需求强烈度？（打分）</strong></p>\n<p>（1-5分打分，1分=不需要；5分=非常需要）</p>\n<p>图片文字提取 | 音频转写 | 网址预览（包含视频网站） | 文档预览 | 笔记预览</p>\n<p>• <strong>关于「富媒体元素」是否支持「AI总结」功能，您的看法是？（KANO）</strong></p>\n<p>若提供此服务（我很喜欢/理应如此/无所谓/勉强接受/我很不习惯）</p>\n<p>若不提供此服务（我很喜欢/理应如此/无所谓/勉强接受/我很不习惯）</p>\n<p>• <strong>若笔记的每项富媒体元素支持AI总结，你对每项元素AI总结的需求强烈程度是？（打分）</strong></p>\n<p>（1-5分打分，1分=不需要；5分=非常需要）</p>',
3: '<strong>分析结论：不建议跟随OS4增加笔记封面，后续考虑易用性优化</strong>\n<p>• 增加封面需求优先级较低</p>\n<p>• 只有手写笔记存在封面强需求，文字笔记/无边记/文档不需要封面，多种类型笔记混排时效果不佳</p>\n<p>• 若需添加封面，涉及到笔记多个模块改动，增加人力成本约1人月</p>\n<div class="sh">用户反馈分析</div>\n<strong>增加封面是笔记文件管理方式的一部分，优先级低于文件夹体系优化</strong>\n<p>笔记近一年Feedback中，有200+条与"文件夹"相关的反馈，主要集中在"希望文件夹支持自由排序"和"在文件夹中新增子文件夹"，核心诉求是更加自由的文件夹管理体系。</p>\n<p>笔记近一年Feedback中，有3条与"封面"相关的反馈，同时这些反馈都"文件夹"、"文档导入"相关联。核心诉求是增加文档导入以及更强大的文件管理系统。因此，增加封面也是为了方便管理，且优先升级低于笔记中的文件夹管理体系。</p>\n<div class="sh">需求分析</div>\n<strong>只有手写笔记有封面强需求，文字笔记、无边画布、文档不需要封面</strong>\n<strong>目前小米笔记支持上述4类笔记，混排时视觉效果可能不如全部都是手写笔记的效果好</strong>\n<div class="sh">文字笔记：不需要封面，列表展示标题+正文即可</div>\n<p>竞品对比：华为备忘录❌不支持封面、荣耀笔记❌不支持封面、Vivo原子笔记❌不支持封面、OPPO便签❌不支持封面、苹果备忘录❌不支持封面</p>\n<div class="sh">无边画布：封面不是刚需，需要的是快速打开快速记录灵感，增加选封面步骤反而增加复杂度</div>',
4: '<div class="sh">笔记应用分类</div>\n<p>厂商及三方应用有两大类笔记应用：</p>\n<p>笔记类型 支持内容 特点 优劣势</p>\n<p>文字笔记 文字、涂鸦块、图片、录音 文字为主，有明确的「行」的概念，涂鸦以独立块或独立图层形式插入在笔记中 优点：在不同屏幕大小下，文字流能够自动换行适配。缺点：文字部分与手绘部分关联性差</p>\n<p>手写笔记 手写文字及绘图、文本框、图片、形状、多格式文档、录音等 手写为主，画布是一张「白纸」，可以在任意位置插入元素 优点：文字与手绘结合紧密，位置关系固定。缺点：在不同屏幕大小下，会进行整体缩放，小屏体验欠佳</p>\n<div class="sh">厂商策略</div>\n<p>厂商主要有三类策略：</p>\n<p>• <strong>将文字笔记和手写笔记拆分为独立应用。代表：苹果、华为</strong> - 优点：可以将每个场景做透 - 缺点：拆分应用涉及到历史内容迁移及产品架构调整</p>\n<p>• <strong>将文字笔记、手写笔记、待办列表合在一个应用中。代表：小米/Vivo/荣耀</strong> - 优点：统一文件管理 - 缺点：手写笔记功能较弱</p>\n<p>• <strong>将所有类型笔记放在一个应用，不主推手写笔记。代表：OPPO</strong></p>\n<p>厂商策略 厂商代表 文字笔记入口 手写笔记入口</p>\n<p>策略1 根据不同使用场景拆分为不同的应用 苹果 独立APP（备忘录） 独立APP（无边记）</p>\n<p> 华为 独立APP（备忘录） 独立APP（笔记）</p>\n<p>策略2 融合在一个应用中 小米 融合APP，拆分不同入口（笔记） </p>\n<p> Vivo 融合APP，拆分不同入口（原子笔记） </p>\n<p> 荣耀 融合APP，拆分不同入口（笔记） </p>\n<p>策略3 融合在一个应用中，不主推手写 OPPO  </p>',
5: '<div class="sh">软硬件功能一览</div>\n<p>对比苹果/华为/Vivo/小米四家手写笔：</p>\n<p>• Apple Pencil 1代(2015) / 2代(2022) / Pro(2024)</p>\n<p>• 华为 M-Pencil 2代(2021) / 3代(2023) / Pro(2025)</p>\n<p>• Vivo Pencil 2(2023) / 3(2025)</p>\n<p>• 小米焦点触控笔 M80P(2023) / Pro P81C(2025)</p>\n<p>硬件参数对比：</p>\n<p> Apple Pencil 1代 Apple Pencil 2代 Apple Pencil Pro M-Pencil第二代 M-Pencil第三代 M-Pencil Pro Vivo Pencil 2 Vivo Pencil 3 小米M80P 小米Pro P81C</p>\n<p>压感 2048级 4096级 8192级 4096级 16384级 16384级 4096级 16384级 8192级 16384级</p>\n<p>轻捏 ❌ ❌ ✅ ❌ ❌ ✅ ❌ ✅ ❌ ✅</p>\n<p>双击 ❌ ✅ ✅ ✅ ✅ ✅ ✅ ✅ ❌ ✅</p>\n<p>上滑/下滑 ❌ ❌ ❌ ❌ ❌ ❌ ✅ ✅ ❌ ✅</p>',
6: '<div class="sh">需求串讲记录（TR2A）</div>\n<p>串讲时间 主讲人 本次串讲结论 参与角色 参与角色结论</p>\n<p>  同意准出 / 修改后进行再次串讲 研发：涉及多模块的研发均需参与评审 通过/不通过</p>\n<p>   测试：涉及多模块的测试均需参与评审 通过/不通过</p>\n<p>   设计：涉及多模块设计均需参与评审 通过/不通过</p>\n<p>标为🌟的部分为TR2务必完成内容，其余部分可在TR2结束后补充</p>\n<div class="sh">需求信息概览</div>\n<p>产品经理  设计师 </p>\n<p>项目经理  相关合作方 </p>\n<p>研发负责人  客户端 </p>\n<p>  服务端 </p>\n<p>  算法 </p>\n<p>  前端 </p>\n<p>测试负责人  数据产品 </p>\n<p>保密级别（不保密/入口保密/严格保密）   </p>',
7: '<p>简介：AskSIA是一款AI学习助手，支持上传学习材料、转录音频课程、对话问答以及整理笔记。</p>\n<p>优势：专注课堂学习场景，一屏整合课件、录音、笔记与AI问答，实现高效学习。</p>\n<div class="sh">媒体报道</div>\n<p>媒体报道 AskSia 是一款"一体化"嵌入高校学习场景、正在快速全球化的 AI 教育黑马。Asksia以超80%的次月留存和百万级别的全球用户，证明该产品与市场的极高契合度。</p>\n<div class="sh">发展历史</div>\n<p>2023年 AskSia公司成立，早期目标用户主打<strong>海外留学生</strong>群体。</p>\n<p>2024年 AskSia 1.0～2.5版本，以涵盖不同学科的强大<strong>解题</strong>工具为卖点。</p>\n<p>2025年 AskSia 3.0版本，产品形态从"工具集"向"一体化"转变，目标是成为大学生"<strong>上好一堂课</strong>"的唯一平台。</p>\n<div class="sh">产品形态</div>\n<p>• 结合当前流行的AI<strong>对话形式</strong>，以用户上传的资料为源数据不断交互。</p>\n<p>• 资料、对话、笔记集中于一个界面，<strong>All in one</strong>。</p>\n<p>• 资料中的关键信息可一键插入笔记，使笔记具备<strong>可溯源</strong>性。</p>\n<div class="sh">能力解析</div>\n<div class="sh">资料上传及预览</div>\n<p>• 支持音频、照片、PDF、PPT、实时录音等超50种媒体文件上传</p>\n<p>• 重点批注、音视频转录、字幕翻译，帮助快速预览材料内容</p>\n<p>功能点 描述</p>\n<p>支持的材料类型 文档：PDF/Word/PPT；音频：MP3/MP4/M4A/WAV；视频：youtube链接</p>\n<p>文档 支持文件预览，PDF/DOC支持重点批注</p>',
8: '<div class="sh">OS2功能：生成内容、摘要、纠错、扩写、润色</div>\n<p>功能 说明</p>\n<p>入口 笔记app：两个入口，编辑条和工具栏。其他一方/三方app：只存在于编辑条</p>\n<p>唤起面板 </p>\n<p>直接问答 </p>\n<p>摘要 </p>\n<p>纠错 </p>\n<p>润色/扩写 </p>\n<div class="sh">OS3功能：在几个社交App内新增AI写作，其余场景仍与OS2一致</div>\n<p>功能 说明</p>\n<p>入口 通过屏幕识别感知到社交文案写作页面出现面板。国内支持app：微信/抖音/快手/小红书/微博。海外支持App：Twitter（X）/WhatsApp/Instgram/Tictok</p>\n<p>唤起面板 </p>\n<p>AI写作 支持切换风格/字数/表情</p>',
9: '<p>请复制本模板编辑填写；大模型算法产品合规评估要求参照小米集团生成式人工智能产品/服务相关评审制度。所有拟面向 C 端用户的 AI 应用服务需求，应用负责人应在「需求设计阶段」及「产品正式上线前」提交本表。</p>\n<div class="sh">大模型三方评估流程</div>\n<div class="sh">一、产品及功能基本信息</div>\n<p>需求名称 笔记AI能力增强 产品版本 </p>\n<p>AIGC功能状态 ✅ 需求设计阶段</p>\n<p>产品名称 小米笔记（com.miui.notes） 所属部门 手机部-软件部-产品部</p>\n<p>涉及终端 ✅小米手机</p>\n<p>功能介绍 输入（图片/PDF、PPT、DOC文档），输出（文字）。具体：图片OCR识别提取文字、文档（PDF/PPT/DOC）全文总结。日活：828W（国内）2995W（全球）。月活：5866W（国内）2.4亿（全球）</p>\n<p>计划上线时间 ✅ 上线：面向全量用户，时间：跟随OS4发布（约2026年8月）</p>\n<p>涉特殊监管场景 不涉及</p>',
10: '<div class="sh">一、卖点总览</div>\n<p>• <strong>赛道人力工作量累计：158人月</strong></p>\n<p>• 美学框架适配-52人月</p>\n<p>• 手写笔记-56人月（其中含25人月字迹美化应用适配）</p>\n<p>• 统一笔袋-7人月</p>\n<p>• 会议录音-10人月</p>\n<p>• 文件管理体系-17人月</p>\n<p>• 生产力环境-16人月（其中含14人月，为系统定制组承接）</p>\n<p>• <strong>外部资源依赖</strong>：WPS（文档阅读器）、小爱（所有AI相关功能）、互联网（浏览器）、跨设备访问（互联互通）</p>\n<p>业务 模块 卖点列表 优先级 工作量</p>\n<p>笔记（总需56人月） 多格式课件导入及导出 PDF/PPT/DOC文档导入 ⭐⭐⭐⭐⭐ 1人月</p>\n<p>  笔记PDF导出 ⭐⭐⭐ 1人月</p>\n<p>  导航包含缩略图、大纲、书签 ⭐⭐⭐ 3人月</p>\n<p>  拖拽文件导入 ⭐⭐ 1人月</p>\n<p> 笔记新框架设计 美学新框架布局设计 ⭐⭐⭐⭐ 4人月</p>\n<p>  接入统一手写笔袋 ⭐⭐⭐⭐ 2人月</p>\n<p>  直板机、Fold支持新建/编辑手写笔记 ⭐⭐⭐ 8人月</p>\n<p>  画布内外自由批注 ⭐⭐⭐ 2人月</p>\n<p>  文字笔记涂鸦优化 ⭐⭐ 2人月</p>\n<p>  新增文档内容搜索 ⭐⭐ 1人月</p>\n<p>  无间距画纸，一笔跨页 ⭐⭐ 2人月</p>\n<p>  无边画布接入 ⭐ 1人月</p>\n<p> 接入小爱问答能力 AI问答 ⭐⭐⭐ 自动标记高亮2人月，AI部分小爱提供</p>',
11: '<div class="sh">基本信息</div>\n<p>应用名称 笔记（原名"便签"，MIUI12.5更名）</p>\n<p>包名 com.miui.notes</p>\n<p>是否解耦 是</p>\n<p>是否在小米应用商店上架 是</p>\n<p>是否在Google商店上架 否</p>\n<p>覆盖国家和地区 国内+国际地区</p>\n<p>说明 系统预装应用，支持应用商店自升级</p>\n<div class="sh">对接人</div>\n<p>部门 负责人 其余对接人</p>\n<p>研发-前端  </p>\n<p>研发-客户端  </p>\n<p>研发-服务端  </p>\n<p>研发-手写引擎  </p>\n<p>产品  </p>\n<p>测试  </p>\n<p>设计  </p>',
12: '<p>按机型分层（lite 2.0手机/lite Pad/middle/normal/Flip/Fold/Pad）控制功能开放：</p>\n<p> lite 2.0手机 lite Pad middle normal Flip Fold Pad</p>\n<p>文字笔记-录音 ❌去掉工具栏「录音」入口 ❌去掉工具栏「录音」入口 ✅ ✅ ✅ ✅ ✅</p>\n<p>文字笔记-插入图片/拍照扫描 ❌去掉工具栏「图片」入口 ❌去掉工具栏「图片」入口 ✅ ✅ ✅ ✅ ✅</p>\n<p>文字笔记-插入音频 ❌去掉工具栏「附件」入口 ❌去掉工具栏「附件」入口 ✅ ✅ ✅ ✅ ✅</p>\n<p>文字笔记-插入文档 ❌去掉工具栏「附件」入口 ❌去掉工具栏「附件」入口 ✅ ✅ ✅ ✅ ✅</p>\n<p>文字笔记-涂鸦 ❌去掉工具栏「涂鸦」入口 ❌去掉工具栏「涂鸦」入口 ✅ ✅ ✅ ✅ ✅</p>\n<p>手写笔记/画布新建及编辑 ❌（支持预览） ✅ ✅ ✅ ✅ ✅ ✅</p>\n<p>图片OCR识别 跟随AI算力分层策略</p>\n<p>文档智能总结 跟随AI算力分层策略</p>',
13: '<div class="sh">课堂笔记</div>\n<div class="sh">产品定义</div>\n<p>专注于高校课堂学习场景的专业笔记 AI 助手，具备学科知识通识、课堂内容提炼能力和学习笔记排版逻辑，核心目标是将零散的课堂学习素材转化为结构清晰、重点突出、符合学生日常复习使用的标准化课堂笔记，全程保持客观、简洁、精准的输出风格，不添加无关拓展内容，贴合课堂实际讲授逻辑。</p>\n<div class="sh">输入源</div>\n<p>支持单类型输入 / 多类型混合输入：</p>\n<p>• 实时录音：支持调用麦克风录音</p>\n<p>• 音频文件：支持MP3, M4A, WAV, AAC, FLAC</p>\n<p>• PDF文档：支持文本型PDF、扫描图像型PDF</p>\n<p>• PPT/PPTX演示文稿</p>\n<p>• 图片（教材页、黑板、手写草稿）：支持JPG, PNG, HEIC</p>\n<p>• 文字笔记要点</p>\n<div class="sh">数据预处理</div>\n<strong>音频/录音处理流程：</strong>\n<p>• 格式统一：转换为16kHz, 16-bit PCM WAV格式</p>\n<p>• 语音增强：基于深度学习的降噪和去混响</p>\n<p>• 语音活动检测：VAD模型切除静默，自然停顿处分段</p>\n<p>• 语音识别：Whisper-large-v3模型，生成带时间戳的原始文本</p>\n<p>• 口语规整化：去除语气词、修正口误</p>\n<p>• 关键信息提取：NER模型标注专业术语、人名、引用</p>\n<strong>PDF文档处理流程：</strong>\n<p>• 类型判断：区分文本型PDF与扫描图像型PDF</p>\n<p>• 文本型解析：PyMuPDF或pdfplumber提取字符、位置、字体信息</p>\n<p>• 扫描型处理：图像预处理→OCR</p>\n<p>• 深度结构化：LayoutLMv3模型进行文档布局理解</p>\n<p>• 语义分块与向量化：按语义切分文本（约512tokens/块）</p>\n<strong>PPT/PPTX处理流程：</strong>\n<p>• 文件解析：解压PPTX文件</p>\n<p>• 分层提取：每页标题、正文文本、演讲者备注</p>\n<p>• 视觉元素处理：解压并保存内嵌图片</p>\n<p>• 幻灯片语义融合</p>\n<strong>图片处理流程：</strong>\n<p>• 图像预处理：自动透视校正、旋转摆正、光照均衡</p>\n<p>• 场景分类：CV模型判断图片类型</p>\n<p>• 目标检测：检测文本区域、图表区域、公式区域</p>\n<p>• 混合OCR：印刷体高精度OCR + 手写识别引擎</p>\n<p>• 公式识别：Mathpix API或Pix2Text转为LaTeX</p>\n<p>• 图表描述：VQA模型生成图表描述</p>\n<p>综合处理原则：素材整合→重点提取→逻辑梳理→内容补全→去重降噪</p>\n<div class="sh">核心处理逻辑</div>\n<p>智能笔记输出模块：核心知识点、课堂要点、考点解析、知识拓展、课后要求。</p>\n<p>核心知识点必须满足至少两个条件：结构重要性、呈现强调、口头强调、高频出现、公式/定理</p>',
14: '<strong>简介：</strong>闪念贝壳 (IdeaShell) 是一款以 AI 语音转写和思维整理为核心的智能语音笔记应用，旨在帮助用户快速捕捉灵感、整理会议纪要以及提升工作学习效率。\n<div class="sh">产品形态</div>\n<div class="sh">主要交互形式</div>\n<p>• 优先<strong>语音记录</strong>，会后智能转录和总结内容</p>\n<p>• 内置多种总结模版，选择模版后，<strong>一键输出结构化总结</strong></p>\n<p>• 在首页搜索、个人笔记内，都支持<strong>AI问询</strong></p>\n<p>记：语音记录优先，也支持打字/手写/图片多种形式 用：智能结构化总结，待办类卡片直接对接系统备忘录 问：首页下拉搜索、个人笔记内，都直达AI问答</p>\n<div class="sh">多端同步</div>\n<p>• 支持手机/Pad/电脑多端同步，功能保持一致</p>\n<p>• 主打苹果生态链，支持Apple Watch抬手记</p>',
15: '<div class="sh">第一题</div>\n<div class="sh">解题要点</div>\n<p>• 支持调用系统麦克风，实现录音功能；能够解析上传的录音/实时音频/输入的文字，支持 ASR 语音转写、NLP 语义理解</p>\n<p>• 分析飞书妙记的核心组成模块，拆解为6个主要模块：模块化总结、结构化正文、智能章节、关键决策、金句时刻、待办事项</p>\n<p>• 定义每一个模块的生成逻辑，包括模块的核心任务、技术方案、生成效果、UI展示</p>\n<p>• 在AI Studio中建立一个可交互界面，支持输入语音文件，输出会议纪要，会议纪要支持导出图片/PDF</p>\n<div class="sh">交互步骤</div>\n<p>• 输入区：支持上传录音文件、实时录音以及输入录音转文字</p>\n<p>• 输出区：显示会议纪要，支持导出图片/PDF，支持页面固定宽度或根据容器自适应宽度</p>\n<div class="sh">提示词</div>\n<p>你是一位专业的会议秘书 AI。请分析提供的会议内容（音频或文本），提取并整理会议纪要，输出语言必须为简体中文：</p>\n<p>• <strong>元数据 (Meta)</strong>: 提取会议标题、日期和时间</p>\n<p>• <strong>总结 (Summary)</strong>: 核心标题(10字以内)、一句话概括(100字以内)、3个模块化卡片（蓝色：关键信息/成就，橙色：风险/问题，绿色：机会/下一步）、核心成果(60-80字)</p>\n<p>• <strong>结构化正文 (Structured Body)</strong>: 详尽全面记录会议要点，第一层标题用一级数字编号，第二/三层用Markdown标题语法</p>',
16: '<div class="sh">笔记</div>\n<div class="sh">问题来源</div>\n<p>满意度调研、用户反馈</p>\n<div class="sh">问题列表</div>\n<p>综合优先级排序 问题描述 进度</p>\n<p>1 不支持导入文件（PDF/PPT/DOC等） 开发中，OS4</p>\n<p>2 富文本编辑能力不全（字号、颜色、高亮等格式） 待启动</p>\n<p>3 不支持录音边录边记 需求已下发，预计9月前敏捷迭代</p>\n<p>4 不支持PDF格式分享 开发中，OS4</p>\n<p>5 文件夹分类管理不方便 待启动（已报名C09）</p>\n<p>6 不支持实时字迹美化 待启动</p>\n<p>7 笔记搜索不准确 OS4 AI搜索专项</p>\n<p>8 单篇笔记内支持搜索 待启动（已报名C08）</p>\n<p>9 不支持在图片中提取文字 开发中，OS4</p>\n<p>10 不支持全局批注快速调起笔记 待启动</p>\n<p>11 速记笔记整合不方便 待启动</p>\n<div class="sh">手写笔</div>\n<p>1 笔记不支持手写笔双击切换橡皮 灰度中</p>',
17: '<div class="sh">需求串讲记录</div>\n<p>串讲时间 主讲人 本次串讲结论 参与角色 参与角色结论</p>\n<p>  同意准出 / 修改后进行再次串讲 研发 通过/不通过</p>\n<p>   测试 通过/不通过</p>\n<p>   设计 通过/不通过</p>\n<p>   其他领域代表 通过/不通过</p>\n<div class="sh">需求信息概览</div>\n<p>产品经理  设计师 </p>\n<p>项目经理  相关合作方 </p>\n<p>研发负责人  客户端 </p>\n<p>  服务端 </p>\n<p>  算法 </p>\n<p>  前端 </p>\n<p>测试负责人   </p>',
18: '<div class="sh">需求背景</div>\n<div class="sh">对应的二期需求大类</div>\n<p>特性二：AI深度加工 从一期的"录音转文字+简单总结"升级到"意图识别→分级加工→结构化产出"。对话框语音输入、AI局部润色/整理/编排、一句话指令生成和修改笔记、AI菜单场景化、AI搜索优化。</p>\n<div class="sh">当前问题分析</div>\n<p>• 对话框看起来像独立的聊天窗口，缺乏与笔记正文联动</p>\n<p>• 快捷chips固定，不区分笔记类型</p>\n<p>• 局部修改没有精准操作入口</p>\n<p>• AI回复缺乏"成品感"</p>\n<p>目标：把对话框从"聊天工具"变成"笔记的 AI 编辑器"</p>\n<div class="sh">对话框交互优化</div>\n<div class="sh">两态设计</div>\n<p>• <strong>收起态（默认）</strong>：底部输入条 + 推荐指令</p>\n<p>• <strong>展开态</strong>：抽屉面板，展示历史对话 + 完整推荐指令列表 + 输入条</p>\n<div class="sh">推荐指令</div>\n<p>推荐指令根据笔记内容动态生成 2 条</p>\n<div class="sh">输入方式</div>\n<p>• 文字输入、语音输入、点击推荐指令</p>\n<div class="sh">Chips 动态展示</div>\n<div class="sh">Chips 的两种形态</div>\n<p>• <strong>指令形态</strong>：一句话短语气泡，出现在收起态输入框上方</p>\n<p>• <strong>菜单形态</strong>：icon + 几个字的按钮，出现在展开态对话面板输入框上方</p>\n<div class="sh">Chips 全集清单</div>\n<p>用户打开一篇笔记只有三件事想做：快速理解内容、把内容改得更好、把录音变成结构化笔记。</p>\n<strong>内容提取</strong>：总结要点、思维导图、待办事项、行程计划\n<strong>文本润色</strong>：校对全文、改简洁、续写补充、改成正式语气\n<strong>笔记模板</strong>：会议纪要、课堂笔记、对话访谈、脑暴纪要',
19: '<div class="sh">需求背景</div>\n<p>目标：把对话框从"聊天工具"变成"笔记的 AI 编辑器"，用户说什么就改什么，点什么就知道会发生什么。</p>\n<p>当前问题：</p>\n<p>• 对话框像独立聊天窗口，缺乏与笔记正文联动</p>\n<p>• 快捷chips固定，不区分笔记类型</p>\n<p>• 局部修改没有精准操作入口</p>\n<div class="sh">对话框交互优化</div>\n<p>对话框新增推荐指令，根据chips智能推荐方案取前2条：</p>\n<p>• 出现时机：进入笔记详情页时，若历史对话记录为空，底部输入条上方自动展示2条推荐指令气泡</p>\n<p>• 消失时机：滚动正文超过约1/3屏幕，或点击AI问答对话框气泡消失</p>\n<p>• 点击气泡直接发送指令，并弹出对话面板</p>\n<div class="sh">Chips 动态推荐</div>\n<div class="sh">Chips 的两种形态</div>\n<p>• <strong>指令形态</strong>：一句话短语气泡，收起态输入框上方权重最高2条</p>\n<p>• <strong>菜单形态</strong>：icon按钮，展开态对话面板输入框上方，动态排序，单行横滑</p>\n<div class="sh">Chips 全集清单</div>\n<strong>内容提取</strong>：要点总结、思维导图、待办事项、行程计划\n<strong>文本润色</strong>：校对全文、改简洁、续写补充、改成正式语气\n<strong>笔记模板</strong>：会议纪要、课堂笔记、对话访谈、脑暴纪要',
20: '<div class="sh">需求背景</div>\n<p>当前笔记之间缺乏关联，每篇笔记都是孤立的。用户面临：</p>\n<p>• <strong>检索困难</strong>：搜索依赖精确关键词</p>\n<p>• <strong>信息碎片化</strong>：同一项目内容分散在多篇笔记中</p>\n<p>• <strong>知识沉没</strong>：早期记录无法与新内容自动关联</p>\n<p>• <strong>整理成本高</strong>：文件夹、标签、手动链接需要额外操作成本</p>\n<strong>优先级与演进路径：</strong>\n<p>阶段 方向 说明</p>\n<p>本期 详情页底部关联 AI 推荐 + 手动引用</p>\n<p>中期 首页"今日相关" 基于日历、待办、近期编辑聚合</p>\n<p>远期 关系图谱 / 跨域关联 可视化笔记网络；关联日历、联系人、录音</p>\n<strong>目标：</strong>用户打开一篇笔记，滑到底部即可看到与当前笔记相关的其他笔记，点击可直接跳转。\n<div class="sh">竞品分析</div>\n<p>产品 关联方式 手动/AI</p>\n<p>Obsidian 用户输入[[笔记名]]手动建立双向链接，反向链接面板自动聚合，关系图谱可视化 仅手动</p>\n<p>Apple Notes 通过编辑条"添加链接"搜索笔记标题插入链接，仅支持单向链接 仅手动</p>\n<p>Notion 三种链接方式 </p>',
22: '<div class="sh">外部来源写入笔记</div>\n<div class="sh">笔记来源标识-- P0</div>\n<p>针对外部来源的笔记，元数据增加外部agent来源标识。</p>\n<p>展示位置 展示内容 标识样式</p>\n<p>首页 统一 Agent 角标 AI 小图标，不区分具体 Agent。AI标记优先级最高</p>\n<p>笔记详情页 来源 Agent 名称 标题上方元信息栏，显示agent名称（如"来自内容助手"、"来自通讯助手"、"来自MiClaw"）</p>\n<div class="sh">笔记来源筛选 -- P0</div>\n<p>笔记右上角「更多」——「筛选」，支持筛选用户自建的笔记和AI创建的笔记。筛选和文件夹是两个独立维度，叠加生效。</p>\n<div class="sh">智能文件夹自动归类（已完成）</div>\n<p>• 复用现有智能文件夹能力，根据文件夹名称对笔记全文匹配自动归类</p>\n<p>• Agent 首次写入某类内容时，若无匹配文件夹，系统自动创建</p>\n<p>笔记全文关键词 自动创建的智能文件夹</p>\n<p>会议纪要 会议纪要</p>\n<p>通话摘要 通话摘要</p>\n<p>速记 速记</p>\n<p>简报 简报</p>\n<div class="sh">基于文件夹问答</div>\n<p>支持首页AI提问基于文件夹问答</p>\n<div class="sh">单篇笔记写入</div>\n<p>生成单次的会议纪要、通话摘要、对话生成笔记等，直接创建并将内容写入笔记。</p>\n<div class="sh">纯待办写入笔记</div>\n<p>生成内容只包含待办事项时，不创建笔记，只创建待办卡片，并同步到待办中心。</p>\n<div class="sh">滚动更新内容写入</div>\n<p>每日简报等"滚动更新"类内容：按周/月/年等维度，同一周期内的内容写入同一篇笔记，按照时间倒序写入。</p>',
23: '<div class="sh">一、需求背景</div>\n<div class="sh">1.1 需求目标</div>\n<p>用户在笔记 APP 内导入附件（图片、网址、文件），将附件内容转化为结构化笔记。</p>\n<p>核心目标：</p>\n<p>• 降低用户整理信息的成本：导入即整理</p>\n<p>• 场景化的触发策略：首页导入自动处理，笔记内上传手动触发</p>\n<div class="sh">二、需求概述</div>\n<div class="sh">需求清单</div>\n<p>模块 功能 优先级 备注</p>\n<p>1. 图片导入 1-1. 首页导入图片，自动 AI 处理 P0 </p>\n<p> 1-2. 笔记内上传图片，支持 OCR 文字提取 P0 </p>\n<p>2. 网址导入 2-1. 首页导入网址，自动 AI 总结 P0 </p>\n<p> 2-2. 笔记内粘贴网址，手动触发 AI 总结 P0 </p>\n<p>3. 文件导入 3-1. 首页导入文件，自动 AI 总结 P0 支持 PDF/Word/PPT</p>\n<p> 3-2. 笔记内上传文件，手动触发 AI 总结 P0 </p>\n<p>通用 异常降级策略 P0 AI 失败时不用原始内容降级写正文</p>\n<p> 标题自动生成 P0 AI 生成 ≤ 20 字标题</p>\n<div class="sh">三、需求详情</div>\n<div class="sh">核心设计原则</div>\n<p>• 每次首页导入都产出 AI 处理结果</p>\n<p>• AI 加工结果为主，原始素材可回溯</p>\n<p>• 意图驱动的分级加工</p>\n<p>• 降级不写正文</p>',
24: '<div class="sh">一、需求背景</div>\n<div class="sh">1.1 产品现状</div>\n<p>当前语音输入核心流程：用户发起录音→录音结束→ASR转写→AI生成总结→写入笔记正文。存在问题：</p>\n<p>• 录音过程中用户有即时记录需求，但只能依赖外部工具</p>\n<p>• 录音结束后AI总结是"全局视角"的通用摘要，缺少用户个人关注维度</p>\n<p>• 录音详情页的播放回听体验不够高效</p>\n<div class="sh">1.2 需求目标</div>\n<p>• 录音过程中可以直接在笔记正文记录关键信息</p>\n<p>• 录音结束后获得"用户手记 + AI 总结"的双层内容结构</p>\n<p>• AI 结合标记内容生成"个人关注重点"</p>\n<p>• 录音详情页体验与录音机APP对齐</p>\n<div class="sh">二、功能概述</div>\n<p>功能模块 定位 使用场景</p>\n<p>边录边记 正文级记录，用户在录音过程中直接在笔记正文区域编辑 记录会议要点、个人想法、待办事项</p>\n<p>录音标记 时间轴级标注，用户在录音过程中打时间戳标记 标记关键时间点、拍摄白板/PPT</p>\n<p>两者的关系：边录边记产出的内容直接写入笔记正文；录音标记产出的内容关联到录音时间轴，作为AI生成"个人关注重点"的输入。</p>\n<div class="sh">三、边录边记功能</div>\n<div class="sh">3.1 场景一：从首页开始录音</div>\n<p>• 入口1：录音面板中</p>\n<p>• 入口2：收起录音面板回到首页，首页底部工具栏</p>\n<p>• 录音过程中创建或导入的所有内容，都与当前正在进行的录音归属同一份笔记</p>\n<p>• 录音结束后，AI基于录音内容生成的总结写入笔记正文末尾</p>',
25: '<p>版本：v1.0 | 日期：2026-04-13</p>\n<div class="sh">一、方案背景与目标</div>\n<div class="sh">1.1 背景</div>\n<p>待办/日程卡片当前有两种生成路径：</p>\n<p>• AI对话生成：用户在笔记内AI对话中通过"提取待办/日程"模板或自然语言触发</p>\n<p>• 语音意图识别自动生成：用户通过语音输入时，AI识别到待办/日程意图后自动生成</p>\n<p>两种路径生成的待办卡片均需与系统待办中心/日历app实现双向同步。</p>\n<p>此外，将清单整体提醒升级为<strong>单条待办独立提醒</strong>。</p>\n<p>日程卡片需要与系统日历app实现双向同步。</p>\n<div class="sh">1.2 目标</div>\n<p>• 用户在笔记、AI对话、待办中心、日历app任一端的操作都能正确同步</p>\n<p>• 将清单整体提醒升级为单条待办独立提醒</p>\n<p>• AI设置提醒遵循不打扰原则</p>\n<div class="sh">二、待办清单支持对单条待办设置提醒</div>\n<div class="sh">2.1 待办中心的提醒展示</div>\n<p>• 设置提醒入口：每条待办下方都可以设置提醒</p>\n<p>• 仅设置提醒未填写待办内容时，完成按钮置灰</p>\n<p>• 已完成的待办，设置/修改提醒后自动恢复未完成状态</p>\n<p>• 删除提醒：提醒时间选择器中支持删除提醒</p>\n<strong>时间格式规则</strong>\n<p>• 今天：今天 HH:mm</p>\n<p>• 其他：M月d日 HH:mm</p>\n<p>• 跨年：yyyy年M月d日 HH:mm</p>\n<p>• 已过期：加"已过期"后缀</p>\n<div class="sh">2.2 笔记正文待办卡片中的提醒展示</div>\n<p>笔记正文中的待办卡片，同步展示每条待办的提醒信息</p>',
26: '<div class="sh">一、需求背景</div>\n<p>当前笔记搜索基于关键词匹配，搜索能力有限。OS4 端侧 AI 搜索基建已提供语义搜索能力，笔记需接入以提升搜索质量。同时，搜索页已有 AI 问答入口，但点击后仅跳转到空白对话页，用户需重新输入搜索词，体验不连贯。</p>\n<div class="sh">二、需求目标</div>\n<p>接入端侧 AI 搜索基建提升搜索质量；优化 AI 问答入口，带入搜索词直接发起对话。</p>\n<div class="sh">三、需求分析</div>\n<div class="sh">3.1 核心用户场景</div>\n<p>• 用户搜索笔记时，除关键词精确匹配外，还能搜到语义相关的笔记</p>\n<p>• 用户搜索后想进一步问 AI，点击 AI 入口时搜索词自动带入</p>\n<div class="sh">3.2 需求拆解</div>\n<strong>接入端侧 AI 搜索</strong>\n<p>序号 需求项 优先级</p>\n<p>1 接入端侧 AI 搜索 P0</p>\n<p>2 降级与兼容 P0</p>\n<strong>AI 问答入口带入搜索词</strong>',
27: '<div class="sh">一、背景</div>\n<p>AI 笔记作为小米全机型预装应用，需要覆盖从旗舰到入门的所有设备。面临两个核心问题：</p>\n<p>• <strong>中低端机功能精简</strong>：受限于硬件性能和 AI 能力覆盖度，需按设备能力分级裁剪功能</p>\n<p>• <strong>向低版本覆盖</strong>：新版采用新数据格式和编辑器架构，需解决数据兼容问题</p>\n<div class="sh">二、核心策略</div>\n<p>一个 APP，全机型安装，按设备能力分级体验。不维护两个笔记 APP。</p>\n<div class="sh">三、设备能力分层</div>\n<p>AI 笔记按设备能力分为五档：</p>\n<p> HyperOS（支持MiClaw） HyperOS（支持原HyperAI） HyperOS（不支持AI） HyperOS Middle HyperOS Lite</p>\n<p>MiClaw相关AI功能 ✅ ❌ ❌ ❌ ❌</p>\n<p>AI写作 ✅ ✅ ❌ ❌ ❌</p>\n<p>AI录音 ✅ ✅ ⚠️老转录 ⚠️老转录 ❌无转录</p>\n<p>说明 全量功能 仅AI写作和AI录音 去除全部AI功能，保留基础录音 去除全部AI功能，基础功能精简 去除全部AI功能，进一步精简</p>\n<p>MiClaw ⊂ HyperAI：支持 MiClaw 的一定支持 HyperAI，反之不一定。AI 能力由机型白名单决定。</p>\n<div class="sh">3.1 AI 写作能力说明</div>\n<p>• 支持 MiClaw 的新 AI Note：AI 写作与 AI 对话融合</p>\n<p>• 历史 OS 版本（支持原 HyperAI）：AI 写作为独立入口</p>\n<p>• 中低端机：隐藏 AI 写作入口</p>\n<div class="sh">3.2 录音转录能力说明</div>\n<p>底层均调用小爱能力，但不同设备档位的功能范围不同。</p>',
28: '<p>• 旧版笔记限制 20000 字符，只管中英文不管标点，且没有附件限制。</p>\n<p>• 新架构笔记内容来源变多了（语音转写、AI 整理、文档导入、Agent 写入）。</p>\n<p>• 新方案按"正文 + 附件转 Markdown 后的实际字符数"统一计量，同时对附件数量和单文件大小设上限。</p>\n<div class="sh">为什么要改</div>\n<p>问题 旧方案的缺陷</p>\n<p>计量口径不统一 只算中英文字符，标点符号、空格、换行不算</p>\n<p>没有附件限制 新架构支持音频、文档、图片等附件，没有限制会导致体积膨胀</p>\n<p>AI 内容不可控 语音转写、AI 整理、Agent 写入都会自动产生大量内容</p>\n<p>云同步压力 单篇笔记过大会拖慢同步速度</p>\n<div class="sh">新的计量规则</div>\n<div class="sh">计入范围：</div>\n<p>统一按 Markdown 渲染前的实际字符数计算：中文字符、英文字母、数字、标点符号、空格、换行符、Markdown语法标记、各类卡片在正文露出部分</p>\n<div class="sh">不计入范围：</div>\n<p>附件二进制数据、附件弹窗内的总结和原文、系统元数据、AI 中间产物</p>',
29: '<strong>核心诉求</strong>：梳理所有 MiClaw 体系中会跳转到笔记、或需要将 Agent 产出内容写入笔记 APP 的场景。覆盖范围：系统自动产出 / MiClaw对话产出 / 跨Agent协作 / 穿戴设备多端采集 / 笔记APP内AI操作，共5大类。\n<div class="sh">一、系统自动产出类（后台触发，无需用户操作）</div>\n<strong>分类定义</strong>：系统事件触发AI后台处理，用户无需主动操作，内容处理完成后通过通知/超级岛推送。\n<strong>内容价值属性</strong>：全部为长期有价值内容。\n<strong>边界</strong>：不包含一次性查询结果，只有AI判断具有长期保存价值的内容才写入笔记。\n<p>场景 触发条件 写入笔记的内容 来源Agent 交互流程 优先级</p>\n<p>会议纪要 录音结束 结构化纪要+待办+决策项 内容助手 录音结束→AI后台转写+生成纪要→超级岛通知→点击进入笔记审阅 P0</p>\n<p>通话摘要 通话结束 通话摘要+待办+关键信息 通讯Agent 通话结束→AI后台生成摘要→超级岛通知→点击进入笔记+同步待办到日历 P0</p>\n<p>拍照自动归档 拍发票/白板/名片 OCR识别结果+结构化内容 影像Agent 拍照→AI识别→超级岛确认→OCR+结构化写入笔记→自动归类 P1</p>\n<p>短信结构化 收到特定短信 航班/快递/消费记录 系统 收到短信→AI识别类型并提取 P1</p>\n<p>出差报告 出差行程结束 行程汇总+花销+发票归集 日程出行Agent  P2</p>\n<p>照片集自动整理 出差/旅行结束 行程照片集+时间线 影像Agent  P2</p>',
30: '<div class="sh">二、Q2Q3主要工作内容</div>\n<div class="sh">键盘</div>\n<p>事项分类 目标 做法&结果输出</p>\n<p>业务梳理 熟悉业务内容 产品/竞品深度使用、近一年用户反馈整理分析、销售量/用户画像数据收集、输出体验报告和业务规划目标</p>\n<p>问卷调研 了解用户满意度，挖掘新需求 问卷设计与编写、内部试点+社区大规模发放、结果分析、提炼关键洞察</p>\n<p>打分模型 优化打分模型 明确模型构建目标、当前模型问题梳理、指标维度重构、用例撰写</p>\n<p>P81/82体验走查 提前识别整机问题 主动走查并记录问题、通过jira跟踪解决进度</p>\n<p>易用性需求 优化用户体验 反引号键适配、轻触两下以拖移开关、光标贴边退出状态栏沉浸模式</p>\n<p>基础体验优化 触控板防误触优化 手掌防误触、边缘动态防误触、三指下滑截屏防误触</p>',
31: '<div class="sh">调研概述</div>\n<strong>研究内容</strong>\n<p>• 了解用户多大程度上愿意将现在使用的平板推荐给自己的亲朋好友（NPS得分）</p>\n<p>• 获取用户推荐与不推荐原因</p>\n<strong>研究方法及样本量</strong>\n<p>• 调研时间：2025年9月30日-2025年11月24日</p>\n<p>• 有效样本量：1002</p>\n<p>• 调研方式：圈选激活且使用Xiaomi Pad 8满一个月的全量用户进行问卷投放</p>\n<div class="sh">核心结论</div>\n<div class="sh">NPS得分</div>\n<p>• Xiaomi Pad 8 的NPS得分为<strong>-9.7分</strong>，较上一代Xiaomi Pad 7（8.9分）低18.6分</p>\n<p>• <strong>重点改善项：系统性能与流畅性、系统稳定性、非自带应用体验、电池续航、屏幕触控、手写笔、平板与其他设备联接</strong></p>\n<p>• <strong>次之改善项：相机拍照、散热、客服售后物流等服务体验、WiFi蓝牙等联接、指纹解锁人脸识别、系统功能和自带小米应用</strong></p>\n<p>• 与Xiaomi Pad 7相比：手写笔进入重点改善项，屏幕触控由次之改善项升级为重点改善项</p>\n<strong>品牌换机来源分析</strong>\n<p>• 超四成用户此前没有平板购买经历</p>\n<p>• <strong>苹果流入用户</strong>评价（-20.0分）低于整体NPS（-9.7分），iPad Air和iPad Pro系列用户NPS分别为-36.8分和-34.8分</p>\n<p>• <strong>华为流入用户</strong>评价（-19.5分）低于整体NPS</p>\n<p>• <strong>小米流入用户</strong>评价（2.5分）高于整体NPS</p>\n<strong>场景分析：</strong>\n<p>• <strong>影音娱乐</strong>（72.8%）及<strong>网课/阅读/学习/记笔记</strong>（68.1%）为TOP1及TOP2应用场景</p>\n<p>• <strong>游戏</strong>场景NPS得分最低，约四成用户会使用此平板玩游戏</p>\n<div class="sh">一、NPS得分</div>\n<div class="sh">（一）整机得分</div>\n<p>Xiaomi Pad 8 的NPS得分为<strong>-9.7分</strong>，较上一代Xiaomi Pad 7（8.9分）低18.6分</p>\n<p>推荐者占比低8%、贬损者占比高11%</p>\n<div class="sh">（二）二级指标贡献值</div>\n<p>• TOP优势项：品牌信誉、外观、屏幕显示</p>\n<p>• TOP劣势项：系统性能与流畅性、系统稳定性、相机拍照</p>',
32: '<div class="sh">人力说明</div>\n<p>OS4时间线：TR3 12/26，TR4 1/23</p>\n<p>笔记开发人力：共5个开发，OS4期间保留2个进行机型交互/日常维护，4个人力可用于OS4开发</p>\n<p>按从12月底全投入开发，共计可投入16人月</p>\n<p>总需25人月，缺9人月</p>\n<p>业务块 人力需求</p>\n<p>AI 13.4月-3.1人月（录音相关功能建议推迟到录音机后）</p>\n<p>基础体验优化 8人月（含1.5人月预留，应对中低端机性能优化）</p>\n<p>美学 5人月（6人月待定）</p>\n<p>小部件 1.7人月</p>\n<div class="sh">评估项</div>\n<div class="sh">AI</div>\n<p>改动组别 改动描述 技术架构 预估工时 备注</p>\n<p>文档内容搜索 支持文档内容搜索（手写笔记） 基于线上AI搜索能力，提供建库数据、展示搜索数据 1.5人/月 miai引擎负责搜索，绘画引擎提供页码跳转接口</p>\n<p>笔记录音摘录AI搜索  录音摘录信息存储在录音机数据库中，需提供AI搜索建库数据  </p>\n<p>笔记待办AI搜索  接入AI搜索基建  </p>\n<p>富媒体元素插入与智能理解    </p>',
33: '<p>2025年12月04日，手机部软件部成功举办第五期火花论坛公开课。</p>\n<p>• <strong>本期主题：</strong>《聊一聊产品逻辑与决策》</p>\n<p>• <strong>分享讲师：</strong>产品部资深专家秦川，曾任职于华为、荣耀等知名企业，拥有16年+行业经验。成功带领团队打造出小米超级岛、小米17背屏等优秀产品。</p>\n<div class="sh">如何制定战略</div>\n<p>战略的制定需超越直觉，建立系统性的分析框架。"五看三定"方法论：</p>\n<p>• <strong>"五看"</strong>：深入审视行业趋势、市场规模、用户深层诉求、竞争格局与自身核心能力</p>\n<p>• <strong>"三定"</strong>：决策输出与落地规划</p>\n<p>案例：大桌面赛道三年规划，"三年内达成基础体验安卓第一"</p>\n<div class="sh">如何挖掘需求&设计方案</div>\n<p>需求的挖掘必须紧紧围绕用户，穿越表面诉求直达本质场景。构建立体的需求洞察网络：用户反馈（Feedback）、行为大数据、场景还原与竞品分析。</p>\n<p>案例：大屏交互体系（多任务），通过数据分析锁定"游戏/短视频+微信"占比超80%的基础盘场景。"用户旅程还原"避免设计脱离实际。</p>\n<div class="sh">如何设定目标</div>\n<p>每个产品功能都应有其"北极星指标"。驱动从"优秀"走向"卓越"的根本动力：对行业与用户的深度热爱。</p>',

1: '<div class="sh">Huberman Lab P1-P20 笔记</div>\n<blockquote>参考资源：examine.com</blockquote>\n<div class="sh">P3 光线与昼夜节律</div>\n<p>• 光线影响激素分泌，眼睛是唯一的光受体</p>\n<p>• 早晨和傍晚去户外接收光线，通过眼睛（不戴太阳镜，不通过玻璃窗），2-10 分钟，能够调节昼夜节律</p>\n<p>• 晚上避免强光，特别是头顶的吸顶灯</p>\n<strong>P18 补充——早上光线强度：</strong>\n<p>条件 | 照度</p>\n<p>晴天 | 100,000 lux</p>\n<p>阴天 | 10,000 lux</p>\n<p>强人造光 | 1,000 lux</p>\n<p>---</p>\n<div class="sh">P4 季节节律与体温</div>\n<p>• 光线抑制褪黑素，夏天昼长夜短褪黑素减少</p>\n<p>• 睡眠是清醒的延伸</p>\n<p>• 学习期间同时伴有音乐、气味或触觉刺激，在睡眠时重复这些刺激有助于提高学习和记忆的速度</p>\n<strong>体温与节律：</strong>\n<p>时间 | 体温状态</p>\n<p>4am | 最低</p>\n<p>6-8am | 开始上升</p>\n<p>4-6pm | 峰值</p>\n<p>• 体温下降 → 感到困倦；体温上升 → 感到清醒</p>\n<p>• 晚上 8 点以后洗冷水澡 → 体温代偿上升 → 生物钟延长白天</p>\n<p>• 早晨洗冷水澡 → 体温上升 → 生物钟提前</p>\n<p>---</p>\n<div class="sh">P5 时差</div>\n<p>最低体温是改变生物钟的绝对参考点：</p>\n<p>• 在最低体温时刻暴露强光 4 小时 → <strong>相位提前</strong>（更早起床和更早睡觉）</p>\n<p>• 在最低体温前 4-6 小时暴露强光 → <strong>相位延迟</strong>（更晚起床和更晚睡觉）</p>\n<p>---</p>\n<div class="sh">P7 集中注意力与神经可塑性</div>\n<p>• 眼睛聚焦在一个很小的区域保持 1-2 分钟，少眨眼</p>\n<p>• <strong>90 分钟一个周期</strong>进行学习</p>\n<p>• 学习中犯错误可以增强神经可塑性——学会正确看待挫折感，将其与加速达成学习目标联系起来</p>\n<p>• <strong>Limbic friction</strong>：打开神经可塑性的一种方式是利用前庭，做一些偏移引力的新运动（瑜伽、倒立、冲浪等）</p>\n<p>---</p>\n<div class="sh">P8 咖啡因</div>\n<p>早上醒来 <strong>2 小时后</strong>再摄入咖啡因。咖啡因会竞争腺苷受体，醒来后一段时间腺苷（使困意累积）被自然抑制，然后再摄入咖啡因能更好地发挥作用。</p>\n<p>---</p>\n<div class="sh">P9 脑损伤</div>\n<p>• 减缓/恢复脑损伤：睡觉时侧卧，将脚部微微抬高</p>\n<p>• 姜黄可能受到铅污染</p>\n<p>---</p>\n<div class="sh">P12 多巴胺</div>\n<blockquote>多巴胺不是体验愉悦的能力，而是体验愉悦的<strong>动机</strong>。（大鼠杠杆实验）</blockquote>\n<p>---</p>\n<div class="sh">P13 情感与激素</div>\n<strong>情感理论三维度：</strong> 唤醒/困倦、感觉良好/感觉糟糕、专注于内部/关注外部\n<p>• 婴儿时期专注于内部感受，通过哭叫来缓解内部焦虑</p>\n<p>• 青春期：瘦素（脂肪构成）加速青春期到来；kisspeptin 刺激性激素生成</p>\n<p>• <strong>催产素</strong>：增强人与人之间联系感与亲密感，降低压力；VD 和褪黑素可能对催产素产生有积极作用</p>\n<p>• <strong>加压素</strong>：类似催产素作用</p>\n<p>• 迷走神经</p>\n<p>---</p>\n<div class="sh">P14 雌激素与睾丸激素</div>\n<p>• 促雌激素：见月草油；atrazine 除草剂（睾丸畸形）</p>\n<p>• 大麻促进芳香化酶活性 → 刺激睾丸激素转化为雌激素</p>\n<p>• 手机发出的电波可能对性腺发育有影响</p>\n<p>• <strong>二氢睾丸激素</strong> → 脱发/胡须生长</p>\n<p>• 防脱发药（5-α-还原酶抑制剂）：抑制睾丸激素向二氢睾丸激素转化</p>\n<p>• 植物雌激素作用：植物对动物的战争</p>\n<p>• 性取向：胚胎时期接触雌/雄激素</p>\n<div class="sh">P15 睾丸激素与雌激素</div>\n<p>• 睾丸激素和雌激素同时存在于男人和女人体中，比例不同</p>\n<p>• 胆固醇可转化为皮质醇/雌激素/睾丸激素（竞争）</p>\n<p>• 尽量鼻呼吸</p>\n<p>• 阳光</p>\n<p>• <strong>负重训练</strong> → 提升睾丸激素</p>\n<p>• 更年期 → 雌激素疗法或促进雌激素产生的补充剂（葛根）</p>\n<p>---</p>\n<div class="sh">P16 食欲与血糖</div>\n<div class="sh">食欲相关激素</div>\n<p>激素 | 作用</p>\n<p><strong>MSH</strong>（黑色素细胞刺激素） | 来自 POMC 神经元，抑制食欲。通过眼睛接收紫外线激活分泌</p>\n<p><strong>Ghrelin</strong>（生长激素释放肽） | 刺激 AgRP 神经元，增加食欲，使血液中葡萄糖水平降低</p>\n<p><strong>CCK</strong>（胆囊收缩素） | 在进食过程中抑制食欲</p>\n<p>• Omega-3 脂肪酸和共轭亚油酸（CLA）能够刺激 CCK 释放</p>\n<p>• 氨基酸刺激 CCK 释放（尤其是谷氨酰胺）</p>\n<p>• 高度加工食物中的乳化剂限制肠道功能，使其无法发出饱腹感信号</p>\n<div class="sh">血糖管理</div>\n<p>避免血糖急剧上升的进食顺序：<strong>纤维 → 蛋白质 → 脂肪 → 碳水</strong></p>\n<p>• LDL 低密度脂蛋白 / HDL 高密度脂蛋白：运输脂肪组织的载体</p>\n<p>• Yerba mate（马黛茶）</p>\n<p>---</p>\n<div class="sh">P17 甲状腺与生长激素</div>\n<div class="sh">甲状腺健康</div>\n<p>维持甲状腺健康的元素：</p>\n<p>• <strong>酪氨酸</strong></p>\n<p>• <strong>碘</strong>（盐、海带、海水、海边的空气）</p>\n<p>• <strong>硒</strong>（每日 155 微克，巴西坚果含量最高）</p>\n<blockquote>甲状腺激素与血糖水平相关，生酮饮食碳水摄入少 → 血糖水平低 → 甲状腺激素水平低。</blockquote>\n<div class="sh">生长激素</div>\n<p>• 甲状腺激素和生长激素均有增加新陈代谢和修复组织损伤的作用</p>\n<p>• 生长激素在<strong>睡眠早期释放</strong>（慢波睡眠），条件是血液中胰岛素和葡萄糖水平较低</p>\n<p>• <strong>睡前两小时不要吃东西</strong></p>\n<p>• 睡眠上半夜以慢波睡眠和深度睡眠为主导，下半夜以 REM 睡眠为主导</p>\n<p>• 较低水平（500 微克）补充褪黑素能够增加慢波睡眠，促进生长激素释放</p>\n<strong>白天增加生长激素的方法：</strong>\n<p>• 30 分钟（女性）/ 60-75 分钟（男性）的适当重量训练或耐力训练</p>\n<p>• 热身</p>\n<p>• 运动完毕后迅速恢复正常体温</p>\n<strong>生长激素通路：</strong> 生长激素 → 进入肝脏 → 生成 IGF-1（胰岛素生长因子 1）→ 提升记忆力\n<strong>提升生长激素的补充剂：</strong> 精氨酸、鸟氨酸；蒸桑拿\n<blockquote>肽：一串氨基酸，氨基酸的短序列</blockquote>\n<p>---</p>\n<div class="sh">P18 皮质醇与肾上腺素</div>\n<div class="sh">间歇性进食与生长激素</div>\n<p>饥饿素 ghrelin 能够结合生长激素释放激素的受体，一定程度上代替其作用，从而刺激生长激素释放。</p>\n<div class="sh">皮质醇与肾上腺素</div>\n<p>• <strong>皮质醇</strong>（cortisol）和<strong>肾上腺素</strong>（epinephrine/adrenaline）：共同作用增加能量与精力</p>\n<p>• 胆固醇是多种激素的底物：雌激素、睾丸激素、皮质醇等，因此这几种激素有竞争机制</p>\n<strong>皮质醇：</strong>\n<p>• 类固醇激素，前体是胆固醇</p>\n<p>• 通过早上接收阳光，在早上定时释放皮质醇 → 提升注意力与能量水平，防止后续时间的皮质醇增加</p>\n<p>• 压力事件会增加皮质醇释放</p>\n<strong>肾上腺素：</strong>\n<p>• 前体是多巴胺</p>\n<p>• 急促的呼吸、冷水浴可触发</p>\n<div class="sh">免疫系统</div>\n<p>皮质醇和肾上腺素增强免疫系统功能的原理：1-4 天内的压力增加，肾上腺素作为信号，使神经系统通知免疫器官产生免疫细胞。</p>\n<div class="sh">慢性压力与白发</div>\n<p>糖皮质激素：慢性压力应激促使头发干细胞中黑素细胞的消耗，导致白发。</p>\n<div class="sh">相关补充剂</div>\n<p>补充剂 | 作用 | 服用时间</p>\n<p><strong>南非醉茄</strong>（ashwagandha） | 降低皮质醇，减轻慢性压力 | 傍晚或晚上</p>\n<p><strong>黑甘草</strong>中的 glycyrrhizin | 增加皮质醇，减少雌激素和睾丸激素 | —</p>\n<p><strong>洋甘菊</strong>中的芹菜素（apigenin） | 温和的抗雌激素，减少皮质醇，抗焦虑（调整 GABA 和氯离子通道） | 傍晚或晚上</p>\n<blockquote>Fasting 会增加肾上腺素和皮质醇释放。</blockquote>\n<div class="sh">提高学习效率的步骤</div>\n<p>• 进入学习前保持冷静和专注（P7）</p>\n<p>• 学习完成后提升肾上腺素（冷感、快速呼吸）</p>\n<p>• NSDR（非睡眠深度休息）或 20 分钟小睡</p>\n<p>• 优化夜晚的睡眠</p>\n<p>---</p>\n<div class="sh">P19 体温调节</div>\n<p>• 动物通过直立毛发间的空气存热</p>\n<p>• 血管收缩保存热量，血管扩张散发热量</p>\n<p>• <strong>AVA（动静脉吻合）</strong>：手掌、脚掌、脸部（原始无毛的部位）— 传递热量（冷和热）的高效部位</p>\n<p>• 运动时通过手掌冷却可以降低核心体温，增强运动表现。方法：将手掌浸在低于体温的冷水中 10-30 秒</p>\n<p>• 咖啡因敏感 → 收缩血管 → 增加体内热量存储</p>\n<p>---</p>\n<div class="sh">P20 运动学习与神经可塑性</div>\n<p>• <strong>重复错误</strong> → 刺激额叶皮层网络 → 神经可塑性</p>\n<p>• 学习完成后<strong>闭目休息 10 分钟</strong>（放空大脑），大脑重播连环动作巩固学习成果</p>\n<p>• 睡眠巩固学习成果</p>\n<p>• 学习综合性技能可以将学习内容拆解，先集中注意力在某一方面，然后再结合起来（例如学习钢琴先集中在按键顺序，而非声音反馈，熟练后再相结合）</p>\n<p>• <strong>可视化训练</strong>（心理训练）：在大脑中重播动作也能够增加实际训练效果</p>\n<p>• <strong>Alpha GPC</strong>（α-甘油磷酸胆碱）</p>',
2: '<div class="sh">Huberman Lab 笔记</div>\n<div class="sh">P21 减脂的营养基础</div>\n<div class="sh">基础营养补充</div>\n<p>• <strong>EPA</strong>：每日摄入 1000mg</p>\n<p>• <strong>谷氨酰胺</strong></p>\n<p>• <strong>肠道功能正常</strong>：益生菌或发酵食品</p>\n<p>• <strong>甲状腺功能正常</strong>：碘水平适量、硒水平适量（每天 1-3 颗巴西坚果）</p>\n<div class="sh">减脂两步</div>\n<p>• <strong>第一步：脂肪动员</strong></p>\n<p>• <strong>第二步：氧化利用</strong></p>\n<div class="sh">NEAT（非运动活动生热作用）</div>\n<p>Non-Exercise Activity Thermogenesis</p>\n<p>肌肉低水平的运动（抖腿、坐立不安、发抖）能够触发神经元释放肾上腺素，刺激脂肪动员和氧化。额外消耗 <strong>800-2000 卡路里</strong>。</p>\n<div class="sh">三种脂肪</div>\n<p>类型 | 位置 | 特点</p>\n<p><strong>白色脂肪</strong> | 皮下脂肪 | 没有线粒体</p>\n<p><strong>棕色脂肪</strong> | 肩胛骨部位 | 富含线粒体，可以直接利用能源产热</p>\n<p><strong>米色脂肪</strong> | 介于两者之间 | 有少量线粒体</p>\n<blockquote>寒冷导致的颤抖能够增加琥珀酸释放，激活棕色脂肪，促进米色脂肪向棕色脂肪转化。</blockquote>\n<p>---</p>\n<div class="sh">P24 视觉</div>\n<div class="sh">光感受器</div>\n<p>眼睛中含有称为光感受器的特殊细胞：视锥细胞和视杆细胞。</p>\n<strong>黑色素蛋白</strong>内部含有视蛋白，本质上是光感受器，能够传达时间节律信息。这种蛋白与某些可变色的两栖动物皮肤中存在的黑色素蛋白非常相似。\n<div class="sh">预防或抵消近视</div>\n<p>• 每天两小时的户外活动</p>\n<p>• 工作学习每 90 分钟眺望远处 20 分钟</p>\n<p>• 睡觉时保持黑暗，不使用夜灯</p>\n<p>• 平滑追踪训练（smooth pursuit stimulus）和远近观察训练，每周 3 次每次 2-10 分钟</p>\n<div class="sh">实用技巧</div>\n<p>• 困倦时，抬头眼睛看向天花板 10 秒，可以保持清醒</p>\n<p>• <strong>叶黄素</strong>可抵消年龄相关的黄斑病变，对重度患者效果更好，对轻度患者效果不佳</p>\n<p>---</p>\n<div class="sh">P25 嗅觉与味觉</div>\n<div class="sh">嗅探练习</div>\n<p>嗅探练习能够提升嗅觉能力，唤醒大脑、提升与气味相关神经元的敏感性。</p>\n<p>练习方式：闻某种气味（例如柑橘）→ 做 10-15 次吸气 → 继续闻柑橘气味</p>\n<div class="sh">信息素（费洛蒙）</div>\n<p>• 柯立芝效应</p>\n<p>• 犁鼻器</p>\n<p>• 同住的女性月经周期同步是信息素效应？</p>\n<div class="sh">味觉受体</div>\n<p>5 种基本味觉：<strong>甜、咸、酸、苦、鲜</strong></p>\n<p>动物类型 | 味觉特点</p>\n<p>大型食肉动物（狗、老虎、灰熊等） | 没有甜味受体，但有更强的咸味和鲜味受体（人类的 5000 倍）</p>\n<p>食草动物（熊猫） | 没有咸鲜味受体，有更强的甜味受体</p>\n<blockquote>神奇浆果能颠倒甜味和酸味</blockquote>\n<p>---</p>\n<div class="sh">P27 听力/平衡</div>\n<p>• <strong>双耳节拍</strong>（binaural beats）：可减缓疼痛</p>\n<p>• <strong>白噪声</strong></p>',
3: '<div class="sh">产品运营供应商调研</div>\n<div class="sh">1. 有赞</div>\n<p>• <strong>官网</strong>：https://www.youzan.com/chanpin/jifenshangcheng.html</p>\n<p>• <strong>适用功能</strong>：积分商城商品上架，积分获取消耗全流程及展示，抽奖活动等简易营销活动</p>\n<p>• <strong>客户案例</strong>：主要是电商、小微企业，服务于微信生态链</p>\n<p>• <strong>优点</strong>：比较年轻化，有直播、社交电商等拓展方向</p>\n<p>• <strong>缺点</strong>：行业及规模不太匹配，公司业务很多但我们能够使用的功能较为单一，无法将优惠券、会员体系统一进行管理</p>\n<p>• <strong>匹配度</strong>：⭐（1/5）</p>\n<p>---</p>\n<div class="sh">2. 百分汇</div>\n<p>• <strong>官网</strong>：https://www.baifenhui.cn/</p>\n<p>• <strong>适用功能</strong>：积分商城开发、权益礼品供应、积分商城代运营（策划到复盘全流程）</p>\n<p>• <strong>客户案例</strong>：主攻金融行业（银行、保险、信托），代表客户中国银行。首页写了服务新能源行业但所附案例与新能源无关，可深入咨询一下。</p>\n<p>• <strong>优点</strong>：运营的方案比较丰富，能够帮助运营提供思路。礼品供应商资源比较丰富。</p>\n<p>• <strong>缺点</strong>：从服务的客户来看跟我们的品牌调性不太符合。会员体系、优惠券无法进行统一管理。</p>\n<p>• <strong>匹配度</strong>：⭐⭐（2/5）</p>\n<p>---</p>\n<div class="sh">3. 橙券</div>\n<p>• <strong>官网</strong>：https://www.chengquan.cn/index</p>\n<p>• <strong>适用功能</strong>：积分商城搭建、权益礼品供应、积分代运营、积分体系定制、营销活动策划</p>\n<p>• <strong>客户案例</strong>：分布比较广泛，有金融、互联网、通讯、生活等，例如中国农业银行、中国联通、京东、小鹏汽车，客户知名度较高。</p>\n<p>• <strong>优点</strong>：各项能力比较均衡，客户也比较多元化，特别是有小鹏汽车积分商城搭建经验。</p>\n<p>• <strong>缺点</strong>：介绍里面有写优惠券功能，案例暂未看到。</p>\n<p>• <strong>匹配度</strong>：⭐⭐⭐（3/5）</p>\n<p>---</p>\n<div class="sh">4. 翼码</div>\n<p>• <strong>官网</strong>：https://www.wangcaio2o.com/</p>\n<p>• <strong>适用功能</strong>：卡券管理系统（制券+发券+核销，线上+线下）、礼品卡发放（储值卡）、营销活动策划、会员管理系统（会员档案、积分、权益、精准营销）、营销 SaaS 平台定制</p>\n<p>• <strong>客户案例</strong>：优衣库、波司登、丝芙兰、米其林、麦当劳、哈根达斯等。美妆、食品、制造业、医药、电信运营商、金融、保险等行业</p>\n<p>• <strong>优点</strong>：功能比较全面，行业覆盖范围广，客户都比较优质，能够满足中长期产品运营需求。</p>\n<p>• <strong>缺点</strong>：新能源类的客户经验待考证</p>\n<p>• <strong>匹配度</strong>：⭐⭐⭐⭐（4/5）</p>',
4: '<div class="sh">低碳减排，与你同行</div>\n<div class="sh">碳排放数据</div>\n<p>行为 | 碳排放量</p>\n<p>使用 1 个塑料袋 | ≈ 10g</p>\n<p>产生 100 克纸张垃圾 | ≈ 120g</p>\n<p>开车出行 1 公里 | ≈ 290g</p>\n<p>每行走一步 | 可减少约 0.0627g</p>\n<blockquote>数据来源：权威机构 @碳阻迹</blockquote>\n<p>如果平时减少驾驶车辆，在日常短距离通勤场景中以走路替代开车，每行走 <strong>5000 步</strong>可以减少约 <strong>313.5g</strong> 碳排放。从脚下的每一步做起，一起为低碳减排贡献力量！</p>\n<div class="sh">活动规则</div>\n<p>扫描下方二维码，登入 <strong>#低碳减排，与你同行#</strong> 小程序，立即计算你的低碳减排践行历程！</p>\n<p>排名 | 奖励</p>\n<p>当日步数排名前 <strong>10</strong> 名 | 每人获赠地球日环保袋 1 个</p>\n<p>当日排名前 <strong>100</strong> 名 | 每人获赠微软官方商城限时配件优惠券</p>\n<p>现在就行动起来~</p>',
5: '<div class="sh">充电桩多订单方案</div>\n<div class="sh">名词解释</div>\n<p>• <strong>进行中订单</strong>：包含预约状态，以及驶入成功后订单支付完成前。</p>\n<p>• <strong>订单转换</strong>：转换前后是同一个订单编号，只是订单类型（预约/现场）、车辆、车位号发生了转换。只有在同一场站时才允许进行订单转换。</p>\n<p>---</p>\n<div class="sh">多个订单基本规则</div>\n<p>• 同一账号支持最多 <strong>2 个</strong>进行中的订单（可根据会员权益配置）</p>\n<p>• 同一车牌同时只能有 <strong>1 个</strong>进行中的订单</p>\n<p>• 预约车位以实际驶入的车牌为准</p>\n<p>---</p>\n<div class="sh">同一账号剩余进行中订单额度 ≥ 1 时</div>\n<p>• 当默认车辆已经处于进行中订单时，再次预约需要选择其他车辆；反之，当默认车辆不处于进行中订单时，再次预约自动选中默认车辆。</p>\n<p>• <strong>预约车辆A，实驾车辆B，驶入预约场站的非预约车位：</strong></p>\n<p>车辆A预约单正常进行，车辆B创建新的现场单。</p>\n<p>• <strong>预约车辆A，实驾车辆B，驶入车辆A的预约车位：</strong></p>\n<p>允许驶入，驶入成功后，进行订单转换（车辆A转换为车辆B，预约单转换为现场单）。若仅识别成功未驶入成功，则仍然按车辆A的预约单处理。</p>\n<blockquote>⚠️ 需要跟硬件确认</blockquote>\n<p>• <strong>预约车辆A，实驾车辆B，驶入与预约不同的场站：</strong></p>\n<p>车辆A预约单正常进行，车辆B创建新的现场单。</p>\n<p>• <strong>预约车辆A，实驾车辆A，驶入预约场站的非预约车位：</strong></p>\n<p>允许驶入，驶入成功后，进行订单转换（预约单转换为现场单）。</p>\n<p>• <strong>预约车辆A，实驾车辆A，驶入与预约不同的场站：</strong></p>\n<p>允许驶入，驶入成功后，原有预约单自动取消，创建新的现场单，并发送 push 提示。</p>\n<blockquote>📱 提示：根据实际驾驶情况，已为您取消预约订单并创建新订单。</blockquote>\n<p>• <strong>已有进行中订单全部处于非预约状态时，驾驶车辆进入任意车位：</strong></p>\n<p>允许驶入，创建新订单。</p>\n<p>• <strong>驾驶车辆存在进行中订单，驶入任意车位：</strong></p>\n<p>不允许驶入。</p>\n<p>---</p>\n<div class="sh">同一账号剩余进行中订单额度 = 1 时</div>\n<p>车辆A处于识别成功未驶入成功状态时，车辆B尝试驶入另一车位：</p>\n<p>• 允许车辆B驶入</p>\n<p>• 车辆AB任意一辆驶入成功创建订单后，另一辆车无法创建订单，无法进行后续充电流程</p>\n<p>• 发送短信/push 通知车辆驶离，车辆驶离后相应充电位恢复可用状态，车辆停留期间不收取费用</p>\n<blockquote>📱 短信/push 提示：[沪A12345] 您的订单数量已达上限，本次订单创建失败，请尽快驶离停车位，谢谢配合。</blockquote>\n<blockquote>❓ 是否有相应的充电桩灯光效果可以提示此类情况？</blockquote>\n<p>---</p>\n<div class="sh">同一账号剩余进行中订单额度 = 0 时</div>\n<p>• <strong>【逻辑不同】预约车辆A，实驾车辆B，驶入预约场站的非预约车位：</strong></p>\n<p>允许驶入，驶入成功后，原有预约单自动取消，创建新的现场单，并发送 push 提示。若仅识别成功未驶入成功，则仍然按车辆A的预约单处理。</p>\n<blockquote>📱 Push 提示：根据实际驾驶情况，已为您取消预约订单并创建新订单</blockquote>\n<p>• <strong>【特殊情况】同场站已有2个及以上预约订单，实驾非预约车辆C，驶入预约场站的非预约车位：</strong></p>\n<p>允许驶入，驶入成功后，预约订单时间最早的订单自动取消，创建车辆C现场单，并发送 push 提示。若仅识别成功未驶入成功，则仍然按原预约车辆的预约单处理。</p>\n<blockquote>📱 Push 提示：根据实际驾驶情况，已为您取消预约订单并创建新订单</blockquote>\n<p>• <strong>预约车辆A，实驾车辆B，驶入车辆A的预约车位：</strong></p>\n<p>允许驶入，驶入成功后，车辆A预约单自动转换为车辆B的现场单。若仅识别成功未驶入成功，则仍然按车辆A的预约单处理。</p>\n<p>• <strong>预约车辆A，实驾车辆B，驶入与预约不同的场站：</strong></p>\n<p>不允许驶入。</p>\n<p>• <strong>预约车辆A，实驾车辆A，驶入预约场站的非预约车位：</strong></p>\n<p>允许驶入，驶入成功后，进行订单转换（预约单转换为现场单）。</p>\n<p>• <strong>预约车辆A，实驾车辆A，驶入与预约不同的场站：</strong></p>\n<p>允许驶入，驶入成功后，原有预约单自动取消，创建新的现场单，并发送 push 提示。</p>\n<blockquote>📱 Push 提示：根据实际驾驶情况，已为您取消预约订单并创建新订单</blockquote>\n<p>• <strong>已有进行中订单全部处于非预约状态时，驾驶车辆进入任意车位：</strong></p>\n<p>不允许驶入。</p>\n<p>• <strong>尝试预约订单：</strong></p>\n<p>不允许预约，页面显示订单已达上限提示。</p>\n<p>---</p>\n<div class="sh">场景对比总结</div>\n<p>场景 | 订单额度 > 0 | 订单额度 = 0</p>\n<p>预约车辆A，实驾车辆B，驶入预约场站的非预约车位 | 车辆A预约单正常进行，车辆B创建新的现场单 | 允许驶入，驶入成功后原有预约单自动取消，创建新的现场单，发送 push 提示</p>\n<p>预约车辆A，实驾车辆B，驶入车辆A的预约车位 | 允许驶入，订单转换（车辆A→车辆B，预约单→现场单） | 同左</p>\n<p>预约车辆A，实驾车辆B，驶入与预约不同的场站 | 车辆A预约单正常进行，车辆B创建新的现场单 | 不允许驶入</p>\n<p>预约车辆A，实驾车辆A，驶入预约场站的非预约车位 | 允许驶入，订单转换（预约单→现场单） | 同左</p>\n<p>预约车辆A，实驾车辆A，驶入与预约不同的场站 | 允许驶入，原有预约单自动取消，创建新的现场单，发送 push 提示 | 同左</p>\n<p>已有进行中订单全部处于非预约状态，驾驶车辆进入任意车位 | 允许驶入，创建新订单 | 不允许驶入</p>\n<p>驾驶车辆存在进行中订单，驶入任意车位 | 不允许驶入 | 不允许驶入</p>',
6: '<div class="sh">充电桩行业调研</div>\n<div class="sh">一、国内充电桩市场现状</div>\n<div class="sh">1. 达成规模，过去三年的增长</div>\n<div class="sh">1.1 行业供给情况</div>\n<p>中国电动汽车充电桩建设规模呈增长趋势。根据中国电动汽车充电基础设施促进联盟发布数据，2015-2023年，我国电动汽车充电桩建设规模不断扩大。</p>\n<p>• 截止 2023 年 12 月，全国充电基础设施累计数量为 <strong>859.6 万台</strong>，同比增加 65%。</p>\n<p>• 2023 年充电桩增量为 338.6 万台，同比上升 30.6%。</p>\n<p>• 随车配建私人充电桩增量占比超过七成，同比上升 26.6%</p>\n<p>• 公共充电桩增量占比不足三成，同比上升 42.7%</p>\n<p>从公共充电桩建设规模来看，自 2015 年以后，我国电动汽车公共充电桩数量保持稳定高速增长趋势。截至 2023 年 12 月，联盟内成员单位总计上报公共充电桩 <strong>272.6 万台</strong>，2023 年 1 月到 12 月，月均新增公共充电桩约 7.7 万台。</p>\n<div class="sh">1.2 行业需求情况</div>\n<p>电动汽车充电桩需求缺口不断扩大。</p>\n<p>2015 年印发的《电动汽车充电基础设施发展指南》建设目标：到 2020 年建成 480 万个充电桩，满足 500 万辆新能源汽车充电需求（公共充电桩 50 万个，私人充电桩 430 万个），车桩比基本达到 <strong>1:1</strong>。</p>\n<p>然而目前充电网络建设远落后于规划。截至 2023 年底我国新能源汽车保有量 2041 万辆，车桩比 <strong>2.4:1</strong>，与规划的 1:1 相比存在较大差距。未来电动汽车充电行业成长空间巨大。</p>\n<div class="sh">1.3 供给与需求不匹配</div>\n<p>现有慢充为主的充电桩供给情况与用户需求未能完全匹配：</p>\n<p>功率区间 | 用户选择占比 | 充电桩建设占比</p>\n<p>≥120kW | 74% | 56%</p>\n<p><30kW | 2% | 24%</p>\n<div class="sh">2. 机型角度的占比</div>\n<p>全国公用直流桩充电功率分布（铭牌统计）：</p>\n<p>功率区间 | 占比</p>\n<p>150kW > P ≥ 100kW（主要为120kW） | 52%</p>\n<p>100kW > P ≥ 50kW | 18%</p>\n<p>200kW > P ≥ 150kW | 18%</p>\n<p>250kW > P ≥ 200kW | 3%</p>\n<p>50kW > P | 2%</p>\n<p>P ≥ 250kW | 7%</p>\n<blockquote>整体看，P ≥ 100kW 区间的公用直流桩占比超 80%。</blockquote>\n<strong>历年发展趋势（2015-2023）：</strong>\n<p>• <strong>2015年</strong>：100kW > P 区间占比达 86%，仅有少量 150kW > P ≥ 100kW 区间</p>\n<p>• <strong>2016-2017年</strong>：以 100kW > P ≥ 50kW 为主但占比降至 62%，150kW > P ≥ 100kW 区间占比提升，P ≥ 150kW 开始逐渐推出</p>\n<p>• <strong>2018-2019年</strong>：100kW > P ≥ 50kW 快速萎缩至 14%，150kW > P ≥ 100kW 提升至 66%，200kW > P ≥ 150kW 占比 14%-17%</p>\n<p>• <strong>2020-2023年</strong>：150kW > P ≥ 100kW、100kW > P ≥ 50kW 持续下降，200kW > P ≥ 150kW 稳定在 20% 上下，P ≥ 250kW 持续上涨</p>\n<strong>小结：</strong> 充电桩数量快速增长，车桩比呈下降趋势，但现有公共充电桩供应以慢充为主。截至 2023 年，充电桩保有量达 859.6 万个，车桩比约为 2.37:1。公共充电桩合计达 272.6 万台，其中直流充电桩 120.3 万台，占比约 44%。\n<div class="sh">3. 竞争格局：市占比</div>\n<div class="sh">3.1 企业竞争：头部效应明显，市场集中度较高</div>\n<p>• <strong>设备制造领域</strong>：国电南瑞、许继电气、动力源等，聚焦于充电桩及相关产品的生产制造</p>\n<p>• <strong>运营服务领域</strong>：星星充电、特来电与国家电网等，聚焦于充电桩的运营维护以及充电网络的建设</p>\n<p>截止 2023 年 11 月，运营公共充电桩数量超过 10 万台的共有 13 家，其中 <strong>特来电、星星充电、云快充、国家电网、小桔充电、蔚景云、达克云</strong> 7 家运营商的市场份额占比超过七成。</p>\n<p>运营商 | 市场份额</p>\n<p>特来电 | 19.19%</p>\n<p>星星充电 | 16.54%</p>\n<p>云快充 | 16.43%</p>\n<blockquote>截止至 2023 年底，全国公共充电桩运营商 Top5 占比 65%，Top10 占比 84%。</blockquote>\n<div class="sh">3.2 特来电</div>\n<strong>主要产品：</strong>\n<p>特来电电动汽车充电网业务主要包括充电设备的研发、生产、销售以及电动汽车充电网的建设与运营。针对公交、公共、物流、园区、小区等不同场景，创新研发了多种类型的充电产品：</p>\n<p>• <strong>智能群充电产品</strong>：由群充箱、充电模块、功率分配模块以及各类型充电终端组合而成。采用"变、配、光、储、充、放、检"的集成设计和"云、边、端协同"的系统架构，实现群管群控、功率共享、智能运维、主动安全防护等功能。</p>\n<p>• <strong>新能源微电网系统产品</strong>：包括新能源微电网箱变、新能源光储充一体化车棚、梯次储能系统等，采用模块化设计和标准化接口，实现能源监控、经济优化、调度响应等多种功能。</p>\n<strong>经营模式：</strong>\n<p>• 为客户提供各种类型的充电产品，根据客户需求提供充电场站规划、设计、安装等一体化解决方案</p>\n<p>• 依托自主研发的充电云平台以及接入的充电场站，向各类用户提供充电网运营服务（车辆充电服务、SaaS 平台服务及其他增值服务）</p>\n<strong>净利润及市场份额：</strong>\n<p>• 2023 年电动汽车充电网业务营业收入 <strong>60.41 亿元</strong>，同比增长 32.21%</p>\n<p>• 毛利润 13.30 亿元，同比增长 52.57%</p>\n<p>• 归母净利润 1.21 亿元，实现扭亏为盈</p>\n<p>• 截至 2023 年底，运营公共充电终端 <strong>52.3 万台</strong>（直流 31.3 万台），市场份额约 26%，排名全国第一</p>\n<p>• 全年充电量达 <strong>93 亿度</strong>，同比增长 59%，市场份额约 26%，排名全国第一</p>\n<strong>V2G 与虚拟电厂：</strong>\n<p>• 在全国 100 多个城市布局近 500 个新能源微电网项目</p>\n<p>• 与 24 个网、省、地级电力调控中心实现在线信息交互</p>\n<p>• 具备虚拟电厂条件的可调度资源容量超 400 万 kW</p>\n<p>• 全国范围内成立独资/合资公司超 260 家（其中合资方为国有企业的超过 150 家）</p>\n<p>• 已与 70 多家车企达成共建品牌站、充电网数据支持等合作</p>\n<strong>盈利情况：</strong>\n<p>年份 | 综合毛利率 | 归母净利率 | 备注</p>\n<p>2020 | 22.52% | — | —</p>\n<p>2021 | 21.49% | — | —</p>\n<p>2022 | 22.13% | 2.34% | 原材料降价回升</p>\n<p>2023 Q1 | 19.08% | 1.03% | 充电运营业务营收占比大幅提升</p>\n<p>---</p>\n<div class="sh">二、未来三到五年的预测</div>\n<div class="sh">1. 规模预测</div>\n<p>全球电动化加速、补能需求提升及充电桩利好政策的持续助力下，国内快充渗透率有望提升，海外充电桩需求紧迫，行业有望进入加速建设期。</p>\n<blockquote>预计 2026 年我国公共充电桩新增规模可达 <strong>389 万台</strong>，对应 2023-26 年 CAGR 为 57%，其中公共直流充电桩新增规模可达 <strong>272 万台</strong>，对应 2023-26 年 CAGR 为 76%。（国联证券）</blockquote>\n<p>以远景零碳超充今年出货量 50 套为例，按照公共直流桩 CAGR 推演，预计 4 年后年出货量可达 <strong>500 套</strong>。</p>\n<div class="sh">2. 格局预测</div>\n<div class="sh">2.1 充电难、充电慢仍是核心痛点</div>\n<p>• 目前新能源车桩比 2.38:1，与工信部要求的 2025 年 2:1、2030 年 1:1 目标仍有差距</p>\n<p>• 32 城平均桩数 & 时间利用率分别仅为 51.32% 和 11.07%，"一桩难求"与"僵尸桩"并存</p>\n<p>• 目前 150KW+ 公共桩仅 5%，快充桩建设亟待提高，直流快充桩功率需向更大功率演进</p>\n<div class="sh">2.2 供给格局将随需求变化</div>\n<p>截至 2023 年，充电桩保有量达 859.6 万个，车桩比约为 2.37:1。公共充电桩合计达 272.6 万台，其中直流充电桩 120.3 万台，占比约 44%。现有以慢充为主的格局会根据用户需求而变化。</p>\n<div class="sh">2.3 智能化充电桩将成为主流</div>\n<p>技术创新是推动行业发展的关键驱动力。未来充电桩充电速度更快、效率更高，兼容性和安全性大幅提升。智能化充电桩能够实现远程监控、智能调度和故障自诊断等功能。</p>\n<div class="sh">3. 技术发展方向预测</div>\n<div class="sh">3.1 高压快充是必然趋势</div>\n<p>• 2015 年前：350V/125A 以下，充电效率约 1C</p>\n<p>• 之后提升到 450V/250A，实现 2C</p>\n<p>• 近年部分车企已将电流提升到 500A，实现 3-4C 快充</p>\n<p>• 广汽、小鹏等主流车企均已推出 800V+ 高压车型，预计 <strong>2026 年 800V 以上高压车型销量将过半</strong></p>\n<p>• 为实现 5min 充电，充电桩尝试向 480KW 布局</p>\n<p>• 近半用户愿为超充支付 5%-10% 溢价</p>\n<div class="sh">3.2 智能柔性充电堆渗透率有望提升</div>\n<p>高压快充下对充电模块的功率调度智能化要求不断提高。充电堆将充电站全部充电模块集中一起，通过功率切换单元按实际需要功率对充电模块进行动态分配，具有提高充电效率、稳定用电网络、优化布局等优势。</p>\n<div class="sh">3.3 液冷成为大功率散热的有效途径</div>\n<p>液冷充电桩相较于传统风冷充电桩的优势：</p>\n<p>对比项 | 液冷 | 风冷</p>\n<p>散热性能 | 更好 | 一般</p>\n<p>充电效率 | 更高 | 一般</p>\n<p>枪线重量 | 更轻 | 较重</p>\n<p>防护等级 | 更高 | 一般</p>\n<p>噪音 | 低 | 较高</p>\n<p>全生命周期成本 | 更低 | 较高</p>\n<p>目前多家公司已积极布局液冷模块及液冷枪线并实现批量销售。</p>\n<div class="sh">3.4 SiC 成为高功率充电桩的必需</div>\n<p>碳化硅（SiC）相比传统硅材料的优势：宽禁带特性、耐压能力强、降低导通电阻、提高功率密度、低能量损耗、抗辐射能力强、高热导率强化散热。</p>\n<blockquote>2021 年 SiC 在中国充电桩市场渗透率仅 17%，预计到 2025 年渗透率可达 <strong>35%</strong>。</blockquote>\n<div class="sh">3.5 增配储能缓解电网压力</div>\n<p>充电负荷和配电网原始负荷早晚叠加形成负荷双高峰，大功率充电桩造成的负荷峰值进一步增加。储能技术给平抑电动汽车充电站负荷、优化配变容量提供了新的技术手段，且成本较为低廉。随着原材料成本下降带来锂电价格下调，增配储能成本降低或促进配储加快落地。</p>\n<div class="sh">3.6 "光储充"一体化是充电站未来主要形式</div>\n<p>"光储充"一体化电站的优势：</p>\n<p>• 打破充电桩收入来源单一的局限性</p>\n<p>• 通过峰谷套利降低企业运营成本</p>\n<p>• 利用光伏发电自发自用，降低运营商用电成本</p>\n<p>• 投资回报周期有望缩小</p>\n<strong>行业实践：</strong>\n<p>• <strong>特来电</strong>：2023 年上半年在全国 40 多个城市拓展约 100 个新能源微电网项目</p>\n<p>• <strong>星星充电</strong>：截至 2023 年 8 月，在全国 30 多个城市上线光储充一体化场站</p>',
7: '<div class="sh">充电运营方案</div>\n<div class="sh">积分中心</div>\n<div class="sh">积分获取</div>\n<p>• <strong>充电/购卡消费</strong>：实付款 1 元获得 1 积分，包括充电订单及购买包月。小数点按照实付款四舍五入成整数计算。</p>\n<p>• <strong>充电订单奖励</strong>：若前 15 分钟还枪，则获得 2 倍积分（2倍积分 = 1倍积分 × 2）。</p>\n<p>• <strong>每日登录</strong>：登录 App 获得 1 积分，每天仅可获得一次。</p>\n<p>• ❓ 直接获取还是点击领取？</p>\n<div class="sh">积分消耗</div>\n<p>• 抵扣占位费</p>\n<p>• 兑换优惠券</p>\n<p>• 抽奖</p>\n<p>• 限量活动报名</p>\n<div class="sh">积分明细</div>\n<p>• <strong>积分获取明细</strong>：（待补充）</p>\n<p>• <strong>积分消耗明细</strong>：（待补充）</p>\n<p>• <strong>积分兑换记录</strong>：（待补充）</p>\n<div class="sh">积分有效期</div>\n<p>• ❓ 积分到期失效？</p>\n<p>---</p>\n<div class="sh">充电费用</div>\n<div class="sh">电费</div>\n<p>• 按场站定价，价格唯一。</p>\n<p>• ❓ 是否有优惠价格？</p>\n<div class="sh">占位费</div>\n<p>• 按照阶梯收费，设置封顶：</p>\n<p>时段 | 费用</p>\n<p>前 30 min | 不收费</p>\n<p>30 min - 60 min | 6 元/min</p>\n<p>超出 60 min | 8 元/min</p>\n<p>上限 | 1000 元</p>\n<p>• 每 30 min 短信推送提示一次。</p>\n<p>• 可以使用积分抵扣，1 积分抵扣 0.1 元，上限 1000 元。</p>\n<p>• <strong>用户首次产生占位费免除。</strong></p>\n<div class="sh">未还枪罚款</div>\n<p>• 在订单结算后，在原有可获得的积分基础上 -20，直到减为 0。</p>\n<p>---</p>\n<div class="sh">包月</div>\n<div class="sh">名称</div>\n<p>• ❓ 充电月卡/季卡/年卡 or VIP 会员？</p>\n<p>• ❓ 购买单一权益/组合权益？</p>\n<div class="sh">价格</div>\n<p>• 包月费用原价：<strong>1700 元/月</strong></p>\n<p>• ❓ 是否有连续包月，包1月、包3月、包年等不同档次？</p>\n<p>• ❓ 是否有优惠价格？</p>\n<p>• ❓ 是否可用优惠券？</p>\n<div class="sh">权益</div>\n<p>• 不限制充电量，可抵扣充电费用</p>\n<p>• 赠送 200 积分</p>\n<p>• ❓ 其他权益？</p>\n<p>• ❓ 是否包含占位费和罚款？</p>\n<p>• ❓ 是否限制充电次数？</p>\n<p>• ❓ 是否限制充电车辆？家庭拥有多辆车？</p>\n<div class="sh">价格说明</div>\n<p>项目 | 待确认内容</p>\n<p>适用范围 | 运营范围？是否支持摩奇？</p>\n<p>计费规则 | 计费发生的时间，订单开始时间 or 订单结束时间？</p>\n<p>优惠叠加 | 是否能与优惠券叠加？优惠的优先级？</p>\n<p>退款 | 是否支持退卡？</p>\n<p>平台抽成 | ？</p>\n<p>---</p>\n<div class="sh">优惠券</div>\n<div class="sh">兑换券</div>\n<p>• 充电费用</p>\n<p>• 购卡费用</p>\n<p>---</p>\n<div class="sh">文案准备</div>\n<p>位置 | 内容</p>\n<p>首页 | 价格说明：充电费 / 占位费 / 罚款</p>\n<p>积分规则 | 积分用途 / 积分获得方式 / 积分失效</p>\n<p>月卡规则 | （待补充）</p>',
8: '<div class="sh">刘擎《西方现代思想讲义》</div>\n<div class="sh">第一章 现代思想的成年</div>\n<div class="sh">1. 韦伯：现代性的四个重要论断</div>\n<div class="sh">世界的祛魅</div>\n<p>从古代到现代有一个重大的观念转变。过去人们相信万物有灵，相信冥冥之中有一些难以言说的神秘事物构成了宇宙的整体秩序。现代的科学理性驱散了这种神秘气氛：人们认识到世界是物质的，我们可以用科学理性去认识世界。</p>\n<p>随着现代的来临，古代世界那种迷雾一般的魅惑，在现代的"清晨"被理性化的光芒驱散了。世界被充分理性化，也就被人看透而不再神秘了。现代人在回望古代世界的时候，会有一种"大梦初醒"的感觉，这就是所谓"世界的祛魅"。</p>\n<div class="sh">诸神之争</div>\n<p>诸神之争的本质是现代社会中价值观念之间的冲突。</p>\n<p>• 科学属于"实然"领域，旨在发现世界的真相"是"什么，只能做出事实判断</p>\n<p>• 支撑人类生活意义的重要观念（宗教信仰、人生理想、道德规范、审美趣味等）属于"应然"领域的价值判断</p>\n<p>• 科学无法解决价值判断问题</p>\n<p>结果是价值观念之间冲突不断。现代人虽然拥有很大的自由，但这种自由也可能成为沉重的负担——我们可能变得茫然失措，或者采取"决断论"的方式，听凭自己的意志随心所欲地断然抉择。这是现代性困境的重要标志。</p>\n<div class="sh">工具理性的扩张</div>\n<p>• <strong>价值理性</strong>：通过理性思考来确定目标</p>\n<p>• <strong>工具理性</strong>：通过理性计算，找到达成目标的最优手段</p>\n<p>工具理性问题有客观标准，容易达成一致；价值理性问题标准不一，很难找到确定的答案。工具理性的扩张，使得官僚制这种强大的组织形式蔓延到了社会的各个领域。</p>\n<div class="sh">现代的铁笼</div>\n<p>铁笼有两个最大的弊端：</p>\n<p>• <strong>造就片面的社会文化</strong>：用功利得失解决道德问题，把道德问题变成了利益计算。按照这个逻辑，只要能找到办法规避惩罚、提高收益，人还是会选择违背道德。用利益计算解决道德问题，永远是治标不治本。</p>\n<p>• <strong>造就片面的社会关系</strong>：人与人、人与组织之间，逐渐变成了一种商业的"供求关系"。</p>\n<blockquote>铁笼一方面囚禁了人的灵性，但另一方面也保护了我们。没有这个铁笼，就没有现代优越的物质条件，以及建立在物质基础上的文明。它让整个社会高效地运转，在大范围内解决了困扰人类数千年的问题：贫困、匮乏、奴役、疾病。</blockquote>\n<p>---</p>\n<div class="sh">第二章 现代人的精神危机</div>\n<p>我们会不断追问生命的意义，这种追问会遇到死亡和贪欲这两大难题。在西方传统社会，人们主要依靠信奉宗教来应对。但经过启蒙理性主义的洗礼，接受宗教信仰不再是理所当然的默认选项。信仰与理性之间存在着鸿沟，确立信仰在现代世界变得非常困难。</p>\n<div class="sh">尼采</div>\n<div class="sh">上帝死了</div>\n<p>尼采对耶稣本身并没有敌意。他认为耶稣不是要直接"救赎人类"，而是告诉人们"应该怎么生活"。耶稣的门徒却搞出一套复杂高深的教义理论，这根本不是耶稣的原意。人们用虚假的教义去理解救世主的启示，最终让这个信仰变得不可信。在这个意义上，<strong>是人杀死了上帝</strong>。</p>\n<div class="sh">超人学说</div>\n<p>尼采认为生命本身是强健有力的。面对无意义的世界和无意义的生命，人应该立足于现实，直面无意义的荒谬，以强大的生命本能舞蹈，在生命活动中创造出价值。用尼采的话说，就是<strong>"成为你自己"</strong>。</p>\n<div class="sh">后真相与视角主义</div>\n<p>视角主义认为事实有没有所谓的"客观性"，取决于人们对这件事有没有"共同视角"。"客观"只是一种错觉，但这种错觉很重要。</p>\n<blockquote>一个人的视角并不是天生固定的，而是在自身经历中形成的。我们应该试着去改变自己的视角，超越自己的视角去理解他人，寻找让不同视角互相理解、融合出共同视角的可能性。理论勾勒了某种灰暗的前景，不意味着我们只能心灰意冷；它恰恰给了我们改变这个前景的机会。</blockquote>\n<div class="sh">弗洛伊德</div>\n<p>精神分析学说的科学光环在 20 世纪 70 年代之后基本消失了，但作为一种哲学或文化理论，至今仍然具有深远而广泛的影响力。弗洛伊德的思想改变了大众对人的观念，最重要的后果就是：<strong>欲望被解放了</strong>。</p>\n<div class="sh">萨特</div>\n<div class="sh">存在就是虚无</div>\n<p>存在的真相是什么？萨特说，存在就是虚无，<strong>存在先于本质</strong>。如果"本质"决定了命运，那么先于本质而存在的人就不被任何命运所限定——人在根本上是自由的。</p>\n<div class="sh">自由是一种沉重的负担</div>\n<p>选择必定会带来后果，而没有任何别人可以承担这份责任，你做出了选择，你就要独自承担责任。</p>\n<div class="sh">他人即地狱</div>\n<p>人总是要维护自己的主体性，所以人与人之间一定会为了争夺主体性而斗争。每个人在和他人相处的时候，都想把他人变成客体，以此来维护自己的主体性和自由。</p>\n<blockquote>存在主义是绝望的哲学，也是希望的哲学，但最重要的是，它是<strong>行动的哲学</strong>！如果说萨特的思想给了我们什么启示，就是八个字：<strong>看清真相，继续战斗</strong>。人是徒劳的激情，人注定孤独，但那又如何？我们都是手推巨石的西西弗斯，但我们知道"西西弗斯是幸福的"，因为"登上顶峰的斗争足以充实人的心灵"。</blockquote>\n<p>---</p>\n<div class="sh">第三章 20世纪的教训（现代世界的社会政治困境）</div>\n<p>资源匮乏与人性自利这两个假设，意味着公共秩序无法自然形成，需要某种具有强制性的政治权威建立和维护。</p>\n<p>韦伯对政府/国家的定义：<strong>在特定的领土之内对暴力的合法垄断</strong>。</p>\n<p>社会契约论对现代的政治合法性做出了重要的理性论证，将政治秩序视为理性建构的人造之物。</p>\n<p>20 世纪上半叶，西方出现了三种相互竞争的主要政体形式：苏联的社会主义、西欧与北美的资本主义民主、德国的纳粹主义。它们都具有突出的现代理性主义特征，但在实践中都出现了各自的困境与危机。</p>\n<div class="sh">鲍曼：现代性与大屠杀</div>\n<p>大屠杀是现代性本身固有的一种潜在可能，只有在现代文明中才可能实现。</p>\n<p>• <strong>官僚制的作用</strong>：机器般理性的现代官僚制，实现了大屠杀这个非理性的暴行</p>\n<p>• <strong>园艺文化</strong>：现代科学主义对大屠杀提供了理念支持——社会秩序就是一项工程，可以在科学理性的指导下整理得干干净净，犹太人变成了秩序里的"杂质"</p>\n<p>• <strong>对受害者理性心理的利用</strong>：纳粹在给受害者提供选项的时候，调整其中的收益，引导受害者"合作"。恰恰是得失计算的求生希望被纳粹所利用</p>\n<div class="sh">阿伦特：平庸之恶</div>\n<p>阿伦特在艾希曼身上发现了一种"平庸性"——他并不残暴，也不是恶魔，但他有"一种超乎寻常的浅薄"，"不是愚蠢，而是匪夷所思地、非常真实地丧失了思考能力"。</p>\n<strong>"极端之恶"和"平庸之恶"是一体两面。</strong> 纳粹大屠杀是一种极端的恶，但这种极端的恶是经由一些"平庸"的罪犯犯下的。其实质是不去思考，是丧失了思考能力。\n<blockquote>独立判断怎么做？阿伦特说，"就各种特殊情况做出判断而言，没有什么恒常的通行标准，也不存在什么确定无疑的规则"。我们只能在具体的处境中，冒着风险，真诚地去做出自己独立的判断，并为此承担责任。</blockquote>\n<div class="sh">波普尔</div>\n<div class="sh">证伪主义</div>\n<p>科学理论的标志不是它能够被证明是对的，而是它可以被证明为错的。科学理论不是真理的代名词，只是一些尚未被证伪的假设。</p>\n<div class="sh">批判理性主义</div>\n<p>人类有理性，理性有局限。</p>\n<p>• 在科学领域：用"问题—猜想—反驳"的三要素机制解释科学知识成长的逻辑，拒绝科学至上论</p>\n<p>• 在社会政治领域：拒绝"乌托邦社会工程"——一种空间和时间上全方位的整体主义规划</p>\n<blockquote>波普尔在科学方面反对科学至上论，在社会政治方面反对历史决定论和乌托邦社会工程。这两个方面一脉相承，都在反对启蒙理性主义中的绝对真理观。他推动了启蒙理性主义的改造升级。</blockquote>\n<div class="sh">哈耶克</div>\n<div class="sh">自发秩序</div>\n<p>从乡间小路、语言和法律的例子中可以看到，无论是原生态的规则还是高度依赖人为设计的规则，都存在着自然生成演化的秩序。哈耶克不排斥人为因素，但反对把人为设计的意图过度拔高，上升到对社会秩序的整体性规划。</p>\n<blockquote>核心观点：<strong>"有意栽花花不发、无心插柳柳成荫"</strong></blockquote>\n<div class="sh">理性的自负</div>\n<p>纳粹德国和苏联的病根是同源的，都来源于"理性的自负"——在经济领域推行计划经济，在社会规划中依赖高度理性化的系统设计。</p>\n<blockquote>"通向地狱之路，是用善良的愿望铺成的。"</blockquote>\n<p>哈耶克和波普尔都提醒我们要警惕理性，不是因为理性不好，而恰恰是理性很好、很管用，所以才要特别警惕对它的夸大和滥用。</p>\n<div class="sh">伯林</div>\n<div class="sh">价值多元论</div>\n<p>伯林认为一元价值只是一种幻觉。多元价值之间的冲突不可能消除。他提出了<strong>"多元价值的不可公度性"</strong>：你找不到一把能够通用地衡量多种不同价值的尺子。</p>\n<p>• 你不能说自由是 0.5 份的平等，正义是 1.5 份的仁慈</p>\n<p>• 一种价值有它独立的内涵，不能被换算为其它价值</p>\n<p>• 某一种价值并不是其它价值的派生物</p>\n<p>伯林强调，价值虽然是多元的，但仍然是客观存在的；人类具有某种最低限度的"共通性"。</p>\n<div class="sh">积极自由与消极自由</div>\n<p>• <strong>消极自由</strong>（free from）：我不想要什么、就可以不要什么</p>\n<p>• <strong>积极自由</strong>（free to）：我想做什么、就可以做什么</p>\n<p>两者都是正当的终极价值，原则上没有高下之分。但伯林警告，积极自由的滥用更具有欺骗性，更需要提高警觉性。</p>\n<div class="sh">马尔库塞</div>\n<div class="sh">"舒适"的不自由</div>\n<p>发达工业社会是一种"新型的极权主义"，不是用恐怖手段来控制大众，而是用无尽的消费和享受来贿赂大众，让人们陷入<strong>"舒舒服服的不自由"</strong>之中。</p>\n<div class="sh">虚假的需求与单面人</div>\n<strong>虚假的需求</strong>不是源自自然的生活需要，而是被市场营销制造出来的。\n<p>马克思的"异化"概念：主体在自身的发展中，分裂出了一个反对自己的对立面。马克思发现了"劳动异化"——工人在劳动中不是肯定自己而是否定自己，只有在吃、喝、生殖等动物机能中才觉得自由活动。<strong>"动物的东西成了人的东西，而人的东西成为动物的东西。"</strong></p>\n<blockquote>一位白领女性，经常加班熬夜伤害了皮肤，所以需要购买护肤品。优质的护肤品很昂贵，所以她要追求升职加薪，这就要加更多的班、熬更多的夜……在这个循环中每一个环节的决定都感到是自由自愿的选择，但最终却陷入一种受到支配的奴役处境——这就是马尔库塞所说的<strong>"自由的奴役"</strong>。</blockquote>\n<div class="sh">工人阶级革命意识的丧失</div>\n<p>资本主义体制的控制力量如此强大，能够灵活地应对任何反抗和解放的挑战，极其有效地"收编"反抗力量，把异端改造成主流。</p>\n<blockquote>在这种新的控制模式中，违背或超越主流的另类观念只有两种命运：要么被排斥消灭掉；要么按照主流世界的原则被转化，转化为现存体制能接受的方式继续存活。</blockquote>\n<p>---</p>\n<div class="sh">第四章 自由主义及其批判者</div>\n<p>自由主义一直是西方现代思想的主流。在古代社会，自由本来是一种"特权"。法国大革命摧毁了等级制度，推动了新的普遍自由观念的广泛传播。</p>\n<p>进入现代社会，<strong>自由、平等、多元</strong>成为无法逆转的基本条件。要兼顾这三种诉求是一件复杂困难的事情，很难找到一个完美的方案。</p>\n<div class="sh">罗尔斯：无知之幕</div>\n<p>通过无知之幕的思想实验，推理论证了正义社会契约的两条原则：</p>\n<strong>第一条：平等的自由原则</strong>\n<p>每个人都平等地享有一系列基本的自由，包括言论自由、信仰自由以及拥有个人财产的自由等。</p>\n<strong>第二条：社会经济的不平等分配必须满足两个限定条件</strong>\n<p>• <strong>公平的机会平等</strong>：从最早的比赛开始就设置尽可能平等的起跑线，从幼儿园到大学保障成长背景的公平</p>\n<p>• <strong>差异原则</strong>：不平等能够让处境最糟糕的人改善状况</p>\n<blockquote>罗尔斯的正义理论中，有一个符合道德直觉的思想：应当尽可能排除那些偶然的和天生的运气因素对命运的影响。</blockquote>\n<div class="sh">诺齐克：自由至上论</div>\n<p>三项正义原则：</p>\n<p>• <strong>获取正义</strong>：财产在最初获取时必须是正当的（劳动占有无主之地、接受自愿馈赠等）</p>\n<p>• <strong>转让正义</strong>：财产转移过程是自由自愿的交换或馈赠</p>\n<p>• <strong>矫正正义</strong>：对不正当方式得来的财产持有必须予以矫正</p>\n<strong>最小国家理论</strong>：国家只要保障个体公民的基本自由和安全，以及确保合法契约的执行，就不应当再有其它功能。福利救济只能依靠慈善，因为征税是强制的而不是自愿的。\n<blockquote>在西方自由主义内部，罗尔斯和诺齐克形成了对立的两极。北欧国家更接近罗尔斯，美国更偏向诺齐克，但欧美国家都落在这条光谱上。</blockquote>\n<div class="sh">德沃金：平等的尊重，平等的关怀</div>\n<p>自由主义的<strong>"国家中立性原则"</strong>：对于各种不同的生活理想和方式，只要本人自愿而且不伤害他人，国家就不能干涉，也不应当偏袒。</p>\n<p>"平等关怀"不是简单地给所有人"平等的待遇"（equal treatment），而是要把每个人<strong>"当作平等的人来对待"</strong>（treating as equals），要考虑处境不同造成的不同需求。</p>\n<div class="sh">沃尔泽：原子化的个人</div>\n<p>社群主义对自由主义的两点批判：</p>\n<p>• 自由主义的理论是虚假的，现实中不存在无所牵绊的原子化个人</p>\n<p>• 自由主义的实践是有害的，造成了自我中心、相互分裂的冷漠社会</p>\n<p>沃尔泽认为，"孤立的自我"确实存在，但恰恰是被现代社会所塑造的结果。现代社会的高度<strong>"流动性"</strong>体现在四个方面：地理上的流动、社会身份的流动、婚姻关系的流动、政治上的流动。</p>\n<div class="sh">泰勒：本真性</div>\n<p>我们的"自我"来自我们和他人的对话，以及对话中的反思。自我无法凭空创造发明自己的价值和意义标准，我们只能"选用"和"改造"价值尺度。</p>\n<blockquote>本真性的理想，一方面让我们忠实于自己的内心感受，一方面要求我们不要陷入唯我论的独白，积极地介入对话和反思。向对话和反思开放，让自我变得更加清醒、更加丰富，才能更好地<strong>"成为你自己"</strong>。</blockquote>\n<div class="sh">哈贝马斯：交往理性</div>\n<p>好好说话这件事本身有很深的道理。哈贝马斯从中发现了一种存在于人与人之间交往中的理性——<strong>交往理性</strong>。</p>\n<p>交往理性的运用条件：</p>\n<p>• <strong>言谈的有效性</strong>四个条件：可理解、真实、正当、真诚</p>\n<p>• <strong>理想言谈情景</strong>：保证所有参与者能够平等地、自由地展开理性的讨论</p>\n<p>---</p>\n<div class="sh">尾声 后冷战时代的争论</div>\n<p>当今世界两种相互抵触的大趋势：<strong>全球化</strong>与<strong>逆全球化（部落化）</strong>。</p>\n<div class="sh">福山：历史终结论</div>\n<p>福山采用"普遍历史观"，主张历史发展有自己的方向，终点是自由主义民主。历史发展的根本动力是<strong>"为承认而斗争"</strong>。</p>\n<p>三阶段推论：追求现代化 → 发展科学技术 → 采用市场经济 → 导致自由民主制</p>\n<div class="sh">亨廷顿：文明冲突论</div>\n<p>世界划分为七个主要"文明圈"：西方、拉丁美洲、东正教、印度、中华、日本、伊斯兰（非洲可能成为第八个）。</p>\n<p>亨廷顿认为文明的核心价值几乎不可改变，"文明之间的冲突"会成为世界冲突的主要形态。要重建世界秩序，最好的办法是让每个文明圈内部的核心国家来主导"圈内秩序"，然后在文明圈之间展开平等对话协商。</p>\n<blockquote>福山相信<strong>"人同此心，心同此理"</strong>，而亨廷顿认为<strong>"非我族类，其心必异"</strong>。</blockquote>\n<div class="sh">结语</div>\n<p>当今重要的冲突不是发生在国家之间，而是来自国家内部——"精神内战"。</p>\n<p>• <strong>经济层面</strong>：国家间贫富差距缩小了，但大部分国家内部阶层不平等加剧了</p>\n<p>• <strong>文化层面</strong>：全球化带来的人口、资本、信息跨国界流动，冲击了各国本土的传统价值和文化认同</p>\n<blockquote>让我们走到一起的原因有时并不是彼此喜欢，而是我们面临共同的威胁和挑战：气候危机、极端主义、新技术挑战、全球疫情、贫富差距扩大。即使在负面的意义上，人类也分享着共同的命运。面对无法独自应对的共同问题，各个国家需要在竞争中保持对话与合作。</blockquote>',
9: '<div class="sh">功能医学概论笔记</div>\n<div class="sh">P64 槲皮素</div>\n<p>植源性黄酮类化合物，槲皮素是许多其他类黄酮苷的苷元。</p>\n<strong>作用：</strong>\n<p>• <strong>肥大细胞稳定剂</strong>，抑制组胺等炎性介质释放。具有很好的抗炎、祛痰、止咳作用，并有一定的平喘作用。</p>\n<p>• 降低血压、增强毛细血管抵抗力、减少毛细血管脆性、降血脂、扩张冠状动脉、增加冠脉血流量。</p>\n<p>---</p>\n<div class="sh">P88 调节免疫的天然植物化合物</div>\n<p>水杨苷、槲皮素、乳香属、姜黄素、甘草根、葡萄籽提取物</p>\n<p>---</p>\n<div class="sh">维生素C 形式优劣排序</div>\n<pre><code>天然植物提取 > 合成维生素C复配生物类黄酮 > 抗坏血酸盐（钠盐、钙盐） > 抗坏血酸\n</code></pre>\n<div class="sh">天然植物提取来源</div>\n<p>卡姆果、针叶樱桃、玫瑰果、醋栗、柑橘类水果</p>\n<div class="sh">生物类黄酮来源</div>\n<p>柑橘类水果</p>\n<div class="sh">注意事项</div>\n<p>• 制造工艺有缓释、脂质体等，可以延长释放时间，增加利用率</p>\n<p>• 服用抗坏血酸盐同时需要考虑其中金属元素（钠、钙）的摄入量</p>\n<p>• 几种专利：<strong>PureWay-C</strong>、<strong>Ester-C</strong>、<strong>Quali-C</strong></p>\n<div class="sh">新手建议</div>\n<blockquote>剂量不要一下太大，从 100mg-200mg 开始看自己耐受度往上加，一下大剂量容易引起肠胃不适。</blockquote>',
10: '<div class="sh">十字花科硫代葡萄糖苷</div>\n<div class="sh">硫代葡萄糖苷概述</div>\n<p>硫代葡萄糖苷（Glucosinolate, GSL，简称硫苷，也称芥子油苷）是植物中一种重要的次生代谢物质，在十字花科植物中广泛存在。</p>\n<p>GLS 由 β-d-硫代葡萄糖基团、磺化肟部分和源自氨基酸的侧链组成。</p>\n<div class="sh">三大分类</div>\n<p>类别 | 代表物质 | 特点</p>\n<p><strong>脂肪族硫苷</strong> | 葡糖萝卜硫苷（glucoraphanin） | 十字花科中最丰富，与控制土壤植物害虫直接相关</p>\n<p><strong>吲哚族硫苷</strong> | 葡糖芥子苷（glucobrassicin） | 可能具有驱虫功能</p>\n<p><strong>芳香族硫苷</strong> | — | 在十字花科作物中极少</p>\n<div class="sh">硫苷的作用</div>\n<p>• 赋予食物特殊的风味</p>\n<p>• 具有防腐和抗菌作用</p>\n<p>• 降低某些癌症发生的危险</p>\n<p>• 摄入过多 2-羟基-3-丁烯基硫苷会导致动物甲状腺肿大</p>\n<blockquote>根据对人类是否有益来分：<strong>有益硫苷</strong>（如具有抗癌作用的萝卜硫苷）和<strong>有害硫苷</strong>（如导致甲状腺肿大的 2-羟基-3-丁烯基硫苷）。</blockquote>\n<blockquote>硫苷的分解产物具有抗癌作用。例如萝卜硫苷在黑芥子酶的作用下分解成萝卜硫素后才具有抗癌作用。植物体内同时具有硫苷和黑芥子酶，但在组织未受到破坏之前，两者分布在不同细胞器中，只有当组织遭到破坏后，黑芥子酶才会与硫苷相遇，使硫苷分解。</blockquote>\n<p>---</p>\n<div class="sh">黑芥子酶</div>\n<p>黑芥子酶（myrosinase，EC3.2.1），又称 β-硫代葡萄糖苷酶，是一种普遍存在于十字花科植物中可将硫代葡萄糖苷高效降解的酶类。</p>\n<p>• 性质稳定，在十字花科植物的根、茎、叶、幼苗及种子中普遍存在</p>\n<p>• 分布在特定的黑芥子酶细胞中</p>\n<p>• <strong>种子及幼苗时期黑芥子酶的活性最高</strong></p>\n<p>• 高温条件易变性失活</p>\n<p>• <strong>低浓度的维生素C有激活黑芥子酶的功能</strong></p>\n<p>---</p>\n<div class="sh">硫代葡萄糖苷-黑芥子酶系统</div>\n<p>在植物细胞内，硫代葡萄糖苷和黑芥子酶是彼此分离的：</p>\n<p>• 硫代葡萄糖苷存在于<strong>液泡</strong>中</p>\n<p>• 黑芥子酶以蛋白颗粒的形式存在于<strong>黑芥子酶细胞</strong>中</p>\n<p>当植物组织受到损伤或病虫侵害时，黑芥子酶被释放出来，与硫代葡萄糖苷直接接触，使其降解为异硫氰酸酯、硫氰酸根离子、腈类、恶唑烷硫酮等有生物活性的物质。</p>\n<blockquote>硫代葡萄糖苷-黑芥子酶系统被认为是十字花科植物重要的<strong>防御系统</strong>，能调节十字花科植物与环境之间的相互作用。</blockquote>\n<p>---</p>\n<div class="sh">关键水解路径</div>\n<div class="sh">路径一：葡糖芥子苷 → I3C → DIM</div>\n<pre><code>葡糖芥子苷（glucobrassicin）\n<p>↓ 黑芥子酶（切碎/咀嚼时水解）</p>\n<p>I3C（吲哚-3-甲醇）</p>\n<p>↓ 胃酸缩合反应</p>\n<p>DIM（二吲哚甲烷）</p>\n</code></pre>\n<div class="sh">路径二：葡糖萝卜硫苷 → 萝卜硫素</div>\n<pre><code>葡糖萝卜硫苷（glucoraphanin）\n<p>↓ 黑芥子酶（切碎/咀嚼时水解）</p>\n<p>萝卜硫素（Sulforaphane）</p>\n</code></pre>\n<div class="sh">肠道菌群的辅助水解</div>\n<p>证据表明，GSL 可以被哺乳动物肠道菌群产生的黑芥子酶样酶水解。但这些类黑芥子酶的活性通常比黑芥子酶低得多，导致 GSL 无法很好地转化为活性 ITC。不同菌株产生的类黑芥子酶在结构、功能和活性上可能存在很大差异。</p>\n<p>---</p>\n<div class="sh">西兰花硫苷含量</div>\n<p>所有品系中均发现的 GSL：萝卜硫苷（glucoraphanin）、葡糖芥子苷（glucobrassicin）、黑芥子硫苷（gluconapin）、环氧丙基硫苷（epiprogoitrin）和芥子酸葡萄糖苷（glucoerucin）。</p>\n<p>GSL | 占总 GSL 比例</p>\n<p><strong>葡糖芥子苷</strong>（glucobrassicin） | 约 <strong>50%</strong>（最主要）</p>\n<p><strong>萝卜硫苷</strong>（glucoraphanin） | 约 <strong>23%</strong>（第二高）</p>\n<p>在西兰花中，萝卜硫苷（GLR）占 GLS 总含量的 20%-80%（因品系而异），是最丰富的脂肪族 GLS。其他 GLS 包括：</p>\n<p>• 葡萄糖芥子苷（10%-40%）</p>\n<p>• 1-甲氧基葡萄糖芥子菜素（5%-30%）</p>\n<p>• 4-甲氧基葡萄糖芥子菜素（1%-5%）</p>\n<p>---</p>\n<div class="sh">参考文献</div>\n<p>• 硫苷及其生物合成分子生物学机理研究进展</p>\n<p>• 十字花科植物中黑芥子酶的研究进展</p>\n<p>• 十字花科植物中硫代葡萄糖苷类物质的结构与功能研究进展</p>\n<p>• 加工和烹调对十字花科蔬菜中萝卜硫苷和萝卜硫素的影响</p>\n<p>• 西兰花的硫代葡萄糖苷和水解产物的组成和含量的选择</p>',
11: '<div class="sh">政治经济学概论（徐禾）</div>\n<div class="sh">第一章 商品和货币</div>\n<div class="sh">通货膨胀（P24）</div>\n<p>由于纸币发行过多而引起的纸币贬值，叫做<strong>通货膨胀</strong>。通货膨胀是剥削阶级国家用来掠夺劳动人民的一个重要手段。</p>\n<p>现代资本主义国家为了弥补财政赤字，常常不顾商品流通的实际需要而滥发纸币，结果造成通货膨胀，引起物价上涨。但与此同时，工人阶级的工资却往往不能相应地增加，因而使他们的实际生活水平下降，而资产阶级的剥削收入却会急剧地增长。</p>\n<p>资产阶级国家之所以利用滥发纸币的办法来弥补财政开支，是因为这种办法比其他办法（如增加税收等）富于隐蔽性。</p>\n<blockquote>列宁指出："滥发纸币是一种最坏的强制性借款，它使工人这一部分最贫困的居民境况尤其恶化。"</blockquote>\n<div class="sh">商品拜物教（P30）</div>\n<p>商品作为物品，是简单而又平常的，但物品作为商品，却是复杂而又神秘的。</p>\n<p>这种神秘观念并不是由商品的使用价值引起的，也不是由决定商品价值的劳动所引起的。商品之所以让人感到神秘，是由<strong>商品形态本身</strong>所引起的：</p>\n<p>• 人类劳动的同一的性质 → 表现为商品的<strong>价值</strong></p>\n<p>• 用时间计算的人类劳动力的支出 → 表现为商品的<strong>价值量</strong></p>\n<p>• 人们之间互相交换劳动的关系 → 表现为<strong>商品与商品互相交换的关系</strong></p>\n<p>---</p>\n<div class="sh">第二章 资本和剩余价值</div>\n<div class="sh">资本流通公式（P40）</div>\n<p>在 G—W—G 的流通中，资本家是<strong>为卖而买</strong>，起初垫付出去的是货币，最后从流通中取回的也是货币。目的是为了取得货币，即交换价值本身。</p>\n<p>资本家在购买（G—W）上垫付 100 元，而从出卖（W—G）上可以得到 110 元。经过一买一卖，货币额会增多，发生价值的增殖。</p>\n<p>修正后的资本流通公式：<strong>G—W—G\'</strong>，其中 G\' = G + ΔG（原来垫付的货币额 + 增殖额）。</p>\n<blockquote>马克思把这个增殖额叫做<strong>剩余价值</strong>，并指出<strong>资本就是能够带来剩余价值的价值</strong>。</blockquote>\n<div class="sh">劳动力商品的特点（P43）</div>\n<p>劳动力商品在使用价值上有一个很大的特点：它的使用价值是<strong>价值的源泉</strong>，它在消费过程中能够创造价值和剩余价值。</p>\n<p>劳动力商品的消费过程，也就是资本主义的生产过程。</p>\n<div class="sh">剩余价值生产的秘密（P46）</div>\n<p>只要资本家把雇佣工人的劳动时间延长到为补偿劳动力价值所需要的时间以上，生产过程中新创造的价值就会超过劳动力的价值，资本家就能够从雇佣工人身上榨取到剩余价值。</p>\n<blockquote>"价值增殖过程不外是超过一定点延长了的价值形成过程。"</blockquote>\n<strong>剩余价值生产的秘密、资本主义剥削的秘密就在这里。</strong>\n<div class="sh">资本拜物教（P48）</div>\n<p>资本的本质并不是一眼就能看出来的，因为在现象形态上，资本总是表现为一定的物品（厂房、机器、原料、制成品等）。资本所体现的生产关系被物的外壳掩盖着，容易形成一种错觉：好像厂房、机器这些物品天然就是资本，天然具有增殖价值的魔力。这种错误观念，就是<strong>资本的拜物教观念</strong>。</p>\n<div class="sh">不变资本与可变资本（P50）</div>\n<p>• <strong>不变资本</strong>：生产资料这一部分资本价值只是转换自己存在的物质形态（如由棉花、纱锭的形态转换为棉纱的形态），而不发生任何量的变化，不发生增殖。</p>\n<p>• <strong>可变资本</strong>：工人所创造的新价值，不仅包括劳动力价值的等价，而且还包括一定量的剩余价值。这一部分资本价值不是不变的，而是一个可变的量。</p>\n<div class="sh">工作日的构成（P51）</div>\n<p>雇佣工人的无偿劳动是剩余价值的<strong>唯一源泉</strong>。资本家必须把工人的劳动时间延长到必要劳动时间以上，使工人在剩余劳动时间内为资本家创造剩余价值。</p>\n<p>在资本主义制度下，工人的工作日总是包括两个部分：</p>\n<p>• <strong>必要劳动时间</strong></p>\n<p>• <strong>剩余劳动时间</strong></p>\n<div class="sh">隐蔽延长劳动时间（P54）</div>\n<p>资本家除了公开延长工作日，还用各种隐蔽的手段增加工人的劳动时间。例如：故意把上工的报点时间提前几分钟，把收工的报点时间推迟几分钟，让工人在下班之后再收拾工作场地和擦洗机器等。尽管工作日名义上没有变动，但实际上却是延长了。</p>\n<div class="sh">机器的资本主义使用（P64）</div>\n<p>机器的资本主义使用必然给工人带来灾难性的结果：</p>\n<p>机器本身 | 资本主义的使用</p>\n<p>缩短劳动时间 | 延长工作日</p>\n<p>使劳动变为轻易 | 加强劳动</p>\n<p>是人类对自然力的胜利 | 使人类服从于自然力</p>\n<p>增加生产者的财富 | 使生产者变为需要救济的贫民</p>\n<p>---</p>\n<div class="sh">第三章 工资</div>\n<div class="sh">劳动力与劳动的区别（P67）</div>\n<p>在商品市场上与资本家直接对立的，并不是劳动，而是劳动者——工人。工人出卖给资本家的，只是他的<strong>劳动力</strong>。</p>\n<p>• <strong>劳动力</strong>：蕴藏在人身体中的一种能力</p>\n<p>• <strong>劳动</strong>：劳动力的作用（劳动力的消费过程）</p>\n<blockquote>这就如同肠胃的消化能力不等于消化，机器亦不同于机器的功能一样。</blockquote>\n<strong>工资不是劳动的价值或价格，而是劳动力的价值或价格的转化形式。</strong> 虽然正是劳动创造出价值和剩余价值，但这里成为商品并具有价值的却不是劳动，而是劳动力。\n<div class="sh">古典经济学的困境（P68）</div>\n<p>古典经济学派由于不了解劳动力和劳动的区别，把工资看成劳动的价值或价格，因而使自己陷入了绝境。</p>\n<p>例如：假定工人劳动 12 小时，创造了 6 元的价值，其中 3 元为工资，3 元为剩余价值。按照他们的说法，3 元工资就是工人 12 小时劳动的价值。</p>\n<p>不过，古典经济学从劳动创造价值的正确前提出发，承认工资只是工人所创造的全部价值的一部分，而资本家和地主的收入都来自工人的无偿劳动。</p>\n<div class="sh">计时工资的剥削（P70）</div>\n<p>在实行计时工资的条件下，资本家常常利用<strong>小时工资制</strong>来加强对工人的剥削：只规定每小时劳动的平均工资，而不规定工作日长度和日（周、月）工资的总额。</p>\n<p>• <strong>经济繁荣时</strong>：要工人加班加点，延长工作日。计时工资总额增加，但劳动力的损耗以更快的速度增加，工人遭受<strong>过度劳动之苦</strong>。</p>\n<p>• <strong>经济衰退时</strong>：缩短工作日，只按实际劳动小时数支付工资。计时工资总额减少，工人陷入半失业状态，遭受<strong>劳动不足之苦</strong>。</p>\n<div class="sh">计件工资的剥削（P72）</div>\n<p>计件工资是资本家延长劳动时间和提高劳动强度的重要手段。</p>\n<p>在实行计件工资时，工人收入的多少与自己的劳动成果有着直接的联系，工人为了能够多挣一点工资，便最大限度地支出自己的劳动，从而为资本家创造出更多的剩余价值。</p>\n<p>计件工资的其他后果：</p>\n<p>• 为资本主义的等级剥削制度奠定了基础，使从事中间剥削的寄生虫更易于进行活动</p>\n<p>• <strong>不利于工人的团结</strong></p>',
