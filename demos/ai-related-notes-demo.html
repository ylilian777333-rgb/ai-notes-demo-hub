14: '<div class="sh">疯狂的尿酸</div>\n<div class="sh">尿酸的来源</div>\n<p>尿酸只有 3 种来源：<strong>果糖、酒精和嘌呤</strong>（嘌呤是一种存在于 DNA 和 RNA 中的有机分子，也存在于食物、某些饮料和人体自身组织中）。</p>\n<p>• 尿酸会促进脂肪的产生——即使没有超重或肥胖问题，也会让腰围变粗，在肝脏中囤积脂肪</p>\n<p>• 高尿酸水平与心血管疾病、认知能力下降、血脂异常、超重/肥胖甚至死亡密切相关</p>\n<blockquote>许多水果中含有的钾、黄酮醇、膳食纤维和维生素C，可以抵消或中和尿酸水平的上升。其中维生素C还有降低尿酸水平并促进尿酸排出的功能。</blockquote>\n<p>---</p>\n<div class="sh">果糖</div>\n<p>果糖和葡萄糖并非生物学效应相同的兄弟姐妹。果糖更像是葡萄糖的邪恶兄弟。</p>\n<p>对比项 | 葡萄糖 | 果糖</p>\n<p>核心作用 | 参与<strong>能量生成</strong> | 参与<strong>能量储存</strong></p>\n<p>胰岛素 | 刺激胰腺释放胰岛素 | 不会促进胰岛素分泌</p>\n<p>代谢方式 | 葡糖激酶催化，过程严谨，ATP 水平稳定 | 果糖激酶催化，消耗 ATP，完全不受管制</p>\n<p>ATP 影响 | 维持稳定 | 大量果糖可使 ATP 骤降 40%～50%</p>\n<p>代谢场所 | 全身细胞 | 主要在肝脏</p>\n<div class="sh">果糖代谢的连锁反应</div>\n<p>• 果糖在肝脏中被果糖激酶代谢，<strong>消耗大量 ATP</strong></p>\n<p>• 细胞发出求救信号 → 身体切换到<strong>储能模式</strong>：减缓新陈代谢，囤积脂肪</p>\n<p>• ATP 转化为腺苷一磷酸 → 经复杂代谢后最终生成<strong>尿酸</strong></p>\n<p>• 高尿酸进一步激活果糖激酶 → 形成<strong>正反馈循环</strong></p>\n<p>高尿酸水平的后果：</p>\n<p>• 加剧能量消耗和线粒体功能障碍</p>\n<p>• 引发炎症和氧化应激</p>\n<p>• 升高血压</p>\n<p>• 增加胰岛素抵抗</p>\n<p>• 触发体脂产生</p>\n<div class="sh">果糖与脂肪肝</div>\n<p>果糖在肝脏代谢时会触发脂肪生成过程，直接导致脂肪的产生——主要以<strong>甘油三酯</strong>的形式存在。甘油三酯在血液中含量过高时，会增加心脏病和冠心病等心血管疾病的患病风险。</p>\n<blockquote>利用果糖不会促进胰岛素分泌和提高血糖水平的特点，将果糖错误宣传为对糖尿病患者有益的安全的糖，是十分可耻的行为。</blockquote>\n<p>---</p>\n<div class="sh">睡眠</div>\n<div class="sh">睡眠不足的危害</div>\n<p>• 直接增加强效炎症分子（细胞因子）的水平：白细胞介素-6、白细胞介素-1β、C反应蛋白、TNF-α</p>\n<p>• 激活白细胞——身体正处于压力之下并容易受伤的信号</p>\n<p>• 睡眠时长缩短 2 小时（8h → 6h）就会导致炎症因子增加</p>\n<p>• 即使只有一天睡眠不足，也会导致炎症标志物急剧增多</p>\n<div class="sh">睡眠过多同样有害</div>\n<p>每晚睡眠超过 8 小时的人体内炎症因子也会增加，研究指出睡眠过多会导致全因死亡率增加 <strong>23%～30%</strong>。</p>\n<div class="sh">睡眠与尿酸</div>\n<p>• 良好睡眠有助于控制尿酸水平</p>\n<p>• 睡眠过程中的生理变化（体温下降、呼吸方式改变、皮质醇水平下降）会刺激关节中尿酸结晶的形成——这是痛风患者经常在夜间发作的原因之一</p>\n<p>• 睡眠期间脱水（呼吸和出汗失去水分）→ 血液中尿酸浓度升高 → 在关节处聚集结晶</p>\n<p>---</p>\n<div class="sh">盐</div>\n<p>盐虽然不含能量，但会通过刺激<strong>内源性果糖</strong>的生成和代谢来增强食欲。内源性果糖会促使暴饮暴食，并导致瘦素抵抗。</p>\n<blockquote>一些动物试验发现饮食中的盐会像尿酸一样，影响内皮型一氧化氮的合成，从而导致认知功能障碍。</blockquote>\n<p>---</p>\n<div class="sh">代糖</div>\n<p>• <strong>木糖醇</strong>：会刺激体内嘌呤的分解，导致尿酸水平升高，最好不要日常摄入</p>\n<p>• <strong>糖精、三氯蔗糖、阿斯巴甜</strong>等代糖：虽然不会提高胰岛素水平，但会改变人体微生物群，导致菌群失调、血糖失衡以及整体代谢紊乱，伤害不亚于传统的糖</p>\n<p>---</p>\n<div class="sh">酒精</div>\n<p>酒精通过 3 种方式提高尿酸水平：</p>\n<p>• 酒精可能是嘌呤的来源之一，嘌呤分解时生成尿酸</p>\n<p>• 酒精导致肾脏忙着清除酒精，无法正常清除尿酸</p>\n<p>• 酒精促进核苷酸的代谢，核苷酸是产生嘌呤的另一个来源</p>\n<blockquote><strong>啤酒是最糟糕的酒</strong>，因为它由啤酒酵母制作而成，含有大量嘌呤。</blockquote>\n<div class="sh">食物中的嘌呤</div>\n<p>富含嘌呤最多的动物性食物：</p>\n<p>• 红肉（牛肉、羊肉、猪肉）</p>\n<p>• 动物内脏（肝、肾）</p>\n<p>• 油性鱼类（凤尾鱼、沙丁鱼、鲱鱼）</p>\n<p>此外，扁豆、豌豆、黄豆等豆类和一部分水果蔬菜中也含有嘌呤。</p>\n<blockquote>食物中嘌呤含量高并不意味着它们会使你的尿酸水平升高。</blockquote>\n<div class="sh">鲜味与嘌呤</div>\n<p>甜、咸、酸、苦、鲜是 5 种基本味觉。"鲜"（umami）的主要来源是<strong>谷氨酸</strong>——味精中常见的一种氨基酸。</p>\n<p>• 高嘌呤食物一般都很鲜，鲜味会让人欲罢不能、对其上瘾</p>\n<p>• 味精多存在于嘌呤含量高的食物中</p>\n<p>• 味精中通常含有能转化为尿酸的添加剂（肌苷酸盐和鸟苷酸）</p>\n<p>• 研究表明，在小鼠生命早期喂食味精会导致小鼠肥胖</p>\n<p>---</p>\n<div class="sh">降尿酸补剂</div>\n<p>补剂 | 作用机理</p>\n<p><strong>槲皮素</strong> | 抑制黄嘌呤氧化酶的活性（生成尿酸的最后一步所必需的酶）</p>\n<p><strong>木犀草素</strong> | 同样抑制黄嘌呤氧化酶</p>\n<p><strong>DHA</strong> | 脑细胞膜重要组成部分，减少大脑和全身炎症，对抗不良饮食引起的肠道炎症，抵消高糖饮食（尤其是果糖）的破坏性影响</p>\n<p><strong>维生素C</strong> | 促进尿酸随尿液排出，减少肾脏对尿酸的再吸收，作为抗氧化剂减少组织受损</p>\n<p><strong>小球藻</strong> | 降低血糖和C反应蛋白水平，降低甘油三酯，提高胰岛素敏感性，改善肝酶</p>\n<p><strong>益生菌</strong> | 肠道微生物群健康影响新陈代谢正常运转，尿酸长期偏高者往往微生物群不健康</p>\n<blockquote>常见的益生元食物：大蒜、洋葱、韭菜、芦笋。</blockquote>\n<p>---</p>\n<div class="sh">降尿酸食物</div>\n<div class="sh">十字花科蔬菜</div>\n<p>西蓝花、西蓝花芽、球芽甘蓝等含有能在人体内转化为<strong>萝卜硫素</strong>的前体分子。</p>\n<p>萝卜硫素的作用：</p>\n<p>• 促进尿酸排泄，抑制尿酸水平升高</p>\n<p>• 本身既不是抗氧化剂也不是抗炎剂，但能通过激活 <strong>Nrf2 信号通路</strong>来增强人体的抗氧化能力和抗炎能力</p>\n<p>• 是最有效的 Nrf2 激活剂之一</p>\n<blockquote>喝适量咖啡、做运动、摄入姜黄和萝卜硫素都有助于激活 Nrf2 信号通路。</blockquote>\n<div class="sh">樱桃</div>\n<p>樱桃含有 2 种具有降尿酸作用的类黄酮：<strong>花青素</strong>和<strong>槲皮素</strong>。</p>\n<p>品种 | 花青素含量 | 特点</p>\n<p>蒙特默伦西樱桃、巴拉顿樱桃（酸樱桃） | 更高 | —</p>\n<p>宾库樱桃（甜樱桃） | 较低 | —</p>\n<p>美国红肉樱桃 | — | 能显著增加体内尿酸排泄量</p>\n<p>樱桃还能减少 C 反应蛋白的含量。</p>\n<div class="sh">其他降尿酸食物</div>\n<p>含有能抑制黄嘌呤氧化酶的化合物：</p>\n<p>• <strong>水果蔬菜</strong>：石榴、蓝莓、芹菜、红洋葱、核桃</p>\n<p>• <strong>香料和香草</strong>：小豆蔻、丁香、百里香、薄荷、迷迭香、牛至</p>',
15: '<div class="sh">真需求（梁宁）</div>\n<div class="sh">PART 1 价值与需求</div>\n<div class="sh">产品价值公式</div>\n<blockquote><strong>产品价值 = 功能价值 + 情绪价值 + 资产价值</strong></blockquote>\n<p> | 功能价值 | 情绪价值 | 资产价值</p>\n<p>维度1 | 原材料/劳动力 | 保障感 | 专门市场/二手市场</p>\n<p>维度2 | 专利/IP | 愉悦感 | 共识</p>\n<p>维度3 | 平台/供应链 | 彰显性 | —</p>\n<p>维度4 | 基础设施 | — | —</p>\n<p>---</p>\n<div class="sh">功能价值</div>\n<p>功能价值的实质就是满足<strong>基础需求</strong>与<strong>效率需求</strong>。四种模型：</p>\n<div class="sh">1. 原材料/劳动力模型</div>\n<p>大米等农产品、5% 硬件毛利的手机、5 元钱 5 双的袜子、售价等于钢材价值的大卡车</p>\n<div class="sh">2. 专利 IP 模型</div>\n<p>司美格鲁肽等西药、芯片</p>\n<div class="sh">3. 平台供应链模型</div>\n<p>• <strong>初代供应链</strong>（有啥卖啥）：丝绸之路、京东</p>\n<p>• <strong>二代供应链</strong>（没啥造啥）：苹果供应链、特斯拉供应链</p>\n<p>• <strong>三代供应链</strong>（一链到底）：SHEIN（小单快反、按需生产的柔性供应链）、ZARA、优衣库</p>\n<div class="sh">4. 基础设施模型</div>\n<p>西方国家巨富的诞生过程几乎如出一辙——基础设施私有化。钢铁大王、铁路大王、软件大王……莫不如此。</p>\n<blockquote>贝索斯说："我不要利润，我要增长。"因为他要做的不是供应链，而是基础设施。</blockquote>\n<p>基础设施之争是王者之战，注定惨烈。微信成了社交基础设施，阿里巴巴/拼多多成了商贸基础设施，美团成了餐饮基础设施，抖音成了网红基础设施。一旦成为基础设施，企业便需要被套上社会责任的枷锁。</p>\n<div class="sh">匪兵甲：功能价值的经典死法</div>\n<p>我们为功能付费，是想要更高的效率。匪兵甲就是产品力不足的产品——主角未出时，还认为自己可堪大用；主角一出，立刻被结构性碾压。</p>\n<p>---</p>\n<div class="sh">情绪价值</div>\n<p>情绪价值有三个付费点：</p>\n<p>• <strong>保障感</strong>（对抗担心）</p>\n<p>• <strong>愉悦感</strong>（对抗枯燥）</p>\n<p>• <strong>彰显性</strong>（对抗自卑）</p>\n<blockquote><strong>情绪价值 = 生理唤起 + 认知标记 + 心理账户</strong></blockquote>\n<div class="sh">生理唤起</div>\n<p>"生理性喜欢"——忽然上头了、下头了、high 了、丧了……被自己的多巴胺、内啡肽、血清素、催产素、肾上腺素劫持了。</p>\n<div class="sh">认知标记</div>\n<p>每个人内心的认知标记不同，哪怕接收到同样的客观信息，被唤起的部分也大不相同。这是沙赫特和辛格提出的<strong>情绪归因论</strong>（情绪的二因素理论）。</p>\n<blockquote>业务全球化，需要尊重每个地区的不同文化都有自己的认知标记——自己觉得好的，别人不一定觉得好。</blockquote>\n<div class="sh">心理账户</div>\n<p>来自诺贝尔经济学奖得主理查德·泰勒。有时候新市场的出现，并不是因为出现了新产品、新需求，而是因为开出了新的心理账户。</p>\n<blockquote>红豆火烧 3 元/个（心理账户：主食），日式蜜豆面包 15 元/个（心理账户：甜品）。换一个心理账户，就会换一个价格档位。</blockquote>\n<div class="sh">酒：情绪商品的典型</div>\n<p>酒精的功能性锚定了酒这个品类。独酌是为了连接自己，邀人喝酒是为了连接对方。对气氛加分越有效，酒的价值就越高。</p>\n<blockquote>功能价值和情绪价值的区别：一个能省则省，越省时间越好；一个能花则花，只想把更多的时间停留在这个点上。</blockquote>\n<p>创造功能价值要有<strong>工具思维</strong>，创造情绪价值要有<strong>玩具思维</strong>。</p>\n<div class="sh">貂丁：情绪价值的经典死法</div>\n<p>用昂贵稀缺的原材料（貂），做一个以前没人做过的品类（丁），觉得自己在创新，其实用户穿着不舒适（没有愉悦感），还穿在里面没法嘚瑟（没有彰显性）。既没有功能价值，也没有情绪价值。</p>\n<p>---</p>\n<div class="sh">资产价值</div>\n<p>可持续变现，就有资产价值。两个支撑条件：</p>\n<p>• 有一个可供它持续变现的<strong>专门市场及配套服务</strong></p>\n<p>• 它在专门市场的价值与价格依赖于某个<strong>共识</strong></p>\n<blockquote>人世间最贵的东西就是共识。与其说共识像黄金一样珍贵，毋宁说黄金的价值在于共识。</blockquote>\n<strong>稀缺性是奢侈品的第一性。</strong> 自由、理想、爱，是我们在求生道路上往往最早抛弃的，它们成了人类社会最稀缺的东西，也成了所有大牌真正的内核。\n<blockquote>人造钻石的公式："人造钻石钱 = 电钱"——毁灭了钻石的稀缺性，没有稀缺性就没有彰显的基础。这是原材料逻辑，不是资产逻辑。</blockquote>\n<div class="sh">产品创新——价值组合</div>\n<p>产品创新，就是创造新功能、新情绪、新资产。</p>\n<p>类型 | 代表</p>\n<p>新功能品类 | ChatGPT、司美格鲁肽</p>\n<p>新情绪品类 | 短剧、剧本杀</p>\n<p>新资产品类 | NFT、球星卡</p>\n<blockquote>回顾百年来商品的演化：功能价值的商品一直在<strong>整合</strong>，情绪价值的商品一直在<strong>分化</strong>。工具越来越集成，情绪消费越来越多。</blockquote>\n<div class="sh">品牌价值</div>\n<p>层级 | 公式 | 特征 | 典型代表</p>\n<p>白牌 | 产品价值 + 商标 | 供应链成熟和渠道重构的结果，赚供应链效率钱 | 拼多多上的产品</p>\n<p>老牌 | 产品价值 + 保障感 | 品牌具有定价权，留在人们心中的记忆和情感反应 | —</p>\n<p>网红 | 产品价值 + 新鲜感 + 话题度 | 新鲜感过后无复购需求，买流量做转化率算 ROI | —</p>\n<p>大牌 | 产品价值 + 辨识度 + 情感唤起 | 用超过 100 年的时间构建熟悉感，管理公众记忆和共识 | 可口可乐</p>\n<p>头牌 | 产品价值 + 辨识度 + 行业领导力 | 推出领导整个行业方向的产品 | iPhone 4、特斯拉 Model 3/Y</p>\n<blockquote>所有消费品的生死，如果只看一个指标，就是<strong>"复购率"</strong>。只有复购的用户，才是能够让一个消费品牌持续活下来的基本盘。</blockquote>\n<p>---</p>\n<div class="sh">PART 2 分歧与共识</div>\n<div class="sh">KANO 模型</div>\n<p>产品属性分为五种：</p>\n<p>属性 | 含义</p>\n<p><strong>期望属性</strong> | 用户最核心的诉求。能确定性交付就满意，不能交付就不满意</p>\n<p><strong>魅力属性</strong> | 用户没有预期的特性。没有不会降低满意度，有了会产生惊喜</p>\n<p><strong>必备属性</strong> | 默认应该提供的。不达标满意度大幅降低，优化了也不会显著提升</p>\n<p><strong>无差异属性</strong> | 用户感知不强甚至不在意。在这上面玩命优化是无意义的内卷</p>\n<p><strong>反向属性</strong> | 用户没有需求，提供后满意度反而下降</p>\n<blockquote>体验来自预期。有时候体验差并不是因为东西不好，只是不符合预期。</blockquote>\n<div class="sh">用户人设</div>\n<div class="sh">人为什么会做出改变？</div>\n<blockquote><strong>不满情绪 × 愿景 × 第一步 > 改变的阻力</strong></blockquote>\n<p>没有不满，没有清晰的愿景，没有可行的第一步，没人愿意做出改变。</p>\n<p>• 用户复购老产品，买的是<strong>熟悉感</strong></p>\n<p>• 用户买新产品，买的是<strong>愿景</strong></p>\n<p>功能价值为核心的产品不需要愿景（参数与配置已标定），情绪价值和资产价值为核心的产品则需要愿景和想象。</p>\n<div class="sh">用户画像 vs 用户人设</div>\n<p> | 用户画像 | 用户人设</p>\n<p>适用时代 | 刚需时代 | 弹性需求时代</p>\n<p>适用产品 | 功能价值为主的刚需产品 | 情绪价值、资产价值为主的弹性需求产品</p>\n<p>核心假设 | 用户需要什么，是因为他没有 | 一个人的长项，就是他的需求</p>\n<p>购买逻辑 | 因为没有，所以需要 | 越擅长的人越懂得自己的需要，然后需要更多</p>\n<p>本质 | 冷数据标签 | 自我设置和自我投资</p>\n<blockquote><strong>人设 = 固定人物分类 + 记忆锤 + 外在形象特点 + 性格 + 特长</strong></blockquote>\n<blockquote>合理的部分是理性，不合理的部分是人性。</blockquote>\n<div class="sh">产品场景</div>\n<p>对一个产品而言，需要找到第一个能让自己活下来的具体"场景"。</p>\n<blockquote><strong>没有产品场景匹配（PSF），就没有产品市场匹配（PMF）。</strong></blockquote>\n<p>PMF 概念由网景公司创始人马克·安德森提出：不是为产品找到一个市场，而是先找到一个好的市场，然后用产品去匹配。</p>\n<strong>场景选择原则：</strong>\n<p>• 小产品靠口碑，大产品靠国民习惯</p>\n<p>• 周期性出现的场景就是习惯产生的地方</p>\n<p>• 同一个产品在不同场景里，用户感受并不相同</p>\n<p>• 场景更具体，产品更有力</p>\n<p>• 想判断一个产品是会增长还是衰落，看它的场景是在扩大还是在收缩</p>\n<strong>场景穷举法：</strong>\n<p>• 把用户可能用到产品的所有具体场景穷举出来</p>\n<p>• 找有没有周期性出现的场景</p>\n<p>• 看最高频的是哪个</p>\n<p>• 想如何让产品进入这个场景</p>\n<blockquote>选择场景，就是选择与用户产生连接机会的频率。在高频出现且能形成强感知的时刻打磨产品，就如同精心打扮去赴重要的约会。</blockquote>\n<div class="sh">认知战</div>\n<p>如何构建新共识，让市场接受一个新品类？需要一场认知战。</p>\n<p>五个要点：信息操纵、情绪操控、认知引导、舆论导向、心理操作。</p>\n<blockquote>一个人不会做出他内心不存在的决定。一个重大决定的做出，只能依赖于对方是真的想做这件事。</blockquote>\n<p>---</p>\n<div class="sh">PART 3 模式</div>\n<p>模式是一个企业构建自己的竞争力，从而活下去的秘密。</p>\n<p>模式设计三大板块：<strong>能力系统、变现逻辑、分配机制</strong>。</p>\n<p>模式的第一个问题——拿谁的钱：</p>\n<p>模式 | 来源</p>\n<p>to C | 从用户手里拿钱</p>\n<p>to B | 从商家、市场手里拿钱</p>\n<p>to VC | 从风险投资人、资本市场手里拿钱</p>\n<p>to G | 从政府手里拿钱</p>\n<blockquote>只要能从四个地方中的一个拿到钱，再控制住成本，企业就可以持续下去。</blockquote>\n<p>---</p>\n<div class="sh">PART 4 求真</div>\n<div class="sh">马斯克与第一性原理</div>\n<blockquote>运用第一性原理，而不是类比思维去思考问题。我们在生活中总是倾向于比较，对别人已经做过的事情跟风去做，这样只能产生细小的迭代发展。</blockquote>\n<p>第一性原理的思考方式：用物理学的角度看待世界，一层层拨开事物表象，看到里面的本质，再从本质一层层往上走。</p>\n<p>• 常用创新方式：学习竞品 → 模仿与优化（同维竞争）</p>\n<p>• 马斯克的方式：回溯到品类的开端，从最根本的存在价值和物理要素来观察，不断接近问题的根本，去<strong>重构解决方案</strong></p>',
16: '<div class="sh">维生素C发现之旅</div>\n<div class="sh">维生素C肠道耐受量</div>\n<p>当一个人口服维生素C达到相当的量（24小时 0.5～200g）时，由于肠道渗透压的改变，会产生轻微的腹泻（非病理性腹泻）。卡思卡特将略低于此的量叫做<strong>"维生素C的肠道耐受量"</strong>——一个人能承受的接近引起腹泻的最大量。</p>\n<p>• 重症感染患者的肠道耐受量通常很大（每天超过 200g）</p>\n<p>• 病情好转时，耐受量迅速降至正常值（每天 4～15g）</p>\n<div class="sh">大剂量维生素C引起腹泻的原因</div>\n<p>大剂量口服抗坏血酸引起的腹泻是因为抗坏血酸在大肠中的<strong>高渗透压</strong>造成的。渗透压增加，水分被吸收进直肠内腔，导致良性腹泻。</p>\n<p>• 对于中毒性疾病，抗坏血酸被组织迅速耗尽，从小肠迅速吸收，没有到达直肠的抗坏血酸不会引起腹泻</p>\n<p>• 静脉注射抗坏血酸盐不会引起腹泻（抗坏血酸在血液和直肠均体现高渗性，渗透压在肠道内外壁趋于相等）</p>\n<blockquote>口服维生素C达到腹泻剂量，是治疗便秘（特别是顽固性便秘）的绝好手段。</blockquote>\n<p>---</p>\n<div class="sh">维生素C匮乏引起的疾病</div>\n<p>系统 | 相关疾病</p>\n<p><strong>免疫系统功能紊乱</strong> | 继发性感染、类风湿性关节炎和其他胶原病、过敏反应、慢性感染（疱疹等）</p>\n<p><strong>凝血机制紊乱</strong> | 出血、心脏病、中风、痔疮及其他血管栓塞症</p>\n<p><strong>肾上腺功能被抑制</strong> | 静脉炎等各种炎症、哮喘、各种过敏反应</p>\n<p><strong>胶原合成异常</strong> | 康复能力减弱、伤疤过大、压疮、静脉曲张、疝气、软骨磨损、椎间盘退化</p>\n<p><strong>神经系统功能损害</strong> | 抑郁、疼痛耐受力降低、肌肉痉挛、神经错乱</p>\n<p>---</p>\n<div class="sh">维生素C缺乏与冠心病</div>\n<div class="sh">拉舍的豚鼠实验——缺乏维C是冠心病的根本原因</div>\n<p>豚鼠与人类一样不能在体内制造维生素C：</p>\n<p>实验组 | 维生素C剂量（等效人类） | 动脉壁状况</p>\n<p>低剂量组 | 每天 60mg | 长出与人类相同的沉积物</p>\n<p>高剂量组 | 每天 5000mg | 动脉壁保持光滑</p>\n<blockquote>这个差别不是由增加饮食中的胆固醇或脂肪获得，而仅仅是由于控制饮食中维生素C的数量获得。</blockquote>\n<div class="sh">变异老鼠实验——胆固醇水平上升是冠心病的后果，不是原因</div>\n<p>2000年初，研究人员将小白鼠制造维生素C的关键基因（制造 GLO 酶的基因）切断，使其不能在体内制造维生素C。结果：</p>\n<p>• 变异老鼠的冠状动脉发生了损伤和裂纹，结缔组织变得薄弱</p>\n<p>• 变异老鼠的胆固醇水平<strong>明显增高</strong></p>\n<blockquote>这个实验说明，<strong>胆固醇水平的上升是冠心病的后果，而不是前因</strong>。</blockquote>\n<div class="sh">心脏血管为什么容易堵塞</div>\n<p>95% 以上的血管堵塞都发生在心脏上。心脏是身体中唯一一个不停运动的器官，每天跳动约 10 万次，承受机械压力最大。</p>\n<p>冠状动脉日复一日、年复一年会失去强度和稳定性，出现应力损伤和裂纹。这种损伤不是由血液中的"有害成分"胆固醇造成，完全是一种<strong>物理机械损伤、应力损伤</strong>。</p>\n<div class="sh">维生素C—胶原蛋白与血管平滑肌的关系</div>\n<p>• 血管由平滑肌组成，平滑肌的基本材料是<strong>胶原蛋白</strong></p>\n<p>• 胶原蛋白由赖氨酸和脯氨酸构成，合成过程中必须有维生素C参与（"羟化"）</p>\n<p>• 没有足够的维生素C → 不能合成足够的胶原蛋白 → 平滑肌损伤不能修复</p>\n<blockquote>多数动物能在体内制造大量维生素C，因此动脉壁光滑，不患冠心病。食肉类动物（狮子、老虎等）也不因血管损伤而引起冠心病。</blockquote>\n<div class="sh">动脉粥样斑块沉积的原因</div>\n<p>鲍林与拉舍的理论：</p>\n<p>• 根本原因是人类维生素C遗传缺乏 → 限制了胶原蛋白生成 → 动脉壁损伤不能及时修复</p>\n<p>• 肝脏生产黏性的<strong>脂蛋白(a)</strong>，沉积到血管损伤处，防止血管渗漏出血</p>\n<p>• 斑块其实是人体自身寻找出来的一种<strong>修复材料</strong>（好比衣服上的补丁、抹墙的泥灰）</p>\n<blockquote>如果没有斑块，脆弱的血管将破裂和渗漏，我们将因内出血形成血栓而死亡。斑块是一种替代的治疗因子，是一个疗伤的过程。</blockquote>\n<div class="sh">治疗冠心病的方案</div>\n<p>鲍林与拉舍对冠心病的最终定义：<strong>慢性坏血病或亚临床坏血病</strong>。</p>\n<p>治疗方法：</p>\n<p>• 服用大剂量维生素C（每天 500mg 到数千毫克以上）</p>\n<p>• 大量食用富含赖氨酸和脯氨酸的优质蛋白（蛋白质粉、蹄筋等胶质含量高的食物）</p>\n<p>• 辅以适量维生素B、维生素E、维生素A等</p>\n<p>• 急性发作时仍应去医院接受抢救</p>\n<p>---</p>\n<div class="sh">维生素C静脉滴注瓦解癌细胞</div>\n<div class="sh">静脉滴注临床实践</div>\n<p>由鲍林事业的继承者瑞欧丹医学博士在 1986 年于美国堪萨斯"人体机能改善中心"首创。</p>\n<p>• 每次使用 15g 抗坏血酸静脉滴注，每周一次或两次</p>\n<p>• 增强了病人的幸福感，减轻了疼痛，令许多病人寿命延长</p>\n<blockquote>同样是 10g 维生素C，静脉滴注在血液中的浓度是口服的 <strong>25 倍以上</strong>，剂量更大时差别可达 <strong>70 倍以上</strong>。</blockquote>\n<div class="sh">高浓度维生素C消灭癌细胞的机理</div>\n<p>• 细胞外的维生素C在氧化过程中产生<strong>过氧化氢（H₂O₂）</strong></p>\n<p>• 癌细胞缺乏<strong>过氧化氢酶（CAT）</strong>，因此被过氧化氢杀死</p>\n<p>• 正常细胞含有过氧化氢酶，可以中和过氧化氢，因此不受伤害</p>\n<p>• 维生素C分子与葡萄糖分子形状非常接近，利用癌细胞亲糖的特性，维生素C在癌细胞周围的浓度可达正常细胞周围的 <strong>5 倍以上</strong></p>\n<p>维生素C的其他抗癌功能：</p>\n<p>• 提升线粒体功能</p>\n<p>• 刺激免疫系统增产干扰素</p>\n<p>• 增加 NK 杀伤细胞的数量</p>\n<p>• 放大吞噬细胞的吞噬和杀伤能力</p>\n<p>• 降低化疗和放疗对 P53 基因的氧化损伤</p>\n<p>• 帮助形成胶原蛋白和肉毒碱，形成阻断癌细胞的壁垒</p>\n<p>• 参与氨基酸转化为神经递质</p>\n<p>• 降低前列腺素 E2 生成，减少炎症</p>\n<p>• 增加干细胞生成，帮助组织修复</p>\n<div class="sh">抗坏血酸遗传缺陷</div>\n<p>• 人类易患肿瘤可能是丧失制造抗坏血酸功能的后果</p>\n<p>• 会制造抗坏血酸的动物少有恶性肿瘤，因为体内应激制造的抗坏血酸可直接进入血液，形成足以致癌细胞解体的较高浓度</p>\n<p>• 人体静脉滴注抗坏血酸，只不过就像恢复了人体应激制造抗坏血酸的功能</p>\n<div class="sh">抗坏血酸遗传缺陷的进化补救措施</div>\n<p>人类和高等灵长目动物缺失了制造 GLO 酶的基因，不能制造抗坏血酸。制造抗坏血酸需要大量能量，失去这个功能可以节省能量，可能使脑力得到加强。</p>\n<p>进化出的补救措施：</p>\n<p>• <strong>限铁机制强化</strong>（包括女性月经失血量增加）——因解毒及抗感染功能下降</p>\n<p>• <strong>妊娠反应加重</strong>——因解毒功能削弱</p>\n<p>• <strong>新生儿黄疸</strong>——因抗自由基功能削弱</p>\n<p>• <strong>尿酸和其他抗氧化剂地位提升</strong>——因抗自由基功能削弱</p>\n<p>• <strong>脂蛋白(a)出现</strong>——修复血管损伤，因组织修复功能削弱</p>\n<p>---</p>\n<div class="sh">限铁机制</div>\n<div class="sh">定义</div>\n<p>在脊椎动物体内存在一道天然的、原始的免疫机制——<strong>限铁机制（iron withholding）</strong>。这个免疫机制是在动物与细菌为争夺铁这个对双方都至关重要的营养元素中发展出来的。</p>\n<div class="sh">铁螯合蛋白的作用</div>\n<p>铁螯合蛋白 | 分布位置 | 作用</p>\n<p><strong>伴清蛋白</strong> | 卵生动物的蛋卵（占蛋清蛋白质的 12%） | 与铁牢固结合，使入侵细菌得不到铁</p>\n<p><strong>铁蛋白</strong> | 哺乳动物体内 | 螯合游离铁</p>\n<p><strong>运铁蛋白</strong> | 血浆、淋巴和脑脊液 | 螯合游离铁（正常铁饱和度 20%～30%，血浆游离铁实际为零）</p>\n<p><strong>乳铁蛋白</strong> | 乳汁、眼泪、鼻涕、唾液、支气管黏液、肠胃液、胆汁、子宫颈黏液、精液、滑膜液 | 扣押游离铁，抑菌，还有固有的杀菌能力</p>\n<blockquote>鸡蛋含有丰富的铁（1mg），但都在蛋黄中。蛋清中布设了伴清蛋白，使入侵的细菌得不到铁。</blockquote>\n<div class="sh">铁过剩的危害</div>\n<p>体内铁过剩使限铁机制负荷加重甚至不堪重负，游离铁出逃和泛滥，让细菌等病原微生物获得营养，最终造成感染性疾病。</p>\n<p>铁过剩与糖尿病、心脑血管疾病、阿尔茨海默病等代谢性疾病的关系已有研究报告，结论均为铁过剩有利于这些疾病的发展。</p>\n<blockquote>补充维生素C确有抗癌功效，但前提是要<strong>限铁</strong>。</blockquote>\n<div class="sh">食物中的铁</div>\n<p>• <strong>血红素铁</strong>：来自肉、禽和鱼，吸收率比非血红素铁高 2～3 倍，很少受其他膳食因素影响</p>\n<p>• <strong>非血红素铁</strong>：吸收受多种因素影响，最明确的促进剂是维生素C</p>\n<p>男性可吸收总膳食铁量的约 6%，育龄妇女约 13%。</p>\n<strong>针对铁过剩的对策：</strong>\n<p>• <strong>少吃红肉</strong>（包括肝、血和骨髓），补充维生素C时还要少吃其他含铁丰富的食物，或将补充时间与餐饮时间错开。每天摄入铁 10～15mg 即可</p>\n<p>• <strong>不额外补铁</strong>。即使缺铁性贫血，也应先补充蛋白质（缺乏蛋白质者运铁蛋白不到正常人的 10%）</p>\n<p>• <strong>喝茶</strong>。绿茶和红茶含有天然铁螯合剂茶多酚，对降低铁吸收率特别有用</p>\n<p>• <strong>戒烟</strong>。烟草含铁，吸入的铁同样危害健康</p>\n<p>• <strong>献血</strong>。定期献血以减少体内的铁（献血 200mL 可释放 100～200mg 铁）</p>\n<p>• 医疗措施：研制铁螯合剂等</p>\n<blockquote>中医主张患感染性疾病时不吃荤菜等"发物"，荤菜特别是肉类含铁丰富。中医所谓的发物，首先就是铁。</blockquote>\n<div class="sh">月经也是一种限铁机制</div>\n<p>月经有可能是进化赠予的天然放血疗法，其目的可能是排铁、限铁，不让细菌得到繁衍必需的关键营养物质，降低细菌感染的风险，以备受精卵有一个良好的环境。</p>\n<blockquote>有些妇女月经失血量过大，有可能并非健康问题，可能源于食肉过多。</blockquote>\n<div class="sh">肿瘤聚铁</div>\n<p>肿瘤主要有两个特征：积累非常高水平的游离铁，以及避免被免疫系统摧毁。</p>\n<p>笔者推导出的癌症定义：</p>\n<blockquote>癌细胞是一种免疫细胞，属于第二免疫系统（限铁机制），其本质特征是吞噬过剩铁。肿瘤是围绕癌细胞搭建的结构建筑物（铁仓库），其功能是储存过剩铁，以对抗细菌感染。</blockquote>\n<p>• <strong>过剩铁是唯一致癌物（致癌元凶）</strong>，其他一切所谓致癌物只是帮凶</p>\n<p>• 红肉消费量增加 → 血清铁蛋白水平上升 → 铁过剩 → 与癌症发生率正相关</p>\n<strong>铁蛋白（Fer）指标：</strong>\n<p>来源 | 正常范围</p>\n<p>传统标准 | 12～300 ng/mL</p>\n<p>温伯格建议 | <strong>20～75 ng/mL</strong></p>\n<div class="sh">癌的两种类型</div>\n<p>类型 | 原因 | 特征</p>\n<p><strong>富铁癌</strong> | 铁过剩 | 巨噬细胞吞噬过剩铁，多发生在上皮组织</p>\n<p><strong>缺A增生</strong> | 维生素A严重缺乏 | 细胞不能正常分化，未成熟细胞大量产生并堆积</p>\n<p>癌症的危险因素排列：① 过剩铁 → ② 缺A增生 → ③ 缺C炎症 → ④ 各种促癌物</p>\n<div class="sh">新生儿排铁</div>\n<p>• 分娩前胎儿是高铁的（铁与铜对脑和中枢神经系统是兴奋剂）</p>\n<p>• 新生儿会排铁，母乳中的乳铁蛋白强力扣留铁，防止病从口入</p>\n<p>• 新生儿在 0.5 岁之前排铁，到 2 岁前后仍保持低铁状态，是限铁机制的体现</p>\n<blockquote>婴幼儿期的低铁现象是限铁机制的体现，此期补铁是对限铁机制的反制，是降低免疫力而不是提高免疫力。</blockquote>\n<p>---</p>\n<div class="sh">维生素C的解毒作用</div>\n<p>维生素C可以化解许多化学物质的毒性（汞、砷、铅、镉、铬、苯、酒精、亚硝酸等）。</p>\n<p>解毒原理三方面：</p>\n<p>• <strong>赋予解毒酶活性</strong>：解毒酶（细胞色素 P450 酶系统）需要大量维生素C才有活性</p>\n<p>• <strong>增加谷胱甘肽的数量</strong>：维生素C增加肝脏制造谷胱甘肽的数量，并使被氧化的谷胱甘肽还原</p>\n<p>• <strong>清除自由基</strong>：解毒过程中产生大量对肝脏有伤害的自由基，维生素C是最强力的自由基清除剂</p>\n<p>---</p>\n<div class="sh">维生素C冲击疗法</div>\n<p>准备 1000mg 一片的维生素C，随身携带。</p>\n<p>• 感冒最初征兆出现时（咽喉发痒、流鼻涕、肌肉酸痛），立即吞下 2 片（2000mg）或更多</p>\n<p>• 以后每隔一小时 2 片或更多，持续若干小时</p>\n<p>• 放屁增多或有腹泻，说明将要见效或已经见效，用量可略减但不要骤停</p>\n<p>• 有人 8 小时之内就彻底好转，感冒严重者一般第一天即可好转，三天之内痊愈</p>\n<p>---</p>\n<div class="sh">各种维生素的缺乏症</div>\n<p>维生素 | 主要缺乏症</p>\n<p><strong>维生素C</strong> | 易疲劳、牙龈出血、皮下出血（紫癜），易感各种感染性疾病（感冒、流感、肺炎、肝炎等），易感冠心病、白内障，易过敏、哮喘，便秘，伤口不易愈合</p>\n<p><strong>维生素A</strong> | 干眼病、夜盲症、皮肤干燥、皮肤癌，一切有上皮组织或黏膜的地方容易病变（呼吸道、消化道、泌尿道、生殖道），免疫功能下降</p>\n<p><strong>维生素B1</strong> | "脚气病"：食欲不佳、消化不良、便秘、神经炎、心肌衰弱、心力衰竭</p>\n<p><strong>维生素B2</strong> | 易疲劳，口唇干裂溃疡、口角炎、舌炎，角膜血管增生，脂溢性皮炎，贫血</p>\n<p><strong>维生素B3</strong>（烟酸） | 糙皮病：皮炎、胃肠道黏膜发炎、腹泻便秘交替、急躁、抑郁、精神错乱</p>\n<p><strong>维生素B5</strong>（泛酸） | 烦躁不安、食欲减退、头痛、精神抑郁、手足麻木刺痛、失眠</p>\n<p><strong>维生素B6</strong> | 脂溢性皮炎、体重下降、肌肉萎缩、贫血、急躁或精神抑郁</p>\n<p><strong>维生素B9</strong>（叶酸） | 巨幼红细胞贫血、舌痛口角炎、消化不良，孕妇缺乏可能生畸形儿</p>\n<p><strong>维生素B12</strong> | 舌炎、虚弱、背痛、四肢刺痛、精神失常、恶性贫血</p>\n<p><strong>维生素E</strong> | 不育不孕、畸胎、乳房小叶增生、视网膜脱落、肌肉无力、贫血、伤口愈合慢</p>\n<p>---</p>\n<div class="sh">维生素A的补充</div>\n<p>补充方法：</p>\n<p>• 吃动物肝脏（问题：高含铁）</p>\n<p>• 直接补充维生素A</p>\n<blockquote>南京大学郑集先生（活到 111 岁）从 20 世纪 80 年代初开始每天补充一粒维生素A胶丸（每粒 2.5 万 IU）。笔者从 2010 年开始每天 2 粒，在美国瑞欧丹诊所检测血液维生素A含量，结果在合格的下限（正常范围 25～107，结果为 37）。维生素A的毒性被夸大。</blockquote>\n<p>---</p>\n<div class="sh">国内维生素C厂家</div>\n<p>2004 年全球维生素C生产能力已达 12 万吨，我国四大企业占约 <strong>68%</strong>（8.2 万吨）：</p>\n<p>企业 | 产能</p>\n<p>东北制药总厂 | 2.2 万吨</p>\n<p>江苏江山制药公司 | 1.5 万吨</p>\n<p>石家庄制药厂（维生药业） | 3 万吨</p>\n<p>华北制药集团（维尔康） | 1.5 万吨</p>\n<blockquote>江山制药的两步发酵技术是全球最先进的。</blockquote>',
17: '<div class="sh">维生素与矿物质专利原料</div>\n<div class="sh">维生素B族</div>\n<p>维生素 | 公司 | 专利名</p>\n<p>B1 | 日本 Hamari Chemicals | <strong>BenfoPure®</strong></p>\n<p>B3 | 德国 Vis Vitalis | <strong>Panmol®</strong></p>\n<p>B5 | 日本 Kyowa Pharma Chemical | <strong>Pantesin®</strong></p>\n<p>B9（叶酸） | 法国 Gnosis | <strong>Quatrefolic®</strong> / <strong>Extrafolate-S®</strong></p>\n<p>B9（叶酸） | 荷兰 DSM | <strong>Metafolin®</strong></p>\n<p>B12 | 西班牙 HealthTech BioActives | <strong>MeCobalActive®</strong></p>\n<div class="sh">维生素C</div>\n<p>公司 | 专利名</p>\n<p>荷兰 DSM | <strong>Quali®-C</strong></p>\n<p>美国 One Innovations Labs | <strong>PureWay C®</strong></p>\n<p>美国 The Bountiful Company | <strong>Ester-C®</strong></p>\n<p>美国 Novotech Nutraceuticals | <strong>Nutra-C®</strong></p>\n<p>美国 Ethical Naturals | <strong>Polyphenol-C®</strong></p>\n<div class="sh">维生素D3</div>\n<p>公司 | 专利名</p>\n<p>荷兰 DSM | <strong>ampli-D®</strong></p>\n<p>植物来源的维生素D3：Vitamin D3v®、Vitashine™、Vita-algae D®、Earthlight®、VegaDELight®、VegD3®</p>\n<div class="sh">维生素E</div>\n<p>公司 | 专利名</p>\n<p>美国 American River Nutrition | <strong>DeltaGold®</strong></p>\n<p>马来西亚 ExcelVite | <strong>EVNol SupraBio™</strong></p>\n<p>马来西亚 PhytoGaia | <strong>TocoGaia™</strong></p>\n<div class="sh">维生素K2</div>\n<p>公司 | 专利名</p>\n<p>法国 Gnosis | <strong>MenaQ7®</strong> / <strong>vitaMK7®</strong></p>\n<p>挪威 Kappa Bioscience | <strong>K2Vital®</strong></p>\n<p>---</p>\n<div class="sh">矿物质</div>\n<p>矿物质 | 公司 | 专利名</p>\n<p>钙 | 美国 Balchem | <strong>DimaCal®</strong></p>\n<p>钙 | 冰岛 Marigot | <strong>Aquamin®</strong></p>\n<p>镁 | 美国 Balchem | <strong>MetaMag®</strong></p>\n<p>镁 | 美国 Magceutics | <strong>Magtein®</strong></p>\n<p>锌 | 美国 Balchem | <strong>Z-Life™</strong></p>\n<p>锌 | 瑞士 Lonza | <strong>L-OptiZinc®</strong></p>\n<p>铁 | 美国 Balchem | <strong>Ferrochel®</strong></p>\n<p>铁 | 美国 Chemi Nutra | <strong>IronAid®</strong></p>\n<p>---</p>\n<div class="sh">护眼原料</div>\n<div class="sh">叶黄素 / 玉米黄质</div>\n<p>公司 | 专利名</p>\n<p>美国 Kemin | <strong>F 18: '<div class="sh">胶原蛋白肽</div>\n<div class="sh">一、基础信息</div>\n<div class="sh">胶原蛋白类型</div>\n<p>类型 | 占比/分布 | 主要作用</p>\n<p><strong>I型</strong> | 占体内总胶原蛋白量的 90%，存在于皮肤、骨骼、肌腱、韧带和血管 | 增强皮肤弹性、促进骨骼健康、支持关节功能</p>\n<p><strong>II型</strong> | 主要存在于软骨组织中 | 保护关节健康、润滑关节、减少关节炎症和疼痛</p>\n<p><strong>III型</strong> | 主要存在于皮肤、血管、内脏 | 维持皮肤弹性和强度、支持血管结构和功能</p>\n<p><strong>IV型</strong> | 主要分布在皮肤组织中间 | —</p>\n<p><strong>V型</strong> | 主要存在于眼睛角膜骨骼，少量分布于皮肤和头发中 | —</p>\n<div class="sh">胶原蛋白肽</div>\n<p>来自动物（一般是牛、猪、鱼）的蛋白质水解形成的肽（氨基酸的短序列），能够直接被人体吸收。</p>\n<p>• <strong>最佳分子大小</strong>：1000-3000 道尔顿（太大不利于吸收，太小不利于吸收后重组）</p>\n<p>• <strong>每日服用剂量</strong>：推荐 3-10g/天（太少达不到效果，太多增加肠胃负担不利于吸收）</p>\n<p>• 本质上是蛋白质，补充量加上饮食中的蛋白质不要超过每日所需蛋白质的上限</p>\n<div class="sh">包装剂型</div>\n<p>剂型 | 评价</p>\n<p><strong>粉剂</strong> | 最好的形式，可以加在咖啡、牛奶里面</p>\n<p><strong>胶囊/片剂</strong> | 服用比较方便，注意辅料安全就行</p>\n<p><strong>液体</strong> | 口服液形式一般会加防腐剂和香精，不推荐</p>\n<p>---</p>\n<div class="sh">二、专利原料</div>\n<div class="sh">VERISOL®</div>\n<p>• <strong>公司</strong>：德国 Gelita 公司（官网）</p>\n<p>• <strong>来源</strong>：Verisol P（猪）、Verisol B（牛）、Verisol F（鱼）</p>\n<p>• <strong>形态</strong>：I型 和 III型</p>\n<p>• <strong>分子量</strong>：2000 道尔顿</p>\n<p>• <strong>起效剂量</strong>：2.5g/天</p>\n<strong>临床证据：</strong>\n<p>• 2013年，114名女性，连续8周每日服用 2.5g Verisol B → 眼周皱纹减少 <strong>20.1%</strong>，皮肤胶原蛋白含量增加 <strong>65%</strong>，弹性蛋白含量增加 <strong>18%</strong>（论文链接）</p>\n<p>• 2020年，76名女性，连续8周每日服用 5g Verisol F → 眼周皱纹减少 <strong>15%</strong>，皮肤弹性增加 <strong>7.6%</strong></p>\n<blockquote>⭐ 这款原料市场份额较大，临床研究也比较多，推荐。</blockquote>\n<p>---</p>\n<div class="sh">Peptan®</div>\n<p>• <strong>公司</strong>：法国 Rousselot 公司（官网）</p>\n<p>• <strong>来源</strong>：Peptan P（猪）、Peptan B（牛）、Peptan F / Peptan Marine（鱼）</p>\n<p>• <strong>形态</strong>：I型</p>\n<p>• <strong>分子量</strong>：2000 或 5000 道尔顿（分低密度和高密度）</p>\n<p>• <strong>起效剂量</strong>：5g/天</p>\n<strong>临床证据：</strong>\n<p>2021年，60名女性，连续90天每日服用 5g Peptan B → 眼周皱纹减少 <strong>13%</strong>，嘴周皱纹减少 <strong>10%</strong></p>\n<p>---</p>\n<div class="sh">Naticol®</div>\n<p>• <strong>公司</strong>：法国 Weishardt 公司（官网）</p>\n<p>• <strong>来源</strong>：鱼皮</p>\n<p>• <strong>形态</strong>：I型</p>\n<p>• <strong>分子量</strong>：2000 或 4000 道尔顿（分低密度和高密度）</p>\n<p>• <strong>起效剂量</strong>：2.5g/天</p>\n<strong>临床证据：</strong>\n<p>2018年，57名女性，连续12周每日服用 2.5g Naticol → 眼周皱纹减少 <strong>16.5%</strong>，皮肤弹性增加 <strong>8%</strong></p>\n<p>---</p>\n<div class="sh">UC-II®</div>\n<p>• <strong>公司</strong>：美国 InterHealth Nutraceuticals 公司（已被瑞士 Lonza 公司收购）（产品官网）</p>\n<p>• <strong>来源</strong>：鸡胸骨未变性 II 型胶原蛋白</p>\n<p>• <strong>形态</strong>：II型</p>\n<p>• <strong>起效剂量</strong>：40mg/天</p>\n<strong>临床证据：</strong>\n<p>40mg/天能够增加关节活动度和灵活性，而且比 1500mg 葡萄糖胺 + 1200mg 软骨素更能促进关节健康。</p>\n<blockquote>参考文献：Lugo JP, et al. Nutr J. 2016;15:14. ；Lugo JP, et al. J Int Soc Sports Nutr. 2013;10:48.</blockquote>\n<p>---</p>\n<div class="sh">BioCell Collagen®</div>\n<p>• <strong>公司</strong>：美国 BioCell Technology 公司（产品官网｜公司官网）</p>\n<p>• <strong>来源</strong>：鸡胸软骨</p>\n<p>• <strong>形态</strong>：II型</p>\n<p>• <strong>起效剂量</strong>：1g/天</p>\n<strong>复合成分（每 1000mg）：</strong>\n<p>成分 | 含量</p>\n<p>水解 II 型胶原蛋白肽 | 600mg</p>\n<p>硫酸软骨素 | 200mg</p>\n<p>透明质酸 | 100mg</p>\n<strong>临床证据：</strong>\n<p>临床研究证实 BioCell Collagen 可以促进关节活跃、皮肤年轻、结缔组织健康。包括七项人体临床试验在内的各种研究都支持其安全性、有效性和生物利用度。</p>\n<blockquote>相关论文：PubMed 22956862｜PMC 4566464</blockquote>',
19: '<div class="sh">英文界面大小写模式调研</div>\n<div class="sh">常用大小写模式</div>\n<p>英文界面元素中主流的大小写模式有两种：<strong>标题模式 (Title case)</strong> 和 <strong>句子模式 (Sentence case)</strong>。</p>\n<div class="sh">（1）标题模式（Title case）</div>\n<p>将文本中每个单词的首字母都大写，除了文本中间的冠词（a, an, the）、并列连词（and, or, but, nor…）、不超过4个字母的介词（on, in, with…）、不定式（to, in, an）等虚词。</p>\n<blockquote>例子：Restore Defaults, Allocate to Project</blockquote>\n<div class="sh">（2）句子模式（Sentence case）</div>\n<p>仅将文本中第一个单词的首字母大写，除非文本中含有必须大写的专有名词。</p>\n<blockquote>例子：Maximum number of downloads</blockquote>\n<p>---</p>\n<div class="sh">两种模式的特点</div>\n<div class="sh">标题模式（Title case）</div>\n<p>• <strong>匀称整齐</strong>：在单词数量较少时，每个单词首字母都大写的设计方式看起来更对称整齐，能够营造出一个良好的视觉节奏。</p>\n<p>• <strong>视觉突出</strong>：标题模式能够从大量信息中脱颖而出，帮助从正文信息中区分出标题文本。</p>\n<p>• <strong>庄重正式</strong>：标题模式往往让用户感觉到庄重正式。如果品牌需要营造出专业、可靠的用户感受，那么推荐使用标题模式。</p>\n<div class="sh">句子模式（Sentence case）</div>\n<p>• <strong>易于阅读</strong>：这种模式下的文本信息易于阅读，尤其是在文本比较长的时候。例如对话框的标题字数较多时，阅读较为困难。</p>\n<p>• <strong>容易区分出专有名词</strong>：句子模式使我们更易于区分出专业名词。专业名词就是那些常常使用大写的单词，比如 New York City 或 Microsoft。如果在产品中的所有按钮上都使用标题模式，那就很难区分出是不是有哪个文本代表专业名词，也就影响到了产品的可用性。</p>\n<p>• <strong>更加友好</strong>：正如标题模式看起来庄重而正式一样，句子模式看起来往往更随意和友好一些。如果品牌需要向用户传达出自然而易于接近的感受，那么推荐使用句子模式。</p>\n<p>---</p>\n<div class="sh">各类设计规范中关于大小写的说明</div>\n<div class="sh">结论</div>\n<p>一部分设计规范采用 Title case 和 Sentence case 结合的方式，对各种 UI 元素文本的大小写模式进行了界定，一般规定具有标题属性或短文本的 UI 元素使用 Title case，描述性文本或长文本使用 Sentence case。以 <strong>Openstack、VMware、Adobe、Autodesk、SAP、Apple</strong> 为代表，其中 Openstack 对各种 UI 元素的大小写界定较为全面且有配图，可参考性较强。</p>\n<p>一部分设计规范中推荐大多数情况都使用 Sentence case，以 <strong>Carbon Design System（IBM）、Microsoft、Google（Material design）、ATLASSIAN</strong> 为代表。</p>\n<p>调研的两个中文规范中对于大小写模式的举例较为模糊，参考性不强。</p>\n<p>---</p>\n<div class="sh">推荐两种模式结合的规范</div>\n<div class="sh">（1）Openstack（NASA）</div>\n<strong>使用 Title case 的情况：</strong>\n<p>对话框标题、图标标签、用于操作或导航的链接、菜单项（菜单栏和上下文菜单）、菜单标题、页面标题、按钮标签、章节标题、步骤标题、表列标题、标签标题、表格标题、工具栏按钮、窗口标题</p>\n<strong>使用 Sentence case 的情况：</strong>\n<p>复选框标签、字段标签、文件名、组框标签、单选按钮或复选框组的标题、悬停帮助文本、输入提示、列表框、下拉列表和组合框条目、列表框标签、消息（信息、警告和错误）、页面说明或描述、进度条标签、单选按钮标签、状态栏文字</p>\n<div class="sh">（2）VMware</div>\n<p>• 对于菜单项、按钮标签、标题、选项卡、数据网格列标题，使用 <strong>Title case</strong>。</p>\n<p>• 对于所有其他文本控件，包括文本框、下拉菜单、复选框、单选按钮、工具提示和树视图，使用 <strong>Sentence case</strong>。</p>\n<div class="sh">（3）Adobe</div>\n<p>• 标题、按钮等使用 <strong>Title case</strong></p>\n<p>• 默认内容样式使用 <strong>Sentence case</strong></p>\n<div class="sh">（4）Autodesk</div>\n<p>• 各级标题、对话框标题、表头、按钮等控件块标签使用 <strong>Title case</strong></p>\n<p>• 消息和提示使用 <strong>Sentence case</strong></p>\n<div class="sh">（5）SAP</div>\n<p>• 用户界面短文本（标签、标题等）使用 <strong>Title case</strong></p>\n<p>• 对所有消息和解释使用 <strong>Sentence case</strong></p>\n<p>• 如果文本较长，则使用 <strong>Sentence case</strong></p>\n<p>• 相对时间以及数字开头的文本使用 <strong>Sentence case</strong>，例如：4 days ago, 4 items left</p>\n<div class="sh">（6）Apple</div>\n<p>• 推荐在所有 UI 元素中使用 Title case 或 Sentence case，未做具体界定。</p>\n<div class="sh">推荐使用 Sentence case 的规范</div>\n<div class="sh">（1）IBM（Carbon Design System）</div>\n<p>推荐大多数 UI 元素都使用 Sentence case。</p>\n<div class="sh">（2）Microsoft</div>\n<p>• 大多数情况下都使用 <strong>Sentence case</strong>，包括标题、UI 标签（按钮或复选框）等。</p>\n<p>• 少数情况下使用 <strong>Title case</strong>，比如产品和服务的名称、文章标题等。</p>\n<div class="sh">（3）Google（Material design）</div>\n<p>大多数情况下都使用 <strong>Sentence case</strong>，包括标题、标签、标注、列表中的所有内容、表格中的所有内容。</p>\n<div class="sh">（4）ATLASSIAN</div>\n<p>所有标题、标题、菜单项、标签和按钮中使用 <strong>Sentence case</strong>。</p>\n<div class="sh">表述模糊的规范</div>\n<p>• <strong>Ant Design</strong>：表述较为模糊</p>\n<p>• <strong>Clarity Design</strong>：表述较为模糊</p>\n<p>---</p>\n<div class="sh">Envision — 英文界面大小写模式定义</div>\n<div class="sh">一般情况</div>\n<p>考虑到 Envision 品牌特性，英文界面文案大小写使用 <strong>Title case 和 Sentence case 结合</strong>的方式。一般情况下，规定标题类文案和页面重点元素使用 Title case，各类表单标签和描述性文本使用 Sentence case。</p>\n<p>具体各类元素使用的大小写模式如下：</p>\n<p>分类 | UI 元素 | 大小写模式</p>\n<p><strong>标题类</strong> | 页面标题 / Page titles | Title case</p>\n<p> | 卡片标题 / Card titles | Title case</p>\n<p> | 对话框标题 / Dialog titles | Title case</p>\n<p> | 表格标题 / Table titles | Title case</p>\n<p> | 图表标题 / Chart titles | Title case</p>\n<p> | 步骤条标题 / Step titles | Title case</p>\n<p> | 标签页 / Tabs | Title case</p>\n<p><strong>重点元素</strong> | 菜单 / Menu | Title case</p>\n<p> | 按钮 / Button | Title case</p>\n<p> | 表头 / Table column headers | Title case</p>\n<p> | 标签 / Tag | Title case</p>\n<p><strong>表单标签</strong> | 复选框标签 / Check box labels | Sentence case</p>\n<p> | 单选框标签 / Radio button labels | Sentence case</p>\n<p> | 输入框标签 / Input labels | Sentence case</p>\n<p> | 选择框标签 / Select labels | Sentence case</p>\n<p><strong>描述性文本</strong> | 文字提示 / Tooltips | Sentence case</p>\n<p> | 输入框提示 / Input hints | Sentence case</p>\n<p> | 下拉列表 / Dropdown list | Sentence case</p>\n<p> | 全局提示 / Messages | Sentence case</p>\n<p> | 告警提示 / Alert | Sentence case</p>\n<p> | 说明或描述 / Instructions or descriptions | Sentence case</p>\n<div class="sh">例外情况</div>\n<p>• <strong>长文本</strong>：若标题类或重点元素的文本长度超过 12 个单词，则建议改用 Sentence case。</p>\n<p>• <strong>相对时间</strong>：使用 Sentence case，例如：4 days ago</p>\n<p>• <strong>数字开头的值或状态</strong>：使用 Sentence case，例如：4 items left</p>\n<p>• <strong>UI 元素的引用</strong>：当在文案中引用某个 UI 元素时，使用与该 UI 元素一致的大小写方式。例如某一页面的标题为 "My Network"，在引用了该页面的文案中，写为 "Enter your network information in the My Network page"。</p>\n<p>• <strong>全部大写（Upper case）</strong>：若某一 UI 元素需要特别引起注意，可以使用每个字母都大写的模式（Upper case）。例如两个需要突出的重要标签使用了全部大写模式，以保证用户不会错过即将被取消的订阅。</p>',
20: '<div class="sh">营养知识</div>\n<div class="sh">麸质</div>\n<strong>来源：</strong> 普通小麦、大麦、黑麦、卡姆小麦、斯佩尔特小麦、（与小麦同一生产线的）燕麦\n<strong>物质：</strong> 蛋白质复合物，包含小麦酵溶蛋白和谷蛋白。转基因小麦中构成麸质的蛋白质结构更集中。\n<strong>麸质引起免疫反应的机制：</strong> 麸质与人体中很多组织的细胞非常相似（氨基酸结构或标记），免疫细胞攻击麸质的同时，也会攻击小肠组织、甲状腺、神经系统和关节，使它们受损（<strong>分子拟态</strong>）。\n<p>---</p>\n<div class="sh">有害脂肪</div>\n<p>牛肉和乳制品中的饱和脂肪是一种有害脂肪。牛被喂食了劣质饲料（主要是玉米）后，体内会产生很多有害的饱和脂肪，使体内炎症加重。</p>\n<blockquote>最好食用草饲或有机饲料喂养的牛。</blockquote>\n<p>---</p>\n<div class="sh">维生素D</div>\n<p>形式 | 名称 | 说明</p>\n<p><strong>D3</strong> | 胆钙化醇 | 活性形式</p>\n<p><strong>D2</strong> | 麦角钙化醇 | 人体很难将植物中的 D2 转化为具有活性的 D3</p>\n<strong>代谢路径：</strong>\n<pre><code>维生素D3 → 肝脏生成 25-羟基维生素D → 可转化为 1,25-羟基维生素D（效力极强的激素）\n</code></pre>\n<p>• 检查指标：25-羟基维生素D 大于 125nmol/L（50ng/ml）为宜</p>\n<p>• 维生素A 能够促进人体对维生素D的吸收</p>\n<strong>作用：</strong> 将钙从肠道输送到血液中\n<p>---</p>\n<div class="sh">维生素K2（甲萘醌）</div>\n<strong>作用：</strong> 帮助将血液中的钙运输到骨骼\n<div class="sh">维生素K1 vs K2</div>\n<p> | K1 | K2</p>\n<p>来源 | 深绿色蔬菜 | 动物产品或发酵食品</p>\n<div class="sh">维生素K2的来源</div>\n<p>食草动物可以将维生素K1转化为K2，而人体缺乏必需的酶完成这一转化，但人体内健康的肠道菌群能够帮助合成维生素K2（50-70%）。</p>\n<p>来源类型 | 亚型 | 食物</p>\n<p>动物来源 | <strong>MK-4</strong> | 鸡鸭鹅牛肝、蛋黄（草饲）、草饲牛肉</p>\n<p>细菌来源 | <strong>MK-7</strong>（长链亚型，对骨骼最有益） | 纳豆（1天10g可补充100微克）、德国泡菜、Gouda奶酪、Brie奶酪</p>\n<blockquote>成人每日建议量 K2：90-120mcg。长期大量补钙或维生素D的人群适量补充维生素K2，避免血管硬化。</blockquote>\n<p>---</p>\n<div class="sh">肠漏症</div>\n<p>食物中未经消化完全的大分子通过肠道缝隙进入体液、血液等，被免疫系统识别攻击，误伤正常细胞。</p>\n<p>---</p>\n<div class="sh">钙</div>\n<strong>钙的运输路径：</strong>\n<pre><code>钙 → 通过维生素D进入血液 → 通过维生素K2进入骨骼\n</code></pre>\n<p>• 维生素D将钙从肠道输送到血液中，同时会消耗镁</p>\n<p>• <strong>钙镁比 2:1</strong></p>\n<p>• 维生素C 增强骨和关节强度</p>\n<p>---</p>\n<div class="sh">烟酸（维生素B3 / 烟酰胺）</div>\n<strong>缺乏症状：</strong> 对称性皮炎皮损（手部、肘部）、口腔溃疡、杨梅舌、消化不良、神经系统问题\n<strong>来源：</strong> 动物肝脏、整粒种子（杂粮、糙米、坚果）、玉米 + 碱面\n<p>---</p>\n<div class="sh">硒</div>\n<strong>作用：</strong> 还原剂，参与各种免疫、促进辅酶A生成、促进维生素E作用协同作用\n<strong>缺乏症状：</strong> 免疫力差、精神倦怠、情绪不稳定、四肢无力\n<strong>来源：</strong> 植物从水土中富集，动物吃植物富集\n<blockquote>⚠️ 推荐量与中毒量接近，正常不需要额外补充。</blockquote>\n<p>---</p>\n<div class="sh">麦角硫因（维生素L）</div>\n<p>最强抗氧化剂，存在于雪平菇、香菇、白蘑菇。</p>',
21: '<div class="sh">薛兆丰经济学讲义（笔记节选）</div>\n<div class="sh">如何建立信任｜克服信息不对称（079-083）</div>\n<div class="sh">什么是优质</div>\n<div class="sh">品质稳定才是优质</div>\n<p>在经济学里，优质的第一层含义是指<strong>匀质</strong>。不是说厂商能把产品的品质做到多好，而是说产品的品质要维持一个稳定的水平。同一批产品当中，一件产品的品质跟另外一件产品品质之间的差距不能大，而且差距越小越好。</p>\n<div class="sh">性价比相当才是优质</div>\n<p>优质的第二层经济学含义是指，为了提高产品质量所要付出的<strong>边际成本</strong>应该跟它得到的<strong>边际收益</strong>相等。当提高产品质量的边际成本等于边际收益时，我们说它达到了优质的标准。</p>\n<div class="sh">如何建立信任</div>\n<p>• <strong>重复交易</strong></p>\n<p>• <strong>第三方背书</strong></p>\n<p>• <strong>增加产品的附加成本</strong>：人们会根据一件产品所配置的附加值高低来判断这件产品质量的高低</p>\n<p>• <strong>以品质三包替代品质检验</strong></p>\n<p>• <strong>以延保合约甄别用户</strong>：甄别出这些顾客，厂家就不需要生产出要求过高的产品了。绝大部分想省钱的顾客，只要平时稍加注意，就可以让产品达到耐用的效果，而不需要厂家生产那些成本极高、供极端环境下使用的产品。</p>\n<p>• <strong>付出沉没成本、给出人质、付出抵押物</strong></p>\n<div class="sh">监管本身也要引入竞争机制（090）</div>\n<p>政府监管本身也会产生问题，有时候它把监管的标准提得过高，也会产生边际成本大于边际收益的后果。</p>\n<div class="sh">强制披露（mandated disclosure）</div>\n<p>政府命令厂家把产品的所有副作用清楚地列出来告诉消费者，让消费者自己来做决定。这种办法很适合解决复杂问题——产品有不同的特性，消费者有不同的偏好，每个人根据自己的情况做决定，不搞一刀切。</p>\n<strong>强制披露失效的原因：</strong>\n<p>• 很多人对文字和数字不敏感</p>\n<p>• 信息负担过重</p>\n<p>• 决策厌恶症</p>\n<div class="sh">监管引入竞争</div>\n<p>监管机构不能只此一家、别无分店，而是应该多家竞争。不同的认证机构根据不同的标准、不同的风格、不同消费者的偏好给出认证，消费者不需要知道具体的知识，只要选择不同认证机构的品牌就可以了。</p>\n<blockquote>让监管机构之间也形成竞争的态势，让它们的专业判断成为一种商品，在自由竞争的市场上互相比较，供消费者选择。这是让"专业知识"和"选择自由"得到协调的好办法。</blockquote>\n<p>---</p>\n<div class="sh">宏观经济学</div>\n<div class="sh">商业银行创造货币（104）</div>\n<div class="sh">劣币驱逐良币符合经济效率</div>\n<p>一旦一个社会确定了用某种商品作为货币，质量较高的品种会被人们保存下来，质量较低的会留在流通当中。这就是"劣币驱逐良币"（Good money is driven out by cheap money）。</p>\n<blockquote>货币之所以有用，就在于人们相信它有用；而只要人们相信它有用，它就不需要用那么高质量的商品来充当。<strong>劣币就是有效的货币。</strong></blockquote>\n<div class="sh">商业银行如何创造货币</div>\n<p>假设一个封闭社会里有 1000 元钱在流动，有一个商业银行系统帮人存钱再贷出去：</p>\n<p>• 第一天：银行收到 1000 元存款</p>\n<p>• 银行贷出去 → 借钱的人花出去 → 收到钱的人再存回银行</p>\n<p>• 第二天：银行账户变成 2000 元</p>\n<p>• 第三天：变成 3000 元……</p>\n<strong>法定准备金率的限制：</strong>\n<p>假定法定准备金率为 20%：</p>\n<p>• 第一天收到 1000 元，留 200 元准备金，贷出 800 元</p>\n<p>• 800 元回流后，留 160 元准备金，贷出 640 元</p>\n<p>• 循环往复……</p>\n<p>最终 1000 元基础货币在 20% 法定准备金率下，创造 4000 元新生货币，整个社会共有 <strong>5000 元</strong>货币在流通。</p>\n<blockquote>创造货币的能力跟法定准备金率成反比，法定准备金率越高，能够创造货币的倍数就越低。</blockquote>\n<div class="sh">通货膨胀（105）</div>\n<div class="sh">货币数量论</div>\n<blockquote>货币流通量 × 货币流通速度 = 货物总量 × 平均物价</blockquote>\n<p>• 平均物价与货物总量<strong>成反比</strong>：货物总量越大，通胀机会越小</p>\n<p>• 平均物价与货币流通量<strong>成正比</strong>：货币流通量越大，通胀机会越大</p>\n<p>• 平均物价与货币流通速度<strong>成正比</strong>：流通速度越快，通胀机会越大</p>\n<div class="sh">通货膨胀成因</div>\n<p>两大学派：</p>\n<p>• <strong>多因论</strong>：年轻人买房、工会要求加薪、进口消费增加、农产品涨价等都能造成通胀</p>\n<p>• <strong>货币超发论</strong>：通胀成因只有一个——钱印多了。在公式 P = MV/Y 里，Y 和 V 基本不变，物价 P 的上涨都可归咎于 M（货币流通量）的增长</p>\n<div class="sh">坎蒂隆效应（Cantillon Effect）</div>\n<p>现实生活中新增的货币总是通过某个出口逐渐流向社会的，这个流动过程需要一段时间，货币对整个经济生活的影响是不均匀的。</p>\n<blockquote>哈耶克描述：这种效应更像我们把蜂蜜倒入一个容器时发生的现象——液体会有扩散到整个瓶底表面的趋势，但刚开始时会有一个小小的隆起，慢慢向外扩散，要达到完全持平仍然需要一段时间。</blockquote>\n<div class="sh">通货膨胀是一种无形的税收</div>\n<p>• 政府多印钞票，政府购买力增加，民众购买力下降——实际上是政府向民众征收的无形税</p>\n<p>• 通胀使纳税人因"被迫上档"而多交了税（累进税制度下，名义工资上涨导致税率更高，但实际财富并未增加）</p>\n<div class="sh">通货膨胀与失业</div>\n<p>通胀跟失业之间的反比关系（菲利普斯曲线）：制造通胀时确实能看到失业率下降，因为新增货币的扩散和人们对通胀的认识需要时间。但随着时间推移，人们逐渐明白这只是通胀，政府不得不抑制通胀时，失业率又会上升。</p>\n<blockquote>如果人们对通货膨胀预测的能力在提高，那么通过制造通货膨胀来减少失业率的努力，就会越来越不管用。</blockquote>\n<strong>滞胀</strong>：如果政府反复使用通胀来对付失业，最终可能出现通货膨胀和高失业率同时并存的现象。\n<p>---</p>\n<div class="sh">经济周期（108-112）</div>\n<p>宏观经济调节的四个目标：</p>\n<p>• 消除经济周期，实现稳步增长</p>\n<p>• 实现低的或平稳的通货膨胀率</p>\n<p>• 实现高的就业率</p>\n<p>• 实现生产力和 GDP 的高速增长</p>\n<div class="sh">奥地利学派</div>\n<p>三个基本观点：</p>\n<p>• <strong>货币不是中性的</strong>：货币从长远看像水，能渗透到社会每个角落；但在蔓延过程中像蜜，会对人的行为产生引导和误导作用</p>\n<p>• <strong>资本是异质的</strong>：厂房、设备、人力资本一旦投资形成，就不能轻易转移到别的用途上去，错误的投资决策要付出代价</p>\n<p>• <strong>社会机构和安排是人们共同行为的结果，而不是计划的结果</strong></p>\n<p>主张：经济周期的起源是政府过度发钞。解决办法：回到金本位，或实施自由发钞制度。</p>\n<div class="sh">凯恩斯主义学派</div>\n<p>认为社会总需求降低时，价格调整总是迟钝和缓慢的，真正受到冲击的是就业和产量。</p>\n<p>主张：政府应该<strong>逆经济周期而行</strong>——人们都在消费时政府少动作；人们都不消费时，政府积极消费、投资、生产。</p>\n<p>• 货币政策失灵后（出现滞胀），转向<strong>财政政策</strong>——政府花钱办大事</p>\n<p>• 政府的钱来自收税或借债，这解释了"二战"后信奉凯恩斯主义的国家政府都债台高筑的现象</p>\n<blockquote>凯恩斯本人深信市场自行调节功能，一旦社会回到正常状态，政府就应该停止干预。</blockquote>\n<div class="sh">货币主义学派</div>\n<p>四个重要见解：</p>\n<p>• <strong>坚持货币数量论</strong>：通胀就是因为货币超发</p>\n<p>• <strong>货币长期中性论</strong>：新增货币流动到社会每个角落后，除了物价上涨，其他任何事情都不会改变</p>\n<p>• <strong>制造通胀不能降低失业率</strong>：长期菲利普斯曲线应该是垂直的，由此预言了滞胀</p>\n<p>• <strong>永久收入假说</strong>：人们的消费水平根据永久收入而定，政府的短期刺激政策不会奏效</p>\n<blockquote>弗里德曼的主张：将货币增长比例写入宪法。关键是把它当作一个常数写到宪法里，谁都改不了，这样人们都能有一个明确的预期。</blockquote>\n<div class="sh">理性预期学派</div>\n<p>在货币主义基础上进一步提出：人们在解读政府经济政策时也是有预期的，"上有政策下有对策"。政府的政策会被人们的预期抵消。</p>\n<blockquote>政府企图平息经济周期的措施，本身可能就会增加经济的波动，就像在嘈杂的环境里大喊一声"大家不要吵"，这句话本身可能就增加了噪声的分贝。</blockquote>\n<div class="sh">真实经济周期理论</div>\n<p>核心思想：冲击无所不在，而经济体中每一个个体需要花一段时间才能对新的冲击做出反应。一切被描绘为"调节缓慢、反应不够充分、市场无效"的现象，其实都是正常的。额外的干预不会解决问题，而只会产生新的问题。</p>\n<blockquote>该学派领军人物芬恩·基德兰德和爱德华·普雷斯科特在 2004 年共同获得诺贝尔经济学奖。</blockquote>\n<div class="sh">宏观经济学家的六大共识</div>\n<p>• 经济增长的长期趋势，主要靠<strong>供应方面</strong>的因素（生产力）</p>\n<p>• 短期的经济波动，往往来自<strong>需求方面</strong></p>\n<p>• 从长期看，通胀和失业之间<strong>不存在稳定的替代关系</strong></p>\n<p>• 从长期看，<strong>货币增长率决定了通货膨胀率</strong></p>\n<p>• 政府试图<strong>微调经济周期是做不到的</strong>（一连串的时间滞后）</p>\n<p>• <strong>人是有对策的</strong>——从控制论角度转化为博弈论角度，政府只不过是众多玩家中的一个</p>\n<p>---</p>\n<div class="sh">公共选举（113-115）</div>\n<div class="sh">市场与投票在公共选择中的区别</div>\n<p>• <strong>投票</strong>：公共选择的结果由<strong>中位数</strong>决定</p>\n<p>• <strong>市场</strong>：公共选择的结果由<strong>平均数</strong>决定</p>\n<div class="sh">中位数投票人原理</div>\n<p>不管参选人的政治理想原来是怎样的，只要他们想获得胜利，就必须选择那些能够讨好中间选民的政纲。</p>\n<blockquote>过去人们以为政治家是为了实现远大理想而参加竞选的；现在人们明白，政治家是为了赢得选举而去刻意剪裁他们的远大理想。</blockquote>\n<p>该原理由邓肯·布莱克在 1948 年重新发现，1957 年安东尼·唐斯将其写入经典著作《民主的经济理论》。</p>\n<div class="sh">阿罗不可能定律</div>\n<p>在人们有多种不同选择的情况下，选举不一定能够反映出大多数人的意愿。不同的问法就决定了不同的答案，并不存在什么"大多数人的意愿"这一说。</p>\n<strong>逃避循环的办法：</strong>\n<p>• 确定一位会议召集人和固定的会议程序</p>\n<p>• <strong>投钞票而非选票</strong>：用钞票投票不仅能反映偏好的排列顺序，还能反映偏好的轻重（不同的价格反映量的不同）</p>\n<div class="sh">民主为何会产生不良经济政策</div>\n<strong>1. 传统公共选择学派</strong>\n<p>• 理由一：<strong>选民是无知的</strong>（经济知识和政治知识都匮乏）</p>\n<p>• 理由二：<strong>选举机制天然容易被利益团体操纵</strong>——有巨大利益的少数派有积极性去操纵选举结果，让大多数分散的选民来承担代价</p>\n<strong>2. 唐纳德·威特曼的质疑</strong>\n<p>• 政党就好像一家公司，党内有纪律约束（品质管控），党外有新闻媒体、智库等密切监督</p>\n<p>• 众多利益团体互相争夺、互相抗衡，本身就是一种有效的政治机制</p>\n<p>• 结论：民主制度下产生的经济政策就是好的政策，因为它恰恰反映了聪明的、有理智的选民所需要的经济政策</p>\n<strong>3. 布赖恩·卡普兰的"理性胡闹"理论</strong>\n<p>普罗大众的经济学认识有四种系统性偏差：</p>\n<p>偏见类型 | 表现</p>\n<p>排外偏见 | 认为经济问题是由外人造成的，不能理解外人对本地人福利的积极作用</p>\n<p>职位偏见 | 觉得工作岗位看得见摸得着，会流失到海外，欢迎把就业留在本地的政策</p>\n<p>反市场偏见 | 对供求关系和价格作用理解不够深，欢迎价格管制政策</p>\n<p>悲观偏见 | 总觉得今天不如昨天，明天可能会更糟</p>\n<strong>市场决策与民主决策的根本区别：</strong>\n<blockquote>在市场里，如果我们要买名贵的跑车，就要单独为此买单。在政治领域，我们不会因为支持某项政策就被单独要求付费。人们在做经济选择时，因为自己要承担后果，就会变得理性；而在政治领域，由于每位选民都不需要对自己的政治主张直接承担责任，人们就会<strong>理性地选择不理性</strong>。</blockquote>\n<p>这就是卡普兰所说的<strong>"理性胡闹"（rational irrationality）</strong>。</p>\n<p>---</p>\n<div class="sh">收入再分配（116）</div>\n<div class="sh">戴雷科特定律</div>\n<p>政府进行财富再分配时，真正得益的并不是社会中最穷的人，而是<strong>中产阶层</strong>。</p>\n<p>原因：</p>\n<p>• 最穷的人没有意识、没有能力、也没有资源替自己说话</p>\n<p>• 最富的人不屑于过多替自己说话</p>\n<p>• 中等收入阶层有很强的动机和能力通过选举为自己办事</p>\n<blockquote>结果是社会上最富和最穷的人，共同补贴了社会上的中产阶级。</blockquote>\n<strong>实例：</strong>\n<p>领域 | 表面受益者 | 实际受益者</p>\n<p>公共教育 | 贫困学生 | 中等收入家庭的孩子（最穷的孩子考不上好大学）</p>\n<p>公共医疗 | 全体民众 | 住在大城市、离好医院近的中等收入阶层</p>\n<p>社会保险与养老金 | 所有退休者 | 更富裕的阶层（穷人早工作早交保险，但富人活得更长）</p>\n<p>免费高速公路 | 所有纳税人 | 有私家车的中等收入阶层</p>\n<p>廉租房与廉价房 | 最穷的人 | 有一定经济基础的中等收入阶层</p>\n<p>---</p>\n<div class="sh">后记：可证伪的才是地道的</div>\n<p>波普尔开创性地指出：<strong>有可能错的理论才是科学理论</strong>。这些理论陈述的内容越丰富、越准确，它出错的可能性就越大，被证伪的可能性也越大。不可能错的理论，则不是科学理论。</p>\n<p>• <strong>科学</strong>：物理学、化学、天文学、经济学——可以被证伪</p>\n<p>• <strong>非科学</strong>：文学、艺术、逻辑、数学——表达情感、愿望、看问题的角度，或是逻辑自洽的符号体系，是永真的</p>\n<blockquote>这并不是说只有科学才有价值，非科学就没有价值，而是说在学习一门学问的时候，我们应该分辨它到底算不算科学，是否要把它当作一门科学来学。</blockquote>',
22: '<div class="sh">辅酶Q10</div>\n<div class="sh">一、形式</div>\n<p>辅酶Q10是生物体内广泛存在的脂溶性醌类化合物，在任何细胞膜和脂蛋白质中都可以发现它的存在。</p>\n<p>三种氧化还原形式：</p>\n<p>形式 | 名称 | 说明</p>\n<p>氧化型 CoQ10 | <strong>泛醌</strong>（ubiquinone） | 比较稳定</p>\n<p>中间体 CoQ10H | <strong>半醌</strong>（ubisemiquinone） | 自由基形式</p>\n<p>还原型 CoQ10H₂ | <strong>泛醇</strong>（ubiquinol） | 更高的活性和理化作用</p>\n<p>• 在血液循环中，<strong>95%</strong> 的辅酶Q10是还原型的泛醇</p>\n<p>• 补充剂仅有氧化型和还原型两种形式，两种形式在体内可以相互转换</p>\n<p>---</p>\n<div class="sh">二、功能</div>\n<div class="sh">1. 产生 ATP 的关键物质</div>\n<p>辅酶Q10可帮助线粒体将食物转化为细胞能量（ATP），在能量需求最大的器官（大脑、心脏、肝脏、肾脏、肌肉）中天然含量最高，有助于维持最佳的细胞功能。</p>\n<div class="sh">2. 抗氧化作用</div>\n<p>氧化型和还原型均有强大的清除自由基的作用，起到强效抗炎作用。<strong>还原型比氧化型的抗氧化作用强 3 倍</strong>。</p>\n<div class="sh">3. 稳定生物膜功能</div>\n<p>可以防止细胞膜破裂及肌纤维结构的破坏，保护生物膜完整性。</p>\n<div class="sh">临床应用</div>\n<p>心绞痛、心肌病与心功能不全、心肌梗塞和心脏手术、高血压、糖尿病、帕金森病、纤维肌痛等疾病的治疗。</p>\n<p>---</p>\n<div class="sh">三、剂量</div>\n<p>人群 | 建议补充量</p>\n<p>健康人群 | 30-100mg/天</p>\n<p>服用他汀类药物或相关健康问题人群 | 60-1200mg/天</p>\n<p>---</p>\n<div class="sh">四、原料专利</div>\n<div class="sh">日本 Kaneka</div>\n<p>• 官网：https://www.kanekanutrients.com/</p>\n<p>• 高品质泛醇（还原型）原料基本由日本 Kaneka 公司垄断</p>\n<p>---</p>\n<div class="sh">五、封装技术专利</div>\n<p>传统的辅酶Q10溶解度较差。使用软胶囊封装且预先使用溶剂溶解的辅酶Q10，吸收率高于粉末形式，常用溶剂是中链甘油三酯。封装技术专利主要集中于增加溶解度和提高生物利用率。</p>\n<div class="sh">5.1 美国 Tishcon 公司</div>\n<p>• 官网：https://www.tishcon.com/ ｜ https://www.qgel.com/</p>\n<p>• 拥有多种辅酶Q10专利商标：Q-Gel、Active-Q、Chew-Q、Derma Q-Gel、HydroQSorb、LiQH、LiQSorb（内服/外用，油溶剂/粉末剂/液体剂/咀嚼片等形式）</p>\n<p>以下两种是最常用的油溶胶囊形式，已经把原料和胶囊皮打包做好，品牌商拿到原料直接装瓶即可，使用这两种专利的产品可以认为是完全一样的产品：</p>\n<strong>Q-Gel®</strong>\n<p>• 原料：天然酵母发酵的泛醌（<strong>氧化型</strong>）</p>\n<p>• 成分：维生素E、明胶、聚山梨酯80、中链甘油三酯、甘油、羟基化卵磷脂、山梨糖醇、纯净水、葵花籽油胭脂红悬浮液</p>\n<strong>Active-Q®（也称 QuinoGel®）</strong>\n<p>• 原料：Kaneka 泛醇（<strong>还原型</strong>）</p>\n<p>• 成分：中链甘油三酯、聚山梨酸酯80、明胶、甘油、山梨醇、抗坏血酸棕榈酯、纯净水、葵花籽油胭脂红悬浮液</p>\n<div class="sh">5.2 瑞士 VESIFACT</div>\n<p>• 官网：https://www.vesifact.ch/ ｜ https://www.sourceoneglobal.com/vesisorb</p>\n<strong>VESIsorb®</strong> 被广泛认为是领先的药物输送系统，可显著提高不同药物的生物利用度（辅酶Q10、omega-3、姜黄素、白藜芦醇、维生素K2、维生素D3等）。\n<p>• <strong>只包括溶剂，不包括原料</strong></p>\n<p>• 成分：明胶、中链甘油三酯、聚山梨酸酯80、聚甘油脂肪酸酯、甘油、焦糖色素</p>\n<div class="sh">5.3 美国 BioActives 公司</div>\n<p>• 官网：https://www.microactiveingredients.com/pages/microactive-coq10</p>\n<strong>MicroActive®</strong> 是粉末状的辅酶Q10，将每个 CoQ10 分子与两个 β-环糊精分子在水介质中复合。分子一侧是脂溶性的（含辅酶Q10），另一侧是水溶性的（有助于通过消化系统有效运输）。\n<p>• 原料：泛醌（<strong>氧化型</strong>）</p>\n<p>• 生物利用度比结晶 CoQ10 高 <strong>3.7 倍</strong></p>\n<div class="sh">5.4 澳大利亚 Pharmako 公司</div>\n<p>• 官网：https://www.pharmako.com.au/aquacelle</p>\n<strong>AquaCelle®</strong> 是一种可定制的自微乳化输送系统（SMEDS），经专门设计和临床证明，可优化泛醇、omega-3、叶黄素和白藜芦醇等油性亲脂性活性成分的生物利用度，同时保持产品稳定性。\n<p>• <strong>只包括溶剂，不包括原料</strong></p>\n<p>• 临床显示可提高生物利用度高达 <strong>700%</strong></p>\n<p>• 成分：柠檬油、明胶、蓖麻油、植物甘油、聚乙二醇、椰子油、橄榄油。含 <2% 的：胭脂红（色素）、卵磷脂、燕麦油、维生素E醋酸酯</p>',
23: '<div class="sh">运营活动设计</div>\n<div class="sh">电商产品目标</div>\n<p>电商产品的目标是<strong>销售额 GMV</strong> 和<strong>用户价值 LTV</strong> 最大化的统一，提升电商销售额也就是提升用户的生命周期价值，提升用户的生命周期价值也就在提升销售额。</p>\n<strong>电商销售额 GMV：</strong>\n<blockquote>GMV = 注册用户数 × 转化率 × 消费次数 × 客单价</blockquote>\n<strong>用户生命周期价值 LTV：</strong>\n<blockquote>新用户 → 首单用户 → 复购用户 → 忠诚用户 → 沉默流失用户</blockquote>\n<p>---</p>\n<div class="sh">活动目标</div>\n<p>• <strong>用户导向</strong>：拉新、转化、留存、会员</p>\n<p>• <strong>销售导向</strong>：提升利润、提升销售额、增加订单量</p>\n<p>• <strong>品牌导向</strong>：提升品牌形象、提升知名度</p>\n<p>---</p>\n<div class="sh">结构维度</div>\n<p>• <strong>用户</strong>：价格敏感、价格不敏感</p>\n<p>• <strong>场景</strong>：线上、线下</p>\n<p>• <strong>激励</strong>：降价、满减、打折、免单、返现、积分、礼物</p>\n<p>• <strong>行为</strong>：邀新、拼团、签到、抽奖、集卡、朋友圈曝光</p>\n<p>• <strong>范围</strong>：单个场站、多个场站、地区范围</p>\n<div class="sh">时间维度</div>\n<p>• <strong>节日</strong>：传统节日、节气、电商节日</p>\n<p>• <strong>社会重大事件</strong>：奥运会等</p>\n<p>• <strong>公司相关事件</strong>：周年庆、挑战者日、地球日</p>\n<p>---</p>\n<div class="sh">投放渠道</div>\n<p>• 短信营销</p>\n<p>• 公司内部公众号</p>\n<p>• 合作车企</p>\n<p>• 车友社群</p>\n<p>• KOL</p>\n<p>• 线下商场</p>\n<div class="sh">投放形式</div>\n<p>• H5 链接</p>\n<p>• 小程序链接</p>\n<p>• 文字</p>\n<p>• 图片（海报、banner）</p>\n<p>• 图文</p>\n<p>• 视频</p>\n<p>---</p>\n<div class="sh">活动规则</div>\n<p>（待补充）</p>\n<p>---</p>\n<div class="sh">活动数据分析</div>\n<strong>分析方式：</strong> 事件分析、分布分析、留存分析、漏斗分析、路径分析\n<strong>需要记录的数据：</strong>（待补充）\n<p>---</p>\n<div class="sh">预置能力</div>\n<p>能力 | 说明 | 备注</p>\n<p>分享及跳转 | 以链接、图片等形式分享到社交软件；通过分享链接进入 App 内页 | 免费</p>\n<p>短信营销 | 给存量用户批量发送短信，提醒用户参与活动或者使用优惠等 | 购买条数</p>\n<p>落地页面 | APP 内页面 | —</p>\n<p>数据分析 | 事件埋点 | 付费功能</p>\n<p>---</p>\n<div class="sh">活动方案</div>\n<div class="sh">活动1：新用户首单优惠</div>\n<p>项目 | 内容</p>\n<p><strong>活动目标</strong> | 拉新</p>\n<p><strong>活动起止时间</strong> | 2023年10月1日 至 2023年12月31日</p>\n<p><strong>优惠券类型</strong> | 免单券（无门槛，最高减免600）；系统自动触发；用户获券后30天内有效</p>\n<p><strong>获券条件</strong> | 新用户注册成功，系统自动发放一张优惠券，每个电话号码仅能获得一次，注销后重新注册的不能再获得此优惠券</p>\n<p><strong>投放渠道</strong> | （待补充）</p>\n<p><strong>投放形式</strong> | 带 App 下载地址的推文 / 图文 / 图片</p>\n<p><strong>数据分析</strong> | 能够追踪新客来源渠道，例如 App 分享 / 微博 / 抖音等渠道分别为 App 带来多少新增用户、启动人数、启动次数</p>\n<div class="sh">活动2：好友邀请拉新</div>\n<p>项目 | 内容</p>\n<p><strong>活动目标</strong> | 拉新</p>\n<p><strong>活动起止时间</strong> | 2023年10月1日 至 2023年12月31日</p>\n<p><strong>优惠券类型</strong> | 免单券（无门槛，最高减免600）；系统自动触发；用户获券后30天内有效</p>\n<p><strong>获券条件</strong> | 注册用户在活动页面分享链接给新用户，新用户通过链接下载 APP 并注册成功的，新用户参与活动1成功，自动获得优惠券；分享用户参与活动2成功，自动获得优惠券</p>\n<p><strong>获取上限</strong> | 每位注册用户参与活动2累计可获得最多10张优惠券</p>\n<p><strong>投放渠道</strong> | （待补充）</p>\n<p><strong>投放形式</strong> | （待补充）</p>\n<p><strong>数据分析</strong> | 能够追踪社交分享链路，活动触发次数、App 启动次数、App 启动人数、App 新增人数</p>',
24: '<div class="sh">键盘使用体验</div>\n<div class="sh">苹果</div>\n<div class="sh">问题</div>\n<p>• 切换手写/中文机制不人性化，只能选其一，不能同时进行</p>\n<p>• 手写很多符号不能识别（导致输入流畅性的主要原因）</p>\n<p>• 部分按键要用力按才有反应，轻按无响应</p>\n<p>• 特殊字符在输入法中无法快速打出</p>\n<div class="sh">优点</div>\n<p>• 开合方便</p>\n<p>• 磁吸几乎无延迟，键盘立刻能响应</p>\n<p>• 中英文混合输入流畅（中文输入法下输入英文流畅）</p>\n<p>• 有输入预测</p>\n<p>• 数字后面半角适配比较好，符合输入习惯</p>\n<p>---</p>\n<div class="sh">华为</div>\n<div class="sh">优点</div>\n<p>• 键盘可以拆卸使用</p>\n<p>• 括号补全</p>\n<div class="sh">缺点</div>\n<p>• 连接结构比较松散，不稳定，必须在桌上使用</p>\n<p>• 触摸板快捷手势比较少，反应不灵敏</p>\n<p>• 中英混合输入时英文字母首字母大写不能和后面的字母一起输入（和小米一样的问题）</p>\n<p>• 不能一键锁屏</p>\n<p>• Shift 按键不是每次都响应（与力度无关）</p>',
25: '<div class="sh">饮食的悖论</div>\n<div class="sh">种子中的化学物质</div>\n<p>裸露的种子没有坚硬的外壳，但含有一种或多种能使捕食者变得虚弱、麻痹或生病的化学物质：</p>\n<p>化学物质 | 作用</p>\n<p><strong>植酸</strong>（抗营养素） | 妨碍身体吸收食物中的矿物质</p>\n<p><strong>胰蛋白酶抑制剂</strong> | 干扰消化酶的正常工作，阻碍生长发育</p>\n<p><strong>凝集素</strong> | 干扰细胞之间的通信，引发肠漏症</p>\n<blockquote>全谷物食品实际上就含有这三种化学防御物质，主要存在于它们的皮、壳、麸皮中。</blockquote>\n<p>---</p>\n<div class="sh">凝集素</div>\n<p>凝集素是一种存在于动植物体内的大分子蛋白质。大多数植物的种子、谷粒、果皮、果壳及叶子中含有的凝集素，都是和碳水化合物（糖）结合在一起的，特别是多糖。由于能与这些物质结合，凝集素也被称为"黏性蛋白"。这种结合会干扰细胞之间的信息传递，引起中毒或炎性反应。</p>\n<div class="sh">麦胚凝集素伪装成胰岛素</div>\n<p>正常情况下，当糖由肠道进入血流时，胰腺分泌胰岛素进入血流，主要去往三个地方：</p>\n<p>目标细胞 | 胰岛素的正常作用 | 麦胚凝集素的破坏</p>\n<p><strong>脂肪细胞</strong> | 与受体结合，指示细胞将葡萄糖转化成脂肪储存，完成后离开受体 | 一直占据受体，不断指示细胞将葡萄糖转变成脂肪</p>\n<p><strong>肌肉细胞</strong> | 打开细胞大门，让葡萄糖进入成为燃料 | 占据受体，阻止胰岛素结合，肌肉无法获得葡萄糖，葡萄糖被分发给脂肪细胞</p>\n<p><strong>神经细胞</strong> | 帮助神经细胞获取葡萄糖 | 阻止葡萄糖进入神经细胞，导致饥饿的大脑要求摄入更多能量</p>\n<blockquote>后果：肌肉越来越少，大脑变得更饥饿，体内储存的脂肪却越来越多。胰岛素抵抗发生在大脑和神经中，被称为<strong>3型糖尿病</strong>。</blockquote>\n<div class="sh">凝集素之王：豆类</div>\n<p>豆类（豌豆、大豆、扁豆等）在所有食物中凝集素含量最高。</p>\n<blockquote><strong>高压烹饪</strong>是处理豆类凝集素的绝佳途径，会破坏凝集素并保留营养成分。</blockquote>\n<div class="sh">新大陆上的凝集素</div>\n<p>包括茄子、花生、腰果、葵花子、奇亚籽和南瓜子等。所有来自新大陆的植物都含有凝集素，人类食用它们的历史还不到 500 年。</p>\n<div class="sh">茄科植物</div>\n<p>茄科植物包括茄子、土豆、辣椒、枸杞和西红柿，含有<strong>茄碱（龙葵素）</strong>——一种神经毒素。</p>\n<p>• 哥伦布把西红柿带回欧洲后的 200 年里，意大利人一直拒绝食用它</p>\n<p>• 至今意大利人制作番茄酱时还会将西红柿<strong>剥皮去籽</strong>（果皮和种子都含有凝集素）</p>\n<p>• 厨师会先用热水烫番茄，剥掉外皮，切成两半挤出籽，最后制作不含果皮和种子的番茄酱</p>\n<div class="sh">南瓜属植物</div>\n<p>南瓜属的所有成员都含有人类在大部分进化过程中都未接触过的凝集素。应该避开南瓜属植物的两个原因：</p>\n<p>• 含有凝集素</p>\n<p>• 其中的糖会告诉身体该为过冬储存脂肪了</p>\n<blockquote>任何长有种子的蔬菜（如南瓜和西葫芦）实际上都属于水果，只会在夏季生长。</blockquote>\n<div class="sh">花生：其实不是坚果</div>\n<p>花生最早起源于美洲，实际上是一种<strong>豆类</strong>而不是坚果，因此富含有害的凝集素。</p>\n<p>• 94% 的人体内都有针对花生凝集素的预成抗体</p>\n<p>• 花生油中的凝集素会导致实验动物患上动脉硬化，去除凝集素后则不会</p>\n<p>• 吃过花生的人的粪便喂给老鼠，老鼠的结肠会发生癌前病变</p>\n<div class="sh">腰果：引起皮疹</div>\n<p>腰果也不是坚果，最初发现于亚马孙雨林。亚马孙人会把含有强效凝集素的核果丢掉，只食用假果。</p>\n<p>• 腰果的外壳具有很强的腐蚀性，加工工人必须戴防护手套</p>\n<p>• 在植物学上，腰果和<strong>毒葛</strong>属于同一科</p>\n<p>• 腰果会明显加重炎症症状，特别是对类风湿性关节炎患者</p>\n<p>---</p>\n<div class="sh">奶牛的基因突变</div>\n<p>大约 2000 年前，北欧奶牛的基因发生了自发性突变，乳汁中的 β-酪蛋白由 <strong>A2 型转变为 A1 型</strong>。</p>\n<p>• A1 型 β-酪蛋白在消化过程中会转变成 <strong>β-酪啡肽</strong>（类似凝集素的蛋白质）</p>\n<p>• β-酪啡肽会附着在胰腺中分泌胰岛素的 β 细胞上，诱骗免疫系统攻击胰腺</p>\n<p>• 这很可能是 <strong>1 型糖尿病</strong>的主要诱因</p>\n<p>奶源 | β-酪蛋白类型 | 安全性</p>\n<p>北欧奶牛 | A1 型 | ⚠️ 有害</p>\n<p>南欧奶牛、山羊、绵羊 | A2 型 | ✅ 相对安全</p>\n<blockquote>如果你觉得自己对乳糖不耐受，或者牛奶会刺激黏液分泌，很可能是对 A1 型 β-酪蛋白过敏。山羊和绵羊的奶及奶酪可以食用，但它们都含有 N-羟乙酰神经氨酸（会引发癌症和心脏病）。</blockquote>\n<p>---</p>\n<div class="sh">转基因玉米</div>\n<p>美国种植的大部分饲料玉米都是转基因玉米——雪花莲中一种能产生强效凝集素的基因被植入了玉米的基因组。</p>\n<p>• 含强效凝集素的转基因玉米喂给牛、鸡和猪，人吃了这些动物的肉，凝集素就会进入体内</p>\n<p>• 这种凝集素会让每个人都发生过敏反应，甚至出现在美国产妇的乳汁中</p>\n<p>• 转基因玉米会导致鸡骨质减少和骨质疏松</p>\n<p>---</p>\n<div class="sh">饮食推荐</div>\n<div class="sh">应当远离的食物</div>\n<p>• 大部分富含凝集素的食物：茄科植物、有种子的蔬菜（牛油果除外）、谷物、比萨饼、面包、谷物早餐、饼干等</p>\n<p>• 所有反季水果（含抗性淀粉的水果和推荐清单上的未成熟水果除外）</p>\n<p>• 少吃牛肉、猪肉和羊肉（减少 N-羟乙酰神经氨酸摄入），草饲动物的肉也要少吃</p>\n<p>• 只食用放牧养殖的鸡、鸭和火鸡</p>\n<p>• 野生鱼类和贝类作为蛋白质来源，远离人工饲养的鱼虾（特别是三文鱼、罗非鱼、鲇鱼和虾）</p>\n<p>• 远离食物链高端位置的鱼（剑鱼、石斑鱼、方头鱼、金枪鱼——汞和重金属较多）</p>\n<p>• 素食者应远离未经发酵的豆制品</p>\n<div class="sh">好好供养肠道有益菌</div>\n<p>食物类型 | 具体食物 | 作用</p>\n<p><strong>抗性淀粉</strong> | 芭蕉、芋头、欧洲萝卜、芜菁、豆薯、芹菜根、菊芋（洋姜）、青香蕉、青芒果、青木瓜 | 肠道有益菌制造短链脂肪酸和酮</p>\n<p><strong>果聚糖</strong> | 菊苣、比利时菊苣、菊芋、秋葵、洋葱、大蒜 | 你能消化的糖，肠道有益菌也可以以它为食</p>\n<p><strong>蘑菇</strong> | 生的或煮熟的蘑菇 | 提供独特的果聚糖呵护肠道有益菌</p>\n<p><strong>绿叶蔬菜和十字花科蔬菜</strong> | — | 促进肠道健康</p>\n<p><strong>多酚类化合物</strong> | 水果果浆（丢掉果汁）、柠檬汁、醋 | 提升革兰氏阳性菌等有益菌的数量</p>\n<p><strong>坚果</strong> | 开心果、核桃、澳洲坚果、胡桃 | 富含多酚类化合物，促进肠道有益菌生长</p>\n<blockquote>将水果榨汁，丢掉果汁（糖就潜伏在这里），把果肉放入思慕雪，或者将果肉与山羊酸奶、绵羊酸奶或椰子酸奶混合。</blockquote>',

function computeRelated(noteId) {
  var results = LLM_RESULTS[noteId];
  if (!results) return [];
  // Attach title from NOTES
  return results.map(function(r) {
    var note = NOTES.find(function(n) { return n.id === r.noteId; });
    return {noteId: r.noteId, title: note ? note.title : "Unknown", dimension: r.dimension, reason: r.reason, confidence: r.confidence};
  });
}

function getDisplayResults(allResults) {
  var display = [];
  var dimCount = {};
  for (var i = 0; i < allResults.length; i++) {
    var r = allResults[i];
    if (r.confidence < 0.70) continue;
    dimCount[r.dimension] = (dimCount[r.dimension] || 0) + 1;
    if (dimCount[r.dimension] > 2) continue;
    display.push(r);
    if (display.length >= 3) break;
  }
  return display;
}

    + '<div class="act">' + SVG_MORE + '</div>'
    + '</div>'
    + '<div class="ph-scroll" style="height:auto;flex:1;overflow-y:auto;padding:0">'
    + '<div class="note-title">' + note.title + '</div>'
    + '<div class="note-meta"><span>' + note.date + '</span> \u00b7 <span>' + note.chars + '\u5b57</span> \u00b7 <span>' + note.category + '</span></div>'
    + '<div class="note-content">' + note.content + '</div>'
    + relatedHTML
    + '</div>'
    + '<div class="ph-bottom" style="position:absolute;bottom:0;left:0;right:0"><div class="ai-pill">' + SVG_SPARK + '<span class="pill-text">\u603b\u7ed3\u3001\u6da6\u8272\u3001\u5bf9\u8bdd...</span></div></div>'
    + '</div>';

  // Right panel
  renderRightPanel(note, allResults, displayResults);
}

function renderRightPanel(note, allResults, displayResults) {
  const dimClass = function(d) { return d === 'project' ? 'dim-project' : d === 'person' ? 'dim-person' : 'dim-topic'; };
  const confColor = function(c) { return c >= 0.8 ? '#22c55e' : c >= 0.6 ? '#eab308' : '#ef4444'; };

  let jsonStr;
  if (displayResults.length > 0) {
    jsonStr = JSON.stringify(displayResults.map(function(r) {
      return { note_id: r.noteId, title: r.title, dimension: r.dimension, reason: r.reason, confidence: r.confidence };
    }), null, 2);
    jsonStr = jsonStr.replace(/"(\w+)":/g, '<span style="color:#7dd3fc">"$1"</span>:')
      .replace(/: "([^"]+)"/g, ': <span style="color:#86efac">"$1"</span>')
      .replace(/: (0\.\d+)/g, ': <span style="color:#fbbf24">$1</span>')
      .replace(/: (\d+),/g, ': <span style="color:#fbbf24">$1</span>,');
  } else {
    jsonStr = '<span style="color:#5a5a72">// 无满足条件的关联笔记\n[]</span>';
  }

  let resultsHTML = '';
  if (displayResults.length > 0) {
    for (const r of displayResults) {
      resultsHTML += '<div class="rp-row" style="flex-wrap:wrap">'
        + '<span class="dim ' + dimClass(r.dimension) + '">' + r.dimension + '</span>'
        + '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + r.title + '</span>'
        + '<div class="conf-bar"><div class="conf-track"><div class="conf-fill" style="width:' + (r.confidence*100) + '%;background:' + confColor(r.confidence) + '"></div></div>'
        + '<span class="conf-val" style="color:' + confColor(r.confidence) + '">' + r.confidence.toFixed(2) + '</span></div>'
        + (r.reason ? '<div style="width:100%;font-size:11px;color:#b0b0c8;margin-top:3px;padding-left:2px;line-height:1.4">' + r.reason + '</div>' : '')
        + '</div>';
    }
  } else {
    resultsHTML = '<div class="rp-empty">∅ 无满足条件的关联笔记</div>';
  }

  const filtered = LLM_FILTERED[note.id] || [];
  let filteredHTML = '';
  if (filtered.length > 0) {
    let rows = '';
    for (const r of filtered) {
      var fn = NOTES.find(function(n) { return n.id === r.noteId; });
      var ftitle = fn ? fn.title : 'Unknown';
      rows += '<div class="rp-row" style="opacity:0.6;flex-wrap:wrap">'
        + '<span style="color:#ef4444;font-size:10px;font-weight:600">\u2715</span>'
        + '<span class="dim ' + dimClass(r.dimension) + '">' + r.dimension + '</span>'
        + '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + ftitle + '</span>'
        + '<div class="conf-bar"><div class="conf-track"><div class="conf-fill" style="width:' + (r.confidence*100) + '%;background:#ef4444"></div></div>'
        + '<span class="conf-val" style="color:#ef4444">' + r.confidence.toFixed(2) + '</span></div>'
        + (r.reason ? '<div style="width:100%;font-size:11px;color:#a0a0b8;margin-top:3px;padding-left:2px;line-height:1.4">' + r.reason + '</div>' : '')
        + '</div>';
    }
    filteredHTML = '<div class="rp-card"><div class="rp-title">\u672a\u63a8\u8350\u4f46\u6709\u5173\u8054</div>' + rows + '</div>';
  }

  rightPanel.innerHTML = '<div class="rp-card">'
    + '<div class="rp-title">当前笔记 <span class="badge">' + note.chars + '字 · ' + note.category + '</span></div>'
    + '<div style="font-size:13px;color:#e8e8f0;font-weight:600">' + note.title + '</div>'
    + '</div>'
    + '<div class="rp-card"><div class="rp-title">LLM 输出 <span class="badge">第三层</span></div>'
    + '<div class="rp-json">' + jsonStr + '</div></div>'
    + '<div class="rp-card"><div class="rp-title">推荐结果（置信度 ≥ 0.70）</div>' + resultsHTML + '</div>'
    + filteredHTML;

  rightPanel.classList.add('visible');
}

// Settings Page
function renderSettings() {
  rightPanel.classList.remove('visible');
  rightPanel.innerHTML = '';

  var SVG_BACK2 = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>';
  var SVG_BATT2 = '<svg width="14" height="10" viewBox="0 0 28 16"><rect x="0" y="0" width="24" height="16" rx="3" fill="none" stroke="#333" stroke-width="2"/><rect x="24" y="4" width="4" height="8" rx="1" fill="#333"/><rect x="2" y="2" width="20" height="12" rx="1.5" fill="#333"/></svg>';

  phone.innerHTML = '<div class="settings-page">'
    + '<div class="ph-sb"><span class="time">14:42</span><div class="right">' + SVG_BATT2 + ' <span style="font-weight:700;font-size:11px;margin-left:2px">87</span></div></div>'
    + '<div class="ph-nav">'
    + '<div class="back" onclick="renderHome(currentFilter)">' + SVG_BACK2 + '</div>'
    + '<div style="flex:1"></div>'
    + '</div>'
    + '<div class="settings-scroll">'
    + '<div style="padding:4px 24px 16px"><h2 style="font-size:26px;font-weight:700;color:#1a1a1a">设置</h2></div>'
    + '<div class="settings-group-title">AI 功能设置</div>'
    + '<div class="settings-group">'
    + '<div class="settings-item">'
    + '<div style="flex:1"><div class="si-label">智能通话笔记</div><div class="si-desc">通话录音结束后自动识别关键内容，生成结构化笔记，减少手动整理</div></div>'
    + '<div class="si-toggle off"></div>'
    + '</div>'
    + '<div class="settings-item">'
    + '<div style="flex:1"><div class="si-label">关联笔记推荐</div><div class="si-desc">分析笔记内容，自动推荐相关笔记</div></div>'
    + '<div class="si-toggle ' + (aiRelatedEnabled ? 'on' : 'off') + '" onclick="toggleRelated(this)"></div>'
    + '</div>'
    + '</div>'
    + '<div class="settings-group-title">云服务</div>'
    + '<div class="settings-group">'
    + '<div class="settings-item"><div style="flex:1"><div class="si-label">小米云同步</div><div class="si-desc">开启后数据将自动同步</div></div><div style="color:#ccc">›</div></div>'
    + '<div class="settings-item"><div style="flex:1"><div class="si-label">云端回收站</div><div class="si-desc">查看和恢复云端已删除的笔记</div></div><div style="color:#ccc">›</div></div>'
    + '</div>'
    + '<div class="settings-group-title">提醒</div>'
    + '<div class="settings-group">'
    + '<div class="settings-item"><div style="flex:1"><div class="si-label">强提醒</div><div class="si-desc">持续响铃且静音和勿扰状态下仍有效</div></div><div class="si-toggle off"></div></div>'
    + '</div>'
    + '<div class="settings-group-title">版本与备案</div>'
    + '<div class="settings-group">'
    + '<div class="settings-item"><div class="si-label">版本信息</div><div style="color:#ccc">›</div></div>'
    + '<div class="settings-item"><div class="si-label">备案信息</div><div style="color:#ccc">›</div></div>'
    + '</div>'
    + '<div class="settings-group-title">其他设置</div>'
    + '<div class="settings-group">'
    + '<div class="settings-item"><div class="si-label">隐私设置</div><div style="color:#ccc">›</div></div>'
    + '</div>'
    + '</div>'
    + '</div>';
}

function toggleRelated(el) {
  aiRelatedEnabled = !aiRelatedEnabled;
  if (aiRelatedEnabled) {
    el.className = 'si-toggle on';
  } else {
    el.className = 'si-toggle off';
  }
}

// Enable AI Related Notes
function enableRelated(noteId) {
  // 原地替换为加载态（G3风格居中）
  var area = document.getElementById('enableArea');
  if (area) {
    area.innerHTML = '<span style="display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border:1px solid #e0e0e0;border-radius:20px;font-size:13px;color:#999">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="10"/></svg>'
      + '正在查找关联笔记...</span>';
  }
  setTimeout(function() {
    aiRelatedEnabled = true;
    // 构建关联结果
    var allResults = computeRelated(noteId);
    var displayResults = getDisplayResults(allResults);
    if (area) {
      if (displayResults.length > 0) {
        var cards = '<div class="related-area"><div class="related-label">关联笔记：</div>';
        for (var i = 0; i < displayResults.length; i++) {
          var r = displayResults[i];
          cards += '<div class="related-card" onclick="renderDetail(' + r.noteId + ')">'
            + '<div class="rc-icon">' + SVG_DOC + '</div>'
            + '<div class="rc-title">' + r.title + '</div>'
            + '<div class="rc-chevron">' + SVG_CHEVRON + '</div>'
            + '</div>';
        }
        cards += '</div>';
        area.outerHTML = cards;
      } else {
        area.outerHTML = '';
      }
    }
    // 更新右侧面板
    var note = NOTES.find(function(n) { return n.id === noteId; });
    if (note) renderRightPanel(note, allResults, displayResults);
  }, 1500);
}

// Init
switchDataset(0);
