<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Claw · 全场景跨端演示 v4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F2F2F7;--card:#FFFFFF;--card2:#F8F8FA;--card3:#F0F0F5;
  --bd:rgba(60,60,67,.08);--bd2:rgba(60,60,67,.14);
  --tx:#1C1C1E;--su:#48484A;--mu:#8E8E93;--dm:rgba(60,60,67,.2);
  --bl:#0A84FF;--am:#FF9F0A;--pu:#BF5AF2;--gn:#30D158;--rd:#FF453A;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
  --r-sm:10px;--r-md:16px;--r-lg:22px;--r-full:999px;
}
html,body{background:linear-gradient(145deg,#0D0D12,#1A1A2E 30%,#16213E 60%,#0F3460);
  color:var(--tx);font-family:-apple-system,'Noto Sans SC',sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;
  display:flex;justify-content:center;align-items:flex-start;padding:40px 10px 60px}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none}
body::before{width:400px;height:400px;background:#BF5AF2;top:-80px;right:-80px}
body::after{width:350px;height:350px;background:#0A84FF;bottom:-60px;left:-60px}
.demo-wrap{display:flex;align-items:flex-start;gap:24px;position:relative}
.device-area{display:flex;gap:24px;align-items:flex-start}
/* ── PHONE ── */
.phone{width:393px;height:852px;background:var(--bg);border-radius:48px;overflow:hidden;position:relative;flex-shrink:0;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.08),0 0 0 2px #2A2A3A,0 0 0 4px #1A1A2A,0 25px 80px rgba(0,0,0,.6),0 5px 20px rgba(0,0,0,.3)}
.phone .sbar{position:absolute;top:14px;left:28px;right:28px;display:flex;justify-content:space-between;align-items:center;z-index:20;pointer-events:none;font-size:14px;font-weight:600;color:var(--tx)}
.sbar-icons{display:flex;gap:4px;font-size:11px;color:var(--mu)}
.phone-label,.pad-label{position:absolute;top:-28px;left:0;color:rgba(255,255,255,.35);font-size:11px;font-weight:600;letter-spacing:.5px}
/* ── PAD ── */
.pad{width:540px;height:720px;background:var(--bg);border-radius:28px;overflow:hidden;position:relative;flex-shrink:0;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.08),0 0 0 2px #2A2A3A,0 0 0 4px #1A1A2A,0 25px 80px rgba(0,0,0,.6),0 5px 20px rgba(0,0,0,.3)}
.pad .sbar{position:absolute;top:10px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:center;z-index:20;pointer-events:none;font-size:12px;font-weight:600;color:var(--tx)}
/* ── SCREEN ── */
.screen{position:absolute;inset:0;top:48px;overflow:hidden;background:var(--card2)}
.pad .screen{top:36px}
.pg{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s,transform .3s;overflow:hidden;background:var(--card2)}
.pg.show{opacity:1;transform:none}.pg.hide{opacity:0;transform:translateY(16px);pointer-events:none}
.pg-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:16px}
.pg-scroll::-webkit-scrollbar{width:2px}.pg-scroll::-webkit-scrollbar-thumb{background:var(--dm)}
/* ═══ CLAW LINE ═══ */
.claw-line{position:absolute;bottom:0;left:0;right:0;height:4px;z-index:50;cursor:pointer;overflow:visible;animation:claw-breathe 3s ease-in-out infinite}
.claw-line::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,#4F46E5,#7C3AED,#A855F7,#6366F1,#3B82F6,#06B6D4,#7C3AED,#4F46E5);background-size:300% 100%;animation:cf 6s linear infinite;border-radius:2px}
.claw-line::after{content:'';position:absolute;top:-6px;bottom:-6px;left:0;right:0;background:linear-gradient(90deg,rgba(79,70,229,.3),rgba(124,58,237,.4),rgba(168,85,247,.3));background-size:300% 100%;animation:cf 6s linear infinite;filter:blur(10px);pointer-events:none}
@keyframes cf{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes claw-breathe{0%,100%{opacity:.65}50%{opacity:1}}
.claw-line.recording{height:6px;animation:none;opacity:1}
.claw-line.recording::before{animation:cf 1.5s linear infinite;background:linear-gradient(90deg,#FF2200,#FF6600,#FF9900,#FFCC00,#FF6600,#FF2200);background-size:300% 100%}
.claw-line.recording::after{top:-10px;bottom:-10px;filter:blur(14px);animation:cf 1.5s linear infinite,cp 1s ease-in-out infinite;background:linear-gradient(90deg,rgba(255,34,0,.4),rgba(255,102,0,.4),rgba(255,153,0,.4));background-size:300% 100%}
@keyframes cp{0%,100%{opacity:.4}50%{opacity:.9}}
.claw-line.processing{height:5px;animation:none;opacity:1}
.claw-line.processing::before{animation:cf .8s linear infinite;background:linear-gradient(90deg,#00ccff,#00ff88,#00ccff,#0088ff,#00ff88);background-size:300% 100%}
.claw-line.processing::after{top:-8px;bottom:-8px;filter:blur(12px);animation:cf .8s linear infinite;background:linear-gradient(90deg,rgba(0,204,255,.3),rgba(0,255,136,.3),rgba(0,136,255,.3));background-size:300% 100%}
/* ═══ SUPER ISLAND ═══ */
.super-island{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:60;
  background:rgba(28,28,30,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:28px;padding:6px 14px;display:none;align-items:center;gap:8px;
  min-width:180px;max-width:340px;color:white;
  box-shadow:0 8px 32px rgba(0,0,0,.4);transition:all .4s cubic-bezier(.25,.46,.45,.94);cursor:pointer}
.super-island.show{display:flex}
.super-island.expanded{padding:14px 16px;border-radius:22px;flex-direction:column;gap:10px;min-width:300px;cursor:default}
.si-mini{display:flex;align-items:center;gap:8px;width:100%}
.si-icon{font-size:16px;flex-shrink:0}
.si-text{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-dot{width:6px;height:6px;border-radius:50%;background:#30D158;animation:si-pulse 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes si-pulse{0%,100%{opacity:.5;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.si-expanded-content{display:none;width:100%;flex-direction:column;gap:8px}
.super-island.expanded .si-expanded-content{display:flex}
.super-island.expanded .si-dot{display:none}
.si-detail{font-size:11px;color:rgba(255,255,255,.7);line-height:1.5}
.si-btns{display:flex;gap:8px;width:100%}
.si-btn{flex:1;padding:9px;border-radius:12px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.si-btn-note{background:#0A84FF;color:white}
.si-btn-claw{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.2)}
.si-btn:active{transform:scale(.96)}
/* ═══ NOTIFICATION BANNER ═══ */
.notif-banner{position:absolute;top:52px;left:10px;right:10px;z-index:55;
  background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:16px;padding:12px 14px;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.15);cursor:pointer;
  animation:notif-in .4s cubic-bezier(.25,.46,.45,.94) both}
.notif-banner.show{display:flex;align-items:center;gap:10px}
@keyframes notif-in{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
.notif-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.notif-body{flex:1;min-width:0}
.notif-app{font-size:9px;font-weight:700;letter-spacing:.04em;color:var(--mu)}
.notif-title{font-size:12px;font-weight:700;color:var(--tx);margin-top:1px}
.notif-sub{font-size:10px;color:var(--su);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif-time{font-size:9px;color:var(--mu);flex-shrink:0}
/* ═══ REC / PROC PANELS ═══ */
.rec-panel{position:absolute;bottom:14px;left:12px;right:12px;z-index:42;
  background:rgba(255,255,255,.97);backdrop-filter:blur(24px);border-radius:20px;
  border:1px solid rgba(255,255,255,.8);box-shadow:0 12px 40px rgba(0,0,0,.16);
  padding:16px;display:none;flex-direction:column;align-items:center;gap:12px;
  animation:panel-up .32s cubic-bezier(.25,.46,.45,.94) both}
.rec-panel.show{display:flex}
@keyframes panel-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.proc-panel{position:absolute;bottom:14px;left:12px;right:12px;z-index:42;
  background:rgba(255,255,255,.97);backdrop-filter:blur(24px);border-radius:20px;
  box-shadow:0 12px 40px rgba(0,0,0,.16);padding:18px;display:none;
  flex-direction:column;align-items:center;gap:10px;animation:panel-up .32s cubic-bezier(.25,.46,.45,.94) both}
.proc-panel.show{display:flex}
.proc-dots{display:flex;gap:6px}
.proc-dot{width:7px;height:7px;border-radius:50%;background:var(--bl);animation:pd 1.2s ease-in-out infinite}
.proc-dot:nth-child(2){animation-delay:.2s}.proc-dot:nth-child(3){animation-delay:.4s}
@keyframes pd{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
/* ═══ JUMP OVERLAY ═══ */
.jump-overlay{position:absolute;inset:0;z-index:55;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.jump-overlay.show{display:flex}
.jump-icon{font-size:32px;animation:jumpPulse 1s ease-in-out infinite}
@keyframes jumpPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.1);opacity:1}}
</style>
<style>
/* ═══ DESKTOP HOME ═══ */
.desk-wallpaper{position:absolute;inset:0;background:linear-gradient(160deg,#C9D6FF,#E2E2E2)}
.desk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px 10px;padding:16px 18px 10px;position:relative;z-index:1}
.desk-app{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default}
.desk-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.desk-label{font-size:10px;color:#333;font-weight:500;text-shadow:0 .5px 1px rgba(255,255,255,.6)}
.desk-dock{position:absolute;bottom:12px;left:18px;right:18px;z-index:2;background:rgba(255,255,255,.45);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px;padding:10px 14px;display:flex;justify-content:space-around;align-items:center}
.desk-dock-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
/* ═══ NOTE PAGE ═══ */
.note-hd{padding:10px 16px 11px;background:var(--card);border-bottom:1px solid var(--bd)}
.note-hd-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.note-back{font-size:12px;color:var(--bl);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.note-acts{display:flex;gap:5px}
.note-act{background:var(--card3);border-radius:8px;padding:4px 8px;font-size:10px;font-weight:600;color:var(--su);cursor:pointer;transition:all .15s}
.note-type{font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;margin-bottom:6px}
.note-title{font-size:16px;font-weight:700;line-height:1.3;margin-bottom:4px;letter-spacing:-.02em}
.note-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.note-tag{font-size:10px;font-weight:600;padding:2px 9px;border-radius:7px;background:var(--card3);color:var(--su)}
.nbody{padding:13px 16px}
.nh1{font-size:15px;font-weight:800;margin-bottom:8px}
.nh2{font-size:12px;font-weight:700;margin:12px 0 5px;display:flex;align-items:center;gap:5px}
.nbd{font-size:11.5px;color:var(--su);line-height:1.8;white-space:pre-line;padding-left:12px}
/* ═══ INLINE EDIT (核心：内联diff确认) ═══ */
.inline-edit{margin:8px 0;padding:10px 12px;background:rgba(255,159,10,.04);border:1px solid rgba(255,159,10,.15);border-radius:12px;animation:fadeIn .35s ease both}
.inline-edit-cmd{font-size:10px;color:var(--am);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.inline-edit-diff{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.inline-del{font-size:11px;color:var(--rd);text-decoration:line-through;background:rgba(255,69,58,.06);padding:3px 8px;border-radius:6px;line-height:1.6}
.inline-add{font-size:11px;color:var(--gn);font-weight:600;background:rgba(48,209,88,.06);padding:3px 8px;border-radius:6px;line-height:1.6}
.inline-edit-btns{display:flex;gap:8px}
.inline-edit-rej{flex:1;padding:7px;border-radius:10px;font-size:11px;font-weight:600;border:1.5px solid var(--bd2);background:transparent;color:var(--su);cursor:pointer}
.inline-edit-acc{flex:2;padding:7px;border-radius:10px;font-size:11px;font-weight:700;border:none;background:var(--gn);color:white;cursor:pointer;box-shadow:0 4px 12px rgba(48,209,88,.3)}
/* ═══ INLINE DISCUSS (核心：内联讨论气泡) ═══ */
.inline-discuss{margin:8px 0;padding:10px 12px;background:rgba(191,90,242,.04);border:1px solid rgba(191,90,242,.12);border-radius:12px;animation:fadeIn .35s ease both}
.inline-disc-hd{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.inline-disc-icon{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#BF5AF2,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:9px;color:white;flex-shrink:0}
.inline-disc-title{font-size:10px;font-weight:700;color:var(--pu);flex:1}
.inline-disc-thread{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.id-user{display:flex;justify-content:flex-end}
.id-user-bub{background:linear-gradient(145deg,#BF5AF2,#9333EA);color:white;border-radius:12px 12px 4px 12px;padding:6px 10px;font-size:10.5px;line-height:1.5;max-width:85%}
.id-ai{display:flex;gap:5px;align-items:flex-start}
.id-ai-av{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#4F46E5);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:white;flex-shrink:0;margin-top:2px}
.id-ai-bub{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.1);border-radius:4px 12px 12px 12px;padding:6px 10px;font-size:10.5px;line-height:1.5;color:var(--tx);max-width:85%}
.id-result{padding:8px 10px;background:rgba(48,209,88,.05);border:1px solid rgba(48,209,88,.12);border-radius:10px;margin-top:4px}
.id-result-lbl{font-size:9px;font-weight:700;color:var(--gn);letter-spacing:.04em;margin-bottom:3px}
.id-result-txt{font-size:10.5px;color:var(--tx);line-height:1.5}
.inline-disc-btns{display:flex;gap:8px}
.inline-disc-rej{flex:1;padding:7px;border-radius:10px;font-size:11px;font-weight:600;border:1.5px solid var(--bd2);background:transparent;color:var(--su);cursor:pointer}
.inline-disc-acc{flex:2;padding:7px;border-radius:10px;font-size:11px;font-weight:700;border:none;background:var(--gn);color:white;cursor:pointer;box-shadow:0 4px 12px rgba(48,209,88,.3)}
/* ═══ INPUT BAR ═══ */
.input-bar{position:absolute;bottom:0;left:0;right:0;z-index:46;display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);min-height:48px}
.input-bar-field{flex:1;display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--card3);border:1px solid var(--bd);border-radius:12px;cursor:pointer;transition:all .2s;min-height:34px}
.input-bar-placeholder{font-size:11px;color:var(--mu);flex:1}
.input-bar-mic{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#4F46E5,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:12px;color:white;flex-shrink:0;cursor:pointer;box-shadow:0 2px 8px rgba(124,58,237,.3);transition:all .2s}
.input-bar-mic:hover{transform:scale(1.08)}
.input-bar-mic.recording{background:linear-gradient(135deg,#FF453A,#FF6B6B);box-shadow:0 2px 12px rgba(255,69,58,.4);animation:micPulse 1s ease-in-out infinite}
@keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
/* ═══ CHAT PAGE (Claw对话) ═══ */
.chat-scroll{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.chat-scroll::-webkit-scrollbar{width:2px}.chat-scroll::-webkit-scrollbar-thumb{background:var(--dm)}
.ch-user{display:flex;justify-content:flex-end}
.ch-user-bub{background:linear-gradient(145deg,#007AFF,#0A84FF);color:white;border-radius:14px 14px 4px 14px;padding:8px 12px;font-size:11.5px;line-height:1.6;max-width:82%;box-shadow:0 2px 8px rgba(10,132,255,.2)}
.ch-ai{display:flex;gap:6px;align-items:flex-start}
.ch-ai-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#4F46E5);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;flex-shrink:0;margin-top:2px}
.ch-ai-bub{background:var(--card);border:1px solid var(--bd);border-radius:4px 14px 14px 14px;padding:8px 12px;font-size:11.5px;line-height:1.6;color:var(--tx);max-width:85%}
.ch-typing{display:flex;gap:4px;padding:4px 0}
.ch-typing-dot{width:5px;height:5px;border-radius:50%;background:var(--pu);animation:pd 1.2s ease-in-out infinite}
.ch-typing-dot:nth-child(2){animation-delay:.2s}.ch-typing-dot:nth-child(3){animation-delay:.4s}
/* result card in chat */
.ch-result-card{margin:4px 0;padding:12px;background:var(--card);border:1px solid rgba(48,209,88,.15);border-radius:14px;box-shadow:var(--shadow-sm)}
.ch-result-label{font-size:9px;font-weight:700;color:var(--gn);letter-spacing:.04em;margin-bottom:6px}
.ch-result-title{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:4px}
.ch-result-preview{font-size:10.5px;color:var(--su);line-height:1.5;margin-bottom:8px}
.ch-result-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;background:var(--bl);color:white;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
/* ═══ SYNC ANIMATION ═══ */
.sync-beam{position:fixed;pointer-events:none;z-index:100;display:none}
.sync-beam.show{display:block}
.sync-beam-line{stroke:url(#syncGrad);stroke-width:2;fill:none;stroke-dasharray:8 4;animation:syncDash 1s linear infinite}
@keyframes syncDash{to{stroke-dashoffset:-24}}
.sync-dot{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--bl);z-index:101;display:none;box-shadow:0 0 12px rgba(10,132,255,.5)}
.sync-dot.show{display:block;animation:syncMove .8s ease-in-out}
@keyframes syncMove{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(0)}}
/* ═══ PAD NOTE VIEW ═══ */
.pad-note-hd{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--bd)}
.pad-note-title{font-size:18px;font-weight:700;margin-bottom:4px}
.pad-note-meta{font-size:11px;color:var(--mu)}
.pad-note-body{padding:16px 20px}
.pad-note-body .nh2{font-size:14px}
.pad-note-body .nbd{font-size:13px}
/* ═══ SCENE PANEL ═══ */
.scene-panel{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;max-height:852px;overflow-y:auto}
.scene-panel::-webkit-scrollbar{width:3px}.scene-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sp-group{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:10px 12px}
.sp-group-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.06em;margin-bottom:8px}
.sp-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:2px}

function clearAll(){_timers.forEach(t=>clearTimeout(t));_timers=[];if(_recTimer){clearInterval(_recTimer);_recTimer=null}}
function pushT(fn,ms){const t=setTimeout(fn,ms);_timers.push(t);return t}

// ═══ SCENE PANEL ═══
function buildScenePanel(){
  const p=$('#SCENE_PANEL');p.innerHTML='';
  GROUPS.forEach(g=>{
    const grp=mk('div','sp-group');
    grp.innerHTML='<div class="sp-group-title">'+g.icon+' '+g.label+'</div>';
    g.scenes.forEach(sid=>{
      const s=SCENES[sid];
      const item=mk('div','sp-item');item.id='SP_'+sid;
      item.innerHTML='<div class="sp-item-icon">'+s.icon+'</div><div><div class="sp-item-name">'+s.name+'</div><div class="sp-item-sub">'+s.sub+'</div></div>';
      item.onclick=()=>runScene(sid);
      grp.appendChild(item);
    });
    p.appendChild(grp);
  });
  // auto-play button
  const ab=mk('div','sp-group');
  ab.innerHTML='<div style="text-align:center;padding:8px"><button id="AUTO_BTN" style="width:100%;padding:10px;border-radius:12px;border:none;background:linear-gradient(145deg,#0A84FF,#007AFF);color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(10,132,255,.3)">▶ 自动演示全流程</button></div>';
  p.appendChild(ab);
  ab.querySelector('#AUTO_BTN').onclick=autoDemo;
}
function updateScenePanel(){
  SCENE_ORDER.forEach(sid=>{
    const el=$('#SP_'+sid);
    if(el)el.className='sp-item'+(sid===_scId?' active':'');
  });
}

// ═══ SYNC ANIMATION ═══
function showSyncAnim(){
  const phone=$('#PHONE'),pad=$('#PAD');
  if(!phone||!pad)return;
  const pr=phone.getBoundingClientRect(),par=pad.getBoundingClientRect();
  const dot=mk('div','sync-dot show');
  dot.style.cssText='left:'+(pr.right+4)+'px;top:'+(pr.top+pr.height/2)+'px;position:fixed;';
  document.body.appendChild(dot);
  dot.animate([
    {left:pr.right+'px',top:(pr.top+pr.height/2)+'px',opacity:1},
    {left:par.left+'px',top:(par.top+par.height/2)+'px',opacity:1}
  ],{duration:600,easing:'ease-in-out'});
  setTimeout(()=>dot.remove(),700);
}

    s.doc.forEach((d,i)=>{if(i===0)return;
      if(d.t==='h2'){const h=mk('div','nh2');h.style.color=s.color;h.innerHTML='<span style="background:'+s.color+';width:3px;height:11px;border-radius:2px;display:inline-block"></span>'+d.v;body.appendChild(h)}
      else if(d.t==='bd'){const b=mk('div','nbd');b.textContent=d.v;body.appendChild(b)}
    });

    // ── 过程层：修订历史（折叠在笔记底部） ──
    const revSec=mk('div','revision-section');

    revSec.innerHTML='<div class="revision-toggle" id="REV_TOGGLE"><span class="revision-toggle-icon" id="REV_ICON">▸</span><span class="revision-toggle-text">📋 修订历史</span><span class="revision-toggle-count" id="REV_COUNT">'+editCount+' 条记录</span></div><div class="revision-body" id="REV_BODY"><div class="revision-body-inner" id="REV_INNER"></div></div>';

    const ib=mk('div','input-bar');ib.id='PH_INPUT';

function buildRevisionHistory(s){
  const inner=$('#REV_INNER');if(!inner)return;
  let html='';
  // 初始生成记录
  html+='<div class="rev-divider">── 笔记生成 ──</div>';
  if(s.hasSrc){
    html+='<div class="rev-user"><div class="rev-user-bub">'+s.srcIcon+' '+s.srcTitle+'</div></div>';
  }
  html+='<div class="rev-ai"><div class="rev-ai-av">AI</div><div class="rev-ai-bub">已识别意图：<b>'+s.name+'</b><br/>生成结构化笔记</div></div>';
  html+='<div class="rev-action">✓ 笔记已生成 · '+s.doc[0].v+'</div>';
  inner.innerHTML=html;
}

function appendRevisionEntry(edit){
  const inner=$('#REV_INNER');if(!inner)return;
  const count=$('#REV_COUNT');
  let html='<div class="rev-divider">── 编辑指令 ──</div>';
  html+='<div class="rev-user"><div class="rev-user-bub">🎙 '+edit.cmd+'</div></div>';
  if(edit.type==='discuss'){
    html+='<div class="rev-ai"><div class="rev-ai-av">AI</div><div class="rev-ai-bub" style="color:var(--pu)">发起讨论…</div></div>';
    edit.dialog.forEach(msg=>{
      if(msg.role==='user'){html+='<div class="rev-user"><div class="rev-user-bub">'+msg.text+'</div></div>'}
      else{html+='<div class="rev-ai"><div class="rev-ai-av">AI</div><div class="rev-ai-bub">'+msg.text.replace(/\n/g,'<br>')+'</div></div>'}
    });
    html+='<div class="rev-action">✓ 达成共识 · '+edit.result+'</div>';
  } else {
    html+='<div class="rev-ai"><div class="rev-ai-av">AI</div><div class="rev-ai-bub"><span style="text-decoration:line-through;color:var(--rd)">'+edit.before+'</span> → <span style="color:var(--gn);font-weight:600">'+edit.after+'</span></div></div>';
    html+='<div class="rev-action">✓ 已应用修改</div>';
  }
  inner.insertAdjacentHTML('beforeend',html);
  // update count
  const entries=inner.querySelectorAll('.rev-divider').length;
  if(count)count.textContent=entries+' 条记录';
}

// ═══ NOTE EDIT: RECORDING → APPLY ═══
function startNoteEdit(){
  if(!_scId)return;const s=SCENES[_scId];if(_editIdx>=s.edits.length)return;
  const cl=$('#PH_CLAW');if(cl)cl.classList.add('recording');
  const mic=$('#PH_IB_MIC');if(mic){mic.classList.add('recording');mic.textContent='⏹'}
  const field=$('#PH_IB_FIELD');if(field)field.innerHTML='<span style="font-size:11px;color:var(--rd);font-weight:600;flex:1">录入编辑指令…</span>';
  _recSec=0;
  const pg=$('#PH_SCR .pg');if(!pg)return;
  let rp=pg.querySelector('.rec-panel');
  if(!rp){rp=mk('div','rec-panel');
    rp.innerHTML='<div style="font-size:11px;font-weight:600;color:var(--su)">录入编辑指令…</div><div style="font-size:24px;font-weight:300;color:var(--rd);font-variant-numeric:tabular-nums" id="PH_REC_TIME">0:00</div><div style="display:flex;align-items:center;gap:2.5px;height:28px" id="PH_REC_WAVE">'+Array.from({length:24},()=>'<div class="wvb" style="width:2.5px;border-radius:2px;background:var(--rd);height:4px;transition:height .1s"></div>').join('')+'</div><button class="rec-stop" id="PH_REC_STOP"></button>';
    pg.insertBefore(rp,pg.querySelector('.claw-line'))}
  setTimeout(()=>rp.classList.add('show'),10);
  _recTimer=setInterval(()=>{_recSec++;const m=Math.floor(_recSec/60),sec=_recSec%60;
    const rt=$('#PH_REC_TIME');if(rt)rt.textContent=m+':'+(sec<10?'0':'')+sec;
    pg.querySelectorAll('#PH_REC_WAVE .wvb').forEach(b=>{b.style.height=(4+Math.random()*22)+'px'})},200);
  const stop=$('#PH_REC_STOP');if(stop)stop.onclick=()=>stopNoteEdit();
}
function stopNoteEdit(){
  if(_recTimer){clearInterval(_recTimer);_recTimer=null}
  const cl=$('#PH_CLAW');if(cl){cl.classList.remove('recording');cl.classList.add('processing')}
  const mic=$('#PH_IB_MIC');if(mic){mic.classList.remove('recording');mic.textContent='🎤'}
  const field=$('#PH_IB_FIELD');if(field)field.innerHTML='<span class="input-bar-placeholder">说出想法，AI 帮你改…</span>';
  const pg=$('#PH_SCR .pg');if(!pg)return;
  const rp=pg.querySelector('.rec-panel');if(rp)rp.classList.remove('show');
  pushT(()=>{if(cl)cl.classList.remove('processing');applyEdit()},700);
}

// ═══ APPLY EDIT: INLINE in note body ═══
function applyEdit(){
  if(!_scId)return;const s=SCENES[_scId];if(_editIdx>=s.edits.length)return;
  const edit=s.edits[_editIdx];
  const nb=$('#PH_NBODY');if(!nb)return;
  const scroll=$('#PH_SCROLL');
  if(edit.type==='confirm'){showInlineConfirm(edit,nb,scroll)}
  else if(edit.type==='discuss'){showInlineDiscuss(edit,nb,scroll)}
}

// ═══ INLINE CONFIRM (内联diff) ═══
function showInlineConfirm(edit,nb,scroll){
  const block=mk('div','inline-edit anim-in');
  block.innerHTML='<div class="inline-edit-cmd">🎙 "'+edit.cmd+'"</div><div class="inline-edit-diff"><div class="inline-del">− '+edit.before+'</div><div class="inline-add">+ '+edit.after+'</div></div><div class="inline-edit-btns"><button class="inline-edit-rej">放弃</button><button class="inline-edit-acc">✓ 应用修改</button></div>';
  nb.appendChild(block);
  if(scroll)scroll.scrollTop=scroll.scrollHeight;
  block.querySelector('.inline-edit-acc').onclick=()=>{
    edit.fn(nb);block.remove();_editIdx++;
    appendRevisionEntry(edit);
    syncEditToPad();
  };
  block.querySelector('.inline-edit-rej').onclick=()=>{block.remove();_editIdx++};
}

// ═══ INLINE DISCUSS (内联讨论气泡) ═══
function showInlineDiscuss(edit,nb,scroll){
  const block=mk('div','inline-discuss anim-in');
  block.innerHTML='<div class="inline-disc-hd"><div class="inline-disc-icon">💬</div><div class="inline-disc-title">深入讨论</div></div><div class="inline-disc-thread" id="ID_THREAD"></div><div class="inline-disc-btns" id="ID_BTNS" style="display:none"><button class="inline-disc-rej">放弃</button><button class="inline-disc-acc">✓ 应用方案</button></div>';
  nb.appendChild(block);
  if(scroll)scroll.scrollTop=scroll.scrollHeight;
  const thread=block.querySelector('#ID_THREAD');
  const dialog=edit.dialog;let idx=0;
  // initial user command
  const cmdRow=mk('div','id-user anim-in');cmdRow.innerHTML='<div class="id-user-bub">🎙 '+edit.cmd+'</div>';
  thread.appendChild(cmdRow);
  function showNext(){
    if(idx>=dialog.length){
      pushT(()=>{
        const res=mk('div','id-result anim-in');
        res.innerHTML='<div class="id-result-lbl">✓ 达成共识</div><div class="id-result-txt">'+edit.result+'</div>';
        thread.appendChild(res);
        if(scroll)scroll.scrollTop=scroll.scrollHeight;
        const btns=block.querySelector('#ID_BTNS');if(btns)btns.style.display='flex';
      },400);return;
    }
    const msg=dialog[idx];
    if(msg.role==='ai'){
      const typing=mk('div','id-ai anim-in');typing.innerHTML='<div class="id-ai-av">AI</div><div class="ch-typing"><div class="ch-typing-dot"></div><div class="ch-typing-dot"></div><div class="ch-typing-dot"></div></div>';
      thread.appendChild(typing);if(scroll)scroll.scrollTop=scroll.scrollHeight;
      pushT(()=>{typing.remove();
        const row=mk('div','id-ai anim-in');row.innerHTML='<div class="id-ai-av">AI</div><div class="id-ai-bub">'+msg.text.replace(/\n/g,'<br>')+'</div>';
        thread.appendChild(row);if(scroll)scroll.scrollTop=scroll.scrollHeight;idx++;
        pushT(showNext,600);
      },800);
    } else {
      const row=mk('div','id-user anim-in');row.innerHTML='<div class="id-user-bub">'+msg.text+'</div>';
      thread.appendChild(row);if(scroll)scroll.scrollTop=scroll.scrollHeight;idx++;
      pushT(showNext,500);
    }
  }
  pushT(()=>{
    const aiIntro=mk('div','id-ai anim-in');aiIntro.innerHTML='<div class="id-ai-av">AI</div><div class="id-ai-bub" style="color:var(--pu);font-weight:500;font-size:10px">这个指令比较模糊，我们先讨论一下？</div>';
    thread.appendChild(aiIntro);if(scroll)scroll.scrollTop=scroll.scrollHeight;
    pushT(showNext,600);
  },500);
  // buttons
  pushT(()=>{
    const accBtn=block.querySelector('.inline-disc-acc');
    const rejBtn=block.querySelector('.inline-disc-rej');
    if(accBtn)accBtn.onclick=()=>{edit.fn(nb);block.remove();_editIdx++;appendRevisionEntry(edit);syncEditToPad()};
    if(rejBtn)rejBtn.onclick=()=>{block.remove();_editIdx++};
  },100);
}

function syncEditToPad(){
  if(!_scId)return;
  showSyncAnim();
  pushT(()=>padShowNote(SCENES[_scId]),500);
}

// ═══ TRIGGER: SUPER ISLAND ═══
function showSuperIsland(s,onNote,onClaw){
  const pg=$('#PH_SCR .pg');if(!pg)return;
  let si=pg.querySelector('.super-island');
  if(!si){si=mk('div','super-island');pg.appendChild(si)}
  si.className='super-island show';
  si.innerHTML='<div class="si-mini"><div class="si-icon">'+s.icon+'</div><div class="si-text">'+s.triggerText+'</div><div class="si-dot"></div></div><div class="si-expanded-content"><div class="si-detail">'+s.triggerDetail+'</div><div class="si-btns"><button class="si-btn si-btn-note">📝 查看笔记</button><button class="si-btn si-btn-claw">💬 进入Claw</button></div></div>';
  si.onclick=()=>{
    si.classList.add('expanded');si.onclick=null;
    const noteBtn=si.querySelector('.si-btn-note');
    const clawBtn=si.querySelector('.si-btn-claw');
    if(noteBtn)noteBtn.onclick=(e)=>{e.stopPropagation();si.classList.remove('show');pushT(()=>{if(onNote)onNote()},300)};
    if(clawBtn)clawBtn.onclick=(e)=>{e.stopPropagation();si.classList.remove('show');pushT(()=>{if(onClaw)onClaw()},300)};
  };
  // auto expand after 1.5s
  pushT(()=>{if(si.classList.contains('show')&&!si.classList.contains('expanded')){si.classList.add('expanded');si.onclick=null;
    const noteBtn=si.querySelector('.si-btn-note');
    const clawBtn=si.querySelector('.si-btn-claw');
    if(noteBtn)noteBtn.onclick=(e)=>{e.stopPropagation();si.classList.remove('show');pushT(()=>{if(onNote)onNote()},300)};
    if(clawBtn)clawBtn.onclick=(e)=>{e.stopPropagation();si.classList.remove('show');pushT(()=>{if(onClaw)onClaw()},300)};
  }},1500);
}

// ═══ TRIGGER: NOTIFICATION ═══
function showNotification(s,onTap){
  const pg=$('#PH_SCR .pg');if(!pg)return;
  let nb=pg.querySelector('.notif-banner');
  if(!nb){nb=mk('div','notif-banner');pg.appendChild(nb)}
  nb.className='notif-banner show';
  nb.innerHTML='<div class="notif-icon" style="background:'+s.color+'15">'+s.icon+'</div><div class="notif-body"><div class="notif-app">CLAW · 笔记</div><div class="notif-title">'+s.triggerText+'</div><div class="notif-sub">'+(s.triggerDetail||'')+'</div></div><div class="notif-time">刚刚</div>';
  nb.onclick=()=>{nb.classList.remove('show');pushT(()=>{if(onTap)onTap()},300)};
  // auto dismiss after 4s
  pushT(()=>{if(nb.classList.contains('show')){nb.classList.remove('show');pushT(()=>{if(onTap)onTap()},300)}},4000);
}

// ═══ TRIGGER: NEG-1 SCREEN ═══
function showNeg1Screen(s,onTap){
  showPhonePage(pg=>{
    pg.style.background='linear-gradient(180deg,#1a1a2e 0%,#16213e 100%)';
    // neg-1 screen header
    const hdr=mk('div','');hdr.style.cssText='padding:20px 18px 10px;color:white';

// ═══ RUN SCENE ═══
function runScene(sid){
  clearAll();_scId=sid;_editIdx=0;updateScenePanel();
  const s=SCENES[sid];
  phoneHome();padShowEmpty();

  pushT(()=>{
    if(s.trigger==='superIsland'){
      // 被动：超级岛 → 笔记
      showSuperIsland(s,(choice)=>{
        if(choice==='note'){
          showJump(()=>{phoneOpenNote(s);pushT(()=>{showSyncAnim();pushT(()=>padShowNote(s),500);pushT(()=>autoChainEdits(s),1000)},500)});
        } else {
          showClawChat(s,()=>showJump(()=>{phoneOpenNote(s);pushT(()=>{showSyncAnim();pushT(()=>padShowNote(s),500)},500)}));
        }
      });
      // auto-click note after 2.5s
      pushT(()=>{const si=$('#PH_SI');if(si&&si.classList.contains('show')){const nb=si.querySelector('.si-btn-note');if(nb)nb.click()}},2500);
    }
    else if(s.trigger==='notification'){
      // 被动/半主动：通知 → 笔记
      showNotification(s,()=>{
        showJump(()=>{phoneOpenNote(s);pushT(()=>{showSyncAnim();pushT(()=>padShowNote(s),500);pushT(()=>autoChainEdits(s),1000)},500)});
      });
    }
    else if(s.trigger==='neg1'){
      // 半主动：负一屏 → 笔记
      showNeg1Screen(s,()=>{
        showJump(()=>{phoneOpenNote(s);pushT(()=>{showSyncAnim();pushT(()=>padShowNote(s),500);pushT(()=>autoChainEdits(s),1000)},500)});
      });
    }
    else if(s.trigger==='claw'){
      // 主动：Claw对话 → 结果卡片 → 笔记
      showClawChat(s,()=>{
        showJump(()=>{phoneOpenNote(s);pushT(()=>{showSyncAnim();pushT(()=>padShowNote(s),500);pushT(()=>autoChainEdits(s),1000)},500)});
      });
      // auto-click result card after 4s
      pushT(()=>{const btn=$('#CH_GO_NOTE');if(btn)btn.click()},4000);
    }
    else if(s.trigger==='directNote'){
      // 笔记内编辑：直接打开笔记
      phoneOpenNote(s);pushT(()=>{showSyncAnim();pushT(()=>padShowNote(s),500);pushT(()=>autoChainEdits(s),1000)},500);
    }
  },400);
}

function showJump(cb){
  if(cb)cb();return;
  const pg=$('#PH_SCR .pg');if(!pg){cb();return}
  let ov=pg.querySelector('.jump-overlay');
  if(!ov){ov=mk('div','jump-overlay');ov.innerHTML='<div class="jump-icon">📝</div><div style="font-size:13px;font-weight:600;color:var(--su)">正在跳转到笔记…</div><div style="font-size:10px;color:var(--mu)">Claw → Notes</div>';pg.appendChild(ov)}
  ov.classList.add('show');
  pushT(()=>{ov.classList.remove('show');cb()},700);
}

// ═══ AUTO CHAIN EDITS ═══
async function autoChainEdits(s){
  if(!s||!s.edits)return;
  for(let i=_editIdx;i<s.edits.length;i++){
    _editIdx=i;
    startNoteEdit();await delay(900);stopNoteEdit();await delay(800);
    const edit=s.edits[i];
    if(edit.type==='discuss'){
      await delay(edit.dialog.length*1000+2000);
      const accBtn=$('.inline-disc-acc');if(accBtn)accBtn.click();await delay(400);
    } else {
      await delay(600);
      const accBtn=$('.inline-edit-acc');if(accBtn)accBtn.click();await delay(400);
    }
  }
}

// ═══ AUTO DEMO ═══
async function autoDemo(){
  if(_autoRunning)return;_autoRunning=true;
  const btn=$('#AUTO_BTN');if(btn)btn.textContent='⏳ 演示中…';
  const demoScenes=['rec_end','screenshot','write_email','deep_research','edit_confirm','edit_discuss'];
  for(const sid of demoScenes){
    clearAll();_scId=sid;_editIdx=0;updateScenePanel();
    const s=SCENES[sid];
    phoneHome();padShowEmpty();await delay(400);

    if(s.trigger==='superIsland'){
      await new Promise(resolve=>{
        showSuperIsland(s,(choice)=>{
          showJump(()=>{phoneOpenNote(s);pushT(()=>{showSyncAnim();pushT(()=>padShowNote(s),500)},500);pushT(()=>resolve(),1200)});
        });
        pushT(()=>{const nb=$('#PH_SI .si-btn-note');if(nb)nb.click()},2000);
      });
      await autoChainEdits(s);await delay(600);
    }
    else if(s.trigger==='notification'){
      await new Promise(resolve=>{
        showNotification(s,()=>{
          showJump(()=>{phoneOpenNote(s);pushT(()=>{showSyncAnim();pushT(()=>padShowNote(s),500)},500);pushT(()=>resolve(),1200)});
        });
      });
      await autoChainEdits(s);await delay(600);
    }
    else if(s.trigger==='claw'){
      await new Promise(resolve=>{
        showClawChat(s,()=>{
          showJump(()=>{phoneOpenNote(s);pushT(()=>{showSyncAnim();pushT(()=>padShowNote(s),500)},500);pushT(()=>resolve(),1200)});
        });
        pushT(()=>{const b=$('#CH_GO_NOTE');if(b)b.click()},3500);
      });
      await autoChainEdits(s);await delay(600);
    }
    else if(s.trigger==='directNote'){
      phoneOpenNote(s);await delay(300);showSyncAnim();pushT(()=>padShowNote(s),500);
      await delay(1200);await autoChainEdits(s);await delay(600);
    }
  }
  _autoRunning=false;if(btn)btn.textContent='▶ 自动演示全流程';
}
