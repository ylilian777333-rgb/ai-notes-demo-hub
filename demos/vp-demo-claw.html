<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Claw · 系统级语音光线</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F2F2F7;--bg2:#E8E8ED;
  --card:#FFFFFF;--card2:#F8F8FA;--card3:#F0F0F5;
  --bd:rgba(60,60,67,.08);--bd2:rgba(60,60,67,.14);
  --tx:#1C1C1E;--su:#48484A;--mu:#8E8E93;--dm:rgba(60,60,67,.2);
  --bl:#0A84FF;--am:#FF9F0A;--pu:#BF5AF2;--gn:#30D158;--rd:#FF453A;
  --bl-bg:rgba(10,132,255,.07);--am-bg:rgba(255,159,10,.07);
  --pu-bg:rgba(191,90,242,.07);--gn-bg:rgba(48,209,88,.07);
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.06);
  --r-sm:10px;--r-md:16px;--r-lg:22px;--r-full:999px;
}
html,body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Noto Sans SC',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding:32px 12px 56px}
.hd{text-align:center;margin-bottom:24px}
.hd-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(10,132,255,.08);border-radius:var(--r-full);padding:5px 14px;font-size:10px;letter-spacing:.06em;color:var(--bl);font-weight:600;margin-bottom:10px;border:1px solid rgba(10,132,255,.12)}
.hd-title{font-size:24px;font-weight:800;letter-spacing:-.04em;margin-bottom:5px}
.hd-sub{font-size:12.5px;color:var(--mu);font-weight:400}
.tabs{display:flex;gap:7px;margin-bottom:22px;flex-wrap:wrap;justify-content:center}
.tab{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r-md);padding:8px 16px;cursor:pointer;transition:all .22s;box-shadow:var(--shadow-sm)}
.tab:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.tab .tn{font-weight:700;font-size:12px;color:var(--su)}.tab .ts{font-size:9px;color:var(--mu);margin-top:1px}
.tab.on-bl{border-color:rgba(10,132,255,.25);background:var(--bl-bg)}.tab.on-bl .tn{color:var(--bl)}
.tab.on-am{border-color:rgba(255,159,10,.25);background:var(--am-bg)}.tab.on-am .tn{color:var(--am)}
.tab.on-pu{border-color:rgba(191,90,242,.25);background:var(--pu-bg)}.tab.on-pu .tn{color:var(--pu)}
.tab.on-gn{border-color:rgba(48,209,88,.25);background:var(--gn-bg)}.tab.on-gn .tn{color:var(--gn)}
.tab.on-rd{border-color:rgba(255,69,58,.25);background:rgba(255,69,58,.07)}.tab.on-rd .tn{color:var(--rd)}
.tab.on-cy{border-color:rgba(0,199,190,.25);background:rgba(0,199,190,.07)}.tab.on-cy .tn{color:#00C7BE}
.tab.on-in{border-color:rgba(88,86,214,.25);background:rgba(88,86,214,.07)}.tab.on-in .tn{color:#5856D6}
.tab.on-pk{border-color:rgba(255,45,85,.25);background:rgba(255,45,85,.07)}.tab.on-pk .tn{color:#FF2D55}
.stage{display:flex;gap:20px;align-items:flex-start;justify-content:center;width:100%;max-width:1200px}
.panel{width:290px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
@media(max-width:800px){.panel{display:none}}
.pc{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px;font-size:11px;box-shadow:var(--shadow-sm)}
.pl{font-size:10px;font-weight:700;color:var(--su);letter-spacing:.03em;margin-bottom:10px;display:flex;align-items:center;gap:5px}
/* ── PHONE ── */
.phone{width:300px;height:628px;background:var(--card);border-radius:52px;border:1px solid rgba(0,0,0,.07);position:relative;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.16),0 8px 24px rgba(0,0,0,.08),inset 0 0 0 1.5px rgba(255,255,255,.95);flex-shrink:0}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:88px;height:26px;background:#1C1C1E;border-radius:0 0 20px 20px;z-index:30}
.notch::after{content:'';width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);position:absolute;right:20px;top:9px}
.sbar{position:absolute;top:30px;left:0;right:0;padding:0 22px;display:flex;justify-content:space-between;align-items:center;z-index:20;pointer-events:none}
.sbar-l{font-size:11px;font-weight:700;color:var(--tx)}.sbar-r{display:flex;gap:4px;align-items:center}
.sd{width:5px;height:5px;border-radius:50%;background:var(--bl)}
.screen{position:absolute;inset:0;top:50px;overflow:hidden;background:var(--card2)}
</style>
</head>
<style>
/* ═══ CLAW LINE ═══ */
.claw-line{position:absolute;bottom:0;left:0;right:0;height:4px;z-index:50;cursor:pointer;overflow:visible;animation:claw-breathe 3s ease-in-out infinite}
.claw-line::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,#4F46E5,#7C3AED,#A855F7,#6366F1,#3B82F6,#06B6D4,#7C3AED,#4F46E5);background-size:300% 100%;animation:cf 6s linear infinite;border-radius:2px}
.claw-line::after{content:'';position:absolute;top:-6px;bottom:-6px;left:0;right:0;background:linear-gradient(90deg,rgba(79,70,229,.3),rgba(124,58,237,.4),rgba(168,85,247,.3),rgba(99,102,241,.3),rgba(59,130,246,.3));background-size:300% 100%;animation:cf 6s linear infinite;filter:blur(10px);pointer-events:none}
@keyframes cf{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes claw-breathe{0%,100%{opacity:.65}50%{opacity:1}}
.claw-line.recording{height:6px;animation:none;opacity:1}
.claw-line.recording::before{animation:cf 1.5s linear infinite;background:linear-gradient(90deg,#FF2200,#FF6600,#FF9900,#FFCC00,#FF6600,#FF2200);background-size:300% 100%}
.claw-line.recording::after{top:-10px;bottom:-10px;filter:blur(14px);animation:cf 1.5s linear infinite,cp 1s ease-in-out infinite;background:linear-gradient(90deg,rgba(255,34,0,.4),rgba(255,102,0,.4),rgba(255,153,0,.4),rgba(255,204,0,.4));background-size:300% 100%}
@keyframes cp{0%,100%{opacity:.4}50%{opacity:.9}}
.claw-line.processing{height:5px;animation:none;opacity:1}
.claw-line.processing::before{animation:cf .8s linear infinite;background:linear-gradient(90deg,#00ccff,#00ff88,#00ccff,#0088ff,#00ff88);background-size:300% 100%}
.claw-line.processing::after{top:-8px;bottom:-8px;filter:blur(12px);animation:cf .8s linear infinite;background:linear-gradient(90deg,rgba(0,204,255,.3),rgba(0,255,136,.3),rgba(0,136,255,.3));background-size:300% 100%}
/* ── PAGES ── */
.pg{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s ease,transform .3s ease;overflow:hidden;background:var(--card2)}
.pg.show{opacity:1;transform:none}.pg.hide{opacity:0;transform:translateY(16px);pointer-events:none}
.pg-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:16px}
.pg-scroll::-webkit-scrollbar{width:2px}.pg-scroll::-webkit-scrollbar-thumb{background:var(--dm)}
/* ═══ DESKTOP HOME ═══ */
.desk-wallpaper{position:absolute;inset:0;background:linear-gradient(160deg,#C9D6FF,#E2E2E2)}
.desk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px 10px;padding:16px 18px 10px;position:relative;z-index:1}
.desk-app{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default}
.desk-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.desk-label{font-size:9px;color:#333;font-weight:500;text-shadow:0 0.5px 1px rgba(255,255,255,.6)}
.desk-dock{position:absolute;bottom:10px;left:16px;right:16px;z-index:2;background:rgba(255,255,255,.45);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:22px;padding:8px 12px;display:flex;justify-content:space-around;align-items:center}
.desk-dock-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.desk-hint{position:absolute;bottom:68px;left:0;right:0;text-align:center;z-index:3;pointer-events:none}
.desk-hint-inner{display:inline-block;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);color:white;font-size:9px;font-weight:500;padding:4px 12px;border-radius:12px}
/* 跳转过渡 */
.jump-overlay{position:absolute;inset:0;z-index:55;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.jump-overlay.show{display:flex}
.jump-icon{font-size:32px;animation:jumpPulse 1s ease-in-out infinite}
@keyframes jumpPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.1);opacity:1}}
.jump-text{font-size:13px;font-weight:600;color:var(--su)}.jump-sub{font-size:10px;color:var(--mu)}
/* ═══ REC / PROC PANELS ═══ */
.rec-panel{position:absolute;bottom:14px;left:12px;right:12px;z-index:42;background:rgba(255,255,255,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:20px;border:1px solid rgba(255,255,255,.8);box-shadow:0 12px 40px rgba(0,0,0,.16),0 4px 12px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.06);padding:16px;display:none;flex-direction:column;align-items:center;gap:12px;animation:rec-up .32s cubic-bezier(.25,.46,.45,.94) both}
.rec-panel.show{display:flex}
@keyframes rec-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.rec-panel-label{font-size:11px;font-weight:600;color:var(--su)}.rec-panel-time{font-size:24px;font-weight:300;color:var(--rd);font-variant-numeric:tabular-nums}
.rec-panel-wave{display:flex;align-items:center;gap:2.5px;height:28px}
.rec-panel-wave .wvb{width:2.5px;border-radius:2px;background:var(--rd);transition:height .1s}
.rec-panel-stop{width:48px;height:48px;border-radius:50%;background:linear-gradient(145deg,#FF5A50,#FF453A);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,69,58,.35);transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.rec-panel-stop:active{transform:scale(.92)}.rec-panel-stop::after{content:'';width:16px;height:16px;border-radius:4px;background:white}
.proc-panel{position:absolute;bottom:14px;left:12px;right:12px;z-index:42;background:rgba(255,255,255,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:20px;border:1px solid rgba(255,255,255,.8);box-shadow:0 12px 40px rgba(0,0,0,.16),0 4px 12px rgba(0,0,0,.08);padding:18px;display:none;flex-direction:column;align-items:center;gap:10px;animation:rec-up .32s cubic-bezier(.25,.46,.45,.94) both}
.proc-panel.show{display:flex}
.proc-dots{display:flex;gap:6px}.proc-dot{width:7px;height:7px;border-radius:50%;background:var(--bl);animation:pd 1.2s ease-in-out infinite}.proc-dot:nth-child(2){animation-delay:.2s}.proc-dot:nth-child(3){animation-delay:.4s}
@keyframes pd{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
.proc-label{font-size:11px;font-weight:600;color:var(--su)}
</style>
<style>
/* ── NOTE PAGE ── */
.note-hd{padding:10px 16px 11px;background:var(--card);border-bottom:1px solid var(--bd)}
.note-hd-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.note-back{font-size:11px;color:var(--bl);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.note-acts{display:flex;gap:5px}
.note-act{background:var(--card3);border-radius:8px;padding:4px 8px;font-size:9.5px;font-weight:600;color:var(--su);cursor:pointer;transition:all .15s}
.note-act:hover{background:var(--bd2);color:var(--tx)}
.note-type{font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;margin-bottom:6px}
.note-title{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:4px;letter-spacing:-.02em}
.note-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.note-tag{font-size:9.5px;font-weight:600;padding:2px 9px;border-radius:7px;background:var(--card3);color:var(--su)}
.nbody{padding:13px 16px}
.nh1{font-size:14px;font-weight:800;margin-bottom:8px}
.nh2{font-size:11.5px;font-weight:700;margin:12px 0 5px;display:flex;align-items:center;gap:5px}
.nbd{font-size:11px;color:var(--su);line-height:1.8;white-space:pre-line;padding-left:12px}
/* source banner */
.src-banner{margin:10px 14px 0;border-radius:var(--r-md);overflow:hidden;border:1px solid rgba(10,132,255,.12);background:rgba(10,132,255,.04);cursor:pointer}
.src-banner-hd{display:flex;align-items:center;gap:8px;padding:8px 12px}
.src-banner-icon{width:24px;height:24px;border-radius:50%;background:rgba(10,132,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.src-banner-label{font-size:9px;font-weight:700;color:var(--bl);letter-spacing:.05em;flex:1}
.src-banner-preview{font-size:10.5px;color:var(--su);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:150px}
.src-banner-caret{font-size:9px;color:var(--mu);transition:transform .22s ease;flex-shrink:0}
.src-banner.open .src-banner-caret{transform:rotate(180deg)}
.src-banner-body{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.src-banner.open .src-banner-body{max-height:500px}
.src-banner-quote{padding:6px 10px 9px;font-size:10.5px;color:var(--tx);line-height:1.8;border-left:2px solid rgba(10,132,255,.2);margin:0 12px 10px;background:rgba(10,132,255,.03);border-radius:0 8px 8px 0}
/* ═══ EDIT BAR ═══ */
.edit-bar{position:absolute;bottom:14px;left:10px;right:10px;z-index:45;background:rgba(255,255,255,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:18px;border:1px solid rgba(0,0,0,.06);box-shadow:0 8px 32px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.06);padding:12px;display:none;flex-direction:column;gap:8px}
.edit-bar.show{display:flex}
.edit-bar-cmd{font-size:10px;color:var(--bl);font-weight:600}
.edit-bar-diff{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--bd);font-size:10px}
.edit-bar-before{flex:1;padding:6px 8px;background:#FFF1F0;border-right:1px solid var(--bd)}
.edit-bar-after{flex:1;padding:6px 8px;background:#F0FDF4}
.edit-bar-lbl{font-size:7.5px;font-weight:700;letter-spacing:.07em;margin-bottom:2px}
.edit-bar-before .edit-bar-lbl{color:var(--rd)}.edit-bar-after .edit-bar-lbl{color:var(--gn)}
.edit-bar-txt{line-height:1.5;color:var(--tx)}
.edit-bar-btns{display:flex;gap:8px}
.edit-bar-rej{flex:1;padding:8px;border-radius:10px;font-size:11px;font-weight:600;border:1.5px solid var(--bd2);background:transparent;color:var(--su);cursor:pointer}
.edit-bar-acc{flex:2;padding:8px;border-radius:10px;font-size:11px;font-weight:700;border:none;background:var(--gn);color:white;cursor:pointer;box-shadow:0 4px 12px rgba(48,209,88,.3)}
/* ═══ DISCUSS PANEL ═══ */
.discuss-panel{position:absolute;bottom:14px;left:10px;right:10px;z-index:45;background:rgba(255,255,255,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:18px;border:1px solid rgba(0,0,0,.06);box-shadow:0 8px 32px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.06);padding:0;display:none;flex-direction:column;height:55%;overflow:hidden}
.discuss-panel.show{display:flex}
.disc-hd{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.disc-hd-icon{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#BF5AF2,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:10px;color:white;flex-shrink:0}
.disc-hd-txt{font-size:11px;font-weight:700;color:var(--pu);flex:1}
.disc-hd-close{font-size:12px;color:var(--mu);cursor:pointer;padding:4px}
.disc-thread{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.disc-thread::-webkit-scrollbar{display:none}
.disc-user{display:flex;justify-content:flex-end}
.disc-user-bub{background:linear-gradient(145deg,#BF5AF2,#9333EA);color:white;border-radius:14px 14px 4px 14px;padding:8px 11px;font-size:11px;line-height:1.6;max-width:82%;box-shadow:0 3px 10px rgba(191,90,242,.25)}
.disc-ai{display:flex;gap:6px;align-items:flex-start}
.disc-ai-av{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#4F46E5);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:white;flex-shrink:0;margin-top:2px}
.disc-ai-bub{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.12);border-radius:4px 14px 14px 14px;padding:8px 11px;font-size:11px;line-height:1.6;color:var(--tx);max-width:85%}
.disc-typing{display:flex;gap:4px;padding:4px 0}
.disc-typing-dot{width:5px;height:5px;border-radius:50%;background:var(--pu);animation:pd 1.2s ease-in-out infinite}.disc-typing-dot:nth-child(2){animation-delay:.2s}.disc-typing-dot:nth-child(3){animation-delay:.4s}
.disc-result{margin:6px 0;padding:10px;background:rgba(48,209,88,.05);border:1px solid rgba(48,209,88,.15);border-radius:12px}
.disc-result-lbl{font-size:9px;font-weight:700;color:var(--gn);letter-spacing:.04em;margin-bottom:5px}
.disc-result-txt{font-size:11px;color:var(--tx);line-height:1.6}
.disc-btns{padding:10px 12px;border-top:1px solid var(--bd);display:flex;gap:8px}
.disc-btn-rej{flex:1;padding:8px;border-radius:10px;font-size:11px;font-weight:600;border:1.5px solid var(--bd2);background:transparent;color:var(--su);cursor:pointer}
.disc-btn-acc{flex:2;padding:8px;border-radius:10px;font-size:11px;font-weight:700;border:none;background:var(--gn);color:white;cursor:pointer;box-shadow:0 4px 12px rgba(48,209,88,.3)}
/* ── TRUST / BTNS ── */
/* ═══ CHAT HISTORY PANEL ═══ */
.chat-history{position:absolute;inset:0;z-index:60;background:var(--card);display:none;flex-direction:column}
.chat-history.show{display:flex}
.chat-hist-hd{padding:10px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.chat-hist-hd-back{font-size:11px;color:var(--bl);cursor:pointer;display:inline-flex;align-items:center;gap:3px;flex-shrink:0}
.chat-hist-hd-txt{font-size:11px;font-weight:600;color:var(--su);flex:1;text-align:center}
.chat-hist-hd-placeholder{width:36px;flex-shrink:0}
.chat-hist-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.chat-hist-body::-webkit-scrollbar{width:2px}.chat-hist-body::-webkit-scrollbar-thumb{background:var(--dm)}
.ch-divider{text-align:center;padding:6px 0;font-size:9px;font-weight:700;color:var(--mu);letter-spacing:.05em}
.ch-user{display:flex;justify-content:flex-end}
.ch-user-bub{background:linear-gradient(145deg,#007AFF,#0A84FF);color:white;border-radius:14px 14px 4px 14px;padding:8px 12px;font-size:11px;line-height:1.6;max-width:82%;box-shadow:0 2px 8px rgba(10,132,255,.2)}
.ch-ai{display:flex;gap:6px;align-items:flex-start}
.ch-ai-av{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#4F46E5);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:white;flex-shrink:0;margin-top:2px}
.ch-ai-bub{background:var(--card2);border:1px solid var(--bd);border-radius:4px 14px 14px 14px;padding:8px 12px;font-size:11px;line-height:1.6;color:var(--tx);max-width:85%}
.ch-action{margin:2px 0;padding:6px 10px;background:rgba(48,209,88,.05);border:1px solid rgba(48,209,88,.12);border-radius:10px;font-size:10px;color:var(--gn);font-weight:600;display:flex;align-items:center;gap:5px}
.trust-switch{display:flex;gap:0;background:var(--card3);border-radius:var(--r-md);padding:3px;border:1px solid var(--bd)}

function updateRightPanel(activeStep){
  if(!App._scId)return;const s=SC[App._scId];
  const dot=qs('#RP_DOT');if(dot)dot.style.background=s.color;
  const title=qs('#RP_TITLE');if(title)title.textContent=s.icon+' '+s.name+' · '+s.label;
  const content=qs('#RP_CONTENT');
  if(content){
    const dc=s.edits.filter(e=>e.type==='discuss').length,cc=s.edits.filter(e=>e.type==='confirm').length;
    content.innerHTML=`<div style="font-size:10.5px;color:var(--su);line-height:1.8;padding:4px 0;border-bottom:1px solid var(--bd)">🎙 "${s.src.slice(0,36)}…"</div><div style="display:flex;gap:8px;padding:6px 0"><div style="padding:3px 8px;background:rgba(10,132,255,.06);border-radius:6px;font-size:9px;font-weight:600;color:var(--bl)">确认 ×${cc}</div><div style="padding:3px 8px;background:rgba(191,90,242,.06);border-radius:6px;font-size:9px;font-weight:600;color:var(--pu)">讨论 ×${dc}</div></div>`}
  const flow=qs('#RP_FLOW');
  if(flow&&s.flow){
    flow.innerHTML=s.flow.map((f,i)=>{
      const isActive=activeStep!==undefined&&i===activeStep;
      const isDone=activeStep!==undefined&&i<activeStep;
      const cls=isActive?'active':isDone?'done':'';
      const numBg=isActive?s.color:isDone?'var(--gn)':'var(--mu)';
      const sayHtml=f.say?`<div class="rp-step-script">${f.who==='用户'?'🗣':''}  <em>${f.say}</em></div>`:'';
      const aiHtml=f.ai?`<div class="rp-step-script">🤖 ${f.ai}</div>`:'';
      return `<div class="rp-step ${cls}" style="cursor:pointer" onclick="App.jumpToStep(${i})" title="点击跳转到此步骤"><span class="rp-step-num" style="background:${numBg};color:white">${i+1}</span><span class="rp-step-title">${f.step}</span>${sayHtml}${aiHtml}</div>`;
    }).join('')}
}

  // ── EDIT RECORDING ──
  function startEdit(){
    if(!scId||editIdx>=SC[scId].edits.length)return;
    setFlowStep(4+editIdx);
    const cl=qs('#CLAW');if(cl)cl.classList.add('recording');
    recSec=0;const pg=qs('#SCR .pg');if(!pg)return;
    let rp=pg.querySelector('.rec-panel');
    if(!rp){rp=mk('div','rec-panel');
      rp.innerHTML=`<div class="rec-panel-label">录入编辑指令…</div><div class="rec-panel-time" id="REC_TIME">0:00</div><div class="rec-panel-wave" id="REC_WAVE">${Array.from({length:24},()=>'<div class="wvb" style="height:4px"></div>').join('')}</div><button class="rec-panel-stop" id="REC_STOP"></button>`;
      pg.insertBefore(rp,pg.querySelector('.claw-line'))}
    rp.querySelector('.rec-panel-label').textContent='录入编辑指令…';
    setTimeout(()=>rp.classList.add('show'),10);
    recTimer=setInterval(()=>{recSec++;const m=Math.floor(recSec/60),s=recSec%60;
      const rt=rp.querySelector('#REC_TIME');if(rt)rt.textContent=m+':'+(s<10?'0':'')+s;
      rp.querySelectorAll('.wvb').forEach(b=>{b.style.height=(4+Math.random()*22)+'px'})},200);
    rp.querySelector('#REC_STOP').onclick=()=>stopEdit();
  }
  function stopEdit(){
    if(recTimer){clearInterval(recTimer);recTimer=null}
    const cl=qs('#CLAW');if(cl){cl.classList.remove('recording');cl.classList.add('processing')}
    const pg=qs('#SCR .pg');if(!pg)return;
    const rp=pg.querySelector('.rec-panel');if(rp)rp.classList.remove('show');
    const t=setTimeout(()=>{if(cl)cl.classList.remove('processing');doApplyFlow()},700);timers.push(t);
  }
  // ═══ APPLY FLOW ═══
  function doApplyFlow(){
    if(!scId)return;const s=SC[scId];if(editIdx>=s.edits.length)return;
    const edit=s.edits[editIdx];
    if(edit.type==='discuss'){showDiscuss(edit)}
    else if(trustMode==='A'){showConfirmBar(edit)}
    else{const nb=qs('#NBODY');if(nb)edit.fn(nb);editIdx++;
      const cl2=qs('#CLAW');if(cl2){cl2.classList.add('processing');setTimeout(()=>cl2.classList.remove('processing'),600)}}
  }
  function showConfirmBar(edit){
    const eb=qs('#EDIT_BAR');if(!eb)return;
    eb.innerHTML=`<div class="edit-bar-cmd">🎙 "${edit.cmd}"</div><div class="edit-bar-diff"><div class="edit-bar-before"><div class="edit-bar-lbl">BEFORE</div><div class="edit-bar-txt">${edit.before}</div></div><div class="edit-bar-after"><div class="edit-bar-lbl">AFTER</div><div class="edit-bar-txt">${edit.after}</div></div></div><div class="edit-bar-btns"><button class="edit-bar-rej" onclick="App.rejectEdit()">放弃</button><button class="edit-bar-acc" onclick="App.acceptEdit()">✓ 应用修改</button></div>`;
    eb.classList.add('show');
  }
  function acceptEdit(){const s=SC[scId];if(!s)return;const edit=s.edits[editIdx];
    const nb=qs('#NBODY');if(nb)edit.fn(nb);const eb=qs('#EDIT_BAR');if(eb)eb.classList.remove('show');editIdx++}
  function rejectEdit(){const eb=qs('#EDIT_BAR');if(eb)eb.classList.remove('show');editIdx++}
  // ═══ DISCUSS FLOW ═══
  function showDiscuss(edit){
    const dp=qs('#DISC_PANEL');if(!dp)return;
    dp.innerHTML=`<div class="disc-hd"><div class="disc-hd-icon">💬</div><div class="disc-hd-txt">深入讨论</div><div class="disc-hd-close" onclick="App.cancelDiscuss()">✕</div></div><div class="disc-thread" id="DISC_THREAD"></div><div class="disc-btns" id="DISC_BTNS" style="display:none"><button class="disc-btn-rej" onclick="App.cancelDiscuss()">放弃</button><button class="disc-btn-acc" onclick="App.acceptDiscuss()">✓ 应用方案</button></div>`;
    dp.classList.add('show');
    const thread=dp.querySelector('#DISC_THREAD');const dialog=edit.dialog;let idx=0;
    function showNext(){
      if(idx>=dialog.length){setTimeout(()=>{
        const res=mk('div','disc-result anim-in');res.innerHTML=`<div class="disc-result-lbl">✓ 达成共识</div><div class="disc-result-txt">${edit.result}</div>`;
        thread.appendChild(res);thread.scrollTop=thread.scrollHeight;
        const btns=dp.querySelector('#DISC_BTNS');if(btns)btns.style.display='flex'},400);return}
      const msg=dialog[idx];
      if(msg.role==='ai'){
        const typing=mk('div','disc-ai anim-in');typing.innerHTML='<div class="disc-ai-av">AI</div><div class="disc-typing"><div class="disc-typing-dot"></div><div class="disc-typing-dot"></div><div class="disc-typing-dot"></div></div>';
        thread.appendChild(typing);thread.scrollTop=thread.scrollHeight;
        const t2=setTimeout(()=>{typing.remove();
          const row=mk('div','disc-ai anim-in');row.innerHTML=`<div class="disc-ai-av">AI</div><div class="disc-ai-bub">${msg.text.replace(/\n/g,'<br>')}</div>`;
          thread.appendChild(row);thread.scrollTop=thread.scrollHeight;idx++;
          const t3=setTimeout(showNext,800);timers.push(t3)},1000);timers.push(t2);
      } else {const row=mk('div','disc-user anim-in');row.innerHTML=`<div class="disc-user-bub">${msg.text}</div>`;
        thread.appendChild(row);thread.scrollTop=thread.scrollHeight;idx++;
        const t4=setTimeout(showNext,600);timers.push(t4)}
    }
    const cmdRow=mk('div','disc-user anim-in');cmdRow.innerHTML=`<div class="disc-user-bub">🎙 ${edit.cmd}</div>`;thread.appendChild(cmdRow);
    const t5=setTimeout(()=>{const aiJ=mk('div','disc-ai anim-in');aiJ.innerHTML='<div class="disc-ai-av">AI</div><div class="disc-ai-bub" style="color:var(--pu);font-weight:500;font-size:10px">这个指令比较模糊，我们先讨论一下？</div>';
      thread.appendChild(aiJ);thread.scrollTop=thread.scrollHeight;
      const t6=setTimeout(showNext,800);timers.push(t6)},600);timers.push(t5);
  }
  function acceptDiscuss(){const s=SC[scId];if(!s)return;const edit=s.edits[editIdx];
    const nb=qs('#NBODY');if(nb)edit.fn(nb);const dp=qs('#DISC_PANEL');if(dp)dp.classList.remove('show');editIdx++}
  function cancelDiscuss(){const dp=qs('#DISC_PANEL');if(dp)dp.classList.remove('show');editIdx++}
  // ── CHAT HISTORY PANEL ──
  function showChatHistory(){
    if(!scId)return;const s=SC[scId];
    const ch=qs('#CHAT_HIST');if(!ch)return;
    let html=`<div class="chat-hist-hd"><div class="chat-hist-hd-back" id="CH_CLOSE">‹ 返回</div><div class="chat-hist-hd-txt">对话记录</div><div class="chat-hist-hd-placeholder"></div></div><div class="chat-hist-body">`;
    // 1. initial voice input
    html+=`<div class="ch-divider">── 语音录入 ──</div>`;
    html+=`<div class="ch-user"><div class="ch-user-bub">🎙 ${s.src}</div></div>`;
    html+=`<div class="ch-ai"><div class="ch-ai-av">AI</div><div class="ch-ai-bub">已识别意图：<strong>${s.label}</strong><br/>正在生成结构化${s.name}…</div></div>`;
    html+=`<div class="ch-action">✓ 笔记已生成 · ${s.doc[0].v}</div>`;
    // 2. each edit interaction
    s.edits.forEach((edit,i)=>{
      html+=`<div class="ch-divider">── 编辑指令 ${i+1} ──</div>`;
      html+=`<div class="ch-user"><div class="ch-user-bub">🎙 ${edit.cmd}</div></div>`;
      if(edit.type==='discuss'){
        html+=`<div class="ch-ai"><div class="ch-ai-av">AI</div><div class="ch-ai-bub" style="color:var(--pu);font-weight:500">意图较模糊，发起讨论…</div></div>`;
        edit.dialog.forEach(msg=>{
          if(msg.role==='user'){
            html+=`<div class="ch-user"><div class="ch-user-bub">${msg.text}</div></div>`;
          } else {
            html+=`<div class="ch-ai"><div class="ch-ai-av">AI</div><div class="ch-ai-bub">${msg.text.replace(/\n/g,'<br>')}</div></div>`;
          }
        });
        html+=`<div class="ch-action">✓ 达成共识 · ${edit.result}</div>`;
      } else {
        html+=`<div class="ch-ai"><div class="ch-ai-av">AI</div><div class="ch-ai-bub">识别为明确指令：<br/><span style="text-decoration:line-through;color:var(--rd)">${edit.before}</span> → <span style="color:var(--gn);font-weight:600">${edit.after}</span></div></div>`;
        html+=`<div class="ch-action">✓ 已应用修改</div>`;
      }
    });
    html+=`</div>`;
    ch.innerHTML=html;
    ch.classList.add('show');
    setTimeout(()=>{const closeBtn=qs('#CH_CLOSE');if(closeBtn)closeBtn.onclick=()=>ch.classList.remove('show')},50);
  }
  // ── JUMP TO STEP (clickable right panel) ──
  function jumpToStep(stepIdx){
    if(!scId)return;clearAll();
    const s=SC[scId];
    if(stepIdx<=1){
      // steps 0-1: go home → auto record
      editIdx=0;goHome(true);setTimeout(()=>{startRec();if(stepIdx===0)return;setTimeout(()=>stopRec(),1200)},600);
    } else if(stepIdx===2){
      // step 2: show processing
      editIdx=0;goHome(true);setTimeout(()=>{
        setFlowStep(2);
        const pg=qs('#SCR .pg');if(!pg)return;
        const cl=qs('#CLAW');if(cl){cl.classList.add('processing')}
        let pp=pg.querySelector('.proc-panel');
        if(!pp){pp=mk('div','proc-panel');pp.innerHTML='<div class="proc-dots"><div class="proc-dot"></div><div class="proc-dot"></div><div class="proc-dot"></div></div><div class="proc-label">AI 正在整理…</div>';pg.insertBefore(pp,pg.querySelector('.claw-line'))}
        setTimeout(()=>pp.classList.add('show'),100);
        const t=setTimeout(()=>{if(cl)cl.classList.remove('processing');pp.classList.remove('show');setFlowStep(3);showJumpTransition(pg,()=>{updateRightPanel(3);openNote()})},1200);timers.push(t);
      },600);
    } else if(stepIdx===3){
      // step 3: directly open note
      editIdx=0;setFlowStep(3);openNote();
    } else {
      // step 4+: open note → auto trigger edit at correct editIdx
      const eIdx=stepIdx-4;
      if(eIdx>=s.edits.length)return;
      editIdx=0;openNote();
      setTimeout(()=>{editIdx=eIdx;setFlowStep(stepIdx);startEdit();setTimeout(()=>stopEdit(),1200)},600);
    }
  }
  // ── AUTO CHAIN: after note opens, auto-play all edit steps ──
  async function autoChainEdits(){
    if(!scId)return;const s=SC[scId];
    for(let i=0;i<s.edits.length;i++){
      editIdx=i;setFlowStep(4+i);startEdit();await delay(1000);stopEdit();await delay(900);
      const edit=s.edits[i];
      if(edit.type==='discuss'){await delay(edit.dialog.length*1200+1800);acceptDiscuss();await delay(300)}
      else if(trustMode==='A'){await delay(500);acceptEdit();await delay(300)}
      else{await delay(300)}
    }
  }
  // ── SELECT / TRUST / AUTO / RESET ──
  function select(id){clearAll();scId=id;editIdx=0;updateTabs();updateRightPanel(undefined);goHome(true);
    setTimeout(()=>{startRec();setTimeout(()=>{stopRec();
      // after note opens, auto-chain all edit steps
      const waitForNote=setTimeout(()=>autoChainEdits(),3200);timers.push(waitForNote);
    },1200)},600)}
  function selectEdit(){if(!scId)scId='research';clearAll();editIdx=0;updateTabs();updateRightPanel(4);openNote()}
  function selectDiscuss(){if(!scId)scId='research';clearAll();const s=SC[scId];editIdx=s.edits.findIndex(e=>e.type==='discuss');if(editIdx<0)editIdx=0;updateTabs();updateRightPanel(4+editIdx);openNote();setTimeout(()=>startEdit(),800)}
  function setTrustMode(m){trustMode=m;qs('#TS_A').className='ts-opt'+(m==='A'?' on on-a':'');qs('#TS_B').className='ts-opt'+(m==='B'?' on on-b':'');qs('#TRUST_DESC').textContent=m==='A'?'编辑指令 → Before/After 确认后应用':'编辑指令 → AI 直接应用，无需确认'}
  function autoDemo(){
    if(autoRunning)return;autoRunning=true;
    const btn=qs('#AUTO_BTN');if(btn)btn.textContent='⏳ 演示中…';
    (async()=>{
      for(const id of ['research','meeting']){
        scId=id;editIdx=0;updateTabs();updateRightPanel(0);
        goHome();await delay(500);startRec();await delay(1200);stopRec();await delay(3200);
        for(let i=0;i<SC[id].edits.length;i++){editIdx=i;setFlowStep(4+i);startEdit();await delay(800);stopEdit();await delay(1200);
          const edit=SC[id].edits[i];
          if(edit.type==='discuss'){await delay(edit.dialog.length*1400+2000);acceptDiscuss();await delay(400)}
          else if(trustMode==='A'){await delay(600);acceptEdit();await delay(400)}}
        await delay(600)}
      autoRunning=false;if(btn)btn.textContent='▶ 自动演示完整流程';goHome()})();
  }
  function reset(){clearAll();autoRunning=false;scId=null;editIdx=0;qs('#AUTO_BTN').textContent='▶ 自动演示完整流程';buildTabs();goHome();updateRightPanel(undefined)}

  // ── openScNote: open a specific scenario note from note home ──
  function openScNote(id){scId=id;editIdx=0;updateTabs();openNote()}

  document.addEventListener('DOMContentLoaded',()=>{buildLeftPanel();buildLeftPanel2();buildLeftPanel3();buildLeftPanel4();buildRightPanel();buildTabs();goHome()});
  const pub={select,selectEdit,selectDiscuss,jumpToStep,openScNote,openNoteHome,goHome,startRec,stopRec,startEdit,stopEdit,acceptEdit,rejectEdit,acceptDiscuss,cancelDiscuss,doApplyFlow,autoDemo,reset,setTrustMode};
  Object.defineProperty(pub,'_scId',{get(){return scId}});
  return pub;
})();
</script>
</body>
</html>
